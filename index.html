rmente le comunicazioni. Infatti, è convinto che affrontare le criticità mano a mano che si manifesteranno, le consentirà di intervenire puntualmente sulle singole richieste e, al contempo, di proseguire con le altre attività del progetto."}, {"num": 166, "domanda": "In qualità di Addetto all'Ufficio per il Processo, su incarico del Presidente di una sezione civile, ha sviluppato uno strumento di monitoraggio dei tempi di definizione e dello smaltimento dell'arretrato, utilizzato periodicamente per il controllo degli obiettivi PNRR. In una riunione di coordinamento, lei apprende che un collega AUP sta sviluppando, su mandato del Presidente di altra sezione civile, un sistema analogo basato però su una modalità di estrazione dati differente. I due strumenti rischiano di produrre dati non confrontabili tra le sezioni. Come si comporterebbe in questa situazione?", "efficace": "Contatta il collega AUP per confrontare le impostazioni tecniche dei due strumenti e individuare le differenze nelle modalità di estrazione dei dati. Sulla base del confronto, elabora una proposta di allineamento che renda i dati confrontabili tra le sezioni, mantenendo le specificità richieste da ciascun Presidente. Quindi, sottopone la proposta ai due Presidenti e al MAGRIF civile, evidenziando i benefici di una metodologia condivisa per il monitoraggio degli obiettivi PNRR a livello di ufficio.", "media": "Chiede un confronto con il Presidente della sezione civile, che le ha commissionato lo sviluppo dello strumento in uso. Durante il colloquio, riferisce che un collega AUP di altra sezione civile sta sviluppando un sistema analogo, ma con una diversa modalità di estrazione dei dati, con il rischio di ottenere risultati non confrontabili tra le sezioni. Pertanto, gli chiede come procedere, segnalando la propria disponibilità a confrontarsi con il collega, se ritenuto da lui opportuno.", "inefficace": "Ritiene che la differenza tra i due strumenti rifletta le diverse esigenze delle rispettive sezioni e che ciascun Presidente abbia legittimamente scelto la modalità di estrazione dati più adatta al proprio ambito. Inoltre, crede che l'eventuale problema relativo all'impossibilità di confrontare i dati tra le due sezioni civili rientri tra le valutazioni di competenza della dirigenza e del MAGRIF civile. Dunque, prosegue le proprie attività secondo le modalità concordate con il proprio Presidente di Sezione."}, {"num": 167, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico, il Presidente del Tribunale le chiede di presentare in una riunione di coordinamento le iniziative di digitalizzazione da lei realizzate, illustrando in quale modo esse contribuiscano all'efficienza del servizio giustizia. In particolare, la presentazione dovrà evidenziare l'impatto concreto di ciascuna iniziativa sui tempi di definizione dei procedimenti. Come si comporterebbe in questa situazione?", "efficace": "Organizza la presentazione illustrando, per ciascuna iniziativa, l’impatto concreto sui tempi di definizione: confronta i tempi medi rilevati prima e dopo l’introduzione di ogni intervento, evidenziandone la riduzione. Per le iniziative più recenti, per le quali i dati non sono ancora sufficienti, propone una stima basata su esperienze analoghe già realizzate da altri colleghi. Infine, presenta al Presidente una sintesi dell'impatto complessivo dei suoi contributi sui tempi di definizione.", "media": "Prepara una presentazione in cui descrive le finalità di ciascuna iniziativa di digitalizzazione adottata, illustrando per ciascuna i benefici che si attendeva inizialmente in fase di pianificazione. Poi, cita alcuni esempi, tratti dalla propria esperienza, del modo in cui alcune delle novità da lei introdotte sono state recepite dal personale dell'Ufficio. Infine, sulla base dei riscontri ricevuti dai colleghi, formula una valutazione complessiva del proprio contributo all’efficienza dell’ufficio.", "inefficace": "Struttura la presentazione concentrandosi sull’iniziativa che ritiene più rilevante, ossia quella tecnicamente più complessa, alla quale dedica la quasi totalità del tempo disponibile per illustrarne nel dettaglio le caratteristiche, riservando alle altre iniziative solo un breve cenno finale. Infatti, è convinto del fatto che un’analisi approfondita di un’unica esperienza consenta di trasmettere con maggiore chiarezza il valore del proprio contributo alla digitalizzazione dell’ufficio."}, {"num": 168, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei utilizza quotidianamente i sistemi gestionali dell'ufficio. Una mattina, un collega AUP assente per malattia le comunica telefonicamente le proprie credenziali, chiedendole di accedere al sistema GIADA con il suo profilo per verificare urgentemente un dato. La condivisione delle credenziali è formalmente vietata dalle procedure di sicurezza informatica dell'ufficio, ma il collega insiste sull'urgenza della richiesta. Come si comporterebbe in questa situazione?", "efficace": "Spiega al collega che la condivisione delle credenziali è vietata dalle regole di sicurezza informatica dell'ufficio. Poi, gli chiede che tipo di dato debba verificare e la ragione dell'urgenza, così da individuare una modalità conforme alle procedure per supportarlo. Sulla base di quanto appreso, gli propone diverse soluzioni alternative, come contattare il personale IT per un accesso temporaneo autorizzato o coinvolgere la cancelleria per il recupero del dato.", "media": "Informa il collega che la condivisione delle credenziali è vietata dalle procedure di sicurezza dell'ufficio e che non può procedere in tal senso. Dunque, lo invita a contattare direttamente il personale IT o il proprio Magistrato referente per trovare una soluzione conforme alle regole. Qualora il collega la dovesse ricontattare, provvederà a fornirgli un supporto nei limiti di quanto consentito delle regole imposte dall'ufficio in materia di privacy.", "inefficace": "Accede al sistema GIADA con le credenziali del collega, considerando che l'urgenza sia tale da giustificare una deroga eccezionale alle procedure ordinarie e che un controllo puntuale su un singolo dato non comporti reali rischi per la sicurezza informatica. Dunque, verifica il dato richiesto e lo comunica al collega, ritenendo l'operazione compiuta corretta poiché si è limitato a verificare solo il dato autorizzato dal titolare delle credenziali."}, {"num": 169, "domanda": "In qualità di Addetto all'Ufficio per il Processo, nel corso dell'elaborazione di un report statistico sui flussi dei procedimenti penali, estrae dal sistema GIADA un dataset che contiene, oltre ai dati aggregati necessari per l'analisi, informazioni personali degli imputati. Prima di salvare il dataset nella cartella condivisa con altri colleghi AUP che collaborano alla stesura report, lei si accorge che, di recente, la possibilità di accedere alla cartella è stata estesa anche ad altri utenti, che potrebbero non avere l'autorizzazione necessaria. Come si comporterebbe in questa situazione?", "efficace": "Sospende il salvataggio e informa il Responsabile della Protezione dei Dati e il personale IT della criticità riscontrata, affinché verifichino le autorizzazioni degli utenti che hanno accesso alla cartella. In attesa del loro riscontro, separa dai dati estratti le informazioni personali identificabili e inserisce nella cartella condivisa solo i dati in formato aggregato e anonimo, così da consentire ai colleghi di proseguire con l'elaborazione del report senza interruzioni.", "media": "Sposta il dataset in una cartella personale anziché in quella condivisa, per evitare che i dati personali siano accessibili ad utenti potenzialmente non autorizzati. Poi, segnala al personale IT la situazione riscontrata, chiedendo di verificare esclusivamente le autorizzazioni dei nuovi utenti recentemente aggiunti alla cartella. In attesa di un riscontro, evita temporaneamente di condividere il dataset con i colleghi AUP, e prosegue da solo con l'elaborazione del report.", "inefficace": "Ritiene che i nuovi utenti con accesso alla cartella condivisa siano stati autorizzati a monte da personale qualificato e che, pertanto, possiedano anche le necessarie abilitazioni al trattamento dei dati personali degli imputati. Dunque, salva immediatamente il dataset nella cartella condivisa come da prassi ordinaria e procede con l'elaborazione del report insieme ai colleghi AUP già coinvolti nell'attività, utilizzando il dataset così come estratto dal sistema GIADA."}, {"num": 170, "domanda": "In qualità di Addetto all'Ufficio per il Processo, mentre sta controllando la posta sulla propria casella istituzionale, riceve un messaggio apparentemente proveniente dal Ministero della Giustizia, che la invita a cliccare su un link per aggiornare entro ventiquattro ore le credenziali di accesso ai sistemi gestionali, pena la disattivazione del suo account. Leggendo attentamente l'indirizzo email del mittente, nota che presenta lievi differenze rispetto a quello ufficiale del Ministero. Come si comporterebbe in questa situazione?", "efficace": "Segnala immediatamente il possibile tentativo di phishing al personale IT dell'ufficio, inoltrando l'email per consentirne l'analisi tecnica. Poi, verifica attraverso i canali ufficiali del Ministero se sia in corso una legittima richiesta di aggiornamento delle credenziali. Infine, avverte i colleghi della sezione della circolazione del messaggio potenzialmente fraudolento, invitandoli a non aprire il link contenuto nell'email qualora la ricevano.", "media": "Dopo averlo esaminato, riconosce il messaggio come sospetto e lo cancella dalla propria casella di posta istituzionale, ritenendo che evitare di cliccare sul link e non fornire un riscontro al mittente siano azioni sufficienti ad evitare i rischi di un tentativo di phishing. Poi, avverte a voce il collega della scrivania accanto, descrivendo a grandi linee le caratteristiche del messaggio ricevuto e raccomandando prudenza in caso di ricezione di e-mail simili.", "inefficace": "Non avendo ricevuto comunicazioni ufficiali che segnalano un tentativo di phishing in corso, ritiene che le lievi differenze nell'indirizzo del mittente possano essere dovute a un nuovo dominio ministeriale non ancora noto e decide di cliccare sul link per verificare l'autenticità della pagina di destinazione. Constatando che questa riproduce fedelmente il layout del portale ministeriale, inserisce le proprie credenziali per evitare la disattivazione dell'account."}, {"num": 171, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, nel corso dell'anno ha sviluppato un archivio digitale della giurisprudenza della sezione, destinato a diventare strumento condiviso una volta completato. Per praticità, durante la fase di sviluppo, lo ha conservato esclusivamente sul proprio computer, senza effettuare un backup su sistemi condivisi. Tuttavia ora, a seguito di un guasto irreparabile del suo computer, l'archivio risulta non accessibile e il Presidente le chiede di trovare una soluzione. Come si comporterebbe in questa situazione?", "efficace": "Contatta il personale IT per tentare il recupero dei dati dal computer danneggiato. In attesa del riscontro, elabora un piano di ricostruzione da attivare qualora il recupero non sia possibile, valorizzando l'esperienza maturata nel precedente sviluppo e individuando strategie per velocizzare il lavoro senza sacrificarne la qualità. Infine, comunica al Presidente il piano e propone di conservare il nuovo archivio in una cartella condivisa inserita nel sistema di backup istituzionale.", "media": "Chiede al personale IT di tentare il recupero dei dati dal computer guasto, attendendo il loro riscontro prima di decidere come procedere. Nel frattempo, comunica al Presidente che si impegnerà a ricostruire l'archivio qualora il recupero non fosse possibile, chiedendogli momentaneamente di avere pazienza dato l'imprevisto che si è trovato a dover gestire. Infine, non appena la situazione si sarà normalizzata, si renderà nuovamente disponibile a fornire gli estratti richiesti dal Presidente.", "inefficace": "Spiega al Presidente che la perdita dei dati è dipesa da un guasto tecnico e che il lavoro svolto nel corso dell'anno dovrà essere integralmente rifatto, senza possibilità di recupero. Inoltre, gli riferisce che il processo di ricostruzione richiederà un periodo significativo, durante il quale non potrà garantirgli la consueta attività di supporto nella predisposizione degli estratti richiesti. Non appena le sarà assegnato un nuovo computer, inizierà l'implementazione di un nuovo archivio."}, {"num": 172, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, si trova a predisporre una bozza di relazione su un fascicolo complesso con tempi stretti. Un collega AUP le confida di utilizzare regolarmente uno strumento di intelligenza artificiale disponibile online per velocizzare questo tipo di attività, caricando sulla piattaforma gli atti processuali del fascicolo, inclusi i dati identificativi delle parti. Il collega le suggerisce di fare lo stesso, precisando che i Magistrati non devono venire a conoscenza di questa pratica. Come si comporterebbe in questa situazione?", "efficace": "Spiega al collega che il caricamento di dati processuali identificabili su una piattaforma esterna non autorizzata viola le regole di riservatezza e protezione dei dati, invitandolo a cessare immediatamente la pratica. Infine, dopo aver segnalato la questione al Responsabile Protezione Dati, predispone la propria bozza utilizzando gli strumenti istituzionali disponibili e informa il Magistrato delle eventuali difficoltà nel rispettare la scadenza concordata.", "media": "Declina il suggerimento del collega esprimendo perplessità sul caricamento di dati identificabili su una piattaforma esterna, considerando la pratica rischiosa per la riservatezza delle parti. Piuttosto, valuta di utilizzare lo strumento anonimizzando preventivamente i dati personali presenti nel fascicolo, per beneficiare comunque del risparmio di tempo. Quanto alla condotta del collega, la considera una scelta personale su cui non le compete intervenire.", "inefficace": "Accetta il suggerimento del collega, considerando che la scadenza ristretta giustifichi il ricorso all'intelligenza artificiale e che le condizioni d'uso della piattaforma offrano sufficienti garanzie sulla riservatezza dei dati inseriti. Quindi, carica gli atti sulla piattaforma e utilizza l'output restituitole come base per la bozza della relazione, evitando di menzionare la pratica al proprio Magistrato referente, come suggeritole dal collega."}, {"num": 173, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso un Tribunale, lei e altri due colleghi AUP siete stati assegnati allo stesso Magistrato in modalità mini- pool. Per coordinare le attività del gruppo, il Magistrato referente ha predisposto da poco un calendario condiviso, dove ciascun AUP deve inserire le scadenze e gli adempimenti assegnati. Dopo alcune settimane di utilizzo, lei nota che uno dei suoi colleghi, poco familiare con lo strumento, cancella involontariamente le voci inserite dagli altri membri del gruppo e inserisce le proprie scadenze in date errate. Come si comporterebbe in questa situazione?", "efficace": "Si confronta con il collega per capire quali operazioni gli creino difficoltà e gli mostra direttamente come inserire, modificare e cancellare le voci correttamente, affiancandolo nelle prime operazioni. Poi, predispone una breve guida con le istruzioni passo per passo per le operazioni più frequenti, condividendola con tutto il gruppo. Infine, ripristina le voci cancellate e corregge le date errate, verificando con il Magistrato che il calendario sia allineato con gli adempimenti programmati.", "media": "Corregge di volta in volta gli errori che trova nel calendario, ripristinando le voci cancellate e spostando le scadenze nelle date corrette. Inoltre, segnala al Magistrato referente le difficoltà riscontrate dal collega nell'utilizzo del calendario condiviso, chiedendogli se ritenga opportuno utilizzare un nuovo strumento, più intuitivo, per l'organizzazione del mini-pool. Infine, continua a monitorare il calendario quotidianamente per individuare e correggere eventuali nuovi errori del collega.", "inefficace": "Continua a consultare il calendario condiviso ma evita di farci completamente affidamento, ritenendo che lo strumento sia poco adatto ad un gruppo in cui non tutti possiedono le competenze necessarie per utilizzarlo correttamente. Dunque, gestisce le proprie scadenze annotandole tra i propri appunti personali e aggiorna il calendario condiviso affinché gli altri colleghi possano prendere visione dei propri adempimenti. Per conoscere le scadenze dei colleghi, preferisce domandare direttamente a voce."}, {"num": 174, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico presso la sezione civile di un Tribunale, ha strutturato un sistema di gestione del ruolo delle udienze tramite fogli di calcolo avanzati, costruito sulle specificità organizzative della propria sezione: numero di Magistrati e tipologie di cause trattate. Il Presidente del Tribunale, soddisfatto dei risultati, le chiede di estenderlo a tutte le sezioni dell'ufficio. Tuttavia, le altre sezioni presentano esigenze organizzative diverse e il sistema richiederebbe un significativo lavoro di adattamento. Come si comporterebbe in questa situazione?", "efficace": "Analizza la struttura del sistema per distinguere gli elementi comuni a tutte le sezioni da quelli specifici della propria. Poi, contatta i referenti delle altre sezioni per raccoglierne le esigenze organizzative e, sulla base delle informazioni raccolte, riprogetta il sistema in forma modulare: una struttura comune condivisa e parametri personalizzabili per ciascuna sezione. Infine, presenta al Presidente il piano di estensione con i tempi di adattamento stimati.", "media": "Condivide il sistema con le altre sezioni, accompagnandolo con una nota esplicativa sulle modalità di utilizzo. Poi, chiede ai referenti di ciascuna sezione di segnalargli le modifiche necessarie per adattarlo alle loro esigenze organizzative. Infine, informa il Presidente di aver avviato la distribuzione del sistema e di attendere i riscontri dalle sezioni per procedere con le personalizzazioni, riservandosi di intervenire mano a mano che riceverà le indicazioni.", "inefficace": "Ritenendo che la struttura attuale del sistema funzioni già in maniera ottimale, reputa che tale strutturazione possa essere condivisa senza modifiche sostanziali anche alle altre sezioni. Dunque, trasmette il sistema nella sua forma originale, allegando delle brevi istruzioni sulle corrette modalità di compilazione dei fogli. D'altronde, se necessario, i colleghi potranno effettuare autonomamente eventuali adattamenti specifici, sulla base delle loro esigenze."}, {"num": 175, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Durante la fase di pre- trattazione, esaminando un atto di citazione depositato telematicamente in vista di un'udienza fissata tra tre giorni, lei rileva due tipi di anomalie diverse: la firma digitale dell'avvocato risulta scaduta e il file complessivo supera le dimensioni massime previste per il deposito telematico. Come si comporterebbe in questa situazione?", "efficace": "Distingue le due anomalie per natura e conseguenze: la firma digitale scaduta incide sulla validità giuridica dell'atto, mentre il superamento delle dimensioni è un'irregolarità tecnica del deposito. Poi, riporta al Magistrato entrambe le criticità, evidenziandone le diverse implicazioni processuali all'interno della scheda preparatoria, e si coordina con la cancelleria affinché il difensore venga tempestivamente avvisato della necessità di regolarizzare il deposito prima dell'udienza.", "media": "Segnala al Magistrato le due anomalie riscontrate nell'atto di citazione, chiedendogli indicazioni su come procedere in vista dell'udienza fissata a tre giorni. In attesa di ricevere un riscontro, annota le irregolarità nella scheda preparatoria tra i profili critici da riverificare. Successivamente, valuta la possibilità di contattare la cancelleria per eventuali comunicazioni al difensore depositante e prosegue con l'esame degli altri fascicoli in programma per le udienze della settimana.", "inefficace": "Prende atto delle anomalie ma ritiene che, trattandosi di irregolarità di natura tecnica e non sostanziale, non impediscano la trattazione della causa in udienza. Dunque, annota nella scheda preparatoria le due criticità come osservazioni di carattere tecnico e prosegue con la preparazione degli altri fascicoli in programma, ritenendo che sarà il Magistrato, in sede di udienza, a valutarne la rilevanza processuale e a decidere se richiedere al difensore la regolarizzazione del deposito."}, {"num": 176, "domanda": "In qualità di Addetto all'Ufficio per il Processo che opera da due anni presso la sezione civile di un Tribunale, si rende conto che le proprie competenze informatiche stanno diventando progressivamente obsolete: i sistemi gestionali sono stati aggiornati con nuove funzionalità che non ha ancora appreso e sono stati introdotti nuovi strumenti di analisi statistica che non conosce. Lei è consapevole che percorsi formativi specifici per l'aggiornamento di tali competenze non sono stati ancora previsti all'interno dell'Ufficio. Come si comporterebbe in questa situazione?", "efficace": "Studia i manuali tecnici delle nuove versioni dei sistemi gestionali, sperimentandone le funzionalità in autonomia. Poi, si confronta con i colleghi che già utilizzano i nuovi strumenti di analisi statistica per acquisirne le competenze di base. Infine, propone al Dirigente un piano di aggiornamento strutturato per tutti gli AUP dell'ufficio, evidenziando come in assenza di competenze adeguate si rischi di compromettere la qualità del lavoro e il raggiungimento degli obiettivi PNRR.", "media": "Segnala al Dirigente la necessità di organizzare sessioni formative sulle nuove funzionalità dei sistemi gestionali e sugli strumenti di analisi recentemente introdotti, chiedendogli di valutare la possibilità di attivare percorsi di aggiornamento specifici per gli AUP della propria sezione. In attesa di un riscontro, inizia a consultare la documentazione tecnica disponibile sulle principali novità introdotte, dedicandovi il tempo che riesce a ritagliare tra le attività ordinarie.", "inefficace": "Ritiene che l'aggiornamento delle competenze informatiche del personale rientri tra le responsabilità dell'ufficio e che, in assenza di percorsi formativi strutturati, proseguire nell'utilizzo delle funzionalità già acquisite sia la scelta più prudente per evitare errori operativi derivanti da un apprendimento non guidato. Pertanto, continua a lavorare con le versioni e gli strumenti che già padroneggia, rimandando l'aggiornamento a quando saranno predisposte le apposite sessioni formative."}, {"num": 177, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico presso la sezione civile di un Tribunale, il Dirigente amministrativo le chiede di predisporre una bozza di linee guida operative per l'utilizzo quotidiano dei sistemi gestionali e del fascicolo telematico, destinate agli altri AUP della sezione. Le linee guida dovranno coprire le operazioni più frequenti, dalla consultazione dei registri alla gestione delle comunicazioni PEC, tenendo conto dei diversi livelli di competenza informatica presenti tra i colleghi. Come si comporterebbe in questa situazione?", "efficace": "Per strutturare il lavoro sulla base delle reali esigenze dei colleghi, indaga quali operazioni risultano più complesse e quali sono le criticità ricorrenti nell’uso dei sistemi. In virtù di tale analisi, organizza le linee guida distinguendo le procedure necessarie per le attività di base dagli approfondimenti sulle funzionalità più avanzate. Infine, sottopone la bozza al Dirigente per la validazione e propone di aggiornarla periodicamente in funzione delle novità introdotte nei sistemi.", "media": "Decide di predisporre le linee guida basandosi sulla propria esperienza quotidiana con i sistemi gestionali, descrivendo le operazioni più frequenti che le capita di svolgere durante una giornata lavorativa ordinaria. Poi, per ciascuna operazione descritta, inserisce un breve approfondimento con i passaggi necessari per eseguirla, cercando di utilizzare un linguaggio accessibile. Infine, trasmette la bozza al Dirigente per la revisione, chiedendogli se sia conforme alle sue aspettative.", "inefficace": "Ritenendo che un documento completo e dettagliato rappresenti il riferimento più utile per guidare i colleghi nell'utilizzo dei sistemi digitali, indipendentemente dal loro livello di competenza, redige le linee guida elencando in modo sistematico tutte le funzionalità disponibili, dalla più semplice alla più complessa. Inoltre, si impegna a riprodurre in maniera fedele il contenuto dei manuali tecnici forniti dal personale IT. Infine, invia la bozza al Dirigente nel formato richiesto."}, {"num": 178, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, arrivando al mattino in ufficio apre il file Word di una scheda preparatoria su cui stava lavorando il giorno prima e nota che l'ultima modifica risale alle ore 3:14 della notte. Dal momento che l'ultima operazione da lei effettuata sul file risale alla pomeriggio precedente e nessun altro collega aveva motivo di intervenire sul documento, lei sospetta che le proprie credenziali possano essere state compromesse. Come si comporterebbe in questa situazione?", "efficace": "Segnala subito l'accesso sospetto al personale IT, descrivendo l'anomalia riscontrata e chiedendo una verifica sugli accessi effettuati con le proprie credenziali nelle ultime ore. Poi, modifica la propria password di accesso al computer e verifica se altri file presenti sulla sua postazione presentino modifiche anomale. Infine, informa il Magistrato referente che la scheda preparatoria potrebbe essere stata compromessa, riservandosi di verificarne l'integrità prima di utilizzarla in udienza.", "media": "Apre il file Word della scheda preparatoria ed esamina il contenuto cercando di individuare eventuali modifiche rispetto alla versione su cui stava lavorando il giorno prima. Poi, per precauzione, modifica la propria password di accesso del proprio computer, ritenendo che questa misura sia sufficiente a prevenire eventuali accessi futuri. Infine, si ripropone di monitorare nei giorni successivi se si verifichino ulteriori episodi analoghi, prima di decidere se segnalare la questione al personale IT.", "inefficace": "Attribuisce la modifica notturna ad un aggiornamento automatico del computer, ritenendo improbabile che qualcuno abbia utilizzato le sue credenziali per accedere ad un singolo file di lavoro. Per sicurezza, rilegge le prime righe della scheda preparatoria per verificare che risultino invariate rispetto alla versione su cui stava lavorando il giorno precedente. Una volta completato tale controllo, prosegue con la redazione delle parti restanti della scheda, considerando l’episodio non rilevante."}, {"num": 179, "domanda": "Lei è un Addetto all'Ufficio per il Processo presso la sezione civile di una Corte d'Appello. A seguito del rilascio di una nuova versione del sistema SICID, che modifica le procedure di deposito telematico e alcune funzionalità per lo spoglio dei fascicoli, lei partecipa ad una corso di formazione online. Al termine di tale iniziativa, lei si rende conto che quanto appreso non è sufficiente a metterla nelle condizioni di operare autonomamente con il sistema aggiornato. Come si comporterebbe in questa situazione?", "efficace": "Individua le funzionalità su cui riscontra maggiori difficoltà e le approfondisce autonomamente, consultando le note di rilascio della nuova versione. Poi, si confronta con i colleghi che hanno più dimestichezza con il sistema aggiornato, chiedendo loro di mostrarle operativamente i passaggi che ritiene più critici. Infine, segnala al Dirigente che la formazione erogata potrebbe risultare insufficiente anche per altri colleghi, proponendo una sessione integrativa sulle funzionalità di uso quotidiano.", "media": "Chiede al personale IT di poter partecipare a una seconda sessione formativa o di ricevere un supporto individuale sulle funzionalità che non ha compreso durante il corso. In attesa del riscontro, inizia a consultare il manuale tecnico della nuova versione, concentrandosi sulle procedure che utilizza più frequentemente nello spoglio dei fascicoli. Inoltre, prova ad utilizzare il sistema aggiornato per le operazioni più semplici, rimandando quelle complesse a quando avrà acquisito maggiore sicurezza.", "inefficace": "Ritiene che la familiarità con le nuove funzionalità si sviluppi gradualmente attraverso l’uso quotidiano. Pertanto, decide di adottare un approccio prudente: utilizza la versione aggiornata del SICID solo per le operazioni non più gestibili con quella precedente, mentre per le rimanenti attività continua a servirsi delle procedure già collaudate. In questo modo, evita che il tempo necessario all’apprendimento incida negativamente sui tempi di evasione delle pratiche in programma."}, {"num": 180, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, trasmette telematicamente alla Corte d'Appello un fascicolo civile composto da centoventi documenti in formato PDF. Il sistema genera regolare ricevuta di consegna ma, il giorno seguente all'invio, la cancelleria della Corte d'Appello le segnala che tre documenti risultano corrotti e illeggibili nella versione ricevuta. Come si comporterebbe in questa situazione?", "efficace": "Individua i tre documenti segnalati e verifica se le versioni originali conservate sulla propria postazione risultino integre e leggibili. Poi, dopo aver accertato l'integrità degli originali, procede al nuovo invio dei soli tre documenti alla cancelleria della Corte d'Appello, verificandone la corretta ricezione. Infine, segnala al personale IT l'anomalia nella trasmissione e propone di introdurre un controllo di integrità dei file prima e dopo ogni trasmissione.", "media": "Riesamina il materiale inviato per cercare di individuare quali siano i tre documenti corrotti. Poi, procede a un nuovo invio dell'intero fascicolo, ritenendo che rinviare tutti i centoventi documenti sia il modo più sicuro per garantire la completezza e l'integrità della trasmissione. Infine, invia un'e-mail alla cancelleria della Corte d'Appello per segnalare l’avvenuto reinvio del documento, chiedendo di segnalargli tempestivamente eventuali ulteriori anomalie.", "inefficace": "Prova a riaprire il documento sul proprio computer e, non riscontrando alcuna criticità, conclude che la corruzione dei tre file sia imputabile esclusivamente ad un problema tecnico degli uffici della Corte d’Appello. Pertanto, considerato che il fascicolo è già stato regolarmente trasmesso con ricevuta di consegna, suggerisce alla cancelleria di rivolgersi al proprio servizio IT per verificare l’anomalia e procedere al recupero dei tre file danneggiati."}, {"num": 181, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei ha trasmesso le comunicazioni PEC alle parti in vista delle udienze della settimana successiva. A distanza di un giorno dall'invio, lei si accorge che per due destinatari il sistema ha generato un avviso di mancata consegna con il messaggio \"Errore 5.2.2 – casella piena\". Inoltre, per altri tre destinatari, pur avendo ricevuto regolare ricevuta di accettazione, a ventiquattro ore dall'invio la ricevuta di consegna non risulta ancora pervenuta. Come si comporterebbe in questa situazione?", "efficace": "Distingue le due criticità per affrontarle separatamente. Per i destinatari con casella piena, si coordina con la cancelleria per procedere con un nuovo invio tramite ufficiale giudiziario. Per quelli che presentano la ricevuta di accettazione ma non la conferma di consegna, invece, contatta il personale IT per verificare se si tratti di un ritardo tecnico del gestore della PEC. Infine, informa il responsabile della cancelleria civile di entrambe le situazioni e delle azioni intraprese.", "media": "Segnala al responsabile della cancelleria entrambe le criticità riscontrate, chiedendogli indicazioni su come procedere per i destinatari con casella piena e per quelli di cui non ha ancora ricevuto conferma di consegna. Nel frattempo, nella speranza che si sia liberato dello spazio, tenta un nuovo invio all'indirizzo PEC dei due destinatari con casella piena. Per le ricevute di consegna mancanti, invece, decide di attendere ancora qualche ora prima di effettuare ulteriori verifiche.", "inefficace": "Considera che i due avvisi di casella piena rappresentino un problema imputabile ai destinatari stessi, che dovrebbero controllare periodicamente che lo spazio nella propria casella PEC sia sufficiente per trasmettere e ricevere tutte le comunicazioni necessarie. Quanto alle ricevute di consegna mancanti, le attribuisce ad un normale ritardo del sistema, ritenendo che perverranno certamente nelle ore successive. Nel frattempo, decide di proseguire con le altre attività in programma."}, {"num": 182, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico presso la sezione civile di un Tribunale, lei è stato incaricato dal Dirigente di elaborare il report trimestrale sui flussi dei procedimenti. Controllando i dati estratti dal SICID, lei rileva che il 4% dei record presenta anomalie: date di iscrizione successive alle date di definizione, procedimenti definiti due volte con provvedimenti diversi e codici materia non corrispondenti alla classificazione ufficiale. Come si comporterebbe in questa situazione?", "efficace": "Classifica le anomalie per tipologia e ne indaga le cause, verificando i dati direttamente nei fascicoli e nei registri da cui sono stati estrapolati. Poi, corregge autonomamente le incongruenze risolvibili attraverso riscontro documentale e segnala al personale IT quelle riconducibili a malfunzionamenti di sistema. Infine, trasmette al Dirigente il report corretto, unitamente ad una nota che documenta le anomalie riscontrate, le correzioni apportate e le segnalazioni effettuate.", "media": "Individua i record anomali e li esclude dall'elaborazione per evitare che alterino i risultati complessivi del report. Poi, segnala al Dirigente le anomalie riscontrate e gli chiede se l'approccio adottato sia corretto o se preferisca una diversa modalità di gestione dei dati. Dopo aver ricevuto conferma di poter procedere in tal modo, completa il report con i dati che non presentano incongruenze e lo trasmette al Dirigente, annotando il numero complessivo dei record esclusi.", "inefficace": "Procede con l'elaborazione del report includendo tutti i dati estratti dal sistema, ritenendo che le anomalie rilevate rappresentino una quota statisticamente trascurabile rispetto al volume complessivo dei record esaminati. Dunque, evita di intervenire manualmente sulle singole incongruenze per non rischiare di introdurre distorsioni soggettive nell'analisi e utilizza i dati del SICID così come sono stati generati dal sistema ufficiale. Infine, completa il report e lo trasmette al Dirigente."}, {"num": 183, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, dopo alcuni mesi di lavoro in modalità mista — tre giorni in presenza e due in smart working — nota che la propria produttività nelle giornate da remoto è sensibilmente inferiore rispetto a quelle in ufficio. In particolare, si trova spesso a dover interrompere il lavoro perché alcune attività richiedono l'accesso a fascicoli cartacei o il coordinamento diretto con la cancelleria, possibili solo dall'ufficio. Come si comporterebbe in questa situazione?", "efficace": "Analizza le attività che svolge abitualmente classificandole in base alla possibilità di eseguirle o meno da remoto: ricerca giurisprudenziale, redazione di schede da fascicoli telematici e analisi statistiche per le giornate di smart working; spoglio dei fascicoli cartacei e raccordo con la cancelleria per i giorni in presenza. Poi, elabora un nuovo schema operativo delle attività e lo condivide con il Dirigente e il Magistrato referente per verificarne la compatibilità con le esigenze della sezione.", "media": "Chiede al Dirigente di rivedere la distribuzione delle giornate di smart working originariamente concordate, proponendo di spostarle di settimana in settimana in date che non richiedano la propria presenza in ufficio. Successivamente, predispone un elenco delle attività che richiedono il coordinamento con la cancelleria e l’accesso ai fascicoli cartacei, così da identificarle chiaramente e poterle lasciare temporaneamente in sospeso durante il lavoro agile, riprendendole al rientro in presenza.", "inefficace": "Attribuisce la minore produttività alle limitazioni intrinseche del lavoro da remoto, ritenendo che le mansioni dell'AUP richiedano necessariamente la presenza fisica in ufficio e che lo smart working sia strutturalmente meno efficiente per il tipo di attività che svolge. Dunque, propone al Dirigente di ridurre le giornate di smart working da due a una alla settimana, considerando che la maggiore presenza in ufficio garantirebbe risultati migliori in termini di produttività e qualità del lavoro."}, {"num": 184, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico, il Dirigente le chiede di preparare un dataset sui flussi dei procedimenti civili destinato a un ricercatore universitario che conduce uno studio sui tempi della giustizia. La convenzione tra l'università e il Ministero è già stata verificata e la condivisione dei dati autorizzata. Durante l'estrazione dal SICID, lei si accorge però che il dataset contiene, oltre ai dati aggregati richiesti, informazioni che potrebbero consentire l'identificazione indiretta delle parti dei procedimenti. Come si comporterebbe in questa situazione?", "efficace": "Sospende la trasmissione del dataset e separa le informazioni potenzialmente identificabili dai dati aggregati necessari alla ricerca, conservando nel file da condividere esclusivamente dati in forma anonima. Poi, consulta il Responsabile Protezione Dati per verificare che il livello di anonimizzazione adottato sia adeguato e conforme alla normativa. Infine, informa il Dirigente delle misure adottate e gli trasmette il dataset depurato, pronto per la condivisione con il ricercatore.", "media": "Segnala al Dirigente che il dataset estratto dal SICID contiene, oltre ai dati aggregati, informazioni che potrebbero consentire l'identificazione delle parti e gli chiede se deve procedere alla loro anonimizzazione. Nel frattempo, individua i campi del dataset che presentano dati potenzialmente identificabili e prepara una versione preliminare del file con tali campi evidenziati, riflettendo su quali possano essere delle possibili opzioni di anonimizzazione da sottoporre al Dirigente.", "inefficace": "Decide di predisporre il dataset richiesto dal Dirigente utilizzando i dati così come estratti dal SICID, ritenendo che l’autorizzazione alla condivisione già concessa copra l’intero contenuto dell’estrazione. Successivamente, li organizza in un report chiaro e facilmente consultabile per il ricercatore, aggiungendo un indice delle tabelle e una legenda dei codici utilizzati per l'estrazione dei dati. Infine, terminato il lavoro, comunica al Dirigente che il dataset è pronto per l’invio."}, {"num": 185, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, nell'ambito di un progetto di digitalizzazione degli atti processuali cartacei precedenti all'introduzione del fascicolo telematico, si accorge che lo scanner in dotazione all'ufficio produce scansioni di qualità insufficiente: testo sfocato parzialmente illeggibile e livello di contrasto inadeguato. Lei arriva alla conclusione che proseguire con la qualità attuale consentirebbe di rispettare i tempi previsti ma renderebbe gli atti difficilmente consultabili. Come si comporterebbe in questa situazione?", "efficace": "Segnala il problema al personale IT, chiedendo una verifica dello scanner e la calibrazione o, se necessario, la sostituzione. Poi, aggiorna il Dirigente, evidenziando che proseguire il lavoro con l’attuale qualità di scansione produrrebbe un archivio digitale inutilizzabile e comprometterebbe il progetto. Dunque, propone un cronoprogramma rivisto, che tenga conto sia della qualità delle scansioni sia delle tempistiche auspicabili entro cui terminare il progetto.", "media": "Segnala al Dirigente che lo scanner produce scansioni di qualità insufficiente e gli chiede se debba proseguire comunque il lavoro per ultimare il progetto entro i tempi o attendere la risoluzione del problema tecnico. In attesa della sua decisione, contatta il personale IT per segnalare il malfunzionamento, richiedendo una stima dei tempi previsti per l'intervento, e prosegue con la scansione dei documenti con testo meno fitto, la cui qualità risulta accettabile.", "inefficace": "Prosegue con la digitalizzazione degli atti mantenendo il ritmo di lavoro previsto, ritenendo che una scansione di qualità imperfetta sia comunque preferibile all'assenza di una versione digitale e che eventuali problemi riguardanti la leggibilità del testo potranno essere affrontati in un secondo momento, migliorando le singole scansioni su richiesta dei Magistrati che ne avranno bisogno. Dunque, si impegna attivamente per completare il progetto entro i tempi previsti."}, {"num": 186, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, il Dirigente ha recentemente introdotto un nuovo applicativo per il monitoraggio delle scadenze processuali, destinato a sostituire i fogli di calcolo Excel. Il nuovo strumento consente la condivisione in tempo reale dei dati tra colleghi e la generazione automatica di report, ma presenta un'interfaccia più complessa e tempi di inserimento più lunghi rispetto ad Excel. Casualmente, lei si accorge che alcuni colleghi continuano a utilizzare Excel parallelamente al nuovo strumento, generando disallineamenti nei dati. Come si comporterebbe in questa situazione?", "efficace": "Analizza le ragioni per cui i colleghi continuano a preferire Excel, identificando le operazioni del nuovo applicativo che risultano più problematiche nell'uso quotidiano. Poi, segnala al Dirigente le criticità riscontrate e gli propone un piano di transizione che preveda sessioni di affiancamento ai colleghi sulle funzionalità più ostiche e, parallelamente, una raccolta delle criticità dell'interfaccia da sottoporre al personale IT per eventuali miglioramenti.", "media": "Segnala al Dirigente di aver notato che alcuni colleghi continuano a utilizzare Excel in parallelo al nuovo applicativo, con il rischio di generare disallineamenti nei dati della sezione. Poi, gli chiede come intenda affrontare la situazione e se ritenga opportuno stabilire una data precisa entro cui passare definitivamente al nuovo strumento. Infine, si rende disponibile a supportare eventuali iniziative che il Dirigente vorrà adottare per favorire la transizione.", "inefficace": "Dopo aver appurato che il nuovo applicativo è realmente più complesso di Excel per le operazioni quotidiane e che l'interfaccia meno intuitiva rallenta il lavoro della sezione, giustifica il comportamento dei colleghi. Pertanto, evita di riferire al Dirigente chi utilizza entrambi gli strumenti, considerando un buon compromesso inserire i dati nel nuovo applicativo solo quando strettamente necessario e mantenere Excel come riferimento principale per il proprio lavoro."}, {"num": 187, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, controllando la casella PEC istituzionale, lei trova un messaggio che apparentemente proviene da un avvocato e presenta in allegato un file denominato \"atto_citazione_urgente.exe\". Il messaggio la invita ad aprire immediatamente l'allegato per visionare un atto processuale urgente. Tuttavia, lei non riconosce il mittente tra i professionisti con cui ha avuto contatti recenti. Come si comporterebbe in questa situazione?", "efficace": "Riconosce nel file con estensione \".exe\" un indicatore di contenuto potenzialmente malevolo, poiché gli atti processuali vengono trasmessi esclusivamente in formato PDF. Quindi, segnala il messaggio al personale IT, inoltrando l'email per l'analisi tecnica del contenuto. Se quest'ultimo dovesse confermare la natura fraudolenta del messaggio, informerà il Dirigente della necessità di avvertire tutti i colleghi dell'ufficio del rischio tramite una comunicazione ufficiale.", "media": "Insospettito dall'estensione \".exe\" del file allegato e dal mittente sconosciuto, decide di non aprire l'allegato ed elimina il messaggio dalla propria casella PEC istituzionale. Poi, convinto di aver neutralizzato il rischio derivante dall'aprire il messaggio fraudolento eliminandolo dalla propria casella, prosegue con il controllo puntuale delle altre comunicazioni PEC in programma e invia una e- mail ordinaria al servizio IT descrivendo l'azione adottata.", "inefficace": "Apre l'allegato per verificarne il contenuto, ritenendo che il messaggio possa provenire da un avvocato con cui non ha ancora avuto occasione di interagire e che l'urgenza dichiarata richieda una verifica immediata. Dopo aver constatato che il file non permette di accedere ad alcun documento leggibile, lo chiude e lo elimina dalla propria casella PEC. Dunque, prosegue con le altre attività in programma, considerando l'episodio come un invio errato da parte del mittente."}, {"num": 188, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, durante una giornata di smart working la chiavetta USB su cui aveva salvato le schede preparatorie per le udienze della settimana smette improvvisamente di funzionare, impedendole di accedere ai file. Le schede, frutto di diversi giorni di spoglio, erano conservate esclusivamente sulla chiavetta. Il Magistrato referente attende le schede entro il termine della giornata per la preparazione delle udienze. Come si comporterebbe in questa situazione?", "efficace": "Contatta il personale IT per verificare la possibilità di recuperare i dati dalla chiavetta danneggiata. In attesa del loro riscontro, accede da remoto al fascicolo telematico e al SICID per ricostruire le schede, sfruttando la conoscenza maturata sui fascicoli già lavorati. Nel frattempo, segnala al Magistrato il piano di recupero adottato e riconosce, per il futuro, la necessità di archiviare le schede preparatorie in una cartella condivisa inclusa nel sistema di backup istituzionale.", "media": "Informa il Magistrato dell'imprevisto, spiegandogli che la chiavetta contenente le schede preparatorie ha smesso di funzionare e chiedendogli almeno un giorno aggiuntivo per la consegna del lavoro. Successivamente, contatta il personale IT descrivendo il problema e chiedendo se sia possibile recuperare i dati entro poche ore. Qualora il recupero non fosse possibile, si renderà disponibile a ricostruire le schede lavorando fino a sera sulla base dei dati accessibili da remoto.", "inefficace": "Comunica al Magistrato che le schede preparatorie per le udienze della settimana sono andate perse a causa di un guasto alla chiavetta USB e che il lavoro dovrà essere rifatto da zero. Pertanto, gli chiede una proroga di tre o quattro giorni per poterle ricostruire integralmente, precisando che tale estensione nelle tempistiche potrebbe rendere opportuno valutare anche il rinvio delle udienze già programmate, così da disporre del tempo necessario per completare il lavoro."}, {"num": 189, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Una mattina, appena arrivato in ufficio, accende il computer e si trova sullo schermo un messaggio che la informa che tutti i suoi file sono stati bloccati da un programma malevolo e che per ripristinarli è necessario effettuare un pagamento entro quarantotto ore. Provando ad aprire alcuni file di lavoro, lei constata che, nonostante il computer risulti connesso regolarmente alla rete interna dell'ufficio, alcuni file risultano effettivamente inaccessibili. Come si comporterebbe in questa situazione?", "efficace": "Disconnette il computer dalla rete interna dell'ufficio per impedire che il programma malevolo si propaghi alle altre postazioni. Poi, contatta il personale IT descrivendo il messaggio comparso sullo schermo e il numero di file resi inaccessibili, chiedendo un intervento urgente per la messa in sicurezza del sistema e il recupero dei dati. Infine, informa il Magistrato referente e il Dirigente della situazione, specificando che il personale tecnico è stato già allertato e sta intervenendo.", "media": "Spegne il computer, ritenendo che l’arresto del sistema possa limitare la diffusione del programma malevolo ad altre postazioni, e contatta il personale IT per segnalare l’accaduto. Poi, riferisce al Magistrato referente che alcuni file su cui lei stava lavorando potrebbero essere compromessi e che è già stato richiesto l’intervento tecnico. In attesa delle opportune verifiche, si astiene dal compiere qualsiasi ulteriore operazione sul computer fino all’arrivo del personale IT.", "inefficace": "Chiude subito il messaggio, ritenendolo un comune tentativo di truffa online che simula minacce informatiche per indurre gli utenti ad effettuare pagamenti non dovuti. Così, riavvia il computer e, constatando che alcuni file risultano ancora inaccessibili, prosegue con le attività della giornata lavorando esclusivamente sui documenti ancora consultabili. Infine, menziona il messaggio ad alcuni colleghi, descrivendoglielo come un semplice tentativo di truffa che deve essere ignorato."}, {"num": 190, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, nel corso della giornata lavorativa invia per errore a tutti i colleghi della sezione un'email contenente una bozza di relazione su un fascicolo, destinata esclusivamente al Magistrato referente. La bozza contiene le proprie valutazioni preliminari sulle questioni processuali del caso e non è ancora stata revisionata dal Magistrato. Lei si accorge dell'errore solo pochi minuti dopo l'invio. Come si comporterebbe in questa situazione?", "efficace": "Invia un secondo messaggio a tutti i destinatari chiedendo di eliminare l'email precedente e di non considerarne il contenuto. Poi, contatta il Magistrato referente per informarlo dell'accaduto prima che venga a conoscenza della bozza attraverso altri colleghi. Infine, chiede al personale IT di verificare che nessun collega abbia inoltrato il documento e gli propone di valutare l'attivazione di una funzione di conferma prima dell'invio a destinatari multipli.", "media": "Invia un messaggio di scuse a tutti i colleghi destinatari chiedendo di ignorare l'email precedente e di eliminare la bozza ricevuta, spiegando che si è trattato di un invio errato. Successivamente, contatta il Magistrato referente per informarlo dell'accaduto e per trasmettergli la bozza al suo indirizzo e-mail corretto. Per il futuro, si ripromette di prestare maggiore attenzione nella verifica dei destinatari prima di procedere con gli invii delle comunicazioni.", "inefficace": "Ritiene che l'errore, seppur spiacevole, non abbia conseguenze significative e non reputa necessario alcun intervento correttivo dal momento che i destinatari, essendo colleghi della stessa sezione, avranno già compreso autonomamente la natura erronea dell'invio. Pertanto, trasmette un nuovo messaggio all'indirizzo corretto del Magistrato referente, contenente la bozza originariamente prevista e una breve nota in cui lo informa dell'invio accidentale ad altri colleghi."}, {"num": 191, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Utilizzando il registro SICID per la gestione ordinaria del ruolo, lei scopre accidentalmente che inserendo una specifica sequenza di caratteri nel campo di ricerca è possibile visualizzare dati di procedimenti di altre sezioni per cui lei non dispone di autorizzazione, inclusi fascicoli relativi a separazioni e affidamento di minori, con dati particolarmente sensibili. Come si comporterebbe in questa situazione?", "efficace": "Interrompe l'azione di ricerca per evitare accessi non autorizzati e segnala la vulnerabilità al personale IT, descrivendo con precisione la sequenza di caratteri che consente di aggirare i controlli di accesso nel sistema. Quindi, informa il Dirigente della criticità riscontrata, evidenziando che tale difetto nella sicurezza del sistema potrebbe comprometterne l'affidabilità complessiva e che, avendolo scoperto per caso, anche altri utenti potrebbero esserne già venuti a conoscenza.", "media": "Per verificare che non si tratti di un’anomalia occasionale, ripete la procedura di inserimento del codice nel campo di ricerca una seconda volta. Successivamente, una volta accertata la persistenza del problema, segnala la vulnerabilità al personale IT, descrivendo la sequenza di caratteri che consente di visualizzare i dati di altre sezioni e richiedendo un intervento correttivo. Infine, ritenendo sufficiente la segnalazione già effettuata, prosegue con le proprie attività.", "inefficace": "Considera la vulnerabilità un'anomalia tecnica di portata limitata, dal momento che l'accesso ai dati richiede una sequenza specifica di caratteri difficilmente riproducibile per caso da altri utenti. Dunque, annota il problema tra i propri appunti di lavoro e si ripropone di menzionarlo al personale IT alla prima occasione utile, senza attribuirgli particolare urgenza. Infine, prosegue con la gestione ordinaria del ruolo, evitando di utilizzare nuovamente la sequenza in questione."}, {"num": 192, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico, sta effettuando il backup mensile dell'archivio giurisprudenziale della sezione, che contiene tre anni di classificazione e indicizzazione delle sentenze. Improvvisamente, il processo si interrompe, segnalando un messaggio di errore generico, e lei non riesce a determinare se il backup sia stato completato, parzialmente completato o mai avviato. Lei è sa che l'ultimo backup effettuato risale a tre settimane prima. Come si comporterebbe in questa situazione?", "efficace": "Verifica innanzitutto che l’archivio originale sia ancora integro e accessibile, escludendo danni ai dati di partenza. Poi, accerta la disponibilità dell'ultimo backup, risalente a tre settimane prima, come punto di ripristino, e contatta il personale IT per descrivere la situazione, verificare lo stato del backup interrotto e avviarne uno nuovo in sicurezza. Infine, propone al Dirigente l’adozione di un backup automatico settimanale per ridurre il rischio di perdita di dati.", "media": "Prova a riavviare manualmente il backup, confidando che un secondo tentativo vada a buon fine. Se il problema dovesse persistere, contatterà il personale IT segnalando l’anomalia e il messaggio di errore, chiedendo di verificare lo stato del backup e indicarle come procedere. Infine, annota la data e l'ora dell’interruzione per documentare l’accaduto, riservandosi di ritentare nuovamente il backup nei giorni successivi qualora l’intervento del personale IT non avvenga in tempi brevi.", "inefficace": "Dopo aver effettuato un riavvio forzato del computer, ritenta immediatamente il backup dall’inizio, ritenendo che l’errore generico potesse essere dovuto ad un problema temporaneo del sistema, risolvibile con il riavvio. Constatando che il secondo tentativo di backup, seppur lentamente, sembra essersi avviato regolarmente, considera il problema superato e prosegue con le altre attività previste per la giornata, riservandosi di controllare ogni tanto lo stato dell'operazione."}, {"num": 193, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, provando ad accedere al registro SICID per completare la verifica delle memorie depositate dalle parti su richiesta del Magistrato, le proprie credenziali non vengono riconosciute come valide. Dopo tre tentativi falliti, il suo account viene temporaneamente bloccato. Il Magistrato ha bisogno del lavoro completato entro un'ora ma lei, momentaneamente, non può accedere al sistema. Come si comporterebbe in questa situazione?", "efficace": "Contatta immediatamente il personale IT segnalando il blocco del proprio account e la necessità di un intervento urgente, specificando che deve completare un lavoro sul SICID entro un'ora. Poi, informa il Magistrato della situazione indicandogli i tempi stimati per la risoluzione. Mentre attende lo sblocco, avvia la verifica sugli atti cartacei del fascicolo e predispone la struttura del lavoro richiesto, così da completarlo rapidamente non appena l'accesso al SICID verrà ripristinato.", "media": "Informa il Magistrato che l’accesso al SICID è momentaneamente bloccato per un problema tecnico e chiede se sia possibile posticipare di qualche ora la consegna del lavoro. Successivamente, contatta il personale IT per segnalare il blocco dell’account e richiedere i tempi previsti per la risoluzione. Infine, rimane alla propria postazione in attesa dell'intervento del personale IT, riservandosi di completare la verifica delle memorie non appena l’accesso verrà ripristinato.", "inefficace": "Avendo già sperimentato situazioni simili in passato e avendo appurato che nella maggior parte dei casi i sistemi tendono a ripristinare autonomamente l'accesso dopo un breve periodo di attesa, decide di aspettare che il blocco temporaneo dell'account si risolva spontaneamente. Nel frattempo, si dedica ad altre attività di routine e comunica al Magistrato di aver riscontrato un problema tecnico nell'accesso al SICID, assicurandogli che il lavoro verrà completato non appena possibile."}, {"num": 194, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Durante un'udienza civile alla quale sta assistendo, in supporto al proprio Magistrato referente, il computer che sta utilizzando si blocca improvvisamente, rendendo impossibile la consultazione del fascicolo telematico e la verbalizzazione digitale. Il Magistrato referente sta trattando una causa complessa con cinque parti e ha urgentemente bisogno di consultare atti contenuti nel fascicolo digitale. Come si comporterebbe in questa situazione?", "efficace": "Dopo aver appurato che non vi sono altre postazioni disponibili, passa alla verbalizzazione su supporto cartaceo per garantire la prosecuzione dell'udienza e si attiva per recuperare gli atti di cui il Magistrato ha bisogno, coordinandosi con la cancelleria. Terminata l'udienza, contatta il personale IT per segnalare il blocco e richiedere un intervento sulla postazione. Ripristinato l'accesso, provvede a trasferire in digitale la verbalizzazione effettuata su supporto cartaceo.", "media": "Segnala subito al Magistrato il blocco del proprio computer e gli propone una breve sospensione dell'udienza per poter gestire efficacemente la situazione. Quindi, contatta il personale IT per verificare i tempi di ripristino della postazione e chiede alla cancelleria se disponga di una copia cartacea degli atti indispensabili per consentire al Magistrato di proseguire l'udienza qualora il personale IT non ripristini il funzionamento della postazione entro un'ora.", "inefficace": "Comunica al Magistrato che il computer è bloccato e che la consultazione del fascicolo digitale e la verbalizzazione non sono possibili al momento. Dunque, ritenendo che proseguire l'udienza di una causa complessa con cinque parti senza accesso al fascicolo rischierebbe di compromettere la qualità della trattazione, suggerisce al Magistrato di valutare il rinvio dell'udienza a una data successiva, in attesa che il personale tecnico risolva il problema e ripristini la postazione."}, {"num": 195, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, nel predisporre le schede cautelari, consultando il registro GIADA lei rileva che per due imputati sottoposti a misura la posizione giuridica risulta aggiornata due volte nella stessa giornata con dati contrastanti: in un caso la misura cautelare risulta attiva nel primo aggiornamento e revocata nel secondo a pochi minuti di distanza; nell'altro la durata pena è stata ridotta senza che nel fascicolo sia stato inserito alcun provvedimento che giustifichi tale modifica. Come si comporterebbe in questa situazione?", "efficace": "Sospende la predisposizione delle schede e verifica nei fascicoli la posizione giuridica dei due imputati: per il primo accerta quale dei due aggiornamenti corrisponda ai provvedimenti agli atti; per il secondo individua il provvedimento che giustifica la riduzione della pena. Poi, contatta il personale IT per verificare se le anomalie dipendano da un malfunzionamento del sistema o da un errore di inserimento dati. Infine, aggiorna i dati nel sistema GIADA e completa le schede.", "media": "Segnala al Magistrato le discrepanze riscontrate nel GIADA per i due imputati, descrivendogli i dati contraddittori del primo e la riduzione della durata pena priva di provvedimento giustificativo del secondo. Dopo che il Magistrato le ha indicato quale aggiornamento considerare valido per il primo imputato e come procedere per il secondo in assenza del provvedimento giustificativo, completa le loro schede e prosegue con quelle degli altri imputati, per i quali i dati risultano regolari.", "inefficace": "Attribuisce la discrepanza e la mancanza del provvedimento ad un disallineamento temporaneo del registro GIADA, ritenendo che il sistema possa aver registrato un conflitto nei dati dovuto all'inserimento di aggiornamenti simultanei da postazioni diverse. Pertanto, per la compilazione delle schede cautelari di entrambi gli imputati, utilizza l'aggiornamento più recente in ordine cronologico, ritenendolo il più attendibile. Infine, procede con la predisposizione delle altre schede in programma."}, {"num": 196, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, nel corso dello spoglio di un fascicolo telematico per un'udienza fissata tra due giorni, apre un atto depositato da un difensore denominato \"memoria_difensiva.pdf\" e scopre che il contenuto del documento non corrisponde al titolo: si tratta di un atto relativo a un procedimento completamente diverso, evidentemente allegato per errore dal difensore. L'udienza è imminente e la memoria difensiva effettiva risulta mancante nel fascicolo. Come si comporterebbe in questa situazione?", "efficace": "Informa il Magistrato che la memoria difensiva contiene un atto errato, relativo ad un altro procedimento, e che il documento effettivo è mancante. Poi, verifica se altri atti del fascicolo presentino analoghe discrepanze tra titolo e contenuto, e si coordina con la cancelleria affinché il difensore venga tempestivamente avvisato dell'errore e possa depositare il documento corretto prima dell'udienza. Infine, annota nella scheda preparatoria la mancanza riscontrata e le azioni intraprese.", "media": "Segnala al Magistrato la discrepanza riscontrata tra il titolo del file e il suo contenuto effettivo, precisando che la memoria difensiva della parte risulta di fatto assente dal fascicolo telematico. Poi, gli chiede indicazioni su come procedere in vista dell’udienza fissata tra due giorni e se sia opportuno coinvolgere la cancelleria per avvisare il difensore. Infine, segnala nella scheda preparatoria la mancanza della memoria tra i profili critici da controllare prima dell'udienza.", "inefficace": "Inserisce nella scheda preparatoria una nota sull'errore di allegazione, segnalando che il file denominato \"memoria_difensiva.pdf\" contiene un atto di un altro procedimento e che la memoria effettiva risulta assente dal fascicolo. Poi, trasmette la scheda al Magistrato insieme a quelle degli altri fascicoli in programma, ritenendo di aver fornito tutti gli elementi necessari affinché possa valutare la situazione e adottare le determinazioni che riterrà opportune in vista dell'udienza."}, {"num": 197, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, due ore dopo l'inizio del suo turno di lavoro, inizia a ricevere sul proprio telefono una serie di codici OTP di autenticazione per l'accesso ai sistemi dell'ufficio. Lei è regolarmente connesso alla propria postazione e, al momento, non sta effettuando alcun tentativo di accesso ai sistemi. Nonostante ciò, i codici continuano ad arrivarle a intervalli regolari di quindici minuti, come se qualcuno stesse tentando di accedere con le sue credenziali. Come si comporterebbe in questa situazione?", "efficace": "Prende sul serio l'anomalia senza escludere alcuna ipotesi, ritenendo che potrebbe trattarsi tanto di un malfunzionamento del sistema quanto di un tentativo di accesso non autorizzato, e per precauzione modifica subito la propria password di accesso. Poi, segnala al personale IT la ricezione dei codici, descrivendone frequenza e regolarità, affinché possano verificarne l'origine e informa il Dirigente della situazione, riservandosi di aggiornarlo una volta ricevuto il riscontro tecnico.", "media": "Segnala al personale IT la ricezione anomala dei codici OTP, specificando che secondo lei ci sono stati dei tentativi di accesso non autorizzati con la sua utenza. Poi, continua a lavorare alla propria postazione, monitorando se i codici continuano ad arrivare anche dopo la segnalazione. Infine, qualora il personale IT confermi che si tratta effettivamente di un tentativo di accesso esterno e non di un malfunzionamento del sistema di autenticazione, modificherà la propria password di accesso.", "inefficace": "Constatata la cadenza regolare con la quale le vengono trasmessi i codici OTP, attribuisce la loro ricezione ad un malfunzionamento tecnico dell'applicazione di autenticazione che sta generando codici non richiesti in modo automatico. Pertanto, considerando la situazione priva di rischi concreti, decide di proseguire con le altre attività previste per la giornata, riproponendosi di disinstallare e reinstallare l'applicazione qualora il problema dovesse persistere nei giorni successivi."}, {"num": 198, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Mentre sta istruendo un fascicolo complesso, si accorge che un collega AUP, anch'egli assegnato a supporto dello stesso Magistrato di riferimento, sta lavorando sul medesimo procedimento con un approccio totalmente diverso dal suo. Poiché il Magistrato non ha comunicato a nessuno dei due la doppia assegnazione, potrebbe trattarsi di un errore organizzativo. Come si comporterebbe in questa situazione?", "efficace": "Si confronta con il collega per mappare le attività già svolte da ciascuno e definire una ridistribuzione provvisoria dei compiti, così da non interrompere la lavorazione del fascicolo. Quindi, informa il Magistrato della doppia assegnazione, sottoponendogli la proposta di ripartizione già concordata con il collega per ottenere la sua approvazione. Infine, si ripromette di verificare sempre, prima di avviare il lavoro su un nuovo fascicolo, di essere l'unico AUP assegnato a quel procedimento.", "media": "Dopo aver notato la sovrapposizione, parla con il collega per capire a grandi linee le attività già svolte da ciascuno sul fascicolo. In seguito, segnala la situazione al Magistrato di riferimento, chiedendogli indicazioni su come procedere e su chi dei due debba occuparsene. Intanto, in attesa di ricevere il suo riscontro, sospende la lavorazione del fascicolo e si dedica alle altre attività assegnate, confidando nel fatto che il Magistrato risolva la questione in tempi brevi.", "inefficace": "Prosegue nella lavorazione del fascicolo secondo il proprio approccio, ritenendo che non sia necessario confrontarsi con il collega. D'altronde, crede che, se il Magistrato ha assegnato il procedimento ad entrambi, avrà sicuramente le sue ragioni. Una volta conclusa la scheda preparatoria, la sottopone al Magistrato e si dedica subito al fascicolo successivo, convinto che avere due prospettive diverse sullo stesso fascicolo non possa che giovare alla trattazione della causa."}, {"num": 199, "domanda": "In qualità di Addetto all'Ufficio per il Processo, qualche giorno fa, lei ha chiesto la possibilità di svolgere una giornata lavorativa in modalità agile. A seguito della sua richiesta, ha ricevuto dalla segreteria del Dirigente la conferma dell'approvazione dello smart working, previsto per il giorno successivo. Tuttavia, nel tardo pomeriggio, il Magistrato la contatta comunicandole che è stata appena fissata un'udienza per il mattino seguente e che ha bisogno della sua presenza. Come si comporterebbe in questa situazione?", "efficace": "Riconosce che la copertura dell'udienza ha priorità e conferma al Magistrato la propria disponibilità per il mattino seguente. Poi, contatta la segreteria del Dirigente per informarla della presenza in ufficio per il giorno seguente. Infine, riorganizza le attività che aveva programmato per la giornata successiva e, per il futuro, si propone di controllare con più frequenza il calendario delle udienze per evitare sovrapposizioni con il proprio giorno di smart working.", "media": "Comprende che la presenza in udienza è prioritaria e conferma al Magistrato la propria disponibilità per il mattino successivo. Poi, si ripromette di contattare la segreteria del Dirigente non appena possibile, per informarla della presenza in ufficio per il giorno seguente. Nel frattempo, si dedica alle attività che aveva pianificato per il resto del pomeriggio, confidando di riuscire a recuperare in tempi brevi quanto aveva previsto durante la giornata di lavoro agile.", "inefficace": "Pur avendo già organizzato la propria giornata in vista del lavoro agile, accetta la richiesta del Magistrato e conferma la propria presenza all'udienza del mattino seguente. Poi, si dedica alle attività che aveva programmato di svolgere nel resto del pomeriggio, reputando che avvisare il Magistrato sia più che sufficiente a gestire la situazione e che la giornata di smart working approvata dalla segreteria del Dirigente venga automaticamente annullata, senza che sia necessario fare altro."}, {"num": 200, "domanda": "Da alcuni mesi, lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lavorando a stretto contatto con un unico Magistrato di riferimento. Di recente, il Presidente di Sezione le ha comunicato che è lei stato assegnato ad altri due Magistrati, passando così al modello mini-pool. Tuttavia, in un confronto informale, il Magistrato con cui collabora da mesi le chiede di continuare a dare la precedenza ai compiti che lui le affiderà rispetto a quelli degli altri Magistrati del pool. Come si comporterebbe in questa situazione?", "efficace": "Esamina le attività in corso con il Magistrato e quelle da avviare con i nuovi Magistrati del pool, per valutare come distribuire il proprio tempo senza perdere continuità sui procedimenti già avviati. Poi, fa presente al Magistrato che la riorganizzazione disposta dal Presidente richiede una distribuzione equa del carico, sottoponendogli la proposta elaborata per rassicurarlo sulla prosecuzione dei fascicoli pendenti. Infine, la condivide anche con il Presidente per allineare i criteri.", "media": "Fa presente al Magistrato che la riorganizzazione disposta dal Presidente di Sezione richiede una distribuzione equa del carico di lavoro tra tutti i Magistrati del pool. Quindi, si organizza per suddividere il proprio tempo in modo bilanciato tra i tre Magistrati, dedicandosi ai fascicoli più urgenti di ciascuno. Inoltre, confidando che la nuova organizzazione si consolidi gradualmente, rimanda ad un momento successivo un confronto con il Presidente sulla gestione del nuovo assetto.", "inefficace": "Considerando naturale assecondare la richiesta del Magistrato con cui collabora da mesi, continua a svolgere le attività nell'ordine da lui indicato, dando sempre la precedenza ai suoi compiti rispetto a quelli degli altri Magistrati. Del resto, ritiene che la gestione delle priorità tra i Magistrati sia una questione organizzativa che non la riguarda direttamente e che sia compito del Presidente di Sezione intervenire qualora dovesse riscontrare squilibri nel funzionamento del pool."}, {"num": 201, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo, lei è stato assegnato al supporto del Presidente della sezione civile di un Tribunale. Elaborando i report mensili sui procedimenti, constata che questi vengono definiti con tempi sempre più lunghi rispetto agli obiettivi PNRR e che il trend, se non contrastato, rischia di compromettere il raggiungimento degli obiettivi programmati. Non è certo se limitarsi a riportare i dati al Presidente di Sezione o se sia opportuno elaborare anche un'analisi delle possibili cause. Come si comporterebbe in questa situazione?", "efficace": "Approfondisce l'analisi dei dati, confrontando i tempi di definizione dei procedimenti con i target PNRR e individuando le possibili cause del peggioramento. Quindi, sulla base di quanto emerso, predispone una relazione per il Presidente in cui illustra le criticità emerse, i dati a supporto e correttivi organizzativi concreti, così da fornirgli un quadro completo. Infine, si rende disponibile a contribuire attivamente all'attuazione delle misure che verranno adottate.", "media": "Verifica i dati mensili, focalizzandosi sulle variazioni più significative rispetto al periodo precedente. Quindi, trasmette il report al Presidente di Sezione, segnalando anche la criticità riscontrata. Inoltre, gli chiede se ritenga opportuno approfondire le possibili cause del trend negativo, chiarendo di essere disponibile a farlo qualora lui lo ritenesse utile. Nel frattempo, si dedica alle altre attività ordinarie, in attesa di ricevere indicazioni su come procedere.", "inefficace": "Dopo aver completato l'elaborazione del report mensile, lo trasmette al Presidente di Sezione corredandolo dei dati raccolti. In seguito, si dedica alle altre attività in programma. Infatti, è convinto che il Presidente, avendo piena visione della sezione e delle sue dinamiche, sappia come interpretare i dati e individuare autonomamente le misure più adatte per affrontare la situazione e invertire il trend negativo riscontrato nei procedimenti della sezione."}, {"num": 202, "domanda": "Lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, a supporto di un unico Magistrato di riferimento. Da una settimana, un tirocinante è stato assegnato allo stesso Magistrato e ha cominciato a occuparsi di studio e spoglio dei fascicoli, attività di cui lei ordinariamente si occupa. Il Magistrato le chiede di coordinarsi con il tirocinante, senza però specificare come suddividere i compiti. Come si comporterebbe in questa situazione?", "efficace": "Analizza il progetto formativo del tirocinante per capire quali attività siano previste per lui. Poi, in base a quanto emerso, elabora una proposta di ripartizione dei compiti, assegnando al tirocinante le attività a maggior valenza formativa, come la ricerca giurisprudenziale, e riservando a sé quelle che esulano dal percorso del tirocinante, come il raccordo con la cancelleria. Infine, sottopone la proposta al Magistrato per avere il suo feedback e definirla in modo chiaro e funzionale.", "media": "Si confronta con il tirocinante per capire su quali fascicoli stia lavorando e concorda con lui una suddivisione pratica basata sulle cause già in lavorazione. Poi, sottopone questa ripartizione al Magistrato e gli chiede un riscontro. Infine, si riserva di consultare il progetto formativo del tirocinante in un secondo momento, convinto che la suddivisione concordata sia già sufficientemente equilibrata e che il Magistrato la avviserà nel caso in cui fosse necessario apportare modifiche.", "inefficace": "Incontra il tirocinante e concorda con lui una divisione dei fascicoli basata sulle esigenze operative immediate della sezione, convinto che il tirocinante debba dare supporto nello svolgimento di tutte le attività ordinarie. In seguito, si dedica alle attività di propria competenza, sulla base della ripartizione definita, reputando che questa suddivisione sia funzionale per il lavoro della sezione e permetta di soddisfare al meglio la richiesta di coordinamento del Magistrato."}, {"num": 203, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, lei viene contattato informalmente da un Magistrato di un'altra sezione, con cui ha già collaborato in passato. Il Magistrato le chiede di supportare temporaneamente la preparazione dei fascicoli nella sua sezione, a causa di una carenza di personale. Il Magistrato le precisa che, vista la situazione di emergenza, ha rivolto questa richiesta direttamente a lei, senza richiedere autorizzazioni. Come si comporterebbe in questa situazione?", "efficace": "Riconosce che la richiesta ricevuta è arrivata al di fuori dei canali istituzionali previsti e che accettarla senza le dovute autorizzazioni potrebbe creare problemi organizzativi. Quindi, con garbo, fa presente al Magistrato di non poter fornirgli supporto senza prima aver consultato il proprio Magistrato di riferimento e il Dirigente amministrativo. Pertanto, li contatta entrambi tempestivamente per informarli della situazione venutasi a creare e ricevere le opportune indicazioni.", "media": "Consapevole del fatto che la richiesta è arrivata al di fuori della corretta catena gerarchica, segnala prontamente la situazione al proprio Magistrato di riferimento, chiedendogli indicazioni su come procedere. Intanto, si dedica alle attività ordinarie della propria sezione, rimandando qualsiasi risposta al Magistrato richiedente. Inoltre, ritiene che, avendo già informato il proprio Magistrato, coinvolgere anche il Dirigente amministrativo sia, almeno per il momento, prematuro.", "inefficace": "Ritiene che supportare temporaneamente il Magistrato sia un gesto di collaborazione doveroso data la situazione di difficoltà in cui si trova la sua sezione. Tuttavia, gli fa presente che, qualora dovessero sopraggiungere urgenze nella propria sezione, lei dovrà necessariamente dare la precedenza alle attività di propria competenza. Quindi, si mette a sua disposizione, convinto che si tratti di un accordo informale che non richieda passaggi autorizzativi preliminari di alcun tipo."}, {"num": 204, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, il Presidente di Sezione le comunica che, a seguito di una riorganizzazione interna, la sezione prenderà in carico circa cento fascicoli provenienti da un'altra sezione. Il Magistrato le chiede quindi di aggiornare il programma delle udienze per inserire i nuovi procedimenti, ma gli atti processuali non sono ancora pervenuti, rendendo impossibile valutarne la complessità e stimare i tempi di trattazione. Come si comporterebbe in questa situazione?", "efficace": "Preso atto che gli atti processuali non sono an
