iale di un Tribunale, le riceve l'incarico di studiare il fascicolo di un procedimento complesso per associazione a delinquere e predisporre la bozza della relazione del processo. Il fascicolo contiene migliaia di pagine di atti di indagine, decine di verbali di udienza e una consulenza tecnica di parte particolarmente articolata. Il consigliere relatore, che le ha affidato l'incarico, si aspetta che la bozza evidenzi le questioni di maggiore rilievo per la decisione collegiale. Come si comporterebbe in questa situazione?", "efficace": "Organizza lo studio del fascicolo suddividendolo per nuclei tematici e predispone un indice degli atti per orientarsi tra le migliaia di pagine. Quindi, redige la bozza strutturandola attorno alle questioni decisive per il collegio, dedicando particolare attenzione ai nodi probatori e alle conclusioni della consulenza tecnica. Infine, sottopone la bozza al consigliere relatore con congruo anticipo, così da consentirgli di integrarla o modificarla prima della camera di consiglio.", "media": "Avvia la lettura del fascicolo, annotando alcuni dei passaggi che ritiene più rilevanti per la decisione del collegio tra i suoi appunti. Poi, redige la bozza della relazione seguendo la sequenza cronologica degli atti esaminati, inserendo i riferimenti alla consulenza tecnica solo nei punti in cui viene richiamata nel corso del procedimento. Infine, consegna la bozza al consigliere relatore entro i tempi, chiedendogli un riscontro sull'adeguatezza dell'impostazione adottata.", "inefficace": "Procede alla lettura integrale di tutti gli atti del fascicolo per assicurarsi di non tralasciare alcun elemento nella redazione della relazione. Infatti, ritiene che una bozza completa debba dar conto di ogni passaggio processuale e di ogni acquisizione probatoria, indipendentemente dal rilievo che ciascun elemento riveste per la decisione finale del collegio. Dunque, redige una relazione minuziosa che ripercorre l'intero iter del procedimento e la consegna al consigliere relatore."}, {"num": 282, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, lei supporta un Magistrato nel controllo delle scadenze delle misure cautelari. Nel corso del monitoraggio settimanale, verificando lo scadenziario, lei rileva che per un imputato in stato di custodia cautelare il termine di fase scadrà tra cinque giorni, senza che nel fascicolo risultino atti di sospensione o proroga. Il Magistrato referente, da lei contattato, non risulta a conoscenza dell'imminente scadenza. Come si comporterebbe in questa situazione?", "efficace": "Segnala al Magistrato l'imminente scadenza del termine di fase, fornendogli i dati del procedimento e lo stato del fascicolo. Quindi, predispone una scheda preparatoria con il quadro aggiornato della posizione dell'imputato, evidenziando l'assenza di atti di sospensione o proroga e i possibili provvedimenti da adottare entro il termine. Infine, propone di effettuare il controllo dello scadenziario due volte a settimana anziché una, così da identificare con maggiore anticipo le scadenze critiche.", "media": "Verifica nel fascicolo se vi siano atti di sospensione o proroga non ancora annotati nello scadenziario, per accertarsi che la scadenza sia effettivamente imminente. Poi, riferisce al Magistrato l'esito della verifica, chiedendogli come intenda procedere e ritenga necessario che lei predisponga una scheda preparatoria per supportarlo nelle determinazioni da assumere entro il termine. Infine, si ripropone di controllare nei giorni successivi che il Magistrato abbia adottato i provvedimenti necessari.", "inefficace": "Annota la scadenza del termine di fase nello scadenziario e la include nel report settimanale che raccoglie tutti i termini cautelari da segnalare al Magistrato. Infatti, ritiene che tale comunicazione periodica sia la modalità più appropriata per portare queste situazioni all'attenzione del Magistrato, evitando segnalazioni frammentarie che potrebbero generare confusione. Dunque, completa la ricognizione dei restanti fascicoli con imputati detenuti e invia il report secondo la tempistica ordinaria."}, {"num": 283, "domanda": "Operando come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, lei supporta un Magistrato nell'aggiornamento mensile delle schede cautelari. Esaminando gli atti più recenti dei procedimenti, lei rileva che per due imputati le condizioni originariamente poste a base della misura cautelare sembrano mutate: nuovi elementi istruttori appaiono indebolire il quadro indiziario del primo mentre il trasferimento di residenza del secondo sembra ridurre il rischio di fuga. Come si comporterebbe in questa situazione?", "efficace": "Aggiorna le schede cautelari, evidenziando per ciascun imputato le novità emerse e il loro possibile impatto sui provvedimenti in corso. Quindi, sottopone le schede al Magistrato con un'analisi separata per ciascuna posizione, così da consentirgli una valutazione mirata sulle condizioni poste alla base delle rispettive misure cautelari. Infine, suggerisce di integrare il monitoraggio mensile con una verifica intermedia degli atti sopravvenuti per rilevare subito eventuali modifiche.", "media": "Riporta nelle schede degli imputati le variazioni riscontrate negli atti più recenti, aggiornando per ciascuno la sezione relativa allo stato del procedimento. Poi, trasmette le schede aggiornate al Magistrato, segnalandogli che le due posizioni presentano elementi di novità rispetto all'ultimo aggiornamento. Infine, chiede al Magistrato se ritenga necessario approfondire una o più delle due situazioni o se le informazioni riportate nelle schede siano sufficienti per le sue valutazioni.", "inefficace": "Decide di concentrarsi prioritariamente sull'aggiornamento della scheda relativa al primo imputato, trattandosi del mutamento più rilevante tra i due riscontrati. Poi, una volta terminato questo lavoro, si dedica alla compilazione sintetica delle schede degli altri, ritenendo che il trasferimento di residenza rappresenti una circostanza fisiologica nel corso di un procedimento penale."}, {"num": 284, "domanda": "Nel ruolo di Addetto all’Ufficio per il Processo presso la sezione penale di un Tribunale, lei viene incaricato di costruire un archivio degli orientamenti giurisprudenziali relativi alle questioni più ricorrenti nella sezione penale. Nel corso del lavoro, lei individua un contrasto su una questione di diritto processuale penale, relativa all'utilizzabilità di determinati atti investigativi: tre consiglieri hanno adottato orientamenti contrastanti in diverse sentenze recenti, con esiti difformi per imputati che si trovavano in situazioni processuali analoghe. Come si comporterebbe in questa situazione?", "efficace": "Mappa i tre orientamenti divergenti e predispone un prospetto comparativo che ne evidenzia fondamenti giuridici, argomentazioni ed esiti processuali. Poi, lo sottopone al Presidente di Sezione proponendo un confronto tra i consiglieri interessati per favorire l'adozione di un indirizzo unitario sulla questione. Infine, suggerisce che la catalogazione delle future pronunce includa un confronto sistematico con gli orientamenti già registrati, così da intercettare tempestivamente eventuali contrasti.", "media": "Documenta per ciascuna delle tre pronunce contrastanti l'orientamento adottato e i relativi riferimenti normativi e giurisprudenziali, inserendoli all'interno dell'archivio. In seguito, segnala al Presidente di Sezione la divergenza riscontrata, chiedendogli se ritenga opportuno un approfondimento in merito o preferisca che i consiglieri interessati si confrontino direttamente tra loro sulla questione. Nel frattempo, prosegue con la catalogazione delle altre questioni ricorrenti della sezione.", "inefficace": "Classifica le tre sentenze nell'archivio sotto la medesima voce tematica, registrando fedelmente l'orientamento espresso in ciascuna pronuncia e i relativi riferimenti normativi. Infatti, ritiene che il compito affidatogli consista esclusivamente nel documentare gli orientamenti della sezione e che segnalare eventuali difformità non rientri tra le sue competenze. Dunque, archiviata la voce con tutti e tre gli orientamenti debitamente documentati, passa all'esame delle materie successive."}, {"num": 285, "domanda": "In qualità di Addetto all’Ufficio per il Processo presso un Tribunale, il Presidente della sezione penale la incarica di effettuare un'analisi dell'arretrato della sezione e di predisporre una proposta di piano di smaltimento. Esaminando i dati, lei rileva che l'arretrato è composto da: 40% di procedimenti in attesa di fissazione per ragioni organizzative; 30% di procedimenti in fase di stallo istruttorio per mancata esecuzione di rogatorie internazionali; 30% di procedimenti di elevata complessità che richiedono una trattazione dibattimentale prolungata. Come si comporterebbe in questa situazione?", "efficace": "Articola il piano per categorie, proponendo interventi mirati: calendarizzazione dei procedimenti in attesa di fissazione, sollecito delle rogatorie internazionali inevase e programmazione di udienze dedicate per i procedimenti complessi. Poi, sottopone al Presidente un cronoprogramma che dia priorità ai procedimenti in attesa di fissazione, in quanto bloccati per ragioni meramente organizzative. Infine, propone un monitoraggio mensile con indicatori specifici per ciascuna delle tre categorie di arretrato.", "media": "Organizza i dati dell'arretrato in un report suddiviso per le tre categorie individuate, indicando per ciascuna la percentuale e le cause del ritardo nella trattazione. Quindi, trasmette il report al Presidente accompagnandolo con alcune osservazioni generali sulle possibili linee di intervento, chiedendogli da quale categoria ritenga opportuno iniziare lo smaltimento. In attesa di ricevere indicazioni, inizia a censire per ciascuna categoria di arretrato i procedimenti pendenti da più tempo.", "inefficace": "Concentra la propria analisi sui procedimenti in attesa di fissazione per ragioni organizzative, trattandosi della categoria più ampia. Infatti, ritiene che avviare il piano dalla componente numericamente prevalente consenta di produrre risultati visibili in tempi brevi e di dimostrare l'efficacia dell'intervento. Dunque, predispone una proposta focalizzata esclusivamente sulla calendarizzazione di questi procedimenti, riservandosi di includere le altre due categorie in una fase successiva del piano."}, {"num": 286, "domanda": "Prestando servizio come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, lei ha appena finito di verbalizzare l'esito di un'udienza in cui il collegio ha disposto: la rinnovazione dell'istruttoria per nuova prova testimoniale, la revoca degli arresti domiciliari per uno degli imputati e la fissazione della prossima udienza. Coordinandosi con la cancelleria per le attività conseguenti, constata però che l'unico cancelliere in servizio può dar corso ad uno solo dei tre provvedimenti entro la giornata. Come si comporterebbe in questa situazione?", "efficace": "Ritenendo che la revoca degli arresti domiciliari debba avere la priorità assoluta, trattandosi di un provvedimento che incide sulla libertà personale dell'imputato, chiede al cancelliere di dare corso a tale adempimento. Nel frattempo, lei si occupa della predisposizione degli atti relativi alla citazione del testimone e alla comunicazione della nuova data d'udienza. Infine, informa il Magistrato dell'organizzazione adottata per garantire la tempestiva esecuzione dei tre provvedimenti.", "media": "Segnala al Magistrato che il cancelliere in servizio può dar corso ad uno solo dei tre provvedimenti entro la giornata, chiedendogli quale debba essere eseguito con priorità. Poi, ricevute le indicazioni, segnala al cancelliere quale adempimento debba svolgere e programma l'esecuzione degli altri due per il giorno successivo. Nel frattempo, prepara la documentazione necessaria per tutti e tre gli adempimenti, così da agevolare il cancelliere nella loro esecuzione non appena possibile.", "inefficace": "Chiede al cancelliere di dar corso ai provvedimenti nell'ordine in cui sono stati adottati dal collegio, iniziando dalla rinnovazione dell'istruttoria per la nuova prova testimoniale. Infatti, ritiene che rispettare tale sequenza sia il criterio più corretto per organizzare il lavoro della cancelleria. Dunque, rimanda l'esecuzione della revoca degli arresti domiciliari e la comunicazione della nuova data d'udienza ai giorni successivi, non appena saranno disponibili più cancellieri."}, {"num": 287, "domanda": "Lei è Addetto all’Ufficio per il Processo presso la sezione penale di un Tribunale. Al termine di un'udienza particolarmente intensa, con venti fascicoli trattati, lei deve procedere allo scarico informatico degli esiti. Nel corso delle operazioni di scarico, si accorge che per tre fascicoli non ricorda con precisione l'esito dei provvedimenti adottati dal Magistrato — se sia stato disposto un rinvio o un'altra tipologia di provvedimento. Tuttavia, il giudice ha già lasciato l'aula. Come si comporterebbe in questa situazione?", "efficace": "Prima di procedere alla registrazione nel sistema informatico, consulta il verbale d'udienza e i propri appunti per ricostruire l'esito dei provvedimenti incerti. Per i fascicoli su cui permane incertezza, chiede conferma al Magistrato tramite e-mail, completando lo scarico degli esiti solo dopo aver verificato la correttezza dei tre provvedimenti effettivamente adottati in udienza. Infine, per il futuro, propone al Magistrato una verifica congiunta degli esiti al termine di ogni udienza.", "media": "Rivede i propri appunti d'udienza per ricostruire gli esiti dei tre fascicoli, riuscendo a chiarire con esattezza la situazione solo per due di essi. Poi, per il terzo fascicolo, su cui l'incertezza permane, registra nel sistema l'esito che ritiene più probabile in base al proprio ricordo dell'udienza. Il mattino seguente, contatta il Magistrato per verificare la correttezza della registrazione effettuata, mostrandosi disponibile a modificarla qualora risultasse inesatta.", "inefficace": "Decide di procedere allo scarico dei venti fascicoli, ricostruendo gli esiti dei tre provvedimenti incerti attraverso la propria memoria. Infatti, ritiene che il ricordo dell'udienza, essendosi appena conclusa, sia sufficientemente affidabile per una registrazione accurata degli esiti e che eventuali imprecisioni potranno essere corrette in seguito. Dunque, completa lo scarico informatico entro la giornata, assicurandosi che il registro risulti aggiornato e completo."}, {"num": 288, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, dove è incaricato della redazione dei decreti di citazione a giudizio per i procedimenti previsti nel trimestre successivo. Nel predisporre i decreti, lei rileva che per un procedimento i dati anagrafici dell'imputato presenti nel sistema informatico risultano incompleti: in particolare, manca il domicilio attuale, dato essenziale per la corretta notifica della citazione. Come si comporterebbe in questa situazione?", "efficace": "Consulta il fascicolo cartaceo per verificare se il domicilio dell'imputato sia ricavabile da atti non ancora digitalizzati. Riscontrata la presenza del dato, segnala al Magistrato la discrepanza tra fascicolo e sistema, chiedendogli conferma prima di utilizzare il domicilio rinvenuto per la redazione del decreto e di coordinarsi con la cancelleria per l'aggiornamento del dato nel sistema. Infine, propone una verifica sistematica dei dati anagrafici prima dell'avvio della redazione dei decreti.", "media": "Contatta la cancelleria per verificare se disponga del domicilio aggiornato dell'imputato, chiedendo ai colleghi di controllare nelle comunicazioni più recenti relative al procedimento. Dopo aver ottenuto il dato, chiede conferma sulla sua correttezza ad un collega AUP che aveva seguito il fascicolo in una fase precedente del procedimento e lo inserisce nel decreto. Infine, trasmette il decreto al Magistrato accompagnandolo con una nota in cui indica come ha reperito l'informazione mancante.", "inefficace": "Redige il decreto di citazione indicando l'ultimo domicilio risultante dagli atti, ritenendo che l'ufficiale giudiziario incaricato della notifica provvederà alle verifiche anagrafiche qualora il destinatario non risulti reperibile all'indirizzo indicato. Infatti, considera che le ricerche del destinatario rientrino tra le competenze dell'ufficiale notificatore e che segnalare preventivamente la lacuna al Magistrato rallenterebbe la predisposizione dei decreti senza vantaggi concreti."}, {"num": 289, "domanda": "Lei presta servizio come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale. Verificando la regolarità delle citazioni e della documentazione per un'udienza fissata tra quattro giorni, constata che la nota di discussione trasmessa dalla Procura della Repubblica per uno dei procedimenti in calendario riporta un numero di ruolo errato, riferito ad un procedimento diverso da quello effettivamente fissato. Come si comporterebbe in questa situazione?", "efficace": "Confronta il numero di ruolo della nota di discussione con quello del registro particolare del procedimento effettivamente calendarizzato, confermando l'errore compiuto dalla Procura della Repubblica. Poi, segnala tale discrepanza alla segreteria della Procura della Repubblica per la correzione del numero indicato nella nota. Infine, informa tempestivamente il Magistrato dell'anomalia riscontrata e si assicura che la correzione richiesta venga apportata nella nota prima dell'udienza.", "media": "Segnala al Magistrato la discrepanza riscontrata, chiedendogli come procedere nei confronti dell'errore commesso dalla Procura della Repubblica. Poi, su indicazione del Magistrato, predispone una comunicazione da inviare alla segreteria della Procura al fine di richiedere la correzione della nota trasmessa. Dopo averla fatta visionare al Magistrato e aver ottenuto il suo consenso, trasmette la comunicazione alla segreteria, augurandosi di ricevere una risposta in tempi brevi.", "inefficace": "Annota l'errore commesso dalla Procura della Repubblica sul frontespizio del fascicolo, così che il Magistrato possa rilevare autonomamente la discrepanza al momento della consultazione. Nel frattempo, procede alla verifica della regolarità delle citazioni, ritenendo che tale attività sia più urgente e rilevante rispetto alla correzione del numero della nota di discussione. Infatti, è certo del fatto che il refuso presente nella nota sia facilmente emendabile in sede di trattazione."}, {"num": 290, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso l'ufficio post dibattimentale di un Tribunale. Esaminando le istanze pervenute, ne individua una presentata direttamente da un imputato in custodia cautelare in carcere, senza l'assistenza di un difensore. In particolare, in tale istanza il detenuto richiede la revisione della propria posizione giuridica alla luce di una recente sentenza della Corte di Cassazione che avrebbe modificato l'interpretazione della norma incriminatrice applicata nel suo caso. Come si comporterebbe in questa situazione?", "efficace": "Acquisisce l'istanza e verifica nel fascicolo se l'imputato disponga di un difensore nominato, accertando al contempo l'esistenza della sentenza di Cassazione citata e la sua pertinenza al caso. Quindi, predispone una nota per il Magistrato con il contenuto dell'istanza, la pronuncia individuata e la segnalazione dell'assenza di assistenza difensiva. Infine, propone al Magistrato di valutare la trattazione prioritaria dell'istanza, considerata la condizione detentiva dell'imputato.", "media": "Protocolla l'istanza e la trasmette al Magistrato, allegando una nota in cui segnala che il detenuto ha presentato la richiesta senza l'assistenza di un difensore e che fa riferimento a una recente sentenza della Cassazione sulla norma incriminatrice applicata nel suo caso. Quindi, chiede indicazioni su come procedere sia riguardo al merito dell'istanza sia in relazione all'assenza del difensore, rendendosi disponibile per eventuali approfondimenti sulla pronuncia citata.", "inefficace": "Registra l'istanza nel sistema e la inserisce nel fascicolo dell'imputato seguendo la procedura ordinaria di protocollazione degli atti pervenuti. Infatti, ritiene che il proprio compito si limiti alla corretta acquisizione delle istanze e che la valutazione del loro contenuto, inclusa la verifica della pronuncia citata e la questione dell'assenza del difensore, rientri tra le attribuzioni del Magistrato assegnatario. Quindi, procede con la lavorazione delle restanti istanze pervenute."}, {"num": 291, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, dove affianca stabilmente un Magistrato. Quest'ultimo, accogliendo la richiesta del difensore di un imputato sottoposto agli arresti domiciliari, emette un provvedimento di revoca della misura e la incarica di curare gli adempimenti conseguenti. Nel corso dell'esecuzione, lei constata che l'imputato risulta sottoposto a un'ulteriore misura cautelare disposta da un diverso ufficio giudiziario, circostanza non menzionata nel provvedimento di revoca. Come si comporterebbe in questa situazione?", "efficace": "Sospende gli adempimenti e verifica nel sistema la natura e lo stato dell'ulteriore misura cautelare. Poi, informa immediatamente il Magistrato affinché possa valutare le implicazioni della revoca alla luce dell'altra misura in atto e disporre le eventuali comunicazioni all'ufficio giudiziario che l'ha emessa. Infine, evidenzia al Magistrato l'utilità di prevedere, prima dell'esecuzione dei provvedimenti cautelari, una verifica delle misure pendenti presso altri uffici.", "media": "Riferisce al Magistrato di aver riscontrato l'esistenza di un'ulteriore misura cautelare a carico dell'imputato, disposta da un diverso ufficio giudiziario e non menzionata nel provvedimento di revoca appena emesso. Poi, gli chiede se debba sospendere temporaneamente gli adempimenti esecutivi relativi all'ordinanza di revoca. Nel frattempo, se non dovesse ricevere indicazioni entro breve, si dedicherà ad altre pratiche che non presentano analoghi elementi di complessità.", "inefficace": "Dà corso agli adempimenti conseguenti alla revoca degli arresti domiciliari seguendo la procedura, ritenendo che la misura disposta da un diverso ufficio giudiziario esuli dagli elementi che lei è tenuto a considerare. Infatti, crede che ciascun ufficio gestisca autonomamente le proprie misure cautelari e che eventuali sovrapposizioni verranno rilevate nelle rispettive sedi competenti. Infine, predispone le comunicazioni di rito e aggiorna la posizione dell'imputato nel sistema."}, {"num": 292, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso un Tribunale, dove cura gli adempimenti connessi all'esecuzione delle sentenze penali definitive. Nel predisporre gli atti relativi ad una condanna a pena detentiva, lei constata che il dispositivo della sentenza indica una pena di tre anni di reclusione, mentre la motivazione fa riferimento ad una tempistica di pena di due anni e sei mesi. Tale incongruenza potrebbe avere conseguenze significative sull'effettiva durata della pena da eseguire. Come si comporterebbe in questa situazione?", "efficace": "Sospende la predisposizione degli atti e verifica nella motivazione il ragionamento seguito per la quantificazione della pena, confrontandolo con il dispositivo per indentificare l'origine dell'errore. Poi, accerta se il condannato sia prossimo all'inizio dell'esecuzione, per comprendere se la correzione abbia carattere di urgenza. Infine, sottopone al Magistrato una nota con le cause della discrepanza, evidenziando i margini temporali disponibili per procedere alla correzione.", "media": "Rilegge attentamente le pagine della sentenza relative alla determinazione della pena per accertarsi che la discrepanza non sia frutto di un errore di lettura. Confermato il contrasto, lo segnala al Magistrato trasmettendogli una copia delle pagine in cui compaiono le due diverse indicazioni di pena. Poi, gli chiede quale delle due quantificazioni debba considerare ai fini della predisposizione degli atti e se ritenga necessario attivare una procedura di correzione.", "inefficace": "Predispone gli atti sulla base della pena indicata nel dispositivo, ritenendo che quest'ultimo prevalga sulla motivazione in caso di contrasto e che la quantificazione ivi indicata costituisca il dato vincolante ai fini dell'esecuzione. Pertanto, ritiene superfluo segnalare la discrepanza al Magistrato, trattandosi di una questione facilmente risolvibile in autonomia. Dunque, porta a termine gli adempimenti necessari in tempi brevi e li trasmette all'Ufficio Esecuzioni Penali."}, {"num": 293, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso un Tribunale, dove supporta il settore patrocinio a spese dello Stato nell'esame delle istanze di liquidazione dei compensi ai difensori d'ufficio ammessi al beneficio dello Stato. Nel corso di una mattinata, esaminando le venti istanze appena pervenute in ufficio, lei rileva che dodici risultano complete e regolari, mentre otto presentano lacune documentali. Come si comporterebbe in questa situazione?", "efficace": "Separa le dodici istanze regolari dalle otto incomplete e istruisce le prime per la liquidazione. Per le otto carenti, individua la natura di ciascuna lacuna e verifica nel fascicolo della causa se i documenti mancanti siano già presenti agli atti, sollecitando i difensori solo per quelli non reperibili internamente. Quindi, trasmette al Magistrato un prospetto riepilogativo con lo stato di ciascuna istanza e le azioni intraprese per il completamento delle posizioni pendenti.", "media": "Istruisce immediatamente le dodici istanze regolari avviandole alla liquidazione. Per le otto incomplete, invece, predispone una comunicazione da inviare a ciascun difensore interessato, chiedendo l'integrazione della documentazione mancante entro un termine ragionevole. Infine, annota tra i propri appunti personali le istanze rimaste in sospeso, riservandosi di sollecitare i difensori qualora le integrazioni richieste non pervengano nei tempi indicati nella comunicazione.", "inefficace": "Porta a termine l'istruttoria delle dodici istanze regolari avviandole alla liquidazione, mentre per le otto incomplete sospende ogni lavorazione in attesa che i difensori provvedano a integrare la documentazione autonomamente. Infatti, ritiene che la completezza delle istanze ricada sotto la responsabilità dei richiedenti e che sollecitarli o ricercare d'ufficio i documenti mancanti esuli dal perimetro del compito affidatogli, circoscritto all'esame delle istanze così come pervenute."}, {"num": 294, "domanda": "Lei è Addetto all'Ufficio per il Processo presso un Tribunale. Finora, lei ha sempre operato in modalità a rotazione, a supporto di più Magistrati della sezione civile. Tuttavia, a seguito di una riorganizzazione, lei viene assegnato in modalità one- to-one ad un Magistrato della sezione penale che si aspetta di essere affiancato in tutte le attività attinenti alla propria materia. Tuttavia, dal momento che lei non ha alcuna esperienza nel settore penale, dopo tre settimane emergono alcune incomprensioni sulle rispettive aspettative. Come si comporterebbe in questa situazione?", "efficace": "Chiede un incontro con il Magistrato per affrontare le incomprensioni e comprendere le attività che dovrà svolgere, le competenze da acquisire e le fonti a cui attingere per formarsi. Sulla base di questo confronto, elabora un piano di formazione che integra le competenze già acquisite nel modello a rotazione nel settore civile con quelle da sviluppare modello one-to-one nel settore penale. Infine, concorda con il Magistrato obiettivi e tempi per raggiungere la piena operatività nel nuovo ruolo.", "media": "Si fa spiegare da un collega AUP, con esperienza nella sezione penale, le principali differenze operative rispetto al civile e le aspettative tipiche del modello one-to-one. Sulla base di quanto appreso, approfondisce alcune delle procedure penali che il collega le ha segnalato essere più ricorrenti. Infine, chiede al Magistrato di indicargli solo le attività su cui deve concentrare prioritariamente il proprio apprendimento e le annota, riservandosi di approfondirle nelle settimane successive.", "inefficace": "Attribuisce le incomprensioni alla specificità della materia penale e alla mancanza di un periodo iniziale di affiancamento, ritenendo che l'ufficio avrebbe dovuto prevedere un percorso di formazione prima della riassegnazione. Dunque, continua a operare secondo le modalità acquisite in precedenza nel modello a rotazione, concentrandosi sulle verifiche di regolarità processuale che già padroneggia, in attesa che la dirigenza predisponga un percorso formativo adeguato alle nuove mansioni."}, {"num": 295, "domanda": "Come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, durante lo spoglio di un fascicolo in materia di locazione commerciale, lei rileva: una questione di competenza territoriale non sollevata dalle parti; una domanda riconvenzionale su cui il giudice non si è pronunciato in ordine all'ammissibilità; un orientamento consolidato della sezione che, qualora venissero superate le criticità precedentemente elencate, consentirebbe la definizione immediata del merito. Lei deve redigere la scheda preparatoria per il Magistrato ma, prima di procedere, deve stabilire un ordine logico da seguire. Come si comporterebbe in questa situazione?", "efficace": "Individua l'ordine logico-processuale delle questioni e struttura la scheda anteponendo la competenza territoriale, in quanto questione pregiudiziale che precluderebbe ogni ulteriore trattazione. Poi, esamina l'ammissibilità della riconvenzionale, il cui esito delimita il perimetro delle questioni di merito. Infine, sottopone la scheda al Magistrato, illustrandogli l'ordine di priorità adottato e segnalandogli come l'orientamento consolidato della sezione consenta una rapida definizione della causa.", "media": "Inserisce nella scheda le tre questioni riscontrate, dedicando a ciascuna una sezione con i riferimenti normativi pertinenti. Poi, segnala al Magistrato l'orientamento consolidato della sezione e la possibilità di definire rapidamente la causa, evidenziando al contempo la necessità di pronunciarsi anche sulla questione di competenza territoriale e sull'ammissibilità della domanda riconvenzionale. Infine, trasmette la scheda, lasciando al Magistrato la determinazione dell'ordine di trattazione.", "inefficace": "Predispone la scheda concentrandosi prioritariamente sull'orientamento consolidato della sezione, ritenendo che la possibilità di definire immediatamente il merito rappresenti l'elemento di maggiore utilità per ottimizzare i tempi di trattazione del fascicolo e agevolare il lavoro del Magistrato. Quanto alla competenza territoriale e all'ammissibilità della riconvenzionale, le menziona in chiusura della scheda come profili accessori da far verificare al Magistrato direttamente in sede di udienza."}, {"num": 296, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, il suo Magistrato referente le chiede di effettuare una ricerca giurisprudenziale sulla qualificazione di un rapporto contrattuale in materia di diritto del lavoro. Al termine della ricerca, l'analisi da lei condotta evidenzia che: la sezione lavoro del Tribunale ha adottato un orientamento costante favorevole alla subordinazione; la Corte d'Appello distrettuale si è espressa in senso opposto in tre recenti pronunce; la Cassazione non si è pronunciata sulla fattispecie dopo le modifiche normative del 2022. Come si comporterebbe in questa situazione?", "efficace": "Organizza i risultati in una nota strutturata per livelli di giurisdizione, evidenziando il contrasto tra l'orientamento del Tribunale e quello della Corte d'Appello e il vuoto interpretativo della Cassazione dopo le modifiche del 2022. Infine, dopo aver incluso nella nota una rassegna delle pronunce più significative su ciascun orientamento, la trasmette al Magistrato, sottolineandogli il rischio che la decisione di primo grado venga riformata in appello alla luce delle tre pronunce difformi.", "media": "Raccoglie le sentenze più recenti che ha individuato nel corso della ricerca e le organizza all'interno di una relazione, allegando per ciascuna di esse una sintesi del principio di diritto espresso. Poi, si reca dal Magistrato per illustrargli i risultati raccolti, evidenziando che sulla questione esistono orientamenti divergenti tra primo e secondo grado, e gli chiede se le informazioni appena trasmesse siano sufficienti per le sue valutazioni o se reputi necessari ulteriori approfondimenti.", "inefficace": "Redige una nota incentrata sull'orientamento della sezione lavoro del Tribunale, ritenendo che la giurisprudenza del proprio ufficio rappresenti il riferimento più pertinente per il Magistrato. Per completezza informativa, decide comunque di menzionare le pronunce della Corte d'Appello e l'assenza di interventi della Cassazione in chiusura della nota. Infatti, ritiene che ogni Magistrato debba attenersi prioritariamente agli orientamenti consolidati all'interno del proprio ufficio giudiziario."}, {"num": 297, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Il Magistrato le affida la predisposizione della bozza di una sentenza in materia di responsabilità medica. Nello studio propedeutico alla redazione, lei individua due filoni applicabili: il primo, maggioritario in Cassazione, fondato sulla perdita di chance; il secondo, minoritario ma più recente, sul danno da inadempimento qualificato. Il Magistrato non ha indicato quale orientamento seguire. Come si comporterebbe in questa situazione?", "efficace": "Predispone una nota comparativa dei due filoni, illustrando come ciascun criterio si applicherebbe ai fatti di causa. All'interno della nota, sottolinea il carattere maggioritario del primo e della maggiore recentezza del secondo, specificandone i diversi profili di rischio in sede di impugnazione. Una volta completa, trasmette la nota al Magistrato e avvia la bozza basandosi sugli elementi comuni ad entrambi gli orientamenti, così da completarla rapidamente una volta ricevuta l'indicazione.", "media": "Informa il Magistrato di aver individuato due orientamenti contrastanti sulla fattispecie, uno maggioritario fondato sulla perdita di chance e uno minoritario sul danno da inadempimento qualificato. Poi, una volta completata l’attività preliminare di ricognizione degli atti contenuti nel fascicolo, trasmette al Magistrato una breve nota nella quale segnala alcune delle pronunce più significative per ciascun orientamento, affinché questi possa valutarle direttamente e decidere quale filone seguire.", "inefficace": "Redige la bozza applicando l'orientamento maggioritario sulla perdita di chance, ritenendo che il filone più consolidato rappresenti la base più solida per la motivazione. Quanto al secondo orientamento sul danno da inadempimento qualificato, lo omette dalla bozza per non appesantire la motivazione con riferimenti a posizioni minoritarie. Infatti, ritiene che il proprio compito sia fornire al Magistrato una bozza coerente e definita, non un quadro delle alternative possibili."}, {"num": 33, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, preparando un fascicolo per la trasmissione alla Corte d'Appello, lei rinviene al suo interno alcuni documenti riservati relativi a un procedimento diverso, coinvolgente soggetti minori di età. Questi atti non avrebbero dovuto essere inclusi e la loro trasmissione ad un altro ufficio costituirebbe una violazione della riservatezza. Il fascicolo deve partire entro la giornata. Come si comporterebbe in questa situazione?", "efficace": "Individua gli atti estranei, separandoli dal fascicolo e verificando che la documentazione restante sia completa. Dunque, riferisce al Magistrato l'accaduto e la provenienza del materiale, per consentirne la restituzione al fascicolo corretto. Ricevuta l'autorizzazione, completa la trasmissione alla Corte d'Appello nei tempi previsti. Infine, condivide il problema con il gruppo di lavoro dell'Ufficio per il Processo, suggerendo un controllo di coerenza documentale prima di ogni trasmissione.", "media": "Estrae i documenti estranei dal fascicolo e li ripone separatamente in un luogo sicuro, così da poter procedere con la trasmissione del fascicolo alla Corte d'Appello entro la giornata. Dunque, invia una e-mail al Magistrato per segnalare sinteticamente l'accaduto e completa l'invio. Nei giorni successivi, attenderà un suo riscontro per definire la restituzione degli atti al fascicolo di provenienza, confidando che l'episodio non comporti ulteriori complicazioni.", "inefficace": "Rimuove discretamente i documenti estranei dal fascicolo, riponendoli in un cassetto per restituirli in un secondo momento alla cancelleria. Quindi, completa la preparazione del fascicolo e procede alla sua trasmissione alla Corte d'Appello entro la giornata, gestendo autonomamente la questione nell'interesse della continuità operativa dell'ufficio. Infine, convinto di aver scongiurato il problema di violazione della riservatezza, riprende le altre attività ordinarie."}, {"num": 39, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione civile di una Corte d'Appello, lei scopre che, per un procedimento già discusso in camera di consiglio, il Magistrato consigliere relatore è stato trasferito in altra sede senza completare la stesura della sentenza. Il fascicolo non è stato riassegnato, il termine per il deposito è prossimo e nessun altro membro del collegio ha preso in carico la redazione del provvedimento. Come si comporterebbe in questa situazione?", "efficace": "Data l'imminenza del termine di deposito, si reca dal Presidente di Sezione per rappresentare la situazione, illustrando la cronologia del fascicolo. Intanto, predispone un riepilogo degli atti e delle attività svolte in camera di consiglio, utile al Magistrato consigliere che verrà individuato per la stesura. Infine, condivide con il team dell'Ufficio per il Processo una proposta per monitorare i fascicoli con sentenza pendente in caso di trasferimento del relatore.", "media": "Riferisce al Presidente di Sezione la mancata riassegnazione del fascicolo, evidenziando l'avvicinarsi del termine di deposito. Nel frattempo, si rivolge alla cancelleria per verificare l'esistenza di eventuali istruzioni rilasciate al momento del trasferimento del Magistrato consigliere. Quindi, riprende le altre attività in programma, essendo sicuro che il Presidente si attiverà tempestivamente per l'individuazione di un nuovo consigliere incaricato della stesura.", "inefficace": "Ritiene che portare la vicenda all'attenzione del Presidente di Sezione possa alimentare valutazioni sfavorevoli sul collegio e generare frizioni interne evitabili. Pertanto, accantona momentaneamente la questione, auspicandosi che l'eventuale ritardo possa rientrare nella prassi del deposito tardivo, tollerata dalla sezione in casi eccezionali, senza particolari conseguenze formali sull'andamento del procedimento o sulla posizione professionale del Magistrato consigliere trasferito."}, {"num": 111, "domanda": "Lavorando come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei viene a conoscenza di un recente aggiornamento del sistema SICID che ha introdotto funzionalità avanzate per la gestione automatizzata delle comunicazioni e il monitoraggio delle scadenze processuali. Tuttavia, nessun collega della sezione risulta informato dell'aggiornamento e le nuove funzionalità restano inutilizzate, anche perché non è stata organizzata alcuna sessione formativa sull'argomento. Come si comporterebbe in questa situazione?", "efficace": "Studia la documentazione dell'aggiornamento, individuando le funzionalità più rilevanti per la sezione e testandole sui fascicoli in gestione. Quindi, prepara una sintesi operativa dei vantaggi riscontrati e la sottopone al Presidente, proponendogli di organizzare un breve incontro dimostrativo per i colleghi. Infine, suggerisce di designare un referente per il monitoraggio dei futuri aggiornamenti del SICID, così da evitare che novità utili restino inutilizzate.", "media": "Legge la documentazione disponibile sull'aggiornamento, prendendo nota delle funzionalità che appaiono più utili per le attività della sezione. Poi, informa i colleghi della novità durante i confronti quotidiani, condividendo le proprie osservazioni e invitandoli a esplorare le nuove opzioni del sistema. Tuttavia, rimanda a un momento successivo un confronto strutturato con il Presidente, ritenendo di dover prima acquisire maggiore padronanza delle nuove funzionalità.", "inefficace": "Registra mentalmente la notizia dell'aggiornamento e torna a occuparsi dei fascicoli in lavorazione con le funzionalità già note. Del resto, è convinto che la diffusione degli aggiornamenti informatici rientri tra le responsabilità del servizio tecnico e della dirigenza, a cui spetta organizzare le sessioni formative necessarie, e che esplorare autonomamente funzionalità non ancora illustrate potrebbe generare errori nella gestione dei registri informatici."}, {"num": 114, "domanda": "Lei lavora come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale. Gestendo i procedimenti sospesi, rileva che l'interfaccia del sistema SICP, utilizzata per l'inserimento dei provvedimenti di sospensione e revoca, è poco intuitiva e causa frequenti errori di immissione. Diversi provvedimenti risultano infatti registrati con dati incompleti o inesatti. Lei individua alcune accortezze operative che potrebbero ridurre sensibilmente questi errori. Come si comporterebbe in questa situazione?", "efficace": "Documenta i passaggi dell'interfaccia SICP che generano gli errori più ricorrenti, abbinando a ciascuno l'accortezza operativa individuata. Quindi, corregge i provvedimenti già registrati con dati incompleti e redige una guida sintetica da condividere con i colleghi della sezione. Infine, sottopone la guida al Presidente, proponendo di segnalare le criticità al servizio informatico e di adottare una checklist di verifica prima di ogni nuovo inserimento nel sistema.", "media": "Mette per iscritto le accortezze individuate, annotando per ciascun passaggio critico le azioni da seguire per evitare gli errori più comuni. Poi, condivide gli appunti con i colleghi della sezione che utilizzano il SICP, illustrando i punti dell'interfaccia più problematici. Tuttavia, rimanda a un momento successivo la segnalazione al Presidente e al servizio informatico, ritenendo prioritario verificare sul campo l'efficacia delle soluzioni proposte.", "inefficace": "Inoltra al servizio informatico una segnalazione dettagliata sulle criticità dell'interfaccia SICP, descrivendone i passaggi che causano errori e chiedendo un intervento correttivo sul sistema. Poi, riprende le proprie attività, persuaso che la risoluzione di problematiche legate all'usabilità dei software spetti al personale tecnico e che adottare accorgimenti individuali, in assenza di un intervento strutturale, rischierebbe di generare procedure difformi e incoerenti."}, {"num": 117, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei viene a conoscenza del fatto che, a seguito di un'interruzione temporanea del sistema SICID, alcuni fascicoli digitali depositati nella settimana precedente non risultano più accessibili. La cancelleria non dispone di backup aggiornato e non è chiaro se i dati siano recuperabili. La situazione è urgente perché tra i fascicoli coinvolti ve ne sono alcuni con udienze fissate nei giorni successivi. Come si comporterebbe in questa situazione?", "efficace": "Prioritizza tra i fascicoli coinvolti quelli con udienze imminenti e sollecita il servizio informatico per il ripristino urgente del SICID, condividendo l'elenco delle cause prioritarie. Poi, per quest'ultimi, verifica se gli atti delle parti siano ancora consultabili nel PCT e raccoglie i documenti cartacei disponibili in cancelleria. Infine, informa il Magistrato dello stato del recupero e propone l'adozione di procedure di backup periodico per prevenire perdite future.", "media": "Controlla quali siano le udienze più imminenti e informa immediatamente il magistrato della situazione, prospettando la possibilità di rinvio di quelle per cui i fascicoli non siano recuperabili nei tempi utili. Poi, raccoglie presso la cancelleria la documentazione cartacea disponibile, per assicurare, per quanto possibile, lo svolgimento delle udienze imminenti. Infine, rimette al servizio informatico ogni valutazione sui tempi di ripristino del SICID e attende l'esito prima di intraprendere ulteriori iniziative.", "inefficace": "Avverte la cancelleria dell'indisponibilità dei fascicoli nel SICID, chiedendole di attivare il servizio informatico per il recupero dei dati mancanti e di mettere al corrente della situazione i difensori le cui udienze sono più imminenti. Poi, riprende le ordinarie attività sui fascicoli che non sono stati resi inaccessibili dall'interruzione del sistema, persuaso che la gestione di un'emergenza informatica e l'individuazione di modalità idonee per il ripristino tempestivo dei dati spettino al servizio tecnico."}, {"num": 120, "domanda": "Lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, quando, seguendo da casa una serie di lezioni videoregistrate sull’utilizzo dei sistemi informativi giudiziari, le sorgono alcuni dubbi su diversi passaggi operativi. Tuttavia, trattandosi di videoregistrazioni, non ha possibilità di confrontarsi direttamente con il formatore. Inoltre, si rende conto che, non avendo possibilità di esercitarsi concretamente sulle procedure illustrate, fatica a trasferire quanto appreso nel lavoro quotidiano. Come si comporterebbe in questa situazione?", "efficace": "Trascrive i dubbi emersi durante le lezioni, annotando per ciascuno il punto della videoregistrazione in cui si colloca. Una volta in ufficio, replica le procedure illustrate direttamente sul sistema, verificando sul campo i passaggi meno chiari e confrontandosi con i colleghi più esperti. Quindi, sottopone al Dirigente i dubbi rimasti irrisolti, proponendo una sessione pratica con il referente informatico aperta ai colleghi che abbiano riscontrato difficoltà analoghe.", "media": "Rivede i passaggi delle lezioni che le risultano meno chiari, prendendo appunti dettagliati e cercando riscontri nella documentazione tecnica disponibile. Una volta in ufficio, prova a replicare le procedure sul sistema, chiedendo aiuto ai colleghi più esperti quando incontra difficoltà. Quanto alle lacune riscontrate nel formato formativo, rimanda la questione a un momento successivo, ritenendo di dover prima completare l'intero percorso di apprendimento.", "inefficace": "Completa la visione dell'intero ciclo di lezioni, annotando in modo generico i passaggi che risultano meno chiari, con l'intenzione di approfondirli in seguito. Poi, torna alle attività ordinarie, persuaso che le competenze sui sistemi informativi si acquisiranno con la pratica quotidiana e che, qualora incontrasse difficoltà nell'utilizzo delle procedure illustrate, potrà sempre rivolgersi ai colleghi più esperti della sezione per ottenere le indicazioni necessarie."}, {"num": 132, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Confrontando i dati del registro SICID con i fascicoli cartacei, scopre che una serie di procedimenti iscritti nelle ultime settimane presenta errori sistematici negli stessi campi: codice materia, valore della causa e data di prima udienza risultano identicamente errati per decine di fascicoli. Indagando la situazione in maniera più approfondita, lei sospetta che vi possa essere un malfunzionamento del sistema. Come si comporterebbe in questa situazione?", "efficace": "Quantifica i fascicoli interessati dagli errori sistematici, documentando le difformità riscontrate e i campi coinvolti. Intanto, corregge i dati errati dei fascicoli con udienza più prossima e avvia una verifica manuale sui nuovi inserimenti. Quindi, trasmette al servizio informatico e al Dirigente una segnalazione tecnica corredata dagli esempi raccolti, proponendo l'introduzione di un controllo incrociato periodico tra registro e fascicoli.", "media": "Allinea manualmente i dati del SICID al contenuto dei fascicoli cartacei per i procedimenti con udienza più prossima. Poi, segnala alla cancelleria le discrepanze individuate, invitandola a verificare i nuovi inserimenti prima di trasmetterli. Quindi, in attesa che la cancelleria riscontri l'eventuale persistenza del malfunzionamento, rinvia la segnalazione al servizio informatico e al Dirigente.", "inefficace": "Adegua i dati nei fascicoli che sta esaminando alle informazioni presenti nei fascicoli cartacei, garantendo la coerenza tra registro e documentazione. Dopotutto, piccoli disallineamenti nei dati di inserimento rientrano nel fisiologico margine di errore di qualsiasi sistema informatico e un'eventuale anomalia strutturale, qualora esista realmente, verrebbe prima o poi individuata dal servizio informatico."}, {"num": 135, "domanda": "Lei lavora come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale. Un collega le fa notare che la coda di stampa della stampante condivisa della sezione conserva e rende visibile a chiunque nella rete lo storico completo dei documenti stampati, con titolo del file, nome dell'utente e data di stampa, inclusi provvedimenti relativi a procedimenti penali in corso. Come si comporterebbe in questa situazione?", "efficace": "Allerta immediatamente il servizio informatico per ottenere il blocco dell'accesso alla coda di stampa e la cancellazione dello storico sensibile. Intanto, informa i colleghi dell'esposizione. Quindi, sottopone al Dirigente una proposta di protocollo su restrizioni di accesso, pulizia automatica della coda e linee guida per la stampa di documenti processualmente sensibili.", "media": "Riporta al servizio informatico l'anomalia riscontrata nella coda di stampa, chiedendo la cancellazione dello storico visibile in rete. Poi, informa il Dirigente della situazione, illustrandogli i rischi per la riservatezza dei documenti penali e chiedendogli indicazioni su come gestire la stampa di provvedimenti sensibili. Quindi, rimane in attesa del riscontro del Dirigente.", "inefficace": "Invia una segnalazione al servizio informatico, chiedendo di verificare la configurazione della stampante e di intervenire sulla coda di stampa per risolvere la vulnerabilità rilevata. Poi, torna alle proprie attività ordinarie. Infatti, ritiene che la gestione della sicurezza delle periferiche di rete rientra tra le competenze esclusive del personale tecnico e che il proprio ruolo si esaurisca nella tempestiva segnalazione dell'anomalia osservata."}, {"num": 138, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, nota che il Magistrato referente le invia abitualmente le istruzioni operative e le richieste di bozze tramite il proprio indirizzo e-mail personale anziché attraverso la posta istituzionale, apprezzandone la maggiore immediatezza. Di conseguenza, parte della corrispondenza relativa ai procedimenti in corso transita su un canale non istituzionale. Come si comporterebbe in questa situazione?", "efficace": "Valuta i rischi di riservatezza e tracciabilità legati all'uso dell'e-mail personale per la corrispondenza processuale in corso. Quindi, illustra con garbo al Magistrato le criticità riscontrate e gli propone di passare alla posta istituzionale, predisponendo modalità di comunicazione altrettanto rapide e ugualmente efficaci. Infine, condivide la nuova pratica con i colleghi della sezione, così da uniformare le modalità di corrispondenza con i Magistrati.", "media": "Espone al Magistrato le criticità legate all'uso dell'e-mail personale per la corrispondenza processuale, illustrandogli i rischi di riservatezza. Poi, gli chiede se ritenga opportuno passare gradualmente alla posta istituzionale, chiedendo indicazioni su come gestire la transizione e rimandando la definizione di un protocollo condiviso con la sezione in attesa del riscontro del Magistrato, ritenendo prioritario preservare la fluidità dell'attuale comunicazione.", "inefficace": "Asseconda la modalità di comunicazione preferita dal Magistrato, riconoscendone l'immediatezza e la rapidità di scambio nelle comunicazioni operative. Infatti, considera che la scelta del canale rientri nella prerogativa del Magistrato e che sollevare autonomamente la questione potrebbe risultare improprio, considerato che l'utilizzo dell'e-mail personale è consolidato nel rapporto di collaborazione instaurato con il proprio Magistrato di riferimento."}, {"num": 141, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lavorando su di un piccolo gruppo di fascicoli, digitalizzati mediante scansione l'anno precedente, si accorge che diversi file sono stati acquisiti come semplici immagini, prive di riconoscimento ottico del testo. Di conseguenza, il loro contenuto non è ricercabile per parole chiave e la consultazione digitale non offre alcun vantaggio rispetto a quella cartacea. Come si comporterebbe in questa situazione?", "efficace": "Converte i file con uno strumento di riconoscimento ottico del testo, restituendo la ricercabilità ai fascicoli in lavorazione. Intanto, verifica l'estensione del problema tra gli altri fascicoli archiviati nell'anno precedente. Quindi, trasmette al Dirigente e al servizio informatico una relazione sulla criticità riscontrata, proponendo una campagna di riprocessamento dell'arretrato e uno standard che imponga l'OCR per ogni futura digitalizzazione.", "media": "Processa con uno strumento di OCR i file su cui sta lavorando, così da renderli ricercabili per la consultazione. Poi, segnala al servizio informatico che alcuni file dell'anno precedente sono privi di riconoscimento ottico, chiedendone l'analisi. Tuttavia, non avendo raccolto dati più sistematici sull'estensione del problema, rimanda a un momento successivo una proposta strutturata al Dirigente sullo standard di digitalizzazione da adottare.", "inefficace": "Ricava le informazioni necessarie scorrendo manualmente il contenuto delle immagini scansionate e ricostruendo i dati utili alla trattazione dei fascicoli. Dopotutto, la ricercabilità per parole chiave rappresenta un miglioramento auspicabile ma non essenziale per lo svolgimento del proprio lavoro, e l'eventuale riprocessamento dei file già archiviati compete al servizio informatico nell'ambito delle ordinarie attività di manutenzione dei sistemi."}, {"num": 144, "domanda": "Lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Scopre che alcuni colleghi, per poter lavorare sui file anche da casa durante lo smart working, salvano abitualmente copie dei documenti di lavoro su servizi di archiviazione cloud personali come Google Drive o Dropbox, anziché utilizzare esclusivamente i sistemi istituzionali. Come si comporterebbe in questa situazione?", "efficace": "Riconosce la legittima esigenza di accesso remoto ai fascicoli durante lo smart working e i rischi connessi all'uso di servizi cloud personali. Intanto, verifica con il servizio informatico quali strumenti istituzionali siano disponibili per l'accesso da remoto sicuro. Quindi, sottopone al Dirigente una proposta di linee guida che indichino gli strumenti istituzionali come unica modalità consentita.", "media": "Richiama l'attenzione dei colleghi sui rischi connessi al salvataggio di documenti su cloud personali, illustrando i profili di riservatezza coinvolti. Poi, segnala la prassi al Dirigente, chiedendogli indicazioni su come garantire un accesso remoto sicuro durante lo smart working. Nel frattempo, lei personalmente utilizza solo gli strumenti istituzionali in attesa di una decisione formale del servizio informatico.", "inefficace": "Impiega esclusivamente i sistemi istituzionali per il salvataggio dei propri documenti di lavoro, rispettando le policy di sicurezza dell'ufficio. Del resto, non ritiene di avere un'autorità per giudicare le modalità operative adottate dai singoli colleghi durante lo smart working, rientrando nella loro sfera di responsabilità personale. Soprattutto poiché, eventuali interventi sulla gestione del cloud aziendale, debbano partire da una direttiva formale del servizio informatico."}, {"num": 147, "domanda": "In qualità di Addetto all’Ufficio per il Processo presso la sezione civile di un Tribunale, scopre che alcuni colleghi AUP, per confrontarsi rapidamente su questioni relative ai fascicoli, si scambiano screenshot delle schermate del registro SICID tramite applicazioni di messaggistica personale sul proprio telefono. Gli screenshot contengono dati delle parti e informazioni processuali visibili. Come si comporterebbe in questa situazione?", "efficace": "Sensibilizza i colleghi sui rischi di riservatezza e di tutela dei dati connessi allo scambio di screenshot tramite applicazioni personali. Intanto, verifica con il servizio informatico quali strumenti istituzionali siano disponibili per il confronto rapido tra gli AUP su questioni relative ai fascicoli. Quindi, sottopone al Dirigente una proposta di protocollo che promuova canali istituzionali sicuri.", "media": "Puntualizza ai colleghi i rischi di riservatezza legati allo scambio di screenshot con dati processuali tramite applicazioni personali. Poi, suggerisce loro di utilizzare canali istituzionali per il confronto sui fascicoli, mostrando le alternative disponibili. Qualora, i colleghi non dovessero modificare spontaneamente la prassi adottata, ragionerà sul fatto di segnalare tutto al Dirigente.", "inefficace": "Rispetta scrupolosamente i canali istituzionali per le proprie comunicazioni operative sui fascicoli e per il trattamento dei dati processuali. Infatti, non si preoccupa delle modalità di comunicazione adottate informalmente dai singoli colleghi, che agiscono in totale autonomia. Inoltre, eventuali interventi sulla sicurezza dei dati scambiati tramite dispositivi personali richiedono una policy esplicita del Dirigente."}];
let config={numQuestions:60, minutes:20, range:null};
let timer=null, tempo=0;
let quizLocked=false;
let submitted=false;

/* ✅ Dropdown blocchi */
(function populateRangeSelect(){
  const sel=document.getElementById("rangeSelect");
  const MAX=297, STEP=15;
  for(let s=1; s<=MAX; s+=STEP){
    const e=Math.min(s+STEP-1,MAX);
    const opt=document.createElement("option");
    opt.value=s+"-"+e;
    opt.textContent=s+"-"+e;
    sel.appendChild(opt);
  }
})();

/* ✅ Disabilita/abilita numero domande random */
rangeSelect.addEventListener("change",()=>{
  numQuestions.disabled = !!rangeSelect.value;
});

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}
function updateTime(){
  time.textContent=
    String(Math.floor(tempo/60)).padStart(2,"0")+":"+
    String(tempo%60).padStart(2,"0");
}

/* START */
function startQuiz(){
  const rangeVal=rangeSelect.value.trim();

  if(rangeVal){
    const [start,end]=rangeVal.split("-").map(Number);
    config.range={start,end};
    config.numQuestions=QUESTION_BANK.filter(q=>q.num>=start&&q.num<=end).length;
    numQuestions.value=config.numQuestions;
  } else {
    config.range=null;
    config.numQuestions=Math.min(QUESTION_BANK.length,Math.max(1,+numQuestions.value));
  }

  config.minutes=Math.max(1,+minutes.value);

  setupPage.style.display="none";
  quizPage.style.display="block";

  resultBox.style.display="none";
  quizLocked=false;
  submitted=false;

  buildQuiz();
  startTimer();
}

/* BUILD QUIZ */
function buildQuiz(){
  questions.innerHTML="";
  submitBtn.disabled=false;
  restartBtn.disabled=false;

  let pool;
  if(config.range){
    pool=QUESTION_BANK.filter(q=>q.num>=config.range.start&&q.num<=config.range.end)
                     .slice()
                     .sort((a,b)=>a.num-b.num);
    config.numQuestions=pool.length;
  } else {
    pool=[...QUESTION_BANK];
    shuffle(pool);
    pool=pool.slice(0,config.numQuestions);
  }

  pool.forEach((q,idx)=>{
    const box=document.createElement("div");
    box.className="question";
    box.innerHTML=`<h3>Domanda ${q.num}</h3><p>${q.domanda}</p>`;
    const opts=[
      {score:"efficace",text:q.efficace},
      {score:"media",text:q.media},
      {score:"inefficace",text:q.inefficace}
    ];
    shuffle(opts);
    opts.forEach(op=>{
      const l=document.createElement("label");
      l.dataset.score=op.score;
      const i=document.createElement("input");
      i.type="radio"; i.name="q"+idx;
      l.appendChild(i); l.append(" "+op.text);
      box.appendChild(l);
    });
    questions.appendChild(box);
  });
}

/* TIMER */
function startTimer(){
  clearInterval(timer);
  quizHeader.classList.remove("time-expired");
  tempo=config.minutes*60;
  updateTime();
  timer=setInterval(()=>{
    tempo--;
    updateTime();
    if(tempo<=0) onTimeExpired();
  },1000);
}

/* RESULTS */
function computeResults(){
  let e=0,m=0,n=0,a=0;
  document.querySelectorAll("label[data-score]").forEach(l=>{
    const i=l.querySelector("input");
    if(i&&i.checked){
      a++;
      if(l.dataset.score==="efficace")e++;
      if(l.dataset.score==="media")m++;
      if(l.dataset.score==="inefficace")n++;
    }
  });
  return {t:config.numQuestions,a,e,m,n};
}
function resultsHTML(r){
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;">
    <div>Totale</div><div>${r.t}</div>
    <div>Date</div><div>${r.a}</div>
    <div>Non date</div><div>${r.t-r.a}</div>
    <div>Efficaci</div><div>${r.e}</div>
    <div>Medie</div><div>${r.m}</div>
    <div>Non efficaci</div><div>${r.n}</div>
  </div>`;
}

/* SUBMIT */
function submitQuiz(){
  if(quizLocked) return;
  clearInterval(timer);
  quizLocked=true;
  submitted=true;
  submitBtn.disabled=true;
  restartBtn.disabled=false;
  document.querySelectorAll("#questions input").forEach(i=>i.disabled=true);
  document.querySelectorAll("label[data-score]").forEach(l=>{
    l.classList.add(l.dataset.score);
    if(l.querySelector("input").checked) l.classList.add("scelta");
  });
  resultStats.innerHTML=resultsHTML(computeResults());
  resultBox.style.display="block";
}

/* TIMEOUT */
function onTimeExpired(){
  clearInterval(timer);
  quizLocked=true;
  submitted=true;
  document.querySelectorAll("#questions input").forEach(i=>i.disabled=true);
  restartBtn.disabled=false;
  quizHeader.classList.add("time-expired");
  time.textContent="Tempo scaduto";
  resultStats.innerHTML=resultsHTML(computeResults());
  resultBox.style.display="block";
}

/* NAVIGATION */
function restartQuiz(){
  quizLocked=false;
  submitted=false;
  resultBox.style.display="none";
  buildQuiz();
  startTimer();
}
function backToSetup(){
  clearInterval(timer);
  resultBox.style.display="none";
  quizLocked=false;
  submitted=false;
  quizPage.style.display="none";
  setupPage.style.display="block";
}

maxInfo.textContent="Domande disponibili: "+QUESTION_BANK.length;
</script>

</body>
</html>
