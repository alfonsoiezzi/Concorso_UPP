gistrato. Dunque, colloca i verbali di udienza e la documentazione bancaria mancanti tra le possibili integrazioni successive e procede all'invio nei tempi previsti, certo che la Procura, qualora necessiti di ulteriori atti, potrà sollecitarli attraverso gli ordinari canali di scambio tra gli uffici."}, {"num": 38, "domanda": "Da qualche mese lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Studiando un fascicolo classificato come causa seriale e inserito in un'udienza con trattazione rapida, lei scopre che il procedimento coinvolge una questione giuridica complessa e peculiare, che richiede una trattazione incompatibile con le altre udienze seriali. Il tempo previsto nel calendario è insufficiente per una trattazione adeguata e l'udienza è fissata tra pochi giorni. Come si comporterebbe in questa situazione?", "efficace": "Identifica gli elementi di complessità del fascicolo, ricostruendo le questioni giuridiche peculiari che lo distinguono dalle cause seriali. Quindi, sottopone al Magistrato un'analisi documentata, prospettandogli di estrarre il procedimento dall'udienza seriale e rifissarlo in una sessione con tempi adeguati. Poi, si coordina con la cancelleria per comunicare il rinvio, se concesso dal Magistrato. Infine, raccomanda di introdurre una verifica della classificazione dopo lo spoglio di ogni fascicolo.", "media": "Inserisce nella scheda preparatoria una nota sulla complessità del fascicolo, riportando le principali questioni giuridiche emerse dalla prima lettura degli atti. Quindi, la consegna al Magistrato prima dell'udienza, evidenziandogli verbalmente l'incompatibilità con la trattazione seriale. Intanto, si dedica alla preparazione degli altri fascicoli in programma, riservandosi di approfondire la questione qualora il Magistrato glielo richieda e confidando che possa valutare l'opportunità di un rinvio.", "inefficace": "Compila la scheda preparatoria secondo il modello adottato per i fascicoli seriali, riportando le informazioni essenziali sulle parti e l'oggetto del procedimento, come di consueto. Poi, consegna la documentazione al Magistrato insieme agli altri fascicoli dell'udienza, persuaso che eventuali adattamenti del calendario rientrino tra le prerogative del Magistrato, il quale potrà disporre un rinvio direttamente in sede di udienza qualora ritenga la trattazione rapida inadeguata al caso."}, {"num": 40, "domanda": "Lavorando come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei collabora all'organizzazione dei turni di udienza con i cancellieri. Verificando la programmazione della settimana successiva, lei constata che per una giornata di udienze non risulta assegnato alcun cancelliere, a causa di assenze contemporanee non previste. L'udienza comprende diversi fascicoli già calendarizzati e i difensori sono stati regolarmente avvisati. Come si comporterebbe in questa situazione?", "efficace": "Individua eventuali cancellieri di altre sezioni o non impegnati per quella giornata, raccogliendo opzioni utili per la copertura. Intanto, aggiorna il Magistrato e si rivolge al Dirigente e al capo cancelleria, facendogli presente quanto riscontrato e prospettando le alternative possibili. Infine, sensibilizza il capo cancelleria sull'opportunità di predisporre un elenco di reperibilità tra il personale disponibile per coperture d'emergenza nei casi di assenze concomitanti.", "media": "Segnala la mancata copertura al Dirigente e al capo della cancelleria, trasmettendo l'elenco delle udienze calendarizzate per quella giornata e chiedendo la cortesia di individuare una soluzione tempestiva. Nel frattempo, informa il Magistrato dell'udienza, illustrandogli brevemente la criticità riscontrata. Si dedica, poi, all'aggiornamento del calendario delle altre udienze, riservandosi di ricontattare i superiori qualora la situazione dovesse protrarsi senza evoluzioni positive.", "inefficace": "Segnala la criticità al capo cancelleria con una e-mail informativa, evidenziando l'assenza simultanea dei cancellieri e ritenendo che tale concomitanza costituisca un evento imprevedibile e imputabile a circostanze esterne. Quindi, riprende le altre attività di programmazione settimanale, convinto che il capo cancelleria provvederà autonomamente ad individuare un cancelliere sostitutivo tra il personale dell'ufficio e a comunicarlo in tempo utile."}, {"num": 41, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Al termine di un'udienza a cui ha partecipato in supporto al Magistrato occupandosi materialmente della verbalizzazione, lei si accorge, rileggendo il verbale, di aver trascritto in modo inesatto una dichiarazione resa da un testimone e questo potrebbe incidere sulla valutazione della prova. Il verbale è stato chiuso e il Magistrato, che non si è accorto dell'incongruenza durante la rilettura, si è allontanato dall'ufficio. Come si comporterebbe in questa situazione?", "efficace": "Rilegge il verbale, cercando di ricostruire il contenuto della dichiarazione del testimone, avvalendosi dei propri appunti di udienza e individuando la parte trascritta in modo inesatto. Quindi, avvisa subito il Magistrato dell'errore riscontrato, illustrandogli la discrepanza e rappresentandogli l'opportunità di risentire eventualmente il testimone. Infine, discute con il team dell'Ufficio per il Processo la criticità, per individuare una prassi di rilettura del verbale prima della chiusura.", "media": "Si impegna per ricostruire mentalmente la discrepanza tra la dichiarazione effettivamente resa dal testimone e quella trascritta nel verbale. Dunque, prepara un appunto con la correzione da apportare, in attesa di sottoporla al Magistrato il prima possibile e farsi dare indicazioni su come procedere. Intanto, prosegue con gli adempimenti post-udienza degli altri fascicoli, sperando che il verbale possa essere rettificato senza complicazioni prima della successiva udienza.", "inefficace": "Rilegge il verbale e, pur individuando la discrepanza, la reputa marginale rispetto al contenuto complessivo della deposizione. Pertanto, procede con gli adempimenti post-udienza come di consueto, ritenendo che la testimonianza mantenga piena utilizzabilità nel giudizio e che un intervento formale di rettifica rischierebbe di complicare inutilmente l'iter. Eventualmente, in occasione del prossimo incontro con il Magistrato, accennerà alla questione qualora se ne presenti l'occasione."}, {"num": 42, "domanda": "Lavorando come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei viene informato che un altro collega AUP, assegnato allo stesso magistrato, ha cessato improvvisamente il servizio. Verificando lo stato dei fascicoli che questi aveva in carico, emerge che diverse schede preparatorie risultano incomplete e che tre udienze sono fissate entro la settimana. Il Magistrato assegnatario non è ancora a conoscenza della situazione e il tempo disponibile per completare le schede è molto ridotto. Come si comporterebbe in questa situazione?", "efficace": "Effettua una ricognizione dei fascicoli del collega, distinguendo le schede con lacune sostanziali da quelle con integrazioni marginali, a partire dai tre fascicoli con udienza imminente. Dunque, aggiorna il Magistrato e il Presidente di Sezione, presentando un piano operativo per il completamento del lavoro. Infine, affronta con il team dell'Ufficio per il Processo la definizione di una procedura per il subentro in caso di cessazioni improvvise.", "media": "Avvia l'esame dei fascicoli delle tre udienze imminenti, concentrandosi sulle parti più immediate delle schede rimaste incomplete. Poi, avvisa il Magistrato dell'accaduto, trasmettendogli l'elenco dei fascicoli coinvolti e chiedendogli come sarà distribuito il lavoro residuo. Nel frattempo, prosegue con la preparazione delle schede secondo l'ordine originario, auspicando che la situazione trovi una soluzione condivisa prima dell'udienza più prossima.", "inefficace": "Pensa che segnalare subito la situazione al Magistrato possa creare allarme ingiustificato, dato che il collega potrebbe aver condiviso informalmente lo stato di avanzamento dei fascicoli prima della cessazione del servizio. Pertanto, prosegue con le proprie attività, attendendo che il Magistrato sollevi autonomamente la questione, fiducioso che nei prossimi giorni emergano indicazioni dalla dirigenza sulla gestione dei fascicoli rimasti orfani."}, {"num": 43, "domanda": "Da qualche mese lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Preparando un fascicolo per la prossima udienza, lei riscontra che un documento più volte richiamato negli atti di entrambe le parti non risulta mai depositato, né in formato cartaceo né nel sistema telematico. L'udienza è fissata tra due giorni e la trattazione potrebbe essere condizionata dall'assenza di questo documento. Come si comporterebbe in questa situazione?", "efficace": "Ripercorre i richiami al documento presenti negli atti delle parti per valutarne la rilevanza ai fini della trattazione, verificando nel PCT l'eventuale presenza del file tra i depositi del fascicolo non ancora associati. Poi, porta all'attenzione del Magistrato la questione, suggerendo di assegnare alle parti un breve termine per il deposito. Infine, Infine, raccomanda ai colleghi dell'Ufficio per il Processo di adottare un controllo incrociato tra atti e documenti in sede di spoglio.", "media": "Esegue una ricerca nel sistema telematico, verificando se il documento sia stato caricato con denominazione diversa o allegato ad altro fascicolo. Non reperendolo, inserisce nella scheda preparatoria una nota dettagliata sulla mancanza del documento, riportando i richiami presenti negli atti delle parti. Poi, per non perdere troppo tempo, riprende con la preparazione degli altri aspetti del fascicolo, lasciando che la questione emerga in udienza per la valutazione del Magistrato.", "inefficace": "Liquida la questione come un dettaglio istruttorio minore e completa la scheda preparatoria evidenziando la corposità delle memorie depositate. In aggiunta, corredata la scheda con una sintesi dei punti controversi, la consegna al Magistrato nei tempi ordinari, confidando che le parti, vista la centralità del documento per le rispettive difese, si presenteranno all'udienza con copia dello stesso pronta da produrre su eventuale sollecitazione del giudice."}, {"num": 44, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei riceve dalla cancelleria un consistente numero di fascicoli da studiare, tutti aventi la stessa data di udienza fissata tra soli quattro giorni. Tuttavia, il volume di lavoro è manifestamente superiore a quanto gestibile nel tempo disponibile con il consueto livello di approfondimento e il Magistrato è in attesa delle schede preparatorie per organizzare la trattazione e predisporre i tempi di discussione. Come si comporterebbe in questa situazione?", "efficace": "Effettua uno screening dei fascicoli, raggruppandoli per materia e complessità e individuando le cause seriali definibili con orientamenti consolidati. Poi, elabora un piano con le priorità e lo condivide con il Magistrato, indicandogli tempi realistici di consegna delle schede. Infine, verifica con i colleghi del team la possibilità di supportarla sul lavoro residuo. Infine, segnala al Presidente di Sezione la necessità di rivedere i criteri di trasmissione dei fascicoli dalla cancelleria.", "media": "Avvia lo studio dei fascicoli, partendo da quelli con maggior numero di memorie depositate, ritenendoli più complessi e, quindi, quelli che richiedono più tempo. Poi, predispone le schede dei casi che riesce a chiudere nel tempo disponibile e trasmette al Magistrato un elenco delle pratiche non ancora esaminate. Riprende, poi, il lavoro sugli altri fascicoli, impegnandosi a terminarli nel minor tempo possibile e sperando che il Magistrato valuti come gestire l'eccedenza in sede di udienza.", "inefficace": "Si attiene all'ordine in cui i fascicoli gli sono stati trasmessi dalla cancelleria, affrontandoli secondo la sequenza originaria di consegna. Si dedica, poi, nel tempo disponibile alla preparazione delle schede con il consueto metodo di lavoro, convinto che, qualora non riuscisse a completarle tutte entro la data dell'udienza, sarà il Magistrato a disporre un rinvio parziale dei fascicoli non ancora istruiti, come avviene abitualmente nella sezione nei casi di sovraccarico del ruolo."}, {"num": 45, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Un pomeriggio, un tirocinante assegnato alla stessa sezione le riferisce di aver inavvertitamente discusso i dettagli di un fascicolo riservato con un collega di un'altra sezione durante una pausa. Il fascicolo contiene dati sensibili relativi alle parti e il tirocinante, preoccupato per le conseguenze, le chiede consiglio su come procedere. Come si comporterebbe in questa situazione?", "efficace": "Ascolta con attenzione il racconto del tirocinante, cercando di comprendere la portata delle informazioni divulgate e l'identità del collega coinvolto. Poi, gli suggerisce di riferire tempestivamente l'accaduto al Magistrato formatore, offrendosi di aiutarlo a impostare la comunicazione. Infine, porta la vicenda all'interno del team dell'Ufficio per il Processo, proponendo un momento di approfondimento sugli obblighi di riservatezza durante le pause e nei contesti informali.", "media": "Ascolta il tirocinante e gli conferma la rilevanza dell'episodio sotto il profilo della riservatezza, invitandolo a mantenere la massima discrezione con altri colleghi. Quindi, gli raccomanda di informare al più presto il Magistrato formatore, affinché possa valutare come gestire la questione. Torna poi al proprio lavoro, confidando che il tirocinante segua scrupolosamente l'indicazione ricevuta e che il Magistrato formatore disponga le eventuali misure necessarie.", "inefficace": "Rassicura il tirocinante, dicendogli che si tratta di un episodio minore, verificatosi in un contesto informale e circoscritto a un collega della stessa amministrazione, pertanto privo di ripercussioni significative. Gli raccomanda, però, di prestare maggiore attenzione in futuro e di evitare di sollevare formalmente la questione, per scongiurare inutili allarmismi, persuaso che l'episodio non avrà conseguenze se nessuno lo porterà all'attenzione dei superiori."}, {"num": 46, "domanda": "Lei è Addetto all’Ufficio per il Processo presso la sezione civile di un Tribunale. Durante un'udienza in una causa complessa di diritto societario, il Magistrato le chiede di verificare contemporaneamente nel sistema SICID alcuni dati relativi a un fascicolo collegato, mentre lei sta verbalizzando le dichiarazioni del perito che sta rendendo chiarimenti orali sulla propria relazione. Tuttavia, svolgere entrambe le attività contemporaneamente comporterebbe il rischio di perdere parti della dichiarazione del perito. Come si comporterebbe in questa situazione?", "efficace": "Rappresenta al Magistrato, con discrezione, l'impossibilità di svolgere le due attività in parallelo senza compromettere la qualità della verbalizzazione. Pertanto, propone di dare priorità alla trascrizione delle dichiarazioni del perito, rinviando la consultazione del SICID alla prima pausa utile o al termine dell'audizione. Infine, si impegna a trasmettere al Magistrato i dati richiesti, non appena disponibili, senza interrompere la regolare prosecuzione dell'udienza.", "media": "Avvia la verbalizzazione delle dichiarazioni del perito, alternandola con rapide consultazioni del SICID per recuperare i dati richiesti dal Magistrato. Poi, durante i passaggi più tecnici dell'audizione, cerca di annotare le parole chiave, per riprendere successivamente il contenuto integrale a memoria. Al termine dell'udienza, completa il verbale sulla base delle proprie annotazioni, nella speranza che la ricostruzione possa mantenere il senso complessivo delle dichiarazioni rese in aula.", "inefficace": "Si impegna a eseguire entrambe le attività contemporaneamente, annotando il contenuto delle dichiarazioni del perito in modo generico quando la consultazione del SICID nel sistema richiede più attenzione. Al termine dell'udienza, chiude il verbale e lo trasmette per gli adempimenti successivi, fiducioso che la parte sostanziale delle dichiarazioni sia stata riportata correttamente e che eventuali imprecisioni non producano conseguenze rilevanti nel corso del successivo iter del procedimento."}, {"num": 47, "domanda": "Da diversi mesi lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Il giorno prima di un'udienza, il Magistrato le sottopone alcune osservazioni sul fascicolo in vista della trattazione. Confrontando le rispettive annotazioni, lei si rende conto che il Magistrato sta lavorando su una versione del fascicolo che non include gli ultimi atti depositati dalle parti nei giorni precedenti, i quali potrebbero risultare rilevanti ai fini della corretta trattazione dell'udienza. Come si comporterebbe in questa situazione?", "efficace": "Estrae dal PCT gli ultimi atti depositati dalle parti e individua gli elementi non ancora presi in esame dal Magistrato. Quindi, gli consegna la versione aggiornata del fascicolo, affiancandola con una sintesi delle novità rilevanti per l'udienza del giorno successivo. Infine, condivide con i colleghi dell'Ufficio per il Processo l'opportunità di adottare un metodo di allineamento tra AUP e Magistrato sugli atti depositati prima di ogni udienza.", "media": "Segnala al Magistrato la presenza di ulteriori atti depositati dalle parti nei giorni precedenti, offrendosi di trasmetterglieli. Quindi, predispone l'elenco dei nuovi documenti e li inoltra via e-mail al Magistrato per una sua consultazione autonoma. Riprende, poi, la preparazione dei restanti fascicoli in programma per l'udienza, confidando che il Magistrato abbia il tempo necessario per integrare questi atti nelle proprie valutazioni prima della trattazione del giorno successivo.", "inefficace": "Ritiene che la presenza di nuovi atti depositati a ridosso dell'udienza rappresenti una circostanza abituale, che il Magistrato potrà verificare autonomamente consultando il PCT il giorno stesso della trattazione. Pertanto, prosegue con la preparazione degli altri fascicoli in programma, persuaso che il giudice, in fase di trattazione, avrà modo di esaminare direttamente in udienza gli eventuali atti non ancora considerati e di adottare le determinazioni necessarie."}, {"num": 48, "domanda": "Lei è stato assegnato come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Una mattina, arrivando in ufficio, lei constata che un'infiltrazione d'acqua, verificatasi durante la notte, ha danneggiato diversi fascicoli cartacei che si trovavano sulla sua scrivania. Purtroppo, alcuni documenti risultano parzialmente illeggibili e, tra i fascicoli coinvolti, ve ne sono tre con udienze programmate nei giorni immediatamente successivi. Come si comporterebbe in questa situazione?", "efficace": "Isola i fascicoli danneggiati in un luogo asciutto per evitare ulteriori danni e procede alla ricostruzione delle copie digitali dal PCT, concentrandosi sui tre fascicoli con udienza imminente. Poi, aggiorna il Magistrato sullo stato dei fascicoli e sui tempi di ricostruzione. In seguito, segnala al Dirigente l'accaduto, per gli interventi di ripristino dei locali, condividendo alcuni accorgimenti sulla custodia dei fascicoli cartacei, per ridurre il rischio di danni analoghi.", "media": "Inizia a stampare gli atti disponibili nel PCT per i tre fascicoli con udienza ravvicinata, per ricostruire rapidamente la documentazione cartacea dei fascicoli. Quindi, informa il Magistrato dell'accaduto e dei danni subiti dalla documentazione. Per i restanti fascicoli coinvolti, si riserva di valutare la portata dei danni nei giorni successivi, confidando che l'asciugatura naturale possa consentire di recuperare parte dei documenti senza interventi ulteriori.", "inefficace": "Inquadra la gestione delle infiltrazioni e della conservazione dei fascicoli cartacei come una competenza del Dirigente amministrativo e del personale di cancelleria. Pertanto, inoltra una segnalazione via e-mail al Dirigente descrivendo l'accaduto. Quindi, riprende le consuete attività della giornata, certo che, qualora i danni ai fascicoli con udienza imminente dovessero compromettere la trattazione, sarà il Magistrato a disporre un rinvio d'ufficio prima della data fissata."}, {"num": 49, "domanda": "Da alcune settimane lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Controllando le comunicazioni inviate dopo l'ultima udienza, lei si avvede che per un procedimento il sistema ha generato due comunicazioni distinte allo stesso difensore, contenenti indicazioni difformi sulla data della prossima udienza. Il difensore potrebbe aver già ricevuto entrambe le comunicazioni e, in assenza di un chiarimento tempestivo, rischia di presentarsi nella data errata. Come si comporterebbe in questa situazione?", "efficace": "Accerta quale sia la data corretta della prossima udienza, rileggendo il verbale dell'ultima udienza, ricavando la data di rinvio. Quindi, si coordina con la cancelleria per l'invio immediato di una comunicazione rettificativa al difensore, che chiarisca la data valida. Contestualmente, aggiorna il Magistrato sull'anomalia riscontrata. Infine, segnala l'episodio al gruppo dell'Ufficio per il Processo, per approfondire le cause dell'errore e prevenirle in seguito.", "media": "Verifica quale delle due date corrisponda a quella fissata per la prossima udienza, consultando la data risultante dal frontespizio del fascicolo. Poi, chiede alla cancelleria di inviare al difensore una comunicazione di rettifica con la data corretta. In seguito, prosegue con la preparazione degli altri fascicoli, confidando che la comunicazione di rettifica giunga subito al difensore e che il disguido si risolva senza complicazioni per la trattazione dell'udienza.", "inefficace": "Valuta l'eventualità di una doppia comunicazione con date difformi come un'anomalia tecnica del sistema destinata a risolversi spontaneamente, poiché il difensore, sulla base dell'ordine cronologico degli invii, saprà riconoscere quale sia la comunicazione valida. Pertanto, prosegue con le altre attività in programma, ritenendo la questione di pertinenza tecnica e comunque risolvibile autonomamente dal difensore alla luce delle informazioni in suo possesso."}, {"num": 50, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di una Corte d'Appello. Il consigliere relatore le affida l'incarico di studiare l'istruttoria svolta in primo grado in una controversia di responsabilità medica, al fine di predisporre una scheda preparatoria utile alla decisione che il collegio dovrà prendere in un'udienza fissata tra dieci giorni. Il fascicolo che lei deve approfondire contiene oltre duecento pagine di verbali di udienza, una relazione peritale di settanta pagine e le osservazioni dei consulenti di parte. Come si comporterebbe in questa situazione?", "efficace": "Esamina preliminarmente i motivi d'appello per individuare i profili contestati e focalizzare lo studio sugli aspetti rilevanti. Poi, struttura l'analisi partendo dalla CTU e dalle testimonianze connesse a tali motivi, confrontandole con le osservazioni dei consulenti di parte per evidenziare le criticità metodologiche. Infine, sottopone al consigliere relatore una scheda che ricostruisce i fatti rilevanti, le testimonianze acquisite e le conclusioni peritali con richiami puntuali ai verbali.", "media": "Inizia lo studio leggendo in ordine cronologico i verbali di udienza e la relazione peritale, soffermandosi sulle conclusioni del CTU e sulle testimonianze più pertinenti. Poi, redige una bozza di scheda riassumendo i contenuti principali e la sottopone al consigliere relatore, chiedendogli se l'impostazione adottata sia coerente con le esigenze del collegio o se debba approfondire altri aspetti. Infine, prosegue con la lettura delle osservazioni dei CTP, sperando di completare tutto in tempo.", "inefficace": "Procede alla lettura integrale del fascicolo seguendo l'ordine in cui sono stati depositati gli atti e riportando nella scheda un riassunto fedele di ciascun documento. Poi, poiché ritiene che la selezione degli elementi rilevanti e la valutazione critica delle risultanze istruttorie e della CTU competano esclusivamente al collegio, consegna al relatore la scheda così redatta, mantenendo un'impostazione meramente descrittiva e rimettendo ogni valutazione al giudizio collegiale."}, {"num": 51, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nel completare gli adempimenti pre-udienza per la trattazione fissata il giorno successivo, si accorge che il difensore dell'attore ha depositato telematicamente, la sera precedente, un'istanza di rinvio per legittimo impedimento, allegando un certificato medico attestante una malattia di sette giorni. L'istanza non risulta ancora portata all'attenzione del Magistrato e il difensore del convenuto non è stato informato del deposito. Come si comporterebbe in questa situazione?", "efficace": "Verifica la bontà dell'istanza e la regolarità del certificato medico allegato, per poi portarli all'attenzione del Magistrato con una nota urgente. Contestualmente, si coordina con la cancelleria predisponendo la bozza di comunicazione di rinvio dell'udienza che andrà inviata alla controparte, non appena il Magistrato avrà assunto le proprie determinazioni. Infine, suggerisce di introdurre un alert automatico sui depositi telematici effettuati nelle ore serali precedenti l'udienza.", "media": "Trasmette l'istanza al Magistrato e gli segnala che l'udienza è fissata il giorno successivo. Poi, gli chiede se intenda accogliere la richiesta di rinvio o preferisca trattare comunque la causa, così da sapere come coordinarsi al meglio con la cancelleria per trasmettere tempestivamente le comunicazioni alla controparte. In attesa di ricevere indicazioni, prosegue con gli altri adempimenti pre-udienza in programma, augurandosi che il Magistrato riesca a pronunciarsi entro breve.", "inefficace": "Poiché ritiene che la valutazione sull'ammissibilità della richiesta di rinvio competa esclusivamente al Magistrato in sede di trattazione, inserisce l'istanza nel fascicolo telematico insieme agli altri atti e ne annota l'esistenza nella scheda preparatoria, così che il Magistrato possa visionarla in apertura di udienza. Infine, considerando esaurito il proprio compito, prosegue con la preparazione degli altri fascicoli in programma per l'udienza del giorno successivo."}, {"num": 52, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nel predisporre le schede preparatorie per le udienze della settimana successiva, si accorge che tre giorni prima il difensore dell'attore ha depositato telematicamente un'istanza di anticipazione dell'udienza per sopravvenuta urgenza, motivata dall'aggravamento delle condizioni di salute del proprio assistito in una causa risarcitoria. L'istanza non risulta ancora portata all'attenzione del Magistrato e l'udienza è attualmente fissata tra due mesi. Come si comporterebbe in questa situazione?", "efficace": "Verifica se sia stata allegata della documentazione medica, per valutare la rilevanza dell'urgenza rappresentata. Poi, controlla nel calendario del ruolo l'esistenza di slot disponibili per un'eventuale anticipazione dell'udienza e sottopone al Magistrato l'istanza, corredata da una sintesi dei profili rilevanti e delle date alternative. Infine, una volta assunto il provvedimento di anticipazione da parte del Magistrato, concorda con la cancelleria la trasmissione delle comunicazioni alle parti.", "media": "Segnala immediatamente al Magistrato la presenza dell'istanza depositata tre giorni prima, trasmettendogliela unitamente al certificato medico allegato dal difensore, se presente. Poi, gli chiede se intenda accogliere la richiesta di anticipazione e, in caso affermativo, in quale data ritenga di fissare la nuova udienza. Nel frattempo, prosegue con la predisposizione delle schede per le altre udienze della settimana, confidando che il Magistrato le dia un riscontro entro la fine della giornata.", "inefficace": "Ritiene che l'istanza, una volta depositata telematicamente, venga automaticamente portata all'attenzione del Magistrato attraverso le ordinarie procedure di cancelleria. Dunque, prosegue con la predisposizione delle schede preparatorie per le udienze imminenti. In seguito, qualora il Magistrato dovesse segnalarle di non aver ricevuto l'istanza, gli farà presente che il deposito era stato correttamente effettuato dal difensore e che la trasmissione avrebbe dovuto giungerle tramite canali ordinari."}, {"num": 53, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Riordinando i fascicoli delle udienze della settimana entrante, si imbatte in un'istanza di rimessione in termini depositata dal difensore dell'attore, volta ad ottenere l'esibizione di documenti rilevanti ai fini della decisione e motivata da una causa non imputabile. L'istanza è stata depositata in prossimità dell'udienza e il Magistrato referente, impegnato in altri adempimenti, non l'ha ancora esaminata. Come si comporterebbe in questa situazione?", "efficace": "Vaglia la plausibilità della causa non imputabile addotta e la rilevanza dei documenti di cui si chiede l'esibizione, ricostruendo la cronologia dei termini processuali. Poi, predispone una nota e la consegna al Magistrato affinché ne prenda subito visione. Infine, propone al Presidente di Sezione di inserire tra le attività AUP una verifica sistematica dei depositi tardivi nelle 48 ore precedenti ciascuna udienza, con segnalazione immediata di quelli urgenti ai Magistrati.", "media": "Predispone una nota per il Magistrato descrivendo l'oggetto dell'istanza e indicando la data di deposito, lasciandogliela in evidenza sulla scrivania insieme al fascicolo cartaceo. Subito dopo, gli invia un'e-mail chiedendogli se intenda esprimersi sulla rimessione in termini prima dell'udienza o trattarla all'udienza di comparizione. Infine, rimane a disposizione per ogni eventuale approfondimento richiesto e prosegue con il riordino dei fascicoli delle udienze della settimana.", "inefficace": "Sottopone immediatamente l'istanza al Presidente di Sezione, chiedendogli di valutare personalmente la questione e di indicare al Magistrato referente come comportarsi, dato che quest'ultimo risulta al momento impegnato in altri adempimenti urgenti. Poi, ritenendo che la delicatezza della rimessione in termini e l'imminenza dell'udienza richiedano una determinazione del Presidente di Sezione, rimane in attesa delle sue indicazioni prima di procedere ulteriormente."}, {"num": 54, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. In una settimana particolarmente intensa, deve conciliare tre attività: lo spoglio di trenta fascicoli per le udienze della settimana successiva, una ricerca giurisprudenziale urgente richiesta dal Magistrato su una questione emersa in udienza e la riprogrammazione del ruolo del mese successivo, resa necessaria da un'udienza straordinaria disposta dal Presidente di Sezione. Lei teme che il tempo a disposizione sia insufficiente per riuscire a completare tutto. Come si comporterebbe in questa situazione?", "efficace": "Effettua una stima dei tempi richiesti da ciascuna attività, individuando le scadenze vincolanti e le attività che possono essere svolte in parallelo, e la condivide con il Magistrato referente per concordare eventuali margini di flessibilità. Poi, avvia la ricerca giurisprudenziale, trattandola come urgenza, e organizza lo spoglio dei trenta fascicoli in base alla data di udienza, iniziando da quelli più prossimi. Infine, riserva le ultime giornate disponibili alla riprogrammazione del ruolo.", "media": "Stima sommariamente il tempo necessario per ciascuna attività e, percependo la difficoltà di completarle tutte entro la fine della settimana, chiede al Presidente di Sezione se sia possibile rinviare la riprogrammazione del ruolo alla settimana successiva, così da concentrarsi su spoglio e ricerca. In attesa della sua risposta, avvia la ricerca giurisprudenziale richiesta urgentemente dal Magistrato referente, dedicandovi tutto il tempo necessario, e poi si dedica allo spoglio.", "inefficace": "Si dedica alle tre attività nell'ordine con cui gli sono state assegnate, iniziando dallo spoglio dei fascicoli. Infatti, ritiene che ogni compito debba essere portato a termine secondo le indicazioni ricevute e che la definizione delle priorità competa esclusivamente a chi le ha assegnato le attività. Eventualmente, qualora al termine della settimana alcuni adempimenti risultino ancora incompleti, comunicherà al Magistrato quali siano rimasti in sospeso e per quali ragioni."}, {"num": 55, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Mezz'ora prima dell'inizio di un'udienza istruttoria complessa, nel preparare un fascicolo di antica iscrizione a ruolo per il Magistrato si accorge che mancano nel PCT i verbali delle tre sessioni istruttorie precedenti, essenziali per l'escussione dei testimoni, e che la relazione del CTU risulta presente solo nel fascicolo cartaceo, senza essere stata caricata a sistema. Il Magistrato sta per entrare in aula e si attende il fascicolo completo. Come si comporterebbe in questa situazione?", "efficace": "Si reca immediatamente in cancelleria per richiedere una copia dei tre verbali istruttori e della relazione del CTU presenti nel fascicolo cartaceo. Poi, informa il Magistrato dell'anomalia rilevata e gli consegna, unitamente alla scheda preparatoria, la copia dei documenti in tempo utile per l'apertura dell'udienza. Al termine della trattazione, verifica insieme alla cancelleria che il fascicolo informatico venga integralmente allineato al cartaceo su tutti gli atti pregressi della causa.", "media": "Contatta urgentemente la cancelleria chiedendo di verificare la presenza della CTU e dei verbali nel fascicolo cartaceo e di procedere al loro caricamento immediato nel PCT. Poi, raggiunge il Magistrato in aula e gli accenna brevemente della mancanza di alcuni documenti nel fascicolo telematico. Infine, torna alla propria postazione per monitorare gli aggiornamenti nel PCT, in attesa che la cancelleria completi i caricamenti prima che i documenti mancanti vengano richiesti in udienza.", "inefficace": "Consegna il fascicolo al Magistrato così come si presenta nel PCT, ritenendo che, trattandosi di sessioni istruttorie già svolte e di un'antica CTU, la consultazione di tali documenti risulti ininfluente ai fini del corretto svolgimento dell'udienza. Dunque, si reca in aula confidando che la trattazione proceda senza richieste specifiche di esibizione dei documenti e che, se così non fosse, tali richieste potranno trovare accoglimento anche ad udienza conclusa."}, {"num": 56, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso un Tribunale, alle ore 09:00 della mattina, lei riceve in rapida successione due richieste urgenti: il Magistrato referente le chiede di predisporre entro un'ora una bozza di ordinanza cautelare con scadenza imminente mentre il Presidente di Sezione la convoca per supportare la predisposizione di una relazione statistica da trasmettere al Ministero entro mezzogiorno. Lei è consapevole che le due attività non possono essere svolte simultaneamente. Come si comporterebbe in questa situazione?", "efficace": "Individua la sequenza operativa più logica: dedicare la prima ora alla bozza di ordinanza cautelare, la cui scadenza è più stretta e il cui inadempimento avrebbe conseguenze processuali dirette, e le due ore successive al supporto alla relazione statistica. Poi, sottopone il piano al Magistrato referente e al Presidente di Sezione per ottenerne l'approvazione e, una volta confermata la possibilità di procedere in tal modo, avvia la stesura della bozza per poi raggiungere il Presidente alle 10:00.", "media": "Informa il Presidente di Sezione che il Magistrato referente le ha chiesto di completare una bozza di ordinanza cautelare entro un'ora. Alla luce della sovrapposizione di tale attività con quella richiesta dal Presidente, chiede a quest'ultimo quale ordine di priorità debba seguire. In attesa delle sue indicazioni, avvia una prima lettura degli atti del procedimento cautelare, confidando che la risposta del Presidente arrivi tempestivamente e le consenta di rispettare entrambe le scadenze.", "inefficace": "Decide di rispondere alla convocazione del Presidente di Sezione per rappresentargli l'inconciliabilità delle due richieste pervenutele simultaneamente nel corso della mattinata. In particolare, gli evidenzia che l'assegnazione improvvisa della redazione di una bozza entro un'ora da parte del Magistrato referente rende del tutto impraticabile il proprio supporto alla predisposizione della relazione statistica. Pertanto, gli chiede di chiarire la questione direttamente con il Magistrato referente."}, {"num": 57, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Durante i controlli di regolarità post-udienza, scopre che una sentenza pubblicata tre giorni prima contiene un errore materiale significativo: nel dispositivo risulta invertita l'indicazione delle parti, cosicché il soggetto vittorioso appare come soccombente, con conseguenze potenzialmente rilevanti sull'esecuzione del provvedimento. La sentenza è già consultabile nel PCT ma non risulta ancora notificata alle parti. Come si comporterebbe in questa situazione?", "efficace": "Confronta il dispositivo con la motivazione della sentenza, per accertare la natura materiale dell'errore. Poi, si reca dal Magistrato estensore per illustrargli l'anomalia riscontrata, evidenziandone le possibili conseguenze sull'esecuzione, e predispone una bozza di ordinanza di correzione ex art. 288 c.p.c. Poi, si coordina con la cancelleria per annotare nel fascicolo telematico la correzione apportata e verifica se altre sentenze dello stesso deposito presentino errori analoghi.", "media": "Comunica al Magistrato estensore l'errore riscontrato nel dispositivo, trasmettendogli una nota sintetica che ne descrive le possibili conseguenze sull'esecuzione del provvedimento. Poi, dopo avergli segnalato la possibilità di dover attivare la procedura di correzione ex art. 288 c.p.c., si rivolge ad un collega AUP più esperto per capire come casi analoghi siano stati gestiti nella sezione e raccogliere elementi utili per gestire con maggiore prontezza una situazione simile in futuro.", "inefficace": "Appone sul frontespizio del fascicolo un'annotazione sull'errore riscontrato nel dispositivo, così che risulti immediatamente visibile al Magistrato estensore in caso di successiva consultazione. Successivamente, poiché ritiene che la correzione ex art. 288 c.p.c. sia attività riservata esclusivamente al Magistrato e che tale procedura possa avvenire anche su istanza delle parti una volta ricevuta la notifica, prosegue con i controlli di regolarità degli altri fascicoli."}, {"num": 58, "domanda": "Lei opera come Addetto all'Ufficio per il Processo con funzioni statistico-informatiche presso un Tribunale. Nell'elaborare il report trimestrale sul disposition time, su incarico del Dirigente Amministrativo, lei rileva un tasso di definizione dei procedimenti civili più elevato rispetto alle attese. Approfondendo l'analisi, scopre che alcune centinaia di fascicoli risultano erroneamente registrati nel SICID come \"definiti per transazione\" invece che come \"pendenti con accordo parziale\". Come si comporterebbe in questa situazione?", "efficace": "Estrae dal SICID tutti i fascicoli classificati \"definiti per transazione\" e ne verifica la correttezza confrontandoli con i verbali di udienza, quantificando l'entità effettiva dell'errore. Poi, sulla base di ciò, sottopone al Dirigente un piano per la correzione dei fascicoli classificati in maniera erronea, da attuare con il supporto della cancelleria, in tre fasi: identificazione dei casi interessati, rettifica del loro stato nel SICID e verifica finale prima della trasmissione ministeriale.", "media": "Esamina un campione di fascicoli classificati come “definiti per transazione” per verificare l’effettiva presenza dell’errore. Poi, segnala al Dirigente la discrepanza rilevata nella classificazione, chiedendo indicazioni sull’eventuale inclusione dei dati errati nel report. Infine, ritenendo che con ogni probabilità le verrà indicato di escludere tali dati, procede con l’elaborazione del report utilizzando esclusivamente i dati corretti, evidenziando in una nota l’esclusione dei dati non conformi.", "inefficace": "Completa il report trimestrale estraendo i dati dal SICID nella loro configurazione attuale, ritenendo che l'elaborazione statistica debba rispecchiare fedelmente lo stato delle registrazioni presenti nel sistema. Poi, poiché è convinto che eventuali correzioni debbano essere effettuate direttamente dalla cancelleria, che ha originariamente inserito i dati, trasmette il report al Dirigente secondo la consueta procedura, segnalandogli sinteticamente l'anomalia riscontrata in alcuni fascicoli."}, {"num": 59, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Durante un'udienza istruttoria, nella quale lei sta provvedendo alla verbalizzazione, il Magistrato istruttore improvvisamente si allontana dall'aula per una comunicazione urgente. Pochi minuti dopo, un testimone afferma ad alta voce di aver ricevuto minacce e di temere per la propria incolumità, esplicitando di non voler proseguire con la deposizione al ritorno del Magistrato. Come si comporterebbe in questa situazione?", "efficace": "Annota puntualmente a verbale le parole del testimone sulle minacce ricevute e sulla volontà di non proseguire con la deposizione. Poi, incarica il commesso di rintracciare con urgenza il Magistrato istruttore per evidenziargli la gravità della situazione. Intanto, invita il testimone a mantenere la calma e a spostarsi in un'area separata dell'aula, così che il Magistrato possa valutare al suo rientro l'adozione delle tutele necessarie e, in caso di reato, la trasmissione degli atti alla procura.", "media": "Verbalizza le parole pronunciate dal testimone sulle minacce ricevute e sulla sua volontà di non proseguire la deposizione al rientro del Magistrato. Poi, esorta il commesso a rintracciare il Magistrato istruttore per chiedergli di interrompere la comunicazione urgente e rientrare immediatamente in aula per gestire personalmente la situazione. Nel frattempo, invita i presenti a mantenere il silenzio e ad attendere composti il rientro del Magistrato, per preservare l'ordine dell'aula.", "inefficace": "Trascrive a verbale le parole pronunciate dal testimone sulle minacce ricevute e sulla volontà di non proseguire oltre la deposizione, ritenendo che la documentazione dell'accaduto rappresenti il contributo richiesto al suo ruolo in questo momento particolarmente critico. Poi, resta nella propria postazione e, considerando che la gestione dell'udienza spetti esclusivamente al Magistrato istruttore, invita il testimone e gli altri presenti ad attendere pazientemente il rientro del giudice in aula."}, {"num": 60, "domanda": "Lei opera come Addetto all'Ufficio per il Processo in supporto all'ufficio detenuti della sezione penale di un Tribunale. Nel corso del controllo di routine dello scadenziario, constata che per tre imputati i termini di custodia cautelare scadono entro i prossimi dieci giorni, senza che il SICP abbia generato i relativi alert automatici. Contattando il personale IT, apprende che da tre settimane il modulo di generazione automatica degli alert è inattivo a causa di un bug introdotto da un recente aggiornamento e non ancora risolto. Come si comporterebbe in questa situazione?", "efficace": "Accerta per ciascuno dei tre imputati se sia già fissata un'udienza entro i termini e lo stato dei relativi fascicoli, per fornire ai Magistrati assegnatari elementi utili alla valutazione degli adempimenti necessari. Poi, aggiorna le schede cautelari e le trasmette ai Magistrati assegnatari, segnalandone l'urgenza. Infine, verifica nello scadenzario eventuali ulteriori scadenze non rilevate e, fino al ripristino del sistema di alert, effettua un monitoraggio manuale quotidiano.", "media": "Comunica subito ai Magistrati assegnatari dei tre imputati l'imminente scadenza dei termini, trasmettendo loro le informazioni ricavate dallo scadenziario. Poi, segnala al personale IT l'urgenza di risolvere il bug del modulo di alert, ricordando loro le conseguenze del malfunzionamento sulla gestione dei termini. Successivamente, prosegue con gli altri adempimenti d'ufficio, rimanendo a disposizione dei Magistrati per eventuali approfondimenti sulla posizione dei tre imputati.", "inefficace": "Comunica ai tre Magistrati assegnatari l'imminente scadenza dei termini di custodia cautelare dei rispettivi imputati, affinché ne tengano conto nella gestione dei relativi fascicoli. Poi, poiché il malfunzionamento del sistema di alert compete al personale IT e l'individuazione di altri eventuali termini in scadenza dipende dalla risoluzione del bug introdotto con l'aggiornamento, si dedica agli altri adempimenti dello scadenziario, in attesa che la problematica venga risolta."}, {"num": 61, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale. Una mattina riceve la telefonata di un giornalista investigativo che richiede una copia degli atti di un procedimento penale pendente, coperto da segreto istruttorio, del quale lei si sta occupando nell'ambito del supporto al Magistrato referente. Il chiamante sostiene di avere diritto all'accesso in base alla normativa sulla trasparenza amministrativa e, di fronte alle sue esitazioni, minaccia la pubblicazione di un articolo sull'opacità del sistema giustizia. Come si comporterebbe in questa situazione?", "efficace": "Risponde con fermezza istituzionale, spiegando che le richieste di accesso agli atti penali si presentano per iscritto e vengono accordate esclusivamente ai diretti interessati, secondo le modalità previste dal codice di rito. Poi, annota il contenuto e l'orario della telefonata, inclusa la minaccia di pubblicazione. Infine, informa il Magistrato referente e il Dirigente, proponendo di condividere con il personale della sezione un protocollo per la gestione delle richieste della stampa.", "media": "Chiarisce al chiamante che le richieste di accesso agli atti di un procedimento penale pendente vengono accordate solo ai diretti interessati, pertanto lo invita ad attendere le fasi processuali in cui il procedimento diventerà accessibile al pubblico. Poi, informa il Magistrato referente della chiamata ricevuta e delle richieste avanzate dal giornalista, riferendogli anche il tono assunto nel corso del colloquio. Quindi, riprende le attività già in programma sui fascicoli della mattinata.", "inefficace": "Cerca di gestire la telefonata con cortesia per contenere la tensione, spiegando al giornalista che il procedimento penale è in una fase in cui gli atti non possono essere divulgati pubblicamente e che dovrà attendere le successive evoluzioni processuali. Poi, nella speranza che la conversazione si sia chiusa in modo sufficientemente garbato da disincentivare la pubblicazione dell'articolo, riprende le attività in corso sui fascicoli in programma, considerando l'episodio ormai concluso."}, {"num": 62, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nella costruzione dell'archivio giurisprudenziale, affidatale dal Presidente, scopre che nelle opposizioni a decreto ingiuntivo per crediti bancari, materia di frequente trattazione, convivono due orientamenti opposti tra Magistrati della stessa sezione: a fattispecie identiche corrispondono decisioni di segno contrario. Il contrasto non è mai emerso formalmente e si traduce in esiti differenziati a seconda del Magistrato assegnatario. Come si comporterebbe in questa situazione?", "efficace": "Predispone una scheda tecnica che confronta fattispecie, argomenti giuridici ed esiti dei due orientamenti, con impostazione neutra. Poi, sottopone la scheda al Presidente di Sezione, evidenziandogli come a fattispecie identiche corrispondano oggi decisioni opposte a seconda del Magistrato assegnatario. Infine, affinché i Magistrati possano concordare un' interpretazione unica della fattispecie, propone che la questione venga affrontata nella prossima riunione di sezione.", "media": "Porta all'attenzione del Presidente di Sezione la discrepanza riscontrata tra le decisioni prese da Magistrati diversi su fattispecie identiche in materia di opposizioni a decreto ingiuntivo bancario. Poi, gli chiede indicazioni su come gestire tale contrasto nell'archivio giurisprudenziale e rimane disponibile a fornirgli ulteriori elementi qualora il Presidente ritenga necessario un ulteriore approfondimento. Infine, riprende l'attività di catalogazione delle altre materie.", "inefficace": "Inserisce nell'archivio giurisprudenziale tutte le sentenze raccolte sulla materia, classificandole per data e Magistrato estensore. Successivamente, poiché ritiene che l'individuazione di divergenze interpretative e la loro gestione competano ai Magistrati nell'esercizio della loro autonomia decisionale, prosegue con la catalogazione delle sentenze nelle altre materie, considerando concluso il proprio lavoro sulle opposizioni a decreto ingiuntivo per crediti bancari."}, {"num": 63, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale. Il Presidente di Sezione la convoca con urgenza informandola che un Magistrato si è assentato per malattia il giorno prima della sua udienza: nel ruolo figurano venti fascicoli, alcuni relativi a imputati detenuti con scadenze cautelari imminenti, altri a procedimenti a piede libero con posizioni più risalenti. Il Presidente le chiede di supportare la riorganizzazione del ruolo, individuando i fascicoli da trattare prioritariamente e quelli rinviabili. Come si comporterebbe in questa situazione?", "efficace": "Passa in rassegna i venti fascicoli e li classifica sulla base di criteri oggettivi: scadenze cautelari dei detenuti, termini di prescrizione e improcedibilità, testimoni già citati. Poi, elabora un nota strutturata, che distingue i fascicoli da trattare prioritariamente da quelli rinviabili con scarso impatto processuale, e la sottopone al Presidente. Infine, si coordina con la cancelleria per le comunicazioni di rinvio e propone l'individuazione di un Magistrato supplente per i casi non rinviabili.", "media": "Classifica autonomamente i venti fascicoli distinguendo quelli con imputati detenuti, che segnala come prioritari per la scadenza dei termini cautelari, da quelli a piede libero, ordinati per data di iscrizione. Poi, presenta la classificazione al Presidente di Sezione, illustrando i criteri adottati e la sequenza proposta per la trattazione. Infine, rimette al Presidente le determinazioni sui rinvii e sulle comunicazioni alle parti, riprendendo nel frattempo le altre attività di supporto.", "inefficace": "Stila un elenco puntuale dei venti fascicoli riportando per ciascuno il numero di ruolo, la tipologia di udienza, il nominativo dell'imputato e il reato contestato. Poi, presenta l'elenco al Presidente di Sezione, chiedendogli di indicare fascicolo per fascicolo quali debbano essere trattati prioritariamente e quali rinviati, dato che la valutazione sulle priorità richiede un giudizio che ritiene competere alla dirigenza della sezione ed eccedere il proprio perimetro operativo."}, {"num": 64, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nel corso degli adempimenti pre-udienza, trova depositata dal difensore dell'attrice un'istanza urgente di anticipazione dell'udienza, attualmente fissata tra quattro mesi. All'istanza è allegata documentazione medica che attesta una malattia terminale, con prognosi infausta a breve termine che rende necessaria una definizione rapida della controversia successoria pendente, per consentire alla parte di sistemare le proprie questioni patrimoniali. Come si comporterebbe in questa situazione?", "efficace": "Prende visione della documentazione medica e verifica la coerenza della richiesta rispetto allo stato del procedimento. Poi, controlla sul calendario del ruolo gli slot utili per una eventuale anticipazione, così da fornirli al Magistrato insieme all'istanza. Infine, si reca dal Magistrato assegnatario per sottoporgli con urgenza la richiesta, coordinandosi con la cancelleria per le comunicazioni alla controparte in caso di accoglimento.", "media": "Sottopone subito l'istanza al Magistrato assegnatario, trasmettendogli la documentazione medica allegata e segnalando l'urgenza rappresentata dal difensore dell'attrice. Successivamente, gli chiede se intenda accogliere la richiesta di anticipazione e in che tempi, così da sapere come procedere con le eventuali comunicazioni da predisporre alle parti. Quindi, riprende gli adempimenti pre-udienza sugli altri fascicoli in agenda per la giornata.", "inefficace": "Annota nella scheda preparatoria del fascicolo la presenza dell'istanza di anticipazione depositata dal difensore dell'attrice, con indicazione della documentazione medica allegata. Poi, essendo convinto del fatto che l'anticipazione di un'udienza debba essere rimessa alla valutazione del giudice che ne ha disposto la fissazione, lascia l'istanza nel fascicolo per la consultazione in sede di esame ordinario e prosegue con altri adempimenti pre- udienza."}, {"num": 65, "domanda": "Lei opera come Addetto all'Ufficio per il Processo con funzioni statistico-informatiche presso un Tribunale. Deve trasmettere al Ministero della Giustizia il report annuale sui flussi dei procedimenti entro le ore 18:00 della giornata. Alle ore 15:00 si accorge che i dati di due sezioni su sei non sono ancora stati caricati nel sistema dalla cancelleria e che i responsabili delle cancellerie interessate risultano entrambi momentaneamente irraggiungibili. Un report parziale rischia di pregiudicare la rendicontazione degli obiettivi PNRR. Come si comporterebbe in questa situazione?", "efficace": "Verifica la possibilità di estrarre autonomamente dal SICID i dati mancanti delle due sezioni con le proprie credenziali. Qualora ciò non dovesse essere possibile, invia un’e-mail urgente ai due responsabili e contatta i funzionari delle cancellerie interessate, sollecitando i dati. Infine, informa il Dirigente illustrando le opzioni praticabili: trasmissione completa, se i dati saranno disponibili entro l’ora indicata, oppure parziale, con nota esplicativa e richiesta di proroga al Ministero.", "media": "Tenta ripetutamente di rintracciare i responsabili delle cancellerie interessate attraverso telefonate ed e-mail, sperando di ottenere rapidamente i dati mancanti per il completamento del report. Poi, informa il Dirigente della situazione e gli chiede indicazioni su come procedere in caso di impossibilità nel reperire i dati entro la tempistica originariamente stabilita. Infine, prosegue con la preparazione del report, pronto ad integrarlo con i dati mancanti non le verranno trasmessi.", "inefficace": "Entro l'orario previsto trasmette al Ministero il report con i dati caricati a sistema dalle quattro sezioni che hanno completato per tempo gli inserimenti e segnala genericamente nelle note la temporanea indisponibilità dei dati delle altre due sezioni. Poi, nella speranza che il Ministero consideri la trasmissione complessivamente adeguata, riprende le ordinarie attività previste per la giornata, riservandosi di integrare i dati mancanti in futuro qualora espressamente richiesti."}, {"num": 66, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nel corso dello spoglio del fascicolo in vista di un'udienza istruttoria, nota che il consulente tecnico d'ufficio nominato nella causa è titolare di uno studio professionale che in passato ha reso consulenze di parte per una delle società oggi parti del procedimento. La circostanza emerge incidentalmente da un atto depositato. Il Magistrato istruttore ha già disposto la CTU e non risulta che le parti abbiano proposto ricusazione ai sensi dell'art. 63 c.p.c. Come si comporterebbe in questa situazione?", "efficace": "Approfondisce l'atto depositato per ricostruire la natura del rapporto professionale pregresso tra lo studio del CTU e una delle parti, individuando i passaggi rilevanti. Poi, si reca dal Magistrato istruttore per sottoporgli con riservatezza la circostanza riscontrata, predisponendo una scheda sintetica con i riferimenti agli atti. Infine, si coordina con la cancelleria per gli adempimenti connessi qualora il Magistrato disponga la sostituzione del CTU.", "media": "Mette al corrente il Magistrato istruttore della circostanza emersa dall'atto, riferendogli il rapporto professionale pregresso tra lo studio del CTU e una delle società parti. Poi, non appena gli verranno fornite istruzioni operative precise sul modo in cui dovrà procedere, si impegnerà per eseguire quanto gli verrà richiesto nei tempi indicati. Una volta concluso tale adempimento, riprenderà lo spoglio degli altri fascicoli in programma per l'udienza istruttoria.", "inefficace": "Registra la circostanza nella scheda preparatoria del fascicolo, annotando il riferimento all'atto dal quale emerge il rapporto professionale pregresso tra lo studio del CTU e una delle parti. Poi, poiché l'art. 63 c.p.c. riserva alle parti la legittimazione a proporre ricusazione del consulente entro termini precisi, ritiene che la valutazione sull'opportunità di tale iniziativa esuli dal proprio ruolo e, pertanto, preferisce dedicarsi ad altre attività urgenti."}, {"num": 67, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nel verificare la conformità tecnica degli atti depositati telematicamente in preparazione di un'udienza fissata tra quattro giorni, si accorge che una memoria difensiva del difensore del convenuto, caricata nel sistema entro i termini, presenta una segnalazione di anomalia: la firma digitale risulta apposta con certificato già scaduto. La memoria contiene eccezioni processuali rilevanti che la parte intendeva sollevare in quella sede. Come si comporterebbe in questa situazione?", "efficace": "Richiede al personale IT dell'ufficio la verifica tecnica sulla marca temporale della firma, per accertare se sia stata apposta prima della scadenza del certificato e valutare eventuali profili di sanatoria. Poi, sulla base dell'esito, sottopone al Magistrato una scheda con la descrizione dell'anomalia e delle sue possibili conseguenze sulla validità del deposito. Infine, si coordina con la cancelleria per le comunicazioni alle parti qualora il Magistrato dichiari la nullità dell'atto.", "media": "Predispone per il Magistrato una nota informativa che riporta l'anomalia segnalata dal sistema sulla firma digitale della memoria e la rilevanza delle eccezioni processuali contenute nell'atto, allegandola al fascicolo. Poi, inserisce un'ulteriore segnalazione nella scheda preparatoria dell'udienza, così che la questione emerga e venga risolta all'apertura della trattazione dal Magistrato. Al termine di tale attività, riprende la verifica di conformità sugli altri atti depositati dalle parti.", "inefficace": "Esclude la memoria difensiva dagli atti utilizzabili per la preparazione del fascicolo, considerando che la firma digitale apposta con certificato scaduto comporti la nullità del deposito secondo le regole del PCT. Dunque, procede con lo studio del fascicolo tralasciando le eccezioni processuali contenute nell'atto, ritenendo che spetti al difensore del convenuto, una volta informato dell'anomalia in udienza, attivarsi nei modi e nei tempi che il codice di rito consente a tutela della parte."}, {"num": 68, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nel corso di un controllo di routine sui fascicoli, scopre che per sette ordinanze relative a procedimenti diversi, pur risultando nel fascicolo telematico le ricevute di accettazione delle PEC inviate ai difensori delle parti, non figurano le corrispondenti ricevute di consegna. Le ordinanze sono state adottate tra due e cinque mesi prima: alcune contengono adempimenti con termini processuali in scadenza, altre con termini già decorsi. Come si comporterebbe in questa situazione?", "efficace": "Esamina le sette ordinanze rilevando per ciascuna gli estremi del procedimento e il tempo trascorso dall'adozione, per misurare l'impatto del mancato perfezionamento delle comunicazioni sulle parti. Poi, le classifica in ordine di priorità e sottopone al Presidente di Sezione e al Dirigente Amministrativo una scheda riepilogativa, proponendo di coordinarsi con la cancelleria per trasmettere nuovamente le comunicazioni. Infine, attiva con il personale IT una verifica sull'origine dell'anomalia.", "media": "Predispone un elenco con gli estremi delle sette ordinanze, segnalando al Dirigente Amministrativo la mancata ricevuta di consegna delle PEC inviate ai difensori. Data la maggiore urgenza delle ordinanze con termini già scaduti, decide di concentrarsi prioritariamente su queste, proponendo al Dirigente il nuovo invio immediato delle relative comunicazioni PEC tramite la cancelleria. Si riserva di prendere in carico le restanti nei giorni successivi, quando avrà a disposizione più tempo.", "inefficace": "Riferisce subito al Dirigente Amministrativo la presenza di un disallineamento tra le ricevute di accettazione e di consegna sulle comunicazioni di alcune ordinanze che ha esaminato personalmente, chiedendogli di valutare chi debba occuparsene. Poi, ritenendo che la gestione di un'anomalia di tale portata richieda un intervento coordinato, le cui modalità devono essere indicate direttamente dal Dirigente, rimane a disposizione per gli adempimenti e le verifiche che le verranno assegnate."}, {"num": 69, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, assegnato in modalità one-to-one ad un Magistrato. In una settimana critica, si trova a gestire simultaneamente tre situazioni: il Magistrato a cui è affiancato è in malattia e cinque udienze della settimana vanno riorganizzate; due bozze di ordinanza che lo stesso Magistrato le aveva affidato prima dell'assenza hanno scadenza tra quarantotto ore; un altro Magistrato della sezione, cogliendo la sua momentanea disponibilità, le chiede un approfondimento giurisprudenziale urgente. Come si comporterebbe in questa situazione?", "efficace": "Struttura un piano di lavoro valutando tempi, scadenze e priorità di ciascuna attività. Poi, si rivolge al Presidente di Sezione per la riorganizzazione delle cinque udienze, proponendo l'individuazione di un Magistrato supplente o un piano di rinvii. Contestualmente, concorda con l'altro Magistrato una tempistica sostenibile per la ricerca giurisprudenziale e dedica le ore centrali della giornata al completamento delle due bozze di ordinanza in scadenza.", "media": "Affronta immediatamente il completamento delle due bozze di ordinanza, data la scadenza più stringente, dedicandovi la prima parte della giornata. Poi, segnala al Presidente di Sezione l'assenza del Magistrato referente e la necessità di riorganizzare le cinque udienze della settimana, rimettendogli le relative determinazioni. Infine, contatta l'altro Magistrato per chiedergli un margine di tempo maggiore sulla ricerca giurisprudenziale urgente.", "inefficace": "Comincia a lavorare alle bozze di ordinanza con la scadenza più stringente, dedicandovi tutta l'attenzione disponibile nella prima parte della giornata, riservandosi di procedere con gli altri due adempimenti uno per volta, nell'ordine che riterrà più opportuno. Nel frattempo, se le dovessero arrivare solleciti in proposito, risponderà di stare procedendo al massimo delle proprie possibilità, secondo la sequenza che ha ritenuto più sostenibile."}, {"num": 70, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, in configurazione one-to-one. Una mattina, poco dopo essere entrato in servizio, scopre che il proprio Magistrato referente è stato ricoverato e sarà assente per almeno due settimane. Dallo spoglio settimanale emergono due procedimenti urgenti: un imputato detenuto con termine di custodia cautelare in scadenza domani; una misura cautelare reale da confermare entro quarantotto ore. Il Presidente di Sezione non è stato ancora informato della situazione. Come si comporterebbe in questa situazione?", "efficace": "Si reca immediatamente dal Presidente di Sezione per informarlo dell'assenza del Magistrato referente, portando una sintesi dei due procedimenti urgenti con gli estremi, le scadenze e lo stato degli atti. Poi, chiede che venga individuato urgentemente un Magistrato supplente per entrambi i casi, offrendosi di trasmettere i fascicoli con le schede cautelari aggiornate. Infine, si coordina con la cancelleria per gli adempimenti conseguenti, così da garantire la trattazione nei termini.", "media": "Presenta al Presidente di Sezione l'assenza del Magistrato referente, segnalandogli l'imminente scadenza del termine di custodia cautelare del detenuto come caso più urgente da affrontare. Dunque, rimette al Presidente ogni determinazione sulla gestione dei procedimenti e si mette a disposizione per predisporre il materiale necessario. Infine, inizia ad aggiornare la scheda cautelare del detenuto, riservandosi di occuparsi della misura cautelare reale nel corso della giornata.", "inefficace": "Invia un'e-mail al Presidente di Sezione per segnalargli brevemente l'assenza del proprio Magistrato referente per le prossime due settimane. Poi, ritenendo di aver così assolto al proprio dovere e considerando che la predisposizione delle schede cautelari dipenderà dalle indicazioni che il Magistrato supplente deciderà di fornirle, preferisce attendere la sua nomina prima di iniziare il lavoro preparatorio cosi da impostarlo in maniera conforme alle sue aspettative e richieste."}, {"num": 71, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei è stato assegnato a tre Magistrati in modalità mini-pool. All'inizio di un'ordinaria mattinata di lavoro, alle ore 09:00, le arrivano tre richieste simultaneamente: il Magistrato coordinatore del pool le chiede lo spoglio urgente di dieci fascicoli per un'udienza calendarizzata nel pomeriggio; un secondo Magistrato le chiede tre bozze di sentenza entro le 12:00; un terzo le chiede supporto alla verbalizzazione di un'udienza che inizierà alle 09:30. Come si comporterebbe in questa situazione?", "efficace": "Pianifica rapidamente le attività della giornata, stimando i tempi e le scadenze di ciascuna richiesta. Quindi, decide di mettersi a disposizione del terzo Magistrato per la prima parte della mattinata, supportandolo nella verbalizzazione dell'udienza delle ore 09:30. Poi, si organizza per dedicare le restanti ore della mattina alle tre bozze di sentenza e il pomeriggio allo spoglio dei dieci fascicoli, aggiornando il Magistrato coordinatore sul piano complessivo.", "media": "Decide di dare assoluta priorità alla verbalizzazione dell'udienza prevista per le 09:30, in quanto richiede presenza fisica e ha la scadenza più stringente, informando contestualmente gli altri due Magistrati del pool della propria momentanea indisponibilità. Poi, dopo aver verbalizzato l'udienza, dedica il tempo rimanente alla stesura delle bozze di sentenza, sperando di completarle entro la giornata, e rimanda lo spoglio dei fascicoli al giorno successivo.", "inefficace": "Inizia immediatamente a lavorare sulla richiesta del Magistrato coordinatore del pool, ossia lo spoglio dei dieci fascicoli, considerandola prioritaria per il ruolo del richiedente. Poi, ritenendo che la verbalizzazione dell'udienza possa essere gestita anche da un cancelliere già presente in aula e che il criterio gerarchico sia il più coerente per decidere come ordinare le priorità tra le tre richieste ricevute, si dedica alla predisposizione delle bozze di sentenza."}, {"num": 72, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione lavoro di un Tribunale, lei è stato recentemente assegnato in modalità one-to-one ad un Magistrato. Quest'ultimo le ha affidato lo studio di un procedimento in materia di mobbing e demansionamento, per predisporre una bozza di provvedimento in vista di un' udienza fissata tra ventiquattro ore. Si tratta della sua prima esperienza con questa tipologia di controversia e il fascicolo contiene una corposa documentazione, tra cui consulenze medico-legali, organigrammi e prove testimoniali. Come si comporterebbe in questa situazione?", "efficace": "Imposta un piano di lavoro in due fasi: effettua prima una ricerca giurisprudenziale mirata sui principi di diritto espressi dalla Cassazione in materia di mobbing e demansionamento, per acquisire il quadro normativo di riferimento. Poi, studia il fascicolo focalizzandosi sulle consulenze medico-legali, sugli organigrammi e sulle prove testimoniali raccolte. Infine, predispone la bozza di provvedimento evidenziando al Magistrato i punti di maggiore rilevanza per la risoluzione della vertenza.", "media": "Avvia la lettura del fascicolo partendo dagli atti introduttivi, proseguendo in ordine cronologico attraverso memorie, consulenze medico-legali, organigrammi e verbali testimoniali. Poi, dopo aver ricostruito a grandi linee il quadro fattuale, inizia a redigere la bozza, riproducendo lo schema che ha visto applicato in diversi precedenti provvedimenti della stessa fattispecie presenti nel gestionale, confidando che l'impostazione adottata sia coerente con quanto il Magistrato si attende.", "inefficace": "Si rivolge subito al Magistrato di riferimento, rappresentando la propria inesperienza in materia e la complessità del fascicolo in rapporto alla scadenza di ventiquattro ore. Pertanto, chiede al Magistrato di valutare la riassegnazione dello studio e della predisposizione della bozza di provvedimento ad un collega AUP più esperto o, in alternativa, un differimento dell'udienza per consentirle un tempo sufficientemente adeguato per la disamina di tutti i documenti presenti nel fascicolo."}, {"num": 73, "domanda": "In qualità di Addetto all'Ufficio per il Processo assegnato ai servizi trasversali di un Tribunale, lei deve presentare al Presidente entro le 15:00 un'analisi comparativa dei tempi medi di definizione dei procedimenti nelle sezioni civili, per un'importante riunione con il Consiglio Giudiziario. Alle ore 13:00, però, lei si accorge che i dati estratti dal SICID differiscono da quelli dei report di monitoraggio periodicamente trasmessi alla presidenza dalle singole sezioni: in tre sezioni su cinque il SICID indica tempi superiori del 30-40%. Come si comporterebbe in questa situazione?", "efficace": "Indaga le cause della discrepanza, verificando le metodologie utilizzate per l'estrazione dei due dataset, con particolare riguardo ai filtri applicati e al trattamento dei procedimenti sospesi. Poi, contatta i referenti delle tre sezioni per chiarire i rispettivi criteri di calcolo. Infine, si reca dal Presidente per illustrargli la situazione, proponendo di presentare nell'analisi i dati ricavati dal SICID con una nota metodologica sulle cause della divergenza rispetto ai report sezionali.", "media": "Condivide subito con il Presidente la discrepanza rilevata tra i dati SICID e i report sezionali, segnalandogli che l'analisi completa delle cause richiederebbe tempi incompatibili con la scadenza delle 15:00. Quindi, predispone il report integrando entrambi i dataset in due tabelle distinte, accompagnate da una breve nota informativa che evidenzia la differenza del 30-40% per le tre sezioni interessate. Infine, rimette al Presidente ogni valutazione su quale dato utilizzare nella riunione.", "inefficace": "Predilige l'utilizzo dei dati estratti dal SICID, ritenendo che il registro ufficiale costituisca la fonte di riferimento obbligata per qualsiasi analisi statistica da presentare ad una riunione istituzionale. Pertanto, completa il report sulla base di tali dati inserendo in nota un generico richiamo all'esistenza di report di monitoraggio interni che riportano tempistiche di definizione minori. Infine, trasmette il documento al Presidente entro le 15:00 come da richiesta originaria."}, {"num": 74, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, assegnato in configurazione one-to-one. Durante lo spoglio di un fascicolo in materia contrattuale fissato per la prima udienza di trattazione del giorno successivo, si accorge che la controversia verte su un contratto di affiliazione commerciale, materia di competenza esclusiva della Sezione Specializzata in Materia di Impresa. La questione di incompetenza non è stata finora sollevata dalle parti, ma è rilevabile d'ufficio dal giudice entro tale udienza. Come si comporterebbe in questa situazione?", "efficace": "Approfondisce il contenuto degli atti e del contratto allegato al fascicolo per raccogliere gli elementi probatori rilevanti ai fini della qualificazione giuridica e della declaratoria di incompetenza ex art. 38 c.p.c. Poi, predispone una scheda tecnica con i riferimenti normativi e giurisprudenziali e una bozza di ordinanza, sottoponendole al Magistrato referente prima dell'udienza. Infine, si coordina con la cancelleria per gli adempimenti conseguenti.", "media": "Espone al Magistrato la questione di competenza rilevata, segnalandogli il possibile inquadramento del contratto di affiliazione commerciale tra le materie riservate alla Sezione Specializzata in Materia di Impresa. Poi, lascia sulla scrivania del Magistrato una nota riassuntiva degli elementi emersi dallo spoglio e rimette alla sua valutazione ogni approfondimento ulteriore. Infine, prosegue con la preparazione della scheda per l'udienza del giorno successivo.", "inefficace": "Integra la scheda preparatoria inserendo un'annotazione sulla possibile questione di competenza emersa dallo spoglio, con un richiamo alla materia del contratto di affiliazione commerciale. Poi, considerando che la questione avrebbe potuto essere sollevata dalle parti costituite, le quali hanno preferito soprassedere, ritiene che ulteriori iniziative esulino dal proprio ruolo di supporto e carica la scheda nel fascicolo telematico affinché sia visibile al Magistrato."}, {"num": 75, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei gestisce il ruolo delle udienze per il Presidente di Sezione. Due giorni prima di un'udienza, si accorge di aver commesso un errore nel calcolo del peso ponderale: ha fissato fascicoli per un totale di sei ore di trattazione, a fronte di una disponibilità effettiva del Magistrato di tre ore. Tra i fascicoli fissati vi sono quattro cause urgenti non rinviabili e dodici cause ordinarie. Come si comporterebbe in questa situazione?", "efficace": "Ricalcola il peso ponderale di ciascun fascicolo per individuare le cause ordinarie con minore impatto processuale in caso di rinvio, così da riportare il carico complessivo dell'udienza entro le tre ore disponibili. Poi, si reca dal Presidente riconoscendo l'errore e sottoponendogli la proposta di rimodulazione del ruolo. Infine, si coordina con la cancelleria per le comunicazioni di rinvio alle parti e, prima della fissazione delle prossime udienze, si ripropone di fare un doppio controllo sul peso ponderale.", "media": "Riconosce senza indugio l'errore e lo comunica subito al Presidente di Sezione, segnalando che le quattro cause urgenti restano prioritarie e che occorre intervenire sulle dodici ordinarie per rientrare nelle tre ore disponibili. Pertanto, rimette al Presidente la selezione dei fascicoli le cui udienze possono essere rinviate senza particolari conseguenze. Infine, una volta individuati tali fascicoli, si mette a disposizione per predisporre le comunicazioni alle parti in collaborazione con la cancelleria.", "inefficace": "Mantiene il ruolo nella configurazione attuale, ritenendo che la gestione del tempo in udienza e l'eventuale decisione di rinviare alcuni fascicoli competano esclusivamente al Magistrato, unico titolare del potere di conduzione dell'udienza stessa. Quindi, per agevolare la trattazione, si dedica alla predisposizione di schede preparatorie particolarmente ridotte per ciascuno dei sedici fascicoli, confidando di mettere il Magistrato nelle condizioni di trattarli più speditamente durante l'udienza."}, {"num": 76, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, durante la verbalizzazione di un'udienza di giudizio abbreviato, si accorge che il testimone sta rendendo dichiarazioni palesemente contraddittorie rispetto al verbale di sommarie informazioni rese in fase di indagini, presente nel fascicolo del pubblico ministero acquisito agli atti. Nel corso dell'esame, né il Magistrato né le parti sembrano essersi accorti della contraddizione. Come si comporterebbe in questa situazione?", "efficace": "Continua la verbalizzazione con precisione, trascrivendo fedelmente le dichiarazioni rese dal testimone in udienza. Poi, alla prima pausa utile, si avvicina con riservatezza al Magistrato per segnalargli la contraddizione rilevata, consegnandogli un prospetto di confronto tra le dichiarazioni odierne e quelle del verbale di sommarie informazioni. Infine, rimette al Magistrato ogni valutazione sull'opportunità di intervenire con domande o di richiamare l'attenzione delle parti.", "media": "Termina la verbalizzazione della deposizione in corso e, durante una breve pausa dell'udienza, si rivolge ad un collega AUP più esperto per confrontarsi su come comportarsi in casi analoghi. Poi, sulla base delle indicazioni ricevute, al termine dell'udienza si avvicina al Magistrato per riferirgli verbalmente la contraddizione riscontrata rispetto al verbale di sommarie informazioni, mostrandosi disponibile ad approfondire la questione qualora il Magistrato ne faccia richiesta.", "inefficace": "Si concentra sulla verbalizzazione delle dichiarazioni rese dal testimone, curando che ogni passaggio della deposizione sia riportato fedelmente per iscritto sul verbale d'udienza. Poi, ritenendo che la contestazione delle eventuali difformità con le dichiarazioni rese in fase di indagini rientri tra le prerogative esclusive del pubblico ministero e della difesa, mantiene un atteggiamento di stretto riserbo, nel rispetto della dialettica del contraddittorio tra le parti."}, {"num": 77, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei gestisce il ruolo delle udienze. Aggiornando il calendario mensile, individua settantadue cause di risarcimento danni da sinistro stradale contro le stesse compagnie assicurative, fondate sulle medesime questioni di liquidazione del danno, distribuite nelle udienze ordinarie dei prossimi sei mesi insieme a cause di diversa natura. L'orientamento della sezi
