<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simulazione – Quiz random</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background:#f4f6f9;
  padding:30px;
  padding-bottom:90px;
}
h1 { text-align:center; margin-top:0; }

.container {
  max-width: 760px;
  margin: 0 auto;
}

.card {
  background:#fff;
  padding:22px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.12);
  margin-bottom:18px;
}

/* ===== SETUP ===== */
.field { margin-bottom:18px; }
label { display:block; font-weight:600; margin-bottom:6px; }

input[type="number"], select {
  width:100%;
  padding:12px;
  font-size:16px;
  border:1px solid #ccd3dd;
  border-radius:6px;
  background:#fff;
}

/* ✅ CAMPO DISABILITATO VISIVAMENTE GRIGIATO */
input[type="number"]:disabled {
  background:#e9ecef;
  color:#6c757d;
  cursor:not-allowed;
}

button {
  padding:12px 22px;
  font-size:16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2c7be5;
  color:#fff;
}
button.secondary { background:#6c757d; color:#fff; }
button:disabled { opacity:.55; cursor:not-allowed; }

/* ===== TIMER BAR ===== */
#quizHeader {
  background:#fff;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.12);
  padding:12px 16px;
  margin-bottom:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position: sticky;
  top: 10px;
  z-index: 10;
}

/* ✅ TIMEOUT VISIVO IN ALTO */
#quizHeader.time-expired {
  background:#f8d7da;
  border-left:6px solid #dc3545;
}
#quizHeader.time-expired #time {
  color:#dc3545;
  font-weight:700;
}

/* ===== QUIZ ===== */
.question {
  background:#fff;
  padding:20px;
  margin-bottom:16px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.10);
}

.options label {
  display:block;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  cursor:pointer;
}

/* ===== COLORI RISPOSTE ===== */
.efficace { background:#d4edda; border-left:6px solid #28a745; }
.media { background:#fff3cd; border-left:6px solid #ffc107; }
.inefficace { background:#f8d7da; border-left:6px solid #dc3545; }

.scelta {
  outline: 3px solid #2c7be5;
  box-shadow: 0 0 0 3px rgba(44,123,229,0.25);
  font-weight: 600;
}

/* ===== RISULTATI ===== */
#resultBox { display:none; margin-bottom:18px; }
#resultBox .results { background:#f7f8fb; padding:12px; border-radius:8px; }

/* ===== FOOTER ===== */
footer {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#f4f6f9;
  border-top:1px solid #d0d5dd;
  text-align:center;
  font-size:12px;
  padding:10px;
}
</style>
</head>

<body>

<h1>Simulazione Prova – Addetti UPP</h1>

<div class="container">

<div id="setupPage" class="card">
  <h2>Impostazioni simulazione</h2>

  <!-- ✅ BLOCCO -->
  <div class="field">
    <label>Blocchi fissi da 15 domande (opzionale)</label>
    <select id="rangeSelect">
      <option value="">(Nessun blocco – usa Numero di domande random)</option>
    </select>
  </div>

  <div class="field">
    <label>Numero di domande random</label>
    <input id="numQuestions" type="number" value="60" min="1">
    <div id="maxInfo"></div>
  </div>

  <div class="field">
    <label>Minuti timer</label>
    <input id="minutes" type="number" value="20" min="1">
  </div>

  <button onclick="startQuiz()">Inizia simulazione</button>
</div>

<div id="quizPage" style="display:none;">

  <div id="quizHeader">
    <div>⏱ <span id="time">00:00</span></div>
    <div>
      <button id="restartBtn" onclick="restartQuiz()">Restart</button>
      <button class="secondary" onclick="backToSetup()">Impostazioni</button>
    </div>
  </div>

  <div id="questions"></div>

  <div id="resultBox" class="card">
    <h3>Risultati</h3>
    <div id="resultStats" class="results"></div>
  </div>

  <div class="card" style="text-align:center;">
    <button id="submitBtn" onclick="submitQuiz()">Invia la prova</button>
  </div>

</div>
</div>

<footer>
Per segnalare errori o suggerimenti scrivere a <b>alfonsoiezzi@hotmail.it</b>
</footer>

<script>
const QUESTION_BANK = [{"num": 1, "domanda": "Lei presta servizio come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Una mattina, il Magistrato referente le assegna con urgenza la predisposizione della bozza di un provvedimento su una materia che lei non ha ancora avuto modo di approfondire, precisando che il documento dovrà essere pronto entro il mattino seguente. Prima che lei possa chiedere chiarimenti o ricevere indicazioni più precise, il Magistrato si reca in udienza e risulta irreperibile per il resto della giornata. Come si comporterebbe in questa situazione?", "efficace": "Avvia la ricerca sulla materia, consultando le banche dati giuridiche e gli orientamenti della sezione per inquadrare il caso. Dopo aver studiato il fascicolo e identificato i nodi giuridici centrali, predispone la bozza del provvedimento. Infine, invia il documento al Magistrato via e-mail, corredandolo di una nota in cui illustra le scelte operate, segnala i punti su cui l'orientamento giurisprudenziale non è univoco e indica le questioni che richiedono un suo riscontro prima della sottoscrizione.", "media": "Visto il poco tempo disponibile, effettua una ricerca sulla materia selezionando le pronunce più immediate tra quelle reperibili nelle banche dati e concentrandosi sui nodi giuridici che ritiene più chiari. Poi, predispone una bozza parziale che riflette quanto individuato, lasciando in sospeso i passaggi argomentativi più complessi. Infine, la invia al Magistrato via e-mail, segnalando le lacune rilevate e chiedendogli le indicazioni necessarie per completarla prima della sottoscrizione.", "inefficace": "Constatata la propria limitata familiarità con la materia, reputa che predisporre la bozza in autonomia, senza indicazioni precise, rischierebbe di produrre un risultato di scarsa utilità. Pertanto, si dedica alle attività ordinarie già pianificate, riservandosi di avviare il lavoro sulla bozza non appena il Magistrato rientrerà dall'udienza per ricevere le direttive necessarie, contando sul fatto che il tempo residuo sarà comunque sufficiente per completarla entro la mattina successiva."}, {"num": 2, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Rientrato in ufficio dopo alcuni giorni di assenza per malattia, lei constata che le comunicazioni telematiche relative ai fascicoli in sua gestione si sono accumulate senza essere state lette né smistate. Lei sa che, tra queste, potrebbero esservi depositi di atti con scadenze ravvicinate che, se non gestiti tempestivamente, rischiano di produrre ricadute sulla regolare trattazione dei procedimenti. Come si comporterebbe in questa situazione?", "efficace": "Effettua una ricognizione delle comunicazioni accumulate, classificandole per tipologia e urgenza, così da individuare i depositi con scadenze ravvicinate. Poi, gestisce prioritariamente questi ultimi, coordinandosi con la cancelleria per gli adempimenti necessari e informando il Magistrato delle situazioni che richiedono un intervento immediato. Infine, segnala l'accaduto al Presidente di Sezione, proponendo una procedura condivisa per evitare analoghi accumuli nei periodi di assenza futuri.", "media": "Scorre le comunicazioni accumulate basandosi sull'oggetto e sul mittente per individuare quelle che sembrano segnalare scadenze ravvicinate. Poi, si occupa della loro trasmissione tempestiva alla cancelleria per i relativi adempimenti e aggiorna il registro dei fascicoli interessati. Per le comunicazioni il cui contenuto risulta meno immediato da classificare, predispone un elenco riepilogativo e lo sottopone al Magistrato, chiedendogli indicazioni su quali casi trattare con priorità.", "inefficace": "Passa in rassegna rapidamente le comunicazioni accumulate per fare una prima valutazione del volume di lavoro, convinto che quelle davvero urgenti siano già state intercettate dalla cancelleria nel corso dei giorni precedenti. In seguito, si concentra sui fascicoli con udienze già fissate nei giorni successivi, ritenendo che questi abbiano precedenza, e si ripromette di esaminare le comunicazioni con maggiore attenzione una volta esaurita la verifica delle udienze più imminenti."}, {"num": 3, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Durante la preparazione della scheda di un fascicolo in vista della prossima udienza, lei si accorge che l'ultima memoria istruttoria depositata risulta sottoscritta da un difensore diverso da quello originariamente costituito, senza che risulti alcuna nuova nomina né alcun atto di sostituzione. Lei sa che, se la questione non viene chiarita subito, potrebbe incidere sulla regolare trattazione del procedimento e richiedere un rinvio. Come si comporterebbe in questa situazione?", "efficace": "Si coordina con la cancelleria per verificare se vi siano atti depositati telematicamente non ancora inseriti nel fascicolo. Una volta accertata l'effettiva assenza di nomine o atti di sostituzione, redige una nota in cui documenta la questione, illustra i possibili riflessi processuali e suggerisce di richiedere alla parte interessata la regolarizzazione della nomina prima dell'udienza. Infine, la trasmette al Magistrato con anticipo, per consentirgli di adottare i provvedimenti necessari.", "media": "Segnala nella scheda preparatoria la difformità rilevata nella sottoscrizione dell'ultima memoria istruttoria, indicando al Magistrato che il difensore firmatario non corrisponde a quello originariamente costituito in giudizio. In seguito, trasmette la scheda al Magistrato, evidenziando che la regolarità della sottoscrizione andrà necessariamente verificata prima dell'udienza. Infine, si rende disponibile per effettuare eventuali ulteriori approfondimenti che il Magistrato riterrà opportuni.", "inefficace": "Completa la scheda del fascicolo concentrandosi sulle questioni di merito che reputa rilevanti per la trattazione, considerando la difformità nella sottoscrizione una questione di carattere meramente formale che il Magistrato potrà agevolmente gestire nel corso dell'udienza. Quindi, trasmette a quest'ultimo la scheda come di consueto, ritenendo che segnalare ogni irregolarità formale riscontrata nei fascicoli rallenterebbe inutilmente il proprio lavoro di preparazione delle udienze."}, {"num": 4, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Organizzando i fascicoli per le udienze della settimana successiva, lei scopre che l'aula assegnata al Magistrato referente per una delle giornate risulta contestualmente attribuita anche ad un altro giudice della sezione per lo stesso orario. I difensori di entrambe le udienze sono già stati convocati e, qualora il problema non venisse risolto, si rischierebbe di dover rinviare almeno una delle due udienze, con conseguenti disagi per le parti. Come si comporterebbe in questa situazione?", "efficace": "Verifica nel sistema gestionale se vi siano ulteriori aule disponibili per quella giornata, così da avere un quadro completo della situazione. Sulla base di quanto emerso, contatta il Magistrato referente ed il Dirigente amministrativo, illustra il problema nel dettaglio e prospetta le possibili soluzioni operative, per consentire loro di adottare la decisione più adeguata nel minor tempo possibile. Infine, si mette a disposizione per supportare l'attuazione della soluzione individuata.", "media": "Sottopone il problema al Magistrato referente, illustrandogli la situazione nel dettaglio e chiedendogli di coordinarsi il prima possibile con l'altro giudice coinvolto per trovare una soluzione condivisa. Nel frattempo, verifica nel sistema gestionale se vi siano aule disponibili per quella giornata, così da fornire al Magistrato referente un'informazione utile per orientare il confronto. Infine, resta in attesa di ricevere un riscontro prima di aggiornare la programmazione della settimana.", "inefficace": "Annota la sovrapposizione rilevata tra le questioni da tenere sotto controllo e riprende le attività di organizzazione dei fascicoli per le altre udienze in programma. Del resto, considerando che manca ancora del tempo prima delle udienze interessate, ritiene sia probabile che la situazione venga rilevata dai Magistrati coinvolti o dal personale della segreteria nel corso delle normali attività di programmazione. Se così non dovesse essere, provvederà a segnalare quanto riscontrato."}, {"num": 5, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Gestendo le comunicazioni successive ad un'udienza, lei si accorge che un provvedimento del Magistrato è stato inviato per errore all'indirizzo PEC del difensore della controparte anziché a quello del difensore destinatario. Il provvedimento contiene indicazioni processuali rilevanti: il difensore destinatario non ne è ancora a conoscenza, mentre la ricevuta di apertura conferma che la controparte ha già letto il messaggio. Come si comporterebbe in questa situazione?", "efficace": "Comunica l'errore al Magistrato, documentando l'accaduto, inclusi gli indirizzi PEC coinvolti e l'orario di invio, ed evidenziando che la controparte ha già avuto accesso a informazioni riservate. Dunque, suggerisce di valutare l'adozione di un provvedimento che neutralizzi l'asimmetria informativa creatasi tra le parti e di segnalare subito l'episodio al Responsabile della protezione dei dati dell'ufficio. Intanto, provvede all'invio corretto del provvedimento al difensore destinatario.", "media": "Provvede all'invio corretto del provvedimento al difensore destinatario, ritenendo che questa sia la priorità più urgente. Poi, informa il Magistrato, riferendogli che il provvedimento è stato recapitato per errore alla controparte e che quest'ultima ne ha già preso visione. Infine, una volta segnalata la situazione, verifica se vi siano altri errori di recapito nella stessa sessione di comunicazioni post-udienza, per accertarsi che l'episodio sia isolato, e riprende le attività ordinarie.", "inefficace": "Trasmette il documento al legale corretto, valutando questa azione come l'intervento prioritario da effettuare. Del resto, reputa che l'errore, seppur spiacevole, abbia natura meramente tecnica e che la controparte, una volta resasi conto di aver ricevuto il messaggio per sbaglio, si asterrà sicuramente dall'utilizzarne il contenuto in modo scorretto. Infine, riprende le altre attività di comunicazione post-udienza, non reputando necessario, per il momento, informare il Magistrato dell'accaduto."}, {"num": 6, "domanda": "Lei presta servizio come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Organizzando il materiale in preparazione delle udienze della settimana successiva, lei constata che alcuni atti relativi a procedimenti pendenti da diversi anni, non sono stati scannerizzati e, quindi, non risultano presenti nel fascicolo telematico. Considerando che le udienze sono fissate a breve, lei è consapevole che il Magistrato, non visualizzando tali atti, rischia di non considerarli nell'ambito della trattazione. Come si comporterebbe in questa situazione?", "efficace": "Individua gli atti mancanti nel fascicolo telematico e verifica la presenza di originali cartacei, ordinandoli in base alla data prevista per l'udienza. Successivamente, sollecita la cancelleria per garantire la scansione prioritaria dei documenti più urgenti e, nel frattempo, informa il Magistrato mettendogli a disposizione le copie cartacee. Infine, propone una verifica sistematica dei fascicoli datati prima di ogni sessione, per intercettare tempestivamente criticità analoghe.", "media": "Rende noto al Magistrato che alcuni atti di procedimenti datati risultano assenti dal fascicolo telematico perché non digitalizzati, indicandogli i procedimenti interessati, calendarizzati nella settimana successiva. Poi, chiede alla cancelleria se sia possibile effettuare la scansione dei documenti mancanti prima della loro trattazione, verificando i tempi necessari per completare l'operazione. Infine, resta in attesa di conferma per stabilire quali fascicoli potranno essere integrati in tempo.", "inefficace": "Prepara il materiale per le udienze basandosi sugli atti presenti nel fascicolo telematico, ritenendo che la documentazione digitalizzata rappresenti il riferimento ufficiale per la trattazione dei procedimenti. Inoltre, considera che la scansione e l'inserimento degli atti nel sistema rientrino tra le competenze della cancelleria e che, quindi, segnalare carenze nella digitalizzazione esuli dal proprio incarico. Dunque, consegna al Magistrato il materiale telematico nella sua forma attuale."}, {"num": 7, "domanda": "Nell'ambito del suo incarico come Addetto all'Ufficio per il Processo con funzioni di supporto statistico presso la sezione civile di un Tribunale, il Presidente di Sezione le chiede di fornire entro il pomeriggio i dati aggiornati sui procedimenti pendenti per una riunione urgente. Verificando il registro informatico, lei constata però che numerosi esiti di udienza delle ultime settimane non sono ancora stati registrati a sistema dalla cancelleria, rendendo impossibile elaborare un report attendibile. Come si comporterebbe in questa situazione?", "efficace": "Informa la cancelleria della richiesta del Presidente e della necessità di inserire con urgenza i dati mancanti. Contestualmente, avvia la predisposizione del report con le informazioni già disponibili, aggiornandolo progressivamente a mano a mano che la cancelleria completa le registrazioni, per rispettare la scadenza. Infine, consegna il report al Presidente di Sezione, proponendo di stabilire una scadenza fissa settimanale per l'aggiornamento del registro da parte della cancelleria.", "media": "Contatta la cancelleria per sollecitare l'inserimento degli esiti mancanti. Poi, informa il Presidente di Sezione, riferendogli che i dati non sono aggiornati a causa delle registrazioni non ancora completate dalla cancelleria e chiedendogli se sia possibile posticipare la data di consegna del report. Infine, in attesa di un riscontro, verifica nel registro informatico quanti esiti risultino mancanti, rimandando l'elaborazione dei dati a quando la cancelleria avrà completato le registrazioni.", "inefficace": "Ritiene che i dati disponibili offrano comunque un quadro rappresentativo della situazione. Quindi, elabora il report con le informazioni presenti nel registro e lo consegna al Presidente entro la scadenza prevista, presentandolo come un documento aggiornato e completo. Infatti, reputa che, qualora il Presidente dovesse rilevare delle incongruenze nel corso della riunione, lei potrà sempre giustificarle con la natura dinamica dei dati statistici, soggetti a continui aggiornamenti."}, {"num": 8, "domanda": "Lei presta servizio come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Verificando il calendario delle udienze in preparazione della settimana successiva, lei si accorge che un'udienza con diversi fascicoli è stata fissata in un giorno in cui il Magistrato referente ha comunicato di non poter essere presente per un impegno istituzionale sopraggiunto all'ultimo momento. Le comunicazioni ai difensori sono già state inviate e la data si avvicina, rendendo necessario un intervento tempestivo per evitare disagi. Come si comporterebbe in questa situazione?", "efficace": "Verifica nel calendario se vi siano slot disponibili nelle settimane successive per un eventuale rinvio, per fornire informazioni complete al Magistrato referente e al Presidente di Sezione. Quindi, informa questi ultimi, illustrando l'udienza coinvolta, i fascicoli iscritti e le date disponibili per il rinvio. In base alle indicazioni ricevute, si coordina con la cancelleria per predisporre gli adempimenti necessari, curando le comunicazioni ai difensori con il massimo anticipo possibile.", "media": "Informa il Magistrato referente, illustrandogli l'udienza coinvolta e i fascicoli iscritti, chiedendogli come intenda procedere per gestire il conflitto con l'impegno istituzionale sopraggiunto e rimettendo a lui ogni valutazione in merito. Intanto, recupera dai fascicoli i recapiti di tutti i difensori già convocati per quella data e li raccoglie in un elenco riepilogativo ordinato per fascicolo, per poter gestire le comunicazioni necessarie nel momento in cui la questione sarà definita.", "inefficace": "Suppone che il Magistrato referente sia già al corrente della sovrapposizione e stia provvedendo autonomamente a gestirla, considerato che l'impegno istituzionale era stato comunicato proprio da lui. Quindi, si dedica alla preparazione degli altri fascicoli in programma e, intanto, continua a predisporre le schede dell'udienza coinvolta come di consueto, convinto che il Magistrato comunicherà eventuali modifiche al calendario con il tempo necessario per adottare i provvedimenti del caso."}, {"num": 9, "domanda": "Prestando servizio come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, dopo una settimana di udienze particolarmente intensa, lei si trova a dover gestire contemporaneamente numerosi adempimenti post- udienza con scadenze concentrate nello stesso giorno. Le attività comprendono comunicazioni alle parti, trasmissione di atti a diversi uffici giudiziari e aggiornamento dei registri informatici, e riguardano fascicoli di natura e complessità differenti. Come si comporterebbe in questa situazione?", "efficace": "Analizza gli adempimenti classificandoli per urgenza e impatto processuale, privilegiando le comunicazioni alle parti con scadenze più ravvicinate e gli atti la cui mancata trasmissione potrebbe pregiudicare i diritti delle parti. Poi, definisce un ordine di priorità e informa il Presidente di Sezione, condividendo con lui il piano di lavoro elaborato. Infine, una volta approvato, procede secondo l'ordine stabilito, garantendo che gli adempimenti più critici siano completati entro i termini.", "media": "Data la mole di lavoro che si trova a gestire, decide di procedere con gli adempimenti post-udienza nell'ordine in cui si presentano, cercando di completarne il maggior numero possibile. Nello specifico, si concentra sulle comunicazioni alle parti, rimandando la trasmissione degli atti e l'aggiornamento dei registri a un momento successivo. Infine, informa il Magistrato degli adempimenti ancora in sospeso e dell'approccio operativo seguito, così da tenerlo aggiornato sulla situazione.", "inefficace": "Valuta di iniziare dall'aggiornamento dei registri, ritenendolo il compito più immediato e facilmente completabile. Se, nonostante l'impegno profuso, si renderà conto di non riuscire a gestire tutte le attività previste entro la scadenza, informerà il Presidente di Sezione e gli chiederà come poter procedere. Del resto, reputa che, per poter garantire un lavoro di livello qualitativo, sia necessario avere tempo sufficiente per potersi occupare di ogni adempimento in modo adeguato."}, {"num": 10, "domanda": "Lei è stato da poco assegnato come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Verificando il calendario delle udienze in preparazione della settimana successiva, lei constata che un fascicolo per il quale il Magistrato aveva già disposto la rimessione in decisione risulta nuovamente fissato a udienza dalla cancelleria. I difensori delle parti hanno già ricevuto comunicazione della nuova data e il Magistrato non è ancora a conoscenza dell'accaduto. Come si comporterebbe in questa situazione?", "efficace": "Consulta il sistema informatico per accertare che la disposizione di rimessione in decisione sia stata correttamente registrata. Quindi, informa il Magistrato dell'accaduto e, parallelamente, si coordina con la cancelleria per revocare la convocazione ai difensori già comunicata, garantendo che vengano avvisati con il massimo anticipo possibile. Infine, estende la verifica anche agli altri fascicoli in calendario, accertando che non vi siano ulteriori errori analoghi da correggere.", "media": "Segnala l'errore alla cancelleria, illustrando la situazione e chiedendo al personale di revocare la convocazione già inviata ai difensori. Quindi, riprende le altre attività di preparazione delle udienze in programma, annotando nel proprio registro di lavoro l'accaduto per tenerne traccia e verificare che, nei giorni successivi, la cancelleria abbia provveduto alla revoca e che i difensori siano stati correttamente avvisati. In caso contrario, provvederà ad informare il Magistrato.", "inefficace": "Dopo aver riscontrato l'errore, prova ad accedere al sistema informatico per rimuove autonomamente il fascicolo dal calendario delle udienze, ritenendo che questa sia la soluzione più rapida per correggere subito la situazione. Successivamente, riprende le altre attività di preparazione dei fascicoli, convinto di aver gestito la questione nel modo più efficiente possibile, senza creare allarmismi, e che la modifica apportata al sistema sia sufficiente a regolarizzare la criticità rilevata."}, {"num": 11, "domanda": "Svolgendo una ricerca giurisprudenziale come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale su un gruppo di cause seriali, lei scopre che l'orientamento consolidato della sezione, su cui si basa la trattazione di queste cause, poggia su una pronuncia che è stata successivamente cassata dalla Corte di Cassazione. Questa circostanza potrebbe incidere significativamente sulla definizione di tutti i procedimenti analoghi ancora pendenti. Come si comporterebbe in questa situazione?", "efficace": "Approfondisce la pronuncia della Cassazione, ricostruendone il contenuto e valutandone le implicazioni per ciascuna delle cause seriali. Poi, predispone una nota per il Magistrato, in cui illustra il contrasto tra l'orientamento consolidato e il nuovo indirizzo della Corte, evidenziando i procedimenti che potrebbero richiedere una revisione dell'impostazione seguita. Infine, la trasmette al Magistrato, per consentirgli di valutare come ridefinire l'approccio alla trattazione delle cause.", "media": "Esamina la pronuncia della Cassazione, cercando di coglierne i tratti essenziali rispetto all'orientamento consolidato della sezione. Quindi, trasmette al Magistrato gli estremi della pronuncia, segnalando che potrebbe incidere sulla trattazione delle cause seriali. Infine, circoscrive la propria analisi alle cause con udienza più ravvicinata, predisponendo una sintesi delle possibili implicazioni processuali, e rimanda l'esame dei restanti procedimenti ad un momento successivo.", "inefficace": "Individua la pronuncia della Corte di Cassazione e la inserisce nel materiale giurisprudenziale da trasmettere al Magistrato, considerandola una fonte utile per completare il quadro di riferimento relativo alle cause seriali. Successivamente, invia il materiale al Magistrato nella forma in cui è stato raccolto, ritenendo che aggiungere commenti o valutazioni personali alle pronunce raccolte potrebbe introdurre inesattezze interpretative. Infine, riprende le altre attività in programma."}, {"num": 12, "domanda": "Nel corso del suo servizio come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, riesaminando una scheda preparatoria già consegnata al Magistrato, lei si accorge di aver commesso un errore: ha indicato che tutte le parti si sono regolarmente costituite, mentre in realtà una di esse risulta assente dal giudizio. Lei sa che il Magistrato potrebbe aver già impostato la trattazione sulla base di questa informazione errata e che l'udienza è prevista tra due giorni. Come si comporterebbe in questa situazione?", "efficace": "Verifica nel fascicolo lo stato effettivo della parte indicata come assente, accertando se si tratti di una contumacia da dichiarare o di una costituzione tardiva non ancora registrata. Quindi, informa il Magistrato dell'errore commesso, trasmettendogli una scheda corretta che riflette la situazione reale delle parti. Infine, estende la verifica agli altri elementi della scheda, accertando che non vi siano ulteriori imprecisioni da correggere prima dell'udienza.", "media": "Contatta il Magistrato per segnalargli l'errore commesso nella scheda, illustrandogli la difformità riscontrata tra quanto indicato e la situazione reale delle parti in giudizio. In seguito, gli invia una e-mail con un riepilogo di quanto comunicato, così da consentirgli di impostare correttamente la trattazione prima dell'udienza. Infine, aggiorna la scheda nel proprio registro di lavoro, annotando la correzione apportata e le informazioni trasmesse al Magistrato.", "inefficace": "Provvede alla correzione della scheda, aggiornando l'indicazione relativa alla parte non costituita, e la ritrasmette al Magistrato. In seguito, annota la correzione apportata, così da tenerne traccia e fornire eventuali spiegazioni qualora le venissero richieste. Infine, riprende le altre attività, convinto che il giudice, consultando la versione aggiornata, disponga di tutte le informazioni necessarie per impostare correttamente la trattazione prima dell'udienza."}, {"num": 13, "domanda": "Prestando servizio come Addetto all'Ufficio per il Processo presso la sezione civile di una Corte d'Appello, durante lo spoglio di un fascicolo, lei rileva che i verbali delle udienze istruttorie di primo grado non sono stati inclusi nella trasmissione degli atti da parte del Tribunale, rendendo impossibile ricostruire la base fattuale della sentenza impugnata. L'udienza d'appello è fissata tra dieci giorni e il Tribunale, da lei già contattato, non è ancora in grado di indicarle quando provvederà alla trasmissione. Come si comporterebbe in questa situazione?", "efficace": "Informa della situazione il Magistrato relatore- referente, illustrandogli le lacune documentali riscontrate e le possibili ricadute sulla trattazione. Parallelamente, invia una richiesta formale al Tribunale sollecitando la trasmissione urgente dei verbali, fissando un termine compatibile con la data dell'udienza. Infine, segnala la criticità al Presidente di Sezione, fornendogli un quadro completo della situazione e dei contatti già avviati, così da tenerlo aggiornato sull'evolversi della questione.", "media": "Chiama nuovamente il Tribunale per sollecitare la trasmissione urgente dei verbali mancanti, evidenziando la data imminente dell'udienza e chiedendo al personale di fornirle almeno una stima dei tempi necessari. In seguito, informa della situazione il Magistrato relatore-referente, evidenziando che lei ha già provveduto a richiedere quanto necessario. Infine, continua ad occuparsi delle attività di spoglio dei fascicoli, augurandosi che il Tribunale le fornisca aggiornamenti il prima possibile.", "inefficace": "Una volta riscontrata la mancanza dei verbali nel fascicolo, annota la lacuna nella scheda preparatoria che trasmette al Magistrato relatore-referente, segnalando la questione tra gli elementi da verificare prima dell'udienza. Successivamente, riprende le attività di spoglio degli altri fascicoli, ritenendo che i dieci giorni ancora disponibili costituiscano un margine sufficiente affinché il Tribunale, preventivamente avvisato, provveda autonomamente a integrare tutta la documentazione mancante."}, {"num": 14, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso l'UPP intersezionale di una Corte d'Appello, lei gestisce le spese prenotate a debito. Svolgendo tale attività, constata che, per diverse decine di procedimenti definiti, i relativi Fogli Notizie non sono mai stati chiusi, generando un significativo arretrato. In questo contesto, il Dirigente amministrativo la informa che è imminente una verifica ministeriale sulla regolarità di questi adempimenti e le chiede di intervenire con urgenza. Come si comporterebbe in questa situazione?", "efficace": "Mappa l'arretrato distinguendo i Fogli Notizie per anno di definizione e complessità degli adempimenti residui. Su questa base, predispone un piano di recupero con priorità e tempistiche specifiche, e lo sottopone al Dirigente, proponendogli un raccordo operativo con la cancelleria per la gestione dell'arretrato. Una volta ottenuta l'approvazione, avvia le chiusure secondo le priorità individuate, fornendo aggiornamenti periodici al Dirigente in vista della verifica ministeriale.", "media": "Sceglie di avviare la lavorazione dai Fogli Notizie che, a suo giudizio, possano essere chiusi più rapidamente, per completare il maggior numero possibile di chiusure prima della verifica. Intanto, informa il Dirigente dell'intervento in corso e del criterio adottato, rinviando ad un momento successivo la lavorazione dei fascicoli più complessi. Infatti, spera che il recupero della parte più consistente dell'arretrato sia sufficiente a superare positivamente il controllo ministeriale.", "inefficace": "Parte dal presupposto che l'attivazione di un piano straordinario di recupero dell'arretrato esuli dalle proprie ordinarie attribuzioni, che riguardano la gestione corrente dei Fogli Notizie. Dunque, intensifica la lavorazione dei fascicoli che le pervengono, seguendo la normale procedura, rendicontando al Dirigente il carico progressivamente smaltito. Infatti, ritiene che il potenziamento della gestione ordinaria contribuisca nel tempo a ridurre il volume complessivo dell'arretrato."}, {"num": 15, "domanda": "Nell'ambito del suo incarico come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei riceve dalla cancelleria un fascicolo il cui termine per le verifiche preliminari ex art. 171- bis c.p.c. scade tra soli tre giorni. Il fascicolo presenta numerose questioni da esaminare, tra cui la regolarità delle notifiche e la completezza del contraddittorio, e il Magistrato attende i risultati per adottare i provvedimenti del caso. Come si comporterebbe in questa situazione?", "efficace": "Stabilisce un ordine di priorità tra le questioni da esaminare in base alla loro rilevanza processuale e avvia le verifiche partendo da quelle più urgenti. Poi, tenendo conto di quanto emerso, predispone un documento riepilogativo per il Magistrato, illustrando gli esiti delle verifiche effettuate. Infine, lo trasmette al giudice evidenziando per ciascuna questione gli elementi rilevanti ai fini della decisione, per consentirgli di adottare i provvedimenti necessari prima della scadenza.", "media": "Avvia le verifiche preliminari partendo dalle questioni che ritiene più immediate, concentrandosi sulla regolarità delle notifiche e sulla completezza del contraddittorio. Poi, effettua un breve elenco delle criticità riscontrate e lo trasmette via e mail al Magistrato, riferendogli che alcune questioni potrebbero richiedere un suo intervento prima della scadenza. Infine, prosegue con le verifiche sulle questioni che risultano ancora da esaminare, cercando di completarle nei giorni residui.", "inefficace": "Ricevuto il materiale dalla cancelleria, concentra le proprie verifiche sulla regolarità delle notifiche, reputandola la questione più rilevante tra quelle da esaminare entro la scadenza. Quindi, trasmette al Magistrato un riscontro basato esclusivamente su questa verifica, convinto che le altre questioni preliminari rientrino nelle valutazioni di competenza del giudice e che il proprio contributo si esaurisca nel controllo degli aspetti più strettamente formali del procedimento."}, {"num": 16, "domanda": "Operando come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei gestisce la trasmissione dei fascicoli alla Corte di Cassazione. Nell'espletamento di tale attività, lei riceve comunicazione che un fascicolo inviato alcune settimane prima, è stato restituito dalla Suprema Corte con una nota che si limita a segnalare genericamente l'incompletezza della documentazione, senza indicare nel dettaglio quali atti risultino mancanti. Lei sa che il termine previsto per la regolarizzazione del fascicolo è ravvicinato. Come si comporterebbe in questa situazione?", "efficace": "Confronta l'elenco degli atti trasmessi con la documentazione ordinariamente richiesta per i ricorsi per Cassazione, individuando le possibili omissioni. Sulla base di quanto emerso, contatta la cancelleria della Suprema Corte per ottenere conferma sulle lacune individuate e orientare con precisione la regolarizzazione. Infine, integra il fascicolo con gli atti risultati mancanti, verifica che la documentazione sia completa e procede con la nuova trasmissione entro la scadenza.", "media": "Chiede alla cancelleria della Suprema Corte informazioni più specifiche sull'oggetto della restituzione, augurandosi di ottenere un riscontro il prima possibile che le permetta di rispettare la scadenza. Intanto, scorre la documentazione inviata per confrontarla mentalmente con quella usualmente richiesta in Cassazione, così da orientarsi su quali possano essere state le criticità. Una volta ottenute le indicazioni, integra il fascicolo e procede con la nuova trasmissione.", "inefficace": "Trattandosi di una nota generica priva di indicazioni operative, si aspetta che la cancelleria della Suprema Corte invii chiarimenti più dettagliati nei giorni immediatamente successivi. Dunque, per non rischiare di introdurre integrazioni errate o superflue sul fascicolo, ritiene preferibile non adottare iniziative autonome e attendere istruzioni più circostanziate, nella ragionevole aspettativa che queste pervengano prima della scadenza prevista per la regolarizzazione."}, {"num": 17, "domanda": "Prestando servizio come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, durante la preparazione dei fascicoli per l'udienza del giorno successivo, lei scopre che un'istanza di dissequestro depositata dal difensore settimane prima, a causa di un sovraccarico di cancelleria, non è stata inserita nel fascicolo né sottoposta al Magistrato. L'udienza di domani è fissata per la decisione nel merito del procedimento e la mancata trattazione dell'istanza comporterebbe un rinvio, con ulteriore dilatazione dei tempi e pregiudizio per l'imputato. Come si comporterebbe in questa situazione?", "efficace": "Recupera l'istanza tra gli atti non ancora lavorati dalla cancelleria e la inserisce all'interno del relativo fascicolo processuale. Poi, predispone una nota dettagliata che illustra la pendenza e la sua urgenza, trasmettendola lo stesso giorno al Magistrato in vista dell'udienza. Infine, verifica personalmente la completezza degli atti a supporto dell'istanza, così da consentire al Magistrato una piena valutazione e la regolare trattazione dell'udienza del giorno successivo.", "media": "Informa il Magistrato del disguido rilevato, riferendogli a grandi linee la situazione e la prossimità dell'udienza fissata per il giorno successivo. Intanto, chiede alla cancelleria di provvedere appena possibile all'inserimento formale dell'atto nel fascicolo processuale, in modo da regolarizzare la posizione. Per il resto, spera che questi adempimenti siano portati a termine in tempo utile per permettere al Magistrato di esaminare l'istanza e di trattare l'udienza senza rinvii.", "inefficace": "Presume che un eventuale rinvio dell'udienza rientri nella prassi ordinaria del procedimento penale e non comporti conseguenze tali da richiedere un intervento straordinario sulla situazione. Pertanto, decide di sottoporre l'istanza al Magistrato direttamente il giorno successivo, al momento della trattazione del merito. Del resto, ritiene che il giudice, dopo aver ricevuto la comunicazione in udienza, possa valutare autonomamente la questione nei tempi che riterrà più opportuni."}, {"num": 18, "domanda": "Nell'ambito del suo incarico come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, durante la preparazione dei fascicoli per l'udienza fissata tra due giorni, lei individua tra le comunicazioni telematiche pervenute all'ufficio una dichiarazione con cui un testimone, la cui deposizione è stata ammessa dal Magistrato, comunica l'impossibilità a presentarsi per gravi motivi di salute. Il Magistrato e i difensori delle parti non sono ancora a conoscenza dell'accaduto. Come si comporterebbe in questa situazione?", "efficace": "Verifica che la dichiarazione del testimone riporti le motivazioni dell'impedimento e gli elementi necessari per la sua valutazione. Poi, la trasmette al Magistrato, corredandola di una nota in cui illustra le possibili implicazioni per la trattazione dell'udienza. Infine, dopo un confronto con il Magistrato, si raccorda con la cancelleria per predisporre le comunicazioni ai difensori delle parti, così da consentire a questi ultimi di adottare le iniziative processuali del caso.", "media": "Trasmette la dichiarazione del testimone al Magistrato, riferendogli dell'impedimento comunicato e sottolineando la prossimità dell'udienza. Contestualmente, segnala la situazione alla cancelleria, chiedendole di provvedere alle comunicazioni ai difensori delle parti, ritenendo che informarli tempestivamente sia la priorità più urgente da gestire. Successivamente, torna da occuparsi della preparazione degli altri fascicoli previsti per l'udienza del giorno successivo.", "inefficace": "Risponde alla comunicazione del testimone confermandogli che l'ufficio ha preso atto dell'impedimento e che la situazione verrà gestita nelle sedi opportune. Quindi, archivia la dichiarazione nel fascicolo telematico, annotandola tra le comunicazioni ricevute in vista dell'udienza. Infine, continua con la preparazione degli altri fascicoli, convinto che la conferma di ricezione inviata al testimone costituisca un adempimento sufficiente a gestire formalmente la situazione."}, {"num": 19, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, durante la verifica della completezza documentale di un fascicolo in vista della prossima udienza, lei constata che il contributo unificato risulta versato in misura insufficiente rispetto al valore effettivo della causa. Il procedimento è in corso da diversi mesi e si sono già svolte due udienze ma l'irregolarità non è mai stata rilevata, con possibili ricadute sulla regolarità amministrativa del procedimento. Come si comporterebbe in questa situazione?", "efficace": "Ricostruisce l'entità della differenza tra la somma versata e quella effettivamente dovuta in base al valore della causa risultante dagli atti. Successivamente, informa il Dirigente amministrativo dell'accaduto, illustrandogli l'irregolarità e segnalando la necessità di adottare il provvedimento di integrazione del contributo nei confronti della parte interessata. A questo proposito, si coordina con la cancelleria per avviare i relativi adempimenti e risolvere subito la criticità rilevata.", "media": "Comunica al Dirigente l'irregolarità rilevata nel versamento del contributo unificato, riferendogli che la somma versata risulta insufficiente rispetto al valore effettivo della causa e che l'omissione è passata inosservata nel corso delle due udienze già svolte. Poi, non appena il Dirigente le riferirà come risolvere la problematica, lei provvederà a contattare la cancelleria per procedere con i relativi adempimenti. Intanto, riprende la verifica documentale degli altri fascicoli in programma.", "inefficace": "Poiché l'omissione è passata inosservata per mesi e il procedimento è proseguito regolarmente, ritiene che intervenire ora rischierebbe soltanto di creare difficoltà e che la problematica potrà essere risolta anche al termine del giudizio. Quindi, decide di riprendere la verifica documentale degli altri fascicoli in programma per l'udienza della settimana successiva, considerando la questione di scarsa rilevanza pratica rispetto alle priorità più immediate di cui lei deve occuparsi."}, {"num": 20, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, effettuando una ricognizione dei fascicoli pendenti, lei individua un procedimento contrassegnato come urgente che non registra alcuna attività da oltre due mesi. Il Magistrato assegnatario è in congedo per malattia prolungata e il fascicolo non è stato riassegnato, poiché la sua specifica urgenza non era stata segnalata alla Presidenza di sezione al momento del congedo. Dall'esame degli atti, emergono istanze delle parti che necessitano di essere prontamente esaminate. Come si comporterebbe in questa situazione?", "efficace": "Prende in esame gli atti in questione per individuare le istanze che richiedono un intervento tempestivo. Poi, predispone una nota per la Presidenza di sezione, illustrando la criticità rilevata, proponendo la riassegnazione urgente del procedimento e allegando l'elenco delle istanze che necessitano di una pronta disamina. Infine, propone alla Presidenza di estendere la ricognizione anche agli altri fascicoli del Magistrato in congedo, per intercettare eventuali situazioni analoghe.", "media": "Decide di esaminare le istanze più recenti per farsi un'idea della situazione, non ritenendo necessario approfondire nel dettaglio le scadenze processuali e le altre pendenze del fascicolo, almeno per il momento. Sulla base di quanto rilevato, predispone una breve comunicazione per la Presidenza di sezione, descrivendo l'inattività del procedimento. Poi, riprende la ricognizione degli altri fascicoli, augurandosi che la questione venga presa in carico e risolta il prima possibile.", "inefficace": "Ragiona sul fatto che, se il fascicolo fosse davvero urgente, le parti avrebbero già sollecitato l'ufficio nel corso dei due mesi trascorsi, e che l'iniziale qualificazione di urgenza risulti ormai smentita dal concreto andamento del procedimento. Quindi, non ritiene necessario attivarsi con apposite segnalazioni alla Presidenza di sezione e riprende la ricognizione degli altri fascicoli, convinto che la questione sarà ripresa direttamente dal Magistrato titolare al rientro dal congedo."}, {"num": 21, "domanda": "Lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Verificando le comunicazioni di un procedimento con udienza imminente, constata che, nonostante una parte abbia revocato il mandato al proprio difensore e nominato un nuovo legale, le comunicazioni processuali continuano ad essere erroneamente inviate alla PEC del difensore revocato, con pregiudizio del diritto di difesa della parte che non ha ricevuto le comunicazioni. Come si comporterebbe in questa situazione?", "efficace": "Identifica gli estremi del nuovo difensore dalla nomina depositata agli atti e verifica il suo indirizzo PEC sull'Albo degli avvocati. Poi, invia al Magistrato una nota, illustrando la situazione riscontrata e sottolineando la presenza nel fascicolo di una nuova nomina. Infine, si raccorda con la cancelleria per l'invio dei nuovi avvisi, indicando il recapito corretto a cui indirizzare le comunicazioni e facendo in modo che si proceda all'inserimento a sistema dell'indirizzo PEC corretto.", "media": "Controlla l'indirizzo PEC dalla nomina depositata agli atti e lo comunica alla cancelleria, affinché quest'ultima provveda all'espletamento di tutti gli adempimenti necessari. Poi, segnala al Magistrato la difformità rilevata nel flusso delle comunicazioni, ancora erroneamente inviate alla PEC del difensore revocato. Infine, riprende la verifica delle altre notifiche in programma, ritenendo di avere fornito alla cancelleria tutti gli elementi utili all'adozione dei provvedimenti del caso.", "inefficace": "Ritenendo che la gestione delle comunicazioni processuali sia di competenza esclusiva della cancelleria, trasmette a quest'ultima la segnalazione dell'irregolarità, così che vengano posti in essere tutti gli adempimenti tecnici e procedurali necessari al rinnovo delle comunicazioni nei confronti del nuovo difensore costituito. Successivamente, considerando conclusa la propria attività sul procedimento in questione, torna ad occuparsi della verifica delle altre attività ordinarie."}, {"num": 22, "domanda": "Da diversi mesi lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Effettuando un controllo sui registri, individua un procedimento classificato come definito nel sistema informatico che, dall'esame del fascicolo cartaceo, risulta invece ancora pendente: l'ultima udienza si era conclusa con un rinvio, correttamente verbalizzato ma non registrato a sistema. Le parti non hanno ricevuto alcuna comunicazione ufficiale sulla nuova data di udienza e sono in attesa da alcune settimane. Come si comporterebbe in questa situazione?", "efficace": "Incrocia i dati del sistema informatico con il verbale dell'ultima udienza, verificando la data stabilita per il rinvio. Poi, si raccorda con la cancelleria, illustrando la discrepanza e proponendo di disporre l'aggiornamento del registro informatico con la nuova data, da comunicare tempestivamente alle parti. Infine, ripercorre i passaggi procedurali, dall'udienza allo scarico a sistema, per individuare in quale fase si sia prodotta l'omissione e per cercare di circoscriverne le cause.", "media": "Cerca di verificare nel verbale dell'ultima udienza la data del rinvio, per avere conferma del giorno esatto che dovrà essere comunicato alle parti. Poi, mette al corrente il Responsabile dell'Ufficio dell'incongruenza rilevata tra la documentazione del fascicolo cartaceo e le risultanze del registro digitale. Infine, tiene traccia della segnalazione nel proprio prospetto di lavoro, in caso di richieste di chiarimento, lasciando che la situazione sia gestita interamente dalla cancelleria.", "inefficace": "Classifica l'anomalia riscontrata come un semplice errore tecnico di scarico, destinato ad essere intercettato dai controlli periodici che la cancelleria effettua sui registri informatici. Di conseguenza, si limita a riportare quanto rilevato tra le segnalazioni raccolte durante il proprio turno di lavoro, persuaso che la verifica interna porterà tempestivamente alla correzione dell'errore e alla regolarizzazione del procedimento, senza necessità di ulteriori iniziative da parte sua."}, {"num": 23, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Un collega AUP, entrato in servizio da poche settimane, le chiede continuamente assistenza e chiarimenti per attività di base come l'inserimento dei dati nei registri informatici e la redazione delle schede preparatorie per le udienze, con continue interruzioni che rallentano significativamente il suo lavoro. Peraltro, l'ufficio non ha previsto alcun percorso di affiancamento strutturato per i nuovi arrivati. Come si comporterebbe in questa situazione?", "efficace": "Concorda con il collega alcuni momenti dedicati nella giornata in cui affrontare dubbi e chiarimenti, così da evitare che le interruzioni compromettano lo svolgimento del proprio lavoro. Poi, condivide con lui i principali strumenti operativi, come checklist e procedure di riferimento, per favorirne l'autonomia nelle attività di base. Infine, segnala la situazione al Presidente di Sezione e al Direttore di sezione, proponendo l'attivazione di un percorso di affiancamento strutturato per i nuovi arrivati.", "media": "Risponde alle richieste del collega a mano a mano che le vengono poste, cercando di dargli indicazioni utili. Nel frattempo, gli suggerisce di annotare i dubbi ricorrenti e di sottoporglieli in un'unica occasione, in un momento più opportuno della giornata, per ridurre le interruzioni. Si augura che, con il passare delle settimane e la graduale familiarizzazione con le procedure dell'ufficio, il collega acquisisca maggiore autonomia nello svolgimento delle attività di base.", "inefficace": "Interpreta la situazione come una normale fase di assestamento del nuovo arrivato, destinata a risolversi con la pratica quotidiana e il supporto dei colleghi. Pertanto, invita il collega a cercare le informazioni nei documenti di riferimento dell'ufficio prima di rivolgersi a lei, considerando l'autoapprendimento parte essenziale del processo di inserimento. Del resto, è fiducioso che, con il passare del tempo, il collega saprà organizzarsi nello svolgimento delle sue attività."}, {"num": 24, "domanda": "Lavorando come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, lei verifica la regolarità delle notifiche disposte dalla Procura in vista delle udienze fissate nelle prossime settimane. Durante i controlli però, constata che per quattro procedimenti le notifiche non sono state ancora eseguite e i termini per garantire la regolarità della citazione sono ormai stretti. La Procura, da lei contattata, comunica difficoltà operative nel completare gli adempimenti in tempo. Come si comporterebbe in questa situazione?", "efficace": "Passa al vaglio i quattro procedimenti, identificando quali notifiche risultano mancanti, le date delle relative udienze e i termini specifici da rispettare. In seguito, sulla base di questo quadro, predispone una nota per il Magistrato, illustrandogli la criticità e proponendo le soluzioni praticabili, tra le quali il rinvio preventivo delle udienze più a rischio. Infine, dopo essersi confrontato con il Magistrato, sollecita la Procura affinché predisponga le notifiche il prima possibile.", "media": "Riferisce verbalmente al Magistrato la situazione riscontrata sui quattro procedimenti, evidenziando le difficoltà che le sono state comunicate dalla Procura e la prossimità dei termini di notifica. Nel frattempo, prova a sollecitare nuovamente la Procura perché completi quanto prima gli adempimenti mancanti. Infatti, conta sul fatto che, grazie ai solleciti ripetuti, le notifiche possano essere eseguite in tempo utile per consentire la regolare trattazione delle udienze previste.", "inefficace": "Inquadra la situazione come una questione di natura operativa, da risolvere attraverso un coordinamento diretto con la Procura, al fine di assicurare il recupero delle notifiche mancanti entro i termini previsti. Per questo motivo, sottopone la problematica al Dirigente amministrativo, riconoscendolo come la figura più adatta ad attivare i necessari raccordi in vista delle udienze imminenti e augurandosi che la direzione proceda con la tempestività richiesta dalla situazione."}, {"num": 25, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione civile di una Corte d'Appello, svolgendo le verifiche previste dall'art. 348-bis c.p.c., lei rileva che la costituzione dell'appellato in un procedimento reca una ricevuta di accettazione elettronica e una ricevuta di avvenuta consegna con date diverse. La discrepanza, di tre giorni, potrebbe determinare la tempestività o tardività della costituzione, con conseguenze rilevanti sulla trattazione dell'appello incidentale. Come si comporterebbe in questa situazione?", "efficace": "Raccoglie gli elementi necessari a chiarire la questione, verificando le date riportate sulle due ricevute e individuando gli orientamenti giurisprudenziali sul tema. Sulla base del quadro ricostruito, predispone una nota per il Magistrato relatore-referente, illustrando la discrepanza, il profilo giuridico coinvolto e le pronunce rilevanti della Corte di Cassazione. Infine, inserisce gli orientamenti individuati nella banca dati sezionale, rendendoli disponibili per la trattazione di casi analoghi.", "media": "Avverte il Magistrato relatore-referente della discrepanza rilevata nel corso delle verifiche, trasmettendogli copia delle due ricevute con le rispettive date e sottolineando la possibile incidenza sulla tempestività della costituzione dell'appellato. A integrazione della segnalazione, richiama alla memoria alcune pronunce di merito sul tema e gliele consegna a supporto del corretto inquadramento giuridico della questione, in vista della sua decisione sull'ammissibilità dell'appello incidentale.", "inefficace": "Riconduce la differenza di tre giorni tra le due ricevute ad un semplice disallineamento tecnico, di scarso rilievo pratico e riconducibile ai normali tempi di consegna del sistema telematico. In seguito, sulla base di questo presupposto, svolge regolarmente le verifiche ex 348-bis e riporta nel fascicolo un semplice cenno alla presenza delle due date riscontrate, presumendo che la questione non richieda alcuna considerazione specifica ai fini dell'ammissibilità dell'appello."}, {"num": 26, "domanda": "Operando come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, durante lo spoglio di un fascicolo in vista dell'udienza imminente, lei rileva che una memoria istruttoria depositata da una delle parti potrebbe risultare tardiva rispetto ai termini processuali previsti. La memoria è già stata inserita nel fascicolo dalla cancelleria. Il Magistrato non è ancora a conoscenza della questione e potrebbe basare la trattazione dell'udienza su un atto processualmente tardivo. Come si comporterebbe in questa situazione?", "efficace": "Accerta l'effettiva tardività del deposito, confrontando la data registrata nel SICID con il termine processuale fissato dal giudice. Quindi, documenta la criticità nella scheda preparatoria, riportando le date rilevanti e il riferimento normativo. Infine, sottopone la questione al Magistrato prima dell'udienza, affinché possa valutare l'ammissibilità dell'atto, e propone di inserire la verifica dei termini di deposito tra i controlli standard dello spoglio.", "media": "Riscontra che la data di deposito della memoria è successiva alla scadenza del termine e segnala la circostanza al Magistrato, chiedendogli indicazioni su come procedere. Intanto, prosegue con lo studio degli altri aspetti del fascicolo, portando avanti le restanti verifiche preliminari. Infine, si riserva di aggiornare la scheda preparatoria sulla base delle indicazioni che riceverà, ritenendo che sia il Magistrato a dover valutare la rilevanza della questione.", "inefficace": "Inserisce la memoria nella scheda preparatoria, documentandone il contenuto al pari degli altri atti depositati dalle parti. Prosegue, quindi, con la preparazione del fascicolo, completando l'analisi degli elementi processuali. Infatti, è convinto che la valutazione della tempestività dei depositi sia una questione strettamente processuale, di esclusiva competenza del Magistrato, il quale dispone degli strumenti per rilevarla autonomamente in sede di trattazione."}, {"num": 27, "domanda": "Da qualche mese, lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Controllando i registri informatici, lei scopre che un medesimo procedimento risulta iscritto due volte nel SICID con numeri di ruolo diversi, ciascuno con uno stato di avanzamento differente. Inoltre, l'udienza successiva risulta calendarizzata su uno dei due numeri di ruolo e la cancelleria non si è accorta della duplicazione. Come si comporterebbe in questa situazione?", "efficace": "Esamina entrambe le iscrizioni nel SICID, confrontando gli atti registrati su ciascun numero di ruolo per individuare quale rifletta lo stato effettivo del procedimento e verificare se vi siano atti mancanti. Quindi, contatta la cancelleria per segnalare l'anomalia e concordare la rettifica prima dell'udienza. Intanto, informa il Magistrato della situazione e delle azioni intraprese, suggerendo un controllo periodico sulle nuove iscrizioni per prevenire duplicazioni future.", "media": "Appurata la discrepanza tra la data indicata nel decreto e quella fissata nel ruolo, predispone una bozza di nuovo decreto di citazione con la data corretta. Quindi, informa il Magistrato dell'errore, sottoponendogli la bozza già predisposta e attendendo la sua autorizzazione prima di coinvolgere la cancelleria per la rinnovazione della notifica. Intanto, prosegue con la verifica delle notifiche degli altri procedimenti, in attesa del riscontro del Magistrato.", "inefficace": "Pensa che la notifica, essendo già stata eseguita, non possa più essere corretta a questo punto del procedimento. Pertanto, inserisce il fascicolo nel materiale predisposto per l'udienza calendarizzata, augurandosi che il difensore dell'imputato verificherà autonomamente la data corretta attraverso i propri canali. Poi, se l'imputato non dovesse comparire all'udienza, sarà il Magistrato a disporre quanto necessario per sanare l'irregolarità."}, {"num": 28, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, verificando con congruo anticipo le notifiche per i procedimenti fissati nella settimana successiva, lei si accorge che il decreto di citazione a giudizio, notificato ad un imputato, riporta una data di udienza diversa da quella effettivamente fissata nel ruolo. La notifica è già stata eseguita e l'imputato potrebbe presentarsi nella data errata, con possibili conseguenze sulla validità della citazione e sul regolare svolgimento dell'udienza. Come si comporterebbe in questa situazione?", "efficace": "Confronta il decreto notificato con il ruolo d'udienza, accertando quale sia la data corretta e verificando se lo stesso errore ricorra in altri procedimenti. Quindi, informa il Magistrato della discrepanza, prospettandogli la necessità di disporre la rinnovazione della notifica con la data esatta e predispone la bozza del nuovo decreto di citazione. Infine, propone di introdurre un controllo di corrispondenza tra decreti e ruolo prima della spedizione delle notifiche.", "media": "Rileva la discrepanza tra la data indicata nel decreto di citazione e quella fissata nel ruolo e la segnala prontamente al Magistrato, chiedendogli indicazioni su come procedere. Intanto, prosegue con la verifica delle notifiche dei restanti procedimenti in calendario. Infine, si riserva di predisporre il nuovo decreto di citazione non appena riceverà le indicazioni del Magistrato, confidando che i tempi siano sufficienti per la rinnovazione della notifica.", "inefficace": "Annota la discrepanza nella scheda del fascicolo, riportando le due date divergenti tra il decreto notificato e il ruolo. Quindi, prosegue con la verifica delle notifiche degli altri procedimenti in calendario, ritenendo che la valutazione sulla correttezza della notifica e sulle conseguenze processuali sia di esclusiva competenza del Magistrato. Del resto, è convinto che il Magistrato, esaminando la scheda in preparazione dell'udienza, individuerà la soluzione più opportuna."}, {"num": 29, "domanda": "Prestando servizio come Addetto all'Ufficio per il Processo presso la sezione civile di una Corte d'Appello, lei gestisce i fascicoli rientrati dalla Cassazione a seguito di annullamento con rinvio. Verificando le assegnazioni, tuttavia, lei constata che uno di questi fascicoli è stato riassegnato allo stesso Magistrato consigliere che aveva redatto la sentenza annullata. Questa circostanza potrebbe configurare un vizio di composizione del collegio, ma il procedimento è già stato calendarizzato. Come si comporterebbe in questa situazione?", "efficace": "Ricostruisce la composizione del collegio che aveva pronunciato la sentenza annullata, verificando anche la posizione degli altri membri. Quindi, predispone una nota per il Presidente di Sezione, documentando l'incompatibilità riscontrata e proponendo la riassegnazione del fascicolo a un diverso Magistrato consigliere. Infine, suggerisce di introdurre un controllo sistematico sulla composizione dei collegi precedenti tra le verifiche standard sui fascicoli rientrati dalla Cassazione.", "media": "Porta la questione all'attenzione del Presidente di Sezione, illustrandogli la circostanza e chiedendogli indicazioni su come procedere con il fascicolo già calendarizzato. Nel frattempo, effettua una ricognizione sui fascicoli più recenti rientrati dalla Cassazione per verificare se presentino situazioni analoghe. Quindi, attende il riscontro del Presidente prima di intraprendere ulteriori azioni, ritenendo che la decisione sulla riassegnazione rientri nelle sue prerogative organizzative.", "inefficace": "Prende nota della circostanza nella scheda preparatoria, indicando i dati sulla composizione del collegio precedente, e si dedica allo studio del merito del fascicolo da sottoporre al Magistrato consigliere assegnatario. Reputa, infatti, che le verifiche sulla composizione dei collegi rientrino tra le attribuzioni esclusive del Presidente di Sezione e che il proprio compito sia circoscritto alla preparazione dei fascicoli per la trattazione in udienza."}, {"num": 30, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, effettuando un controllo sulla regolarità dei fascicoli definiti, lei scopre che, per diversi procedimenti, le sentenze depositate alcuni mesi prima non sono mai state comunicate ai difensori delle parti. Le parti potrebbero, quindi, non essere a conoscenza dell'avvenuto deposito. Come si comporterebbe in questa situazione?", "efficace": "Raccoglie dal SICID i dati relativi a ciascun procedimento interessato, mappando le sentenze prive di comunicazione e i rispettivi termini di deposito. Quindi, informa il Direttore della cancelleria, documentando le omissioni riscontrate perchè adotti i provvedimenti in ordine alle comunicazioni non effettuate. Infine, propone l'introduzione di una verifica periodica sullo stato delle comunicazioni delle sentenze depositate, per prevenire analoghe criticità in futuro.", "media": "Effettua un primo controllo sui procedimenti coinvolti, concentrandosi sulle sentenze depositate più di recente. Dunque, predispone un elenco delle omissioni riscontrate e lo trasmette alla cancelleria, perchè adotti gli opportuni provvedimenti. Successivamente, informa il Magistrato della situazione, chiedendogli se ritenga necessario segnalare la questione anche al Presidente di Sezione, e si riserva di completare la verifica sui procedimenti restanti nei giorni seguenti.", "inefficace": "Ritiene che l'omissione risale a diversi mesi prima del suo controllo e che le attività ordinarie in programma richiedano attenzione prioritaria. Pertanto, inserisce una nota riepilogativa tra le verifiche effettuate e prosegue con la preparazione dei fascicoli per le udienze imminenti, riservandosi di sottoporre la questione al Magistrato nel prossimo incontro programmato, convinto che qualche giorno di attesa in più non modifichi una situazione che si è già protratta per mesi."}, {"num": 31, "domanda": "Lavorando come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, consultando il SICID, lei si accorge che una sentenza è stata pubblicata e comunicata alle parti. Verificando il provvedimento pubblicato, tuttavia, lei nota che si tratta di una bozza preliminare priva della firma del Magistrato. Il difensore di una delle parti ha già ricevuto la comunicazione e potrebbe aver preso visione del documento. Come si comporterebbe in questa situazione?", "efficace": "Data l'urgenza della situazione, avvisa il Magistrato, richiedendogli la versione definitiva della sentenza. Intanto, sollecita la cancelleria affinché sospenda ogni ulteriore comunicazione. Ottenuta la versione firmata della sentenza, si adopera prontamente per la risoluzione del problema dell'erronea pubblicazione secondo le indicazioni impartite dal Magistrato e dal Direttore di cancelleria.", "media": "Verifica nel SICID quali difensori abbiano ricevuto la comunicazione contenente la bozza, per circoscrivere l'ampiezza del problema. Quindi, sottopone la questione al Magistrato, illustrandogli la situazione e chiedendogli indicazioni su come procedere alla sostituzione del documento pubblicato. Intanto, predispone un elenco delle comunicazioni errate già recapitate, da trasmettere alla cancelleria per l'esecuzione delle decisioni che verranno disposte dal Magistrato.", "inefficace": "Considera che l'errore sia riconducibile alla cancelleria, responsabile della pubblicazione del documento errato. Pertanto, segnala la questione al personale di cancelleria, invitandolo a verificare l'accaduto e a provvedere alla rettifica. Quindi, prosegue con lo studio degli altri fascicoli in programma, essendo certo che la cancelleria provvederà ad intraprendere ogni azione necessaria."}, {"num": 32, "domanda": "Da qualche settimana, lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Esaminando il calendario delle prossime udienze, si imbatte in un procedimento per il quale le parti avevano raggiunto un accordo conciliativo, ma che figura ancora iscritto nel ruolo con udienze future programmate. Lo scarico dell'udienza in cui era avvenuta la conciliazione non è stato completato nel sistema e comunicazioni di rinvio sono state inviate ai difensori. Come si comporterebbe in questa situazione?", "efficace": "Recupera dal fascicolo il verbale di conciliazione, ricostruendo gli adempimenti mancanti nel SICID. Poi, aggiorna il Magistrato sulla situazione e si coordina con la cancelleria per completare lo scarico, curando anche l'invio ai difensori di una comunicazione rettificativa sull'intervenuta definizione. Infine, condivide la criticità con il team dell'Ufficio per il Processo, proponendo di definire una procedura comune per la verifica degli scarichi successivi alle conciliazioni.", "media": "Avvia un confronto con la cancelleria per chiarire la mancata registrazione dello scarico, concordando le modalità di rettifica nel SICID e di rimozione delle udienze erroneamente fissate dal calendario. Poi, sottopone la situazione al Magistrato, illustrandogli quanto emerso. Intanto, raccoglie i riferimenti dei difensori destinatari delle comunicazioni di rinvio, così da poterli contattare tempestivamente una volta concordata con il Magistrato la corretta modalità di rettifica.", "inefficace": "Registra l'incongruenza riscontrata, segnalandola informalmente alla cancelleria con una e-mail in cui indica il numero del procedimento e le udienze erroneamente programmate nel calendario. In seguito, continua con la preparazione dei fascicoli in programma, giudicando che lo scarico nel SICID e la gestione delle comunicazioni ai difensori rientrino nella responsabilità della cancelleria. Eventualmente, tornerà sulla questione qualora la cancelleria dovesse sollecitare un suo intervento."}, {"num": 34, "domanda": "Lavorando come Addetto all'Ufficio per il Processo presso la sezione civile di una Corte d'Appello, durante lo studio di un fascicolo pendente da oltre due anni, lei scopre che il difensore di una parte aveva depositato un'istanza di trattazione urgente, fondata sulle gravi condizioni di salute del proprio assistito, rimasta inevasa. L'istanza non è mai stata portata all'attenzione del Magistrato consigliere relatore né segnalata al Presidente di Sezione. Come si comporterebbe in questa situazione?", "efficace": "Approfondisce la verifica sul deposito dell'istanza, accertando la data di presentazione e la mancanza di riscontro nel fascicolo e di circostanze sopravvenute sulle condizioni di salute dell'assistito. Quindi, predispone una nota riepilogativa e la sottopone al consigliere relatore e al Presidente di Sezione, proponendo per il futuro un monitoraggio specifico delle istanze di trattazione urgente depositate dai difensori.", "media": "Sottopone l'istanza al consigliere relatore, descrivendogli la situazione e l'esigenza di una trattazione prioritaria. Nel frattempo, verifica nel fascicolo la presenza di altri atti del difensore contenenti aggiornamenti sulle condizioni di salute dell'assistito. Quindi, riprende le altre attività, dedicandosi allo studio degli altri fascicoli d'udienza.", "inefficace": "Reputa che, dato il tempo ormai trascorso dal deposito dell'istanza, un ulteriore ritardo di qualche giorno non modifichi la situazione processuale. Pertanto, annota la circostanza nella scheda preparatoria con le informazioni essenziali e la consegna al consigliere relatore nei tempi ordinari. Riprende, quindi, lo studio degli altri fascicoli, convinto che sarà il consigliere a valutare la rilevanza dell'istanza e a disporre i provvedimenti del caso."}, {"num": 35, "domanda": "Da alcuni mesi lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Verificando i depositi telematici in vista della prossima udienza, lei riscontra che un atto processuale depositato da un difensore tramite il PCT risulta illeggibile a causa di un file corrotto. Il termine per il deposito è scaduto il giorno precedente e non è chiaro se il contenuto dell'atto sia recuperabile. L'udienza è fissata a breve. Come si comporterebbe in questa situazione?", "efficace": "Esegue più tentativi di apertura del file, utilizzando programmi diversi per accertarsi dell'irrecuperabilità del documento. Poi, porta la questione all'attenzione del Magistrato, illustrando l'esito delle verifiche e le ricadute sull'udienza imminente. Ricevute le indicazioni, si coordina con la cancelleria per gli adempimenti necessari. Infine, condivide la criticità nel team dell'Ufficio per il Processo, suggerendo di inserire una verifica di leggibilità tra i controlli ordinari sui depositi telematici.", "media": "Tenta l'apertura del file con alcuni programmi e ne verifica l'irrecuperabilità. Constatata l'illeggibilità del contenuto, segnala la circostanza al Magistrato, chiedendogli se ritenga opportuno disporre un rinvio dell'udienza o procedere diversamente. Nel frattempo, avvisa la cancelleria dell'anomalia sul deposito. Riprende, quindi, lo spoglio degli altri fascicoli in programma, riservandosi di intervenire nuovamente sul deposito solo dopo aver ricevuto disposizioni dal Magistrato.", "inefficace": "Presume che la corruzione del file sia riconducibile a un malfunzionamento del PCT o del sistema del difensore, elementi estranei alla propria sfera operativa. Pertanto, prosegue con la preparazione degli altri fascicoli in programma, ritenendo che il difensore si accorgerà autonomamente del problema una volta verificata la ricezione del proprio deposito e provvederà a contattare direttamente la cancelleria per eventuali integrazioni o chiarimenti."}, {"num": 36, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, supportando l'ufficio esecuzione, lei riscontra che i dati anagrafici del condannato registrati nel sistema SICP non corrispondono a quelli riportati nella sentenza divenuta irrevocabile. La discrepanza riguarda il luogo e la data di nascita e potrebbe far sì che l'ordine di esecuzione venga indirizzato a una persona diversa da quella effettivamente condannata. Come si comporterebbe in questa situazione?", "efficace": "Ricostruisce i dati corretti confrontando la sentenza con gli atti identificativi del fascicolo. Poi, predispone una nota tecnica che documenta la discrepanza e le fonti consultate, da sottoporre al Magistrato referente dell'ufficio esecuzione per le determinazioni del caso. Intanto, si coordina con la cancelleria per bloccare l'emissione dell'ordine. Infine, suggerisce di inserire un controllo di corrispondenza anagrafica tra sentenza e SICP tra le verifiche standard dell'ufficio esecuzione.", "media": "Riscontrata la difformità dei dati anagrafici, segnala la circostanza al Magistrato dell'esecuzione, trasmettendogli un prospetto con le informazioni divergenti rilevate nei documenti. Intanto, chiede alla cancelleria di verificare se analoghi disallineamenti siano presenti in altri fascicoli dell'ufficio. Quindi, sospende gli adempimenti preparatori sul fascicolo, riservandosi di aggiornare il SICP non appena il Magistrato avrà chiarito quale sia la versione corretta dei dati.", "inefficace": "Giudica che una lieve discrepanza sui dati anagrafici non sia tale da incidere sulla corretta identificazione del condannato, poiché nome e cognome restano comunque coerenti tra i documenti. Pertanto, procede con gli adempimenti dell'ufficio esecuzione come di consueto, convinto che eventuali incongruenze sui dati di nascita saranno agevolmente intercettate e corrette nei passaggi successivi del procedimento esecutivo dal personale della cancelleria o dalle autorità incaricate."}, {"num": 37, "domanda": "Prestando servizio come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei deve trasmettere alla Procura della Repubblica copia degli atti di un procedimento in cui il Magistrato ha rilevato elementi che potrebbero integrare un reato e ne ha disposto la trasmissione al PM. Mentre prepara la trasmissione, tuttavia, lei si rende conto che il fascicolo risulta incompleto: infatti, mancano due verbali di udienza e la documentazione bancaria depositata dall'attore, tutti atti potenzialmente rilevanti per le valutazioni della Procura. Come si comporterebbe in questa situazione?", "efficace": "Esamina il fascicolo e il SICID per individuare gli atti mancanti e le loro collocazioni originali. Poi, contatta la cancelleria per recuperare i verbali e la documentazione bancaria, integrandoli nella copia da trasmettere. In seguito, aggiorna il Magistrato sulla situazione e sui tempi previsti per il completamento del fascicolo. Infine, prepara una nota per il team dell'Ufficio per il Processo in cui condivide spunti operativi per la gestione delle future trasmissioni ad altri uffici.", "media": "Chiede alla cancelleria di recuperare con urgenza i due verbali di udienza e la documentazione bancaria depositata dall'attore, così da poter integrare il fascicolo prima dell'invio alla Procura. Dunque, comunica al Magistrato l'incompletezza riscontrata. Poi, mette da parte la pratica, attendendo il ritrovamento degli atti da parte della cancelleria, confidando che i tempi residui siano sufficienti per trasmettere il fascicolo completo alla Procura entro i termini previsti.", "inefficace": "Circoscrive la trasmissione agli atti attualmente disponibili nel fascicolo, presumendo che siano sufficienti per una prima valutazione della Procura in ordine ai fatti rilevati dal Ma
