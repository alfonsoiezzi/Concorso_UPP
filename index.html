modo diverso. Come si comporterebbe in questa situazione?", "efficace": "Interpella i Magistrati della sezione per raccogliere le loro preferenze sull'ordinamento dei documenti nel fascicolo digitale. Quindi, elabora un criterio uniforme che bilanci ordine cronologico e suddivisione per tipologia di atto, testandolo sui fascicoli delle prossime udienze. Infine, sottopone il criterio al Presidente per la validazione, proponendo di adottarlo come standard per l'intera sezione e offrendosi di affiancare i colleghi nella sua applicazione.", "media": "Sceglie il criterio che ritiene più funzionale e lo adotta stabilmente per i propri fascicoli, offrendo al Magistrato una struttura coerente e prevedibile. Poi, suggerisce ai colleghi di convergere verso lo stesso ordinamento, illustrando le ragioni della propria scelta operativa. Tuttavia, rimanda il confronto formale con il Presidente, ritenendo che la bontà del criterio emergerà dalla pratica quotidiana e che i colleghi si adegueranno progressivamente.", "inefficace": "Continua a organizzare i fascicoli digitali secondo il criterio cronologico, curandone la completezza e l'ordine interno per garantire al Magistrato un documento ben strutturato. Del resto, è convinto che la scelta del criterio organizzativo dipenda dal rapporto tra ciascun addetto e il proprio Magistrato e che un'eventuale uniformazione dei metodi debba essere promossa dal Presidente di Sezione, qualora lo ritenga necessario per il buon funzionamento dell'ufficio."}, {"num": 121, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. In occasione di un sollecito del Magistrato su una bozza di ordinanza che riteneva già consegnata, si rende conto che nella sezione manca uno strumento digitale per tracciare lo stato di avanzamento delle bozze di provvedimento. Infatti, non è possibile distinguere quelle in redazione, quelle trasmesse per revisione e quelle pronte per la firma. L'episodio non è isolato e genera ricorrenti solleciti. Come si comporterebbe in questa situazione?", "efficace": "Realizza un foglio di tracciamento condiviso per monitorare in tempo reale lo stato di ciascuna bozza, distinguendo quelle in redazione, in revisione e pronte per la firma. Lo testa direttamente con il Magistrato, raccogliendo i suoi riscontri per affinare la struttura. Quindi, propone al Presidente di adottarlo come standard per tutta la sezione, così da eliminare i solleciti e rendere sempre visibile lo stato di avanzamento delle bozze in gestione.", "media": "Imposta un file condiviso con il Magistrato per monitorare lo stato delle bozze in lavorazione, inserendo una nota di stato per ciascuna bozza. Poi, illustra il metodo ai colleghi della sezione durante un confronto informale, consigliando loro di adottare una soluzione analoga per i propri fascicoli. Tuttavia, rimanda a un momento successivo la proposta di standardizzarlo formalmente, confidando che i colleghi lo adottino spontaneamente vedendone i benefici pratici.", "inefficace": "Chiarisce al Magistrato lo stato della bozza e provvede alla sua consegna, scusandosi per il disguido causato dall'assenza di una comunicazione aggiornata sullo stato di avanzamento del lavoro. Del resto, è persuaso che la difficoltà di tracciare le bozze rientri nella normale complessità del rapporto di lavoro tra addetto e Magistrato e che spetti al Presidente di Sezione valutare se introdurre strumenti di coordinamento specifici per migliorare l'organizzazione interna."}, {"num": 122, "domanda": "Lei in qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, gestisce la casella PEC della sezione insieme ad altri colleghi. Individuando con due giorni di ritardo un'istanza cautelare urgente depositata via PEC, si rende conto che le comunicazioni in entrata non sono smistate secondo criteri condivisi, con atti rilevanti che si confondono con quelli ordinari e ciascun AUP interviene secondo proprie priorità. Come si comporterebbe in questa situazione?", "efficace": "Comunica immediatamente al Magistrato il ritardo nell'individuazione dell'istanza cautelare, fornendogli un quadro completo della situazione e delle azioni necessarie. Intanto, si coordina con i colleghi per stabilire criteri provvisori di smistamento basati sulla tipologia dell'atto. Quindi, propone al Presidente di Sezione un protocollo condiviso che assegni a ciascun addetto turni di supervisione della casella e categorie di atti di propria competenza.", "media": "Porta subito all'attenzione del Magistrato l'istanza cautelare individuata in ritardo, fornendogli le informazioni essenziali e scusandosi. Poi, propone ai colleghi di adottare in via informale un criterio di priorità per lo smistamento degli atti più urgenti, come la distinzione tra atti cautelari e ordinari. Tuttavia, ritenendo opportuno verificare prima se il criterio informale adottato risulti sufficiente, rimanda a un momento successivo una proposta strutturata.", "inefficace": "Recupera l'istanza cautelare con ritardo e predispone in tempi brevi quanto necessario per la trattazione, scusandosi con il Magistrato per il disguido. Poi, torna alla gestione ordinaria della casella PEC, convinto che il disallineamento riscontrato sia da attribuire all'eccezionale volume di comunicazioni della settimana e che il coordinamento con i colleghi per lo smistamento degli atti, che di norma funziona bene, non richieda un intervento strutturale per un episodio sporadico."}, {"num": 123, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Dopo aver rielaborato una scheda preparatoria secondo le indicazioni ricevute a voce dal Magistrato, quest'ultimo le contesta di non aver recepito correttamente due modifiche richieste. Ripensando agli ultimi incontri, si rende conto che la mancanza di una traccia digitale delle osservazioni del Magistrato la espone ricorrentemente al rischio di omissioni e fraintendimenti. Come si comporterebbe in questa situazione?", "efficace": "Chiede al Magistrato di illustrarle le due modifiche contestate e corregge immediatamente la scheda. Quindi, gli propone di adottare una prassi digitale condivisa, ossia, al termine di ogni incontro, inviargli via e-mail un breve riepilogo scritto delle indicazioni ricevute perché possa confermarlo o rettificarlo. Infine, concorda l'adozione sistematica di questa modalità, così da disporre di una traccia verificabile e condivisa per ogni successivo aggiornamento.", "media": "Torna dal Magistrato per chiarire nel dettaglio le modifiche richieste e corregge la scheda in base alle indicazioni ricevute. Poi, inizia a prendere appunti scritti in modo sistematico durante i colloqui, così da avere un riferimento personale da consultare al momento della stesura. Per il momento, rimanda a un momento successivo la proposta di un metodo condiviso, ritenendo che la propria annotazione personale sia sufficiente a prevenire omissioni e fraintendimenti futuri.", "inefficace": "Accoglie le osservazioni del Magistrato con spirito collaborativo, corregge la scheda secondo le indicazioni e si impegna a prestare maggiore attenzione nel recepire le richieste verbali in futuro. Del resto, è convinto che la comunicazione diretta con il Magistrato sia parte integrante del proprio ruolo e che ricorrere a riepiloghi scritti potrebbe appesantire inutilmente il rapporto di lavoro, trasformandolo in una procedura burocratica inutile."}, {"num": 124, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale e mentre sta predisponendo l’elenco dei procedimenti da trattare in udienza, si accorge di non aver inserito un fascicolo che invece doveva comparire e che il Presidente di Sezione aveva segnalato a voce come prioritario per il Magistrato. Verificando sul gestionale, nota che è disponibile un contrassegno digitale delle priorità, che tuttavia nella sezione resta inutilizzato in favore di comunicazioni verbali informali. Come si comporterebbe in questa situazione?", "efficace": "Rettifica l’elenco dei procedimenti da trattare in udienza inserendo il fascicolo omesso e ne informa tempestivamente il Magistrato. Quindi, contrassegna il fascicolo con il flag di priorità disponibile nel gestionale e propone al Presidente di adottarlo sistematicamente, così da sostituire le comunicazioni verbali con una segnalazione digitale tracciabile. Infine, suggerisce di renderlo obbligatorio per ogni indicazione di priorità, eliminando così il rischio di omissioni future.", "media": "Reinserisce il fascicolo e informa il Magistrato. Poi, comincia a utilizzare sistematicamente il contrassegno digitale delle priorità per i fascicoli di propria competenza, illustrandone l'utilità ai colleghi in occasione di un confronto informale. Tuttavia, rimanda a un momento successivo una proposta strutturata al Presidente per rendere obbligatorio il flag, ritenendo opportuno verificare prima se i colleghi lo adottino spontaneamente.", "inefficace": "Aggiorna l'elenco dei procedimenti inserendo il fascicolo prioritario omesso e ne informa il Magistrato. Quindi, prosegue con le consuetudini della sezione, convinto che le segnalazioni verbali delle priorità rappresentino una prassi collaudata. Qualora, il Presidente intendesse adottare il contrassegno digitale, esprimerà la sua indicazione in modo esplicito e sarà opportuno recepirla in quella sede, senza anticipare autonomamente un cambiamento non ancora condiviso."}, {"num": 125, "domanda": "In qualità di Addetto all'Ufficio per il processo - servizi trasversali - presso un Tribunale, lei è incaricato di organizzare una riunione da remoto che coinvolge personale interno dotato di account istituzionale @giustizia.it, avvocati ed altri soggetti privi di account istituzionale. La riunione verte su una tematica organizzativa urgente e la partecipazione di tutti i soggetti coinvolti è imprescindibile. Pertanto, occorre garantire l’accesso alla riunione indipendentemente dalla tipologia di account in possesso dei partecipanti. Come si comporterebbe in questa situazione?", "efficace": "Predispone un evento di calendario inserendo tutti i partecipanti e genera un link unico di accesso, verificando che sia consentita la partecipazione anche agli utenti esterni all'amministrazione, tramite browser. Prima di procedere all'invio della convocazione, controlla le impostazioni di accesso, in particolare la gestione della sala d'attesa, per evitare ritardi e difficoltà nell'ingresso. Infine, prevede un co-organizzatore e testa preventivamente il corretto funzionamento del collegamento.", "media": "Crea un evento di calendario, inserendo tutti i partecipanti che le sono stati indicati, e condivide il link per consentire l'accesso alla riunione nella data fissata. Poi, invia la convocazione, confidando che le impostazioni per accedere alla riunione siano già configurate correttamente e consentano un ingresso agevole ad ogni partecipante. In caso di difficoltà al momento dell'avvio della riunione, interverrà prontamente per risolvere ogni criticità che le verrà segnalata.", "inefficace": "Inizialmente, prova a richiedere ai partecipanti esterni di dotarsi di un account compatibile con il sistema utilizzato dall'amministrazione. Se ciò non dovesse essere possibile, suddividerà i partecipanti in due gruppi, utenti interni ed esterni, e creerà due eventi di calendario separati, nella speranza che tale impostazione garantisca a tutti la possibilità di accedere e una gestione tecnica adeguata della riunione, accettando come possibile conseguenza una maggiore complessità organizzativa."}, {"num": 126, "domanda": "Lei in qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, riordinando i fascicoli dopo un'udienza, trova annotazioni a penna del Magistrato su copie cartacee stampate da depositi telematici, osservazioni che sembrano utili alla redazione del provvedimento e che rischiano di andare disperse. Infatti, si rende conto che il Magistrato stampa sistematicamente i file per poterli annotare e che ignora la possibilità di apporre annotazioni digitali direttamente sui PDF. Come si comporterebbe in questa situazione?", "efficace": "Innanzitutto, sperimenta le funzionalità di annotazione digitale disponibili nei software in uso presso l'ufficio, verificandone la praticità e l'adattabilità alle esigenze del Magistrato. Poi, gli sottopone una dimostrazione pratica delle principali funzionalità, mostrando come apporre commenti, evidenziare delle parti e inserire note direttamente sui file PDF. Quindi, gli offre supporto nell'adozione dello strumento e propone di condividere la buona pratica con gli altri Magistrati.", "media": "Mostra al Magistrato le funzionalità di annotazione digitale disponibili sui PDF, illustrandogli come apporre commenti e note direttamente sul file. Poi, gli propone di provarle su alcuni fascicoli in lavorazione, offrendosi di assisterlo in caso di difficoltà. Poi, ritenendo opportuno attendere che il Magistrato consolidi l'utilizzo autonomo dello strumento, rimanda la condivisione con gli altri Magistrati, prima di farne una proposta più ampia.", "inefficace": "Conserva le copie cartacee annotate nel fascicolo fisico e le utilizza come riferimento nella redazione del provvedimento, portando avanti il lavoro nel rispetto del metodo adottato dal Magistrato. Del resto, segnalare l'esistenza di funzionalità digitali alternative esula dalle proprie attribuzioni operative. Inoltre, ritiene che ogni eventuale cambiamento delle abitudini di lavoro debba scaturire da una sua scelta autonoma del Magistrato o da un'indicazione del Presidente di Sezione."}, {"num": 127, "domanda": "Lei, come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, fa parte di un mini- pool insieme ad altri due AUP assegnati al medesimo magistrato. In un'udienza recente, il Magistrato ha dovuto rinviare una causa perché nessuno dei tre AUP aveva verificato che la notifica della chiamata del terzo fosse stata regolarmente eseguita. Confrontandosi con i colleghi del pool, si rende conto che ciascuno segue proprie prassi di verifica, senza una checklist condivisa che garantisca l'uniformità e la completezza dei controlli. Come si comporterebbe in questa situazione?", "efficace": "Avvia un confronto con i colleghi del pool per mappare le verifiche che ciascuno effettua, individuando sovrapposizioni e lacune. Poi, elabora una checklist digitale condivisa che copra sistematicamente tutti i passaggi delle verifiche pre- udienza, la sottopone al magistrato per la validazione e ne promuove l'adozione immediata. Infine, propone al Presidente di Sezione di estenderla a tutti i pool della sezione come standard operativo, illustrandone i benefici per la prevenzione degli errori.", "media": "Sollecita un confronto immediato con i colleghi del pool per cercare di comprendere, a grandi linee, le rispettive prassi di verifica. Poi, per uniformare i controlli pre-udienza, gli propone di compilare i campi vuoti di un calendario digitale condiviso. Poi, qualora dovesse ricevere da parte loro un feedback positivo a riguardo, condividerà la proposta con il magistrato, rimanendo comunque aperto nei confronti di eventuali soluzioni alternative che il magistrato riterrà opportuno adottare.", "inefficace": "Prosegue con le proprie prassi di verifica consolidate, ritenendo che la definizione di procedure condivise rientri nelle responsabilità del magistrato coordinatore. Dunque, decide di limitarsi a segnalare al magistrato le criticità riscontrate nei singoli fascicoli durante le udienze, astenendosi dal giudicare le modalità individuali di lavoro altrui per mantenere un clima positivo. Infine, considerando adeguato il livello di coordinamento reciproco attuale, rimanda qualsiasi intervento ad un'eventuale iniziativa del magistrato."}, {"num": 128, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. In occasione della relazione settimanale al Presidente di Sezione, constata che per ricostruire gli esiti delle udienze svolte, tra rinvii, riserve e decisioni, deve aprire uno a uno i singoli fascicoli telematici. Nessun riepilogo digitale aggregato permette al Presidente di avere una visione d'insieme dell'attività settimanale, con evidente dispendio di tempo nella produzione del report. Come si comporterebbe in questa situazione?", "efficace": "Sviluppa un foglio di lavoro in cui registrare, al termine di ogni udienza, l'esito di ciascun fascicolo trattato, così da generare in tempo reale il riepilogo settimanale. Lo testa sulle udienze della settimana corrente, verificando che le categorie di esito coprano tutte le casistiche. Quindi, lo sottopone al Presidente, proponendo di adottarlo come strumento standard per le relazioni periodiche e di condividerlo con tutti gli addetti della sezione.", "media": "Costruisce un foglio riepilogativo in cui raccoglie manualmente gli esiti delle udienze della settimana, organizzandoli per categoria. Poi, lo sottopone al Presidente come strumento di sintesi dell'attività settimanale, chiedendogli se ritenga opportuno adottarlo in modo più strutturato e continuativo. Tuttavia, in attesa di ricevere un riscontro dal Presidente sull'utilità del documento, rimanda la possibilità di definire un formato stabile e condiviso con i colleghi.", "inefficace": "Apre uno per uno i fascicoli telematici della settimana, ricavandone gli esiti delle udienze svolte e compilando il report settimanale per il Presidente con la consueta cura. Infatti, ritiene che il metodo di ricostruzione manuale, pur richiedendo più tempo, garantisca la correttezza e la completezza dei dati rendicontati, e che l'introduzione di strumenti automatizzati di aggregazione richiederebbe una valutazione tecnica preventiva della quale non si è ancora occupato."}, {"num": 129, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Un collega AUP si accorge di aver mancato il termine per lo \"scarico\" di un provvedimento, essendosi affidato esclusivamente alla propria agenda cartacea. Emerge che nessun AUP della sezione dispone di promemoria digitali automatici sulle scadenze processuali dei fascicoli in lavorazione, con il rischio che, all'aumentare del carico, altre scadenze rilevanti possano sfuggire al controllo. Come si comporterebbe in questa situazione?", "efficace": "Affianca il collega nel valutare le conseguenze del termine mancato e le possibili azioni correttive. Intanto, individua strumenti di promemoria digitale già disponibili nell'ufficio, come i calendari condivisi o le funzionalità di alert del gestionale, e ne testa l'efficacia sulle proprie scadenze processuali. Quindi, propone al Presidente di Sezione di adottarli come sistema standardizzato per tutti gli AUP, così da ridurre il rischio di omissioni future.", "media": "Configura un sistema di promemoria digitali sulle proprie scadenze processuali, utilizzando il calendario condiviso già disponibile nell'ufficio. Poi, suggerisce ai colleghi di fare altrettanto, mostrando loro come impostare alert automatici per le scadenze processuali. Tuttavia, prima di condividere con il Presidente di Sezione questa soluzione, ritiene sia opportuno verificare che siano i colleghi ad adottare autonomamente il sistema.", "inefficace": "Segnala la problematica al Dirigente amministrativo, chiedendogli di valutare se sia opportuno attivare un sistema di promemoria digitale per le scadenze processuali oppure di interpellare il servizio informatico per individuare soluzioni già disponibili. Convinto che la predisposizione di strumenti digitali di supporto rientri tra le responsabilità della dirigenza, torna alle proprie attività, proseguendo con la gestione delle scadenze tramite la propria agenda cartacea."}, {"num": 130, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Durante lo spoglio di un fascicolo telematico, si accorge casualmente che le medesime parti risultano coinvolte in un altro procedimento pendente presso la stessa sezione, e quindi, potrebbero essere collegate tra di loro. Infatti, il gestionale non segnala automaticamente le connessioni tra procedimenti e la scoperta è avvenuta solo grazie alla memoria di un collega più esperto. Come si comporterebbe in questa situazione?", "efficace": "Avvisa tempestivamente il Magistrato della connessione individuata, fornendogli i dettagli di entrambi i fascicoli. Intanto, esegue una ricerca mirata nel gestionale per verificare se vi siano ulteriori procedimenti con le stesse parti. Quindi, propone al Presidente di Sezione di istituire un controllo periodico incrociato sulle parti dei fascicoli in lavorazione e di segnalare al servizio informatico l'opportunità di implementare una funzione automatica di rilevazione.", "media": "Informa il Magistrato della connessione rilevata tra i due procedimenti, fornendogli le informazioni disponibili sulle rispettive cause. Poi, effettua una verifica sommaria nel gestionale per individuare eventuali altri fascicoli con le stesse parti, concentrandosi sui procedimenti facilmente accessibili. Quindi, prima di proporre uno strumento di controllo sistematico, ritiene necessario valutare se l'episodio si sia rivelato un caso isolato o una criticità ricorrente.", "inefficace": "Riporta la connessione individuata nella scheda preparatoria del fascicolo e la porta all'attenzione del Magistrato durante il successivo momento di confronto, senza interrompere le attività già in corso. Infatti, la ricerca sistematica di connessioni tra procedimenti non è inerente la fase di spoglio e la mancata rilevazione automatica da parte del gestionale rappresenta una limitazione tecnica nota che spetta gestire al servizio informatico."}, {"num": 131, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, verificando le scadenze processuali dei fascicoli assegnati, si accorge che il sistema di calcolo automatico dei termini genera date di scadenza errate. I termini calcolati dal sistema risultano sistematicamente anticipati di uno o due giorni rispetto a quelli effettivi. Come si comporterebbe in questa situazione?", "efficace": "Riesamina manualmente le scadenze di tutti i fascicoli interessati dall'errore, individuando le date corrette alla luce del calendario festivo. Intanto, raccoglie documentazione oggettiva sui casi riscontrati per documentare il malfunzionamento del sistema. Quindi, trasmette al Dirigente e al servizio informatico una segnalazione tecnica corredata dagli esempi, proponendo un controllo manuale delle scadenze critiche fino alla risoluzione dell'anomalia di calcolo.", "media": "Ricontrolla manualmente le scadenze dei fascicoli di propria competenza e corregge quelle anticipate dal sistema. Poi, informa brevemente i colleghi del malfunzionamento riscontrato, invitandoli a verificare le loro scadenze, rimandando a un momento successivo una segnalazione formale al servizio informatico e al Dirigente. Infatti, ritiene che l'approccio manuale adottato individualmente sia sufficiente a contenere il rischio nel breve periodo.", "inefficace": "Recepisce i calcoli del sistema come validi e prosegue nella gestione ordinaria delle scadenze secondo le date indicate dall'applicativo. Del resto, la verifica manuale di calcoli automatici esula dalle proprie competenze e eventuali correzioni di calcolo dei termini rientra nelle responsabilità tecniche del servizio informatico, unico soggetto legittimato a intervenire sulle configurazioni del sistema gestionale."}, {"num": 133, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale con contratto a tempo determinato. Mancano tre mesi alla scadenza del suo contratto e il Dirigente le chiede di organizzare il passaggio di consegne digitale al collega che la sostituirà: file di lavoro, schede in corso, accessi ai sistemi, materiali di ricerca, contatti operativi con la cancelleria e con il Magistrato referente. Come si comporterebbe in questa situazione?", "efficace": "Pianifica il passaggio di consegne articolando le attività per aree tematiche e predisponendo una mappa completa dei materiali da trasferire. Intanto, organizza un repository digitale strutturato per fascicoli, sistemi, contatti e archivi. Infine, concorda con il Dirigente sessioni di affiancamento con il collega subentrante, per un trasferimento graduale e verificato delle competenze maturate.", "media": "Centralizza in una cartella condivisa tutti i file di lavoro, le schede in corso, i materiali di ricerca, nominandoli in modo chiaro. Poi, prepara un documento riepilogativo dei contatti operativi con la cancelleria e con il Magistrato referente. Dunque, ritenendo di aver già predisposto l'essenziale per il passaggio, lascia decidere al Dirigente l'eventuale definizione di un piano di affiancamento con il collega subentrante.", "inefficace": "Trasferisce al collega i file di lavoro e le schede in corso, caricandoli nella cartella personale del successore e inviandogli via e-mail le credenziali di accesso ai sistemi. Infatti, ritiene che la conoscenza operativa dell'ufficio si consolidi naturalmente attraverso la pratica quotidiana e che il successore, una volta preso in carico i materiali digitali, ricostruirà autonomamente le prassi operative."}, {"num": 134, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico, nell'elaborare il report trimestrale per il Ministero della Giustizia, si accorge che nel database utilizzato per le estrazioni sono presenti record di prova inseriti durante una sessione di formazione svoltasi il mese precedente, mai rimossi dal sistema. I dati fittizi sono indistinguibili da quelli reali se non per il codice identificativo dell'Operatore che li ha inseriti. Come si comporterebbe in questa situazione?", "efficace": "Isola i record di prova tramite il codice dell'Operatore di formazione e li esclude dalle estrazioni per il report trimestrale. Intanto, segnala tempestivamente al servizio informatico la presenza dei dati fittizi, sollecitandone la rimozione dal database prima delle successive rilevazioni. Quindi, propone al Dirigente di introdurre un protocollo che separi gli ambienti di formazione da quelli di produzione, per evitare il ripetersi di contaminazioni dei dati.", "media": "Filtra le estrazioni del report escludendo i record associati al codice dell'Operatore di formazione, così da trasmettere dati coerenti al Ministero. Poi, segnala la presenza dei dati fittizi al servizio informatico, chiedendo che vengano rimossi dal database. Poi, ritenendo sufficiente la rimozione puntuale dei dati, rimanda a un momento successivo la proposta di introdurre un protocollo che separi gli ambienti di formazione da quelli di produzione.", "inefficace": "Rappresenta al servizio informatico la presenza dei record di prova, chiedendone la rimozione per le rilevazioni future, e compila il report trimestrale secondo le modalità consuete. Infatti, è del parere che la pulizia dei dati di formazione rientri tra le responsabilità del personale tecnico e che il peso dei record fittizi, trattandosi di un volume limitato, non alteri in modo significativo gli indicatori trasmessi al Ministero."}, {"num": 136, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, dopo la ripresa dell'attività dalla pausa feriale estiva, con la calendarizzazione di numerose udienze complesse, il sistema gestionale diventa estremamente lento, rendendo difficoltosa la consultazione dei fascicoli e lo svolgimento delle attività di spoglio. Il rallentamento si ripete regolarmente ogni anno, in corrispondenza dei picchi di attività, e incide significativamente sulla produttività della sezione. Come si comporterebbe in questa situazione?", "efficace": "Traccia i rallentamenti osservati, documentando orari, durata e attività maggiormente compromesse durante le settimane di picco. Sulla base di ciò, elabora una proposta di riorganizzazione delle attività di spoglio, anticipando la consultazione dei fascicoli nei periodi di minore carico del sistema, così da ridurre l'impatto sulla produttività della sezione. Quindi, la trasmette al Dirigente e al personale IT, insieme ad un report dettagliato con gli elementi raccolti.", "media": "Decide di distribuire le attività di spoglio nelle fasce orarie in cui il sistema risulta più reattivo, anticipando la consultazione dei fascicoli più onerosi durante le settimane più intensive. Poi, condivide con i colleghi gli orari di maggiore reattività, suggerendo loro di organizzarsi analogamente. Dunque, ritenendo che l'organizzazione adottata personalmente e suggerita ai colleghi sia sufficiente a contenere, almeno parzialmente, l'impatto dei rallentamenti, attende a segnalare la questione al Dirigente.", "inefficace": "Gestisce con pazienza i rallentamenti adattandosi ai tempi tecnici del sistema e recuperando il carico accumulato nei giorni successivi ai picchi di attività. Del resto, i rallentamenti che seguono le settimane feriali estive rientrano nella fisiologia di un sistema condiviso da tutti gli uffici del distretto. Tuttavia, spera comunque che, entro breve, la direzione centrale intervenga e commissioni al personale IT degli interventi sull'infrastruttura che migliorino la situazione attuale."}, {"num": 137, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Si rende conto che, ogni volta che si allontana dalla propria postazione per recarsi in udienza o in cancelleria, la sessione di accesso ai sistemi gestionali rimane attiva per circa due ore. La sua postazione è situata in un ambiente condiviso e, potenzialmente, accessibile ad altri colleghi e al personale di passaggio. Come si comporterebbe in questa situazione?", "efficace": "Blocca subito la sessione di accesso ai sistemi ogni volta che si allontana dalla postazione, adottando la pratica del blocco schermo da tastiera. Intanto, verifica con il servizio informatico se sia possibile ridurre il timeout della sessione attiva. Quindi, sottopone al Dirigente una proposta di linee guida sulla sicurezza delle postazioni, estensibile a tutti gli addetti, per uniformare le pratiche di accesso.", "media": "Acquisisce l'abitudine di bloccare lo schermo ogni volta che si allontana dalla postazione, per proteggere la propria sessione di accesso. Poi, consiglia ai colleghi più vicini di fare altrettanto e, ritenendo che l'adozione individuale della buona pratica sia sufficiente a contenere il rischio, decide di non proseguire sulla proposta di una verifica tecnica del timeout da parte del servizio informatico.", "inefficace": "Mantenendo le modalità operative abituali, cerca di prestare maggiore attenzione a limitare il tempo di assenza dalla postazione. Infatti, valuta che l'ambiente della sezione sia frequentato esclusivamente da personale autorizzato e che l'accesso alla propria postazione da parte di colleghi o di utenti di passaggio rappresenti un'ipotesi remota, considerata la natura dei controlli di sicurezza già presenti nell'ufficio."}, {"num": 139, "domanda": "Lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Consultando il fascicolo telematico di un procedimento in vista dell'udienza, scopre che due allegati indicati nell'indice degli atti risultano presenti come voci ma privi del file corrispondente: cliccando sul riferimento, il sistema restituisce un messaggio di errore. Al contrario, il fascicolo cartaceo contiene regolarmente tali documenti. Come si comporterebbe in questa situazione?", "efficace": "Reintegra gli allegati mancanti scansionando le copie cartacee e caricandole nel fascicolo telematico, dopo averne verificato la completezza. Intanto, informa il Magistrato dell'anomalia rilevata e delle azioni intraprese per garantire la disponibilità dei documenti in udienza. Quindi, segnala l'anomalia alla cancelleria e al servizio informatico, proponendo di introdurre un controllo di coerenza tra indice e file allegati prima di ogni udienza calendarizzata.", "media": "Digitalizza le copie cartacee degli allegati mancanti e le inserisce nel fascicolo telematico, assicurando la disponibilità dei documenti per l'udienza. Poi, informa il Magistrato della situazione riscontrata e segnala l'anomalia alla cancelleria. Inoltre, non ritenendo urgente questa situazione, rimanda la segnalazione al servizio informatico sull'integrità dei fascicoli telematici, in attesa di verificare se l'anomalia sia isolata oppure ricorrente.", "inefficace": "Fa riferimento al fascicolo cartaceo per consultare i documenti non presenti nella versione telematica e predispone il materiale necessario per l’udienza. Infatti, ritiene che la disponibilità dei documenti nel fascicolo cartaceo garantisce la completezza delle informazioni utili alla trattazione. Inoltre, eventuali anomalie nella versione telematica, trattandosi di episodi isolati, rientrano nelle normali dinamiche dei sistemi informativi e possono essere sempre segnalate."}, {"num": 140, "domanda": "Lei è Addetto all'Ufficio per il Processo con profilo statistico-informatico presso un Tribunale. Esportando i dati dal registro SICID in formato tabellare per un'elaborazione statistica, si accorge che i campi descrittivi più lunghi vengono sistematicamente troncati a 255 caratteri, perdendo informazioni significative sull'oggetto dei procedimenti. I report elaborati nei mesi precedenti potrebbero quindi contenere dati incompleti senza che nessuno se ne sia accorto. Come si comporterebbe in questa situazione?", "efficace": "Circoscrive l'impatto del troncamento verificando quali report già prodotti risultino affetti dalla perdita sistematica di informazioni. Intanto, testa metodi alternativi di esportazione che consentano di preservare l'integrità dei campi descrittivi. Quindi, trasmette al Dirigente e al servizio informatico una relazione con l'entità del problema, proponendo la rielaborazione dei report compromessi e l'adozione di un protocollo di verifica per le future esportazioni.", "media": "Ricerca metodi alternativi di esportazione che preservino l'integrità dei campi descrittivi e li utilizza per il report in corso di elaborazione. Poi, segnala l'anomalia del troncamento al servizio informatico, chiedendo di verificare le cause tecniche e se è possibile di intervenire sul sistema. Quindi, rimane in attesa di capire se il problema sia stato risolto e di valutare con il Dirigente l'eventuale impatto sulle rilevazioni passate.", "inefficace": "Demanda al servizio informatico la verifica dell'anomalia del troncamento, chiedendo di intervenire sul sistema di esportazione per risolvere il problema tecnico. Poi, dal momento che la gestione dei limiti tecnici del sistema rientra tra le responsabilità del personale informatico, prosegue l'elaborazione del report in corso con i dati disponibili e, se confermate, eventuali ricadute sulle elaborazioni passate saranno valutate autonomamente dalla dirigenza."}, {"num": 142, "domanda": "Lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Inserendo i dati di un nuovo procedimento nel registro SICID, si accorge che il sistema consente di completare la registrazione anche lasciando vuoti campi che dovrebbero essere obbligatori. Verificando i procedimenti iscritti di recente, scopre che numerosi fascicoli presentano le medesime lacune. Come si comporterebbe in questa situazione?", "efficace": "Elenca i fascicoli recenti che presentano campi vuoti nel SICID, documentando sistematicamente le lacune più ricorrenti. Intanto, integra i dati mancanti sui fascicoli di propria competenza e coordina con la cancelleria il completamento degli altri. Quindi, trasmette al servizio informatico e al Dirigente una segnalazione sulle lacune rilevate, proponendo di rendere effettivamente obbligatori i campi essenziali.", "media": "Integra manualmente i dati mancanti nei fascicoli di propria competenza e invita la cancelleria a verificare i nuovi inserimenti per evitare ulteriori lacune. Poi, segnala il problema al Dirigente, illustrandogli le carenze riscontrate nella registrazione dei procedimenti recenti. Fatto questo, ritenendo opportuno attendere il riscontro del Dirigente prima di sollecitare un intervento tecnico, rimanda la segnalazione al servizio informatico.", "inefficace": "Riempie i campi vuoti del fascicolo su cui sta lavorando, inserendo i dati mancanti prima di procedere con la trattazione. Infatti, considera la presenza di campi vuoti in alcuni fascicoli un episodio occasionale, riconducibile a disattenzioni puntuali del personale di cancelleria, e che comunque, la configurazione dei campi obbligatori nel SICID rientri tra le scelte tecniche del servizio informatico, estranee al proprio operato."}, {"num": 143, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nota che alcuni colleghi, anziché utilizzare la firma digitale per sottoscrivere i documenti da trasmettere telematicamente, stampano il documento, lo firmano a mano, lo scansionano e lo ricaricano nel sistema come file immagine. Questa prassi produce documenti privi di firma digitale valida e di qualità grafica inferiore rispetto all'originale. Come si comporterebbe in questa situazione?", "efficace": "Dialoga con i colleghi per comprendere le ragioni della prassi, valutando se dipenda da difficoltà tecniche, mancata conoscenza dello strumento o altre cause. Intanto, illustra loro con una dimostrazione il corretto uso della firma digitale, mostrando i vantaggi in termini di validità giuridica e qualità dei documenti. Quindi, sottopone al Dirigente una proposta di breve formazione sull'argomento e di una linea guida.", "media": "Spiega ai colleghi come utilizzare correttamente la firma digitale, illustrando loro i passaggi tecnici più rilevanti e i vantaggi in termini di validità e qualità del documento. Poi, li invita a sperimentare lo strumento sui prossimi depositi telematici, offrendosi di assisterli in caso di difficoltà. Quindi, sceglie di non effettuare una proposta formale al Dirigente, ritenendo opportuno verificare prima quanti colleghi adottino spontaneamente la nuova pratica.", "inefficace": "Adopera regolarmente la firma digitale per i propri documenti, rispettando le modalità tecniche previste per la trasmissione telematica. D'altronde, pensa che le modalità operative adottate dai singoli colleghi rientrano nella loro autonomia professionale e eventuali interventi sulle prassi di firma devono partire da una decisione formale del Dirigente o del servizio informatico, a cui spetta verificare la conformità delle pratiche adottate nell'ufficio."}, {"num": 145, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale. Controllando la casella PEC istituzionale, trova decine di ricevute di accettazione e di avvenuta consegna generate automaticamente dal sistema nelle settimane precedenti che nessuno ha mai esaminato né archiviato. Alcune di queste ricevute potrebbero contenere avvisi di mancata consegna relativi a comunicazioni processuali rimaste inevase. Come si comporterebbe in questa situazione?", "efficace": "Vaglia sistematicamente le ricevute accumulate nella casella PEC, separando le conferme di consegna dagli avvisi di mancata consegna. Intanto, interviene sulle comunicazioni processuali rimaste inevase, attivandosi per la loro regolarizzazione e informando il Magistrato delle situazioni più critiche. Quindi, propone al Dirigente un protocollo di monitoraggio periodico della casella PEC, con assegnazione di responsabilità e scadenze di verifica per prevenire analoghe omissioni.", "media": "Scorre le ricevute PEC accumulate, individuando gli avvisi di mancata consegna più urgenti e attivandosi per regolarizzare le comunicazioni processuali rimaste inevase. Poi, informa la cancelleria delle omissioni riscontrate, chiedendo di intervenire sui casi più critici, ritenendo prioritario sanare i casi più urgenti prima di affrontare la questione in modo sistematico ed effettuare una proposta al Dirigente.", "inefficace": "Archivia le ricevute PEC in una cartella dedicata, consentendone una consultazione ordinata nel caso dovesse emergere la necessità di verifiche specifiche. Del resto, la gestione ordinaria della casella istituzionale rientra tra le responsabilità della cancelleria e del personale amministrativo e un addetto non è tenuto a effettuare verifiche autonome sulle ricevute generate automaticamente dal sistema, in assenza di una specifica richiesta in tal senso."}, {"num": 146, "domanda": "Lei lavora come Addetto all’Ufficio per il Processo con profilo statistico-informatico presso un Tribunale. Viene informato dal personale IT che una procedura automatica di pulizia del server ha spostato in un area non accessibile fascicoli digitali relativi a procedimenti definiti da oltre cinque anni, inclusi alcuni per i quali erano ancora pendenti termini di impugnazione o istanze di esecuzione. La pulizia è avvenuta senza preavviso e senza verifica preventiva dello stato effettivo dei procedimenti. Come si comporterebbe in questa situazione?", "efficace": "Ricostruisce l'entità della procedura di pulizia, incrociando i fascicoli spostati con i registri per identificare quelli con termini di impugnazione o istanze pendenti. Intanto, si attiva per il recupero dai backup disponibili e dai fascicoli cartacei, informando i Magistrati referenti dei procedimenti compromessi. Quindi, trasmette al Presidente e al Dirigente una relazione urgente, proponendo un protocollo di validazione preventiva prima di ogni futura pulizia automatica.", "media": "Ispeziona i backup disponibili per verificare quali fascicoli possano essere recuperati, dando priorità a quelli con termini o istanze ancora pendenti. Poi, informa il Dirigente della situazione e chiede al servizio informatico di interrompere ulteriori operazioni di pulizia. Poi, prima di definire un protocollo di validazione preventiva, preferisce attendere l'esito delle operazioni di recupero prima di avanzare proposte strutturate.", "inefficace": "Rimette al servizio informatico la segnalazione ricevuta, chiedendo loro di chiarire la portata della problematica e di valutare le azioni di ripristino opportune. Poi, torna alle proprie elaborazioni statistiche, persuaso che la gestione tecnica dei backup e delle procedure di pulizia del server rientri tra le competenze esclusive del personale IT e che lei non disponga degli strumenti necessari per intervenire su operazioni di natura sistemistica."}, {"num": 148, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, verificando lo stato delle comunicazioni PEC inviate per le udienze della settimana successiva, nota che il certificato di firma generato dalla propria CMG è in scadenza. Se tale certificato non viene rinnovato entro i prossimi dieci giorni, le comunicazioni PEC potrebbero essere rifiutate dai gestori destinatari. Come si comporterebbe in questa situazione?", "efficace": "Comunica all'ufficio preposto l'imminente scadenza della tessera CMG, sollecitandone il rinnovo tempestivo. Intanto, monitora quotidianamente lo stato del certificato per verificare l'avvenuto rinnovo e la validità delle PEC in uscita. Quindi, propone al Dirigente una verifica delle tessere in scadenza di tutto il personale amministrativo e di magistratura dell'ufficio.", "media": "Avverte tempestivamente l'ufficio preposto dell'imminente scadenza del certificato digitale, chiedendo di procedere al rinnovo. Poi, informa il Dirigente della situazione, affinché possa verificare che il servizio IT proceda nei tempi previsti e ritenendo sufficiente aver segnalato l'urgenza attuale della situazione ai soggetti competenti, rimane in attesa di ricevere indicazioni definitive.", "inefficace": "Memorizza l'avviso riportato nelle comunicazioni PEC e registra con cura la data di scadenza del certificato tra le informazioni utili. Poi, rimane in attesa di ulteriori indicazioni, fiducioso che il rinnovo dei certificati digitali della propria tessera CMG sarà effettuato nelle ordinarie attività di manutenzione del servizio informatico e che il sistema stesso potrebbe generare l'avviso con anticipo."}, {"num": 149, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, dove supporta il Magistrato referente nella programmazione delle udienze. Nel predisporre il calendario del mese successivo, lei constata che il sistema GIADA, utilizzato per la gestione automatizzata delle assegnazioni dibattimentali, presenta un malfunzionamento che impedisce la consultazione dei dati necessari alla calendarizzazione. Le udienze devono essere programmate entro la settimana. Come si comporterebbe in questa situazione?", "efficace": "Documenta il malfunzionamento con una segnalazione dettagliata al personale IT, richiedendo un intervento prioritario in ragione della scadenza settimanale. In parallelo, recupera le date di udienza, verificando i frontespizi dei fascicoli dei procedimenti pendenti e accedendo ai dati presenti nel registro SICP. Sulla base dei dati raccolti, predispone una programmazione provvisoria e la condivide con il Magistrato, riferendogli la soluzione adottata per garantire il rispetto dei tempi.", "media": "Informa il Magistrato che GIADA è temporaneamente inutilizzabile per la calendarizzazione e, contestualmente, segnala il problema anche al personale IT. Poi, chiede al Magistrato se preferisca attendere il ripristino del sistema o procedere con una programmazione manuale basata sui fascicoli cartacei. Non appena riceve indicazioni a riguardo, inizia raccogliere i dati necessari dai fascicoli, riservandosi di inserirli manualmente nel sistema GIADA non appena sarà tornato operativo.", "inefficace": "Comunica il malfunzionamento al personale IT e rimane in attesa del ripristino, ritenendo che procedere con strumenti alternativi rischierebbe di produrre una programmazione incoerente con i dati ufficiali del gestionale. Dunque, informa il Magistrato del disservizio, precisandogli che la programmazione potrà essere completata non appena il sistema verrà ripristinato. Nell'attesa, si dedica ad altri adempimenti della sezione, verificando periodicamente lo stato del ripristino."}, {"num": 150, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Durante una mattina di lavoro ordinario, nel predisporre le schede preparatorie per le udienze della settimana successiva, lei si accorge casualmente che per alcuni fascicoli gli atti depositati dalle parti non risultano ancora acquisiti al fascicolo telematico, rischiando di ritardare la fase di spoglio oltre i tempi attesi dal Magistrato. Come si comporterebbe in questa situazione?", "efficace": "Verifica nel PCT l'origine del rallentamento, distinguendo se vi siano anomalie tecniche o se gli atti risultino in attesa di accettazione, a causa di un arretrato di pratiche non ancora lavorate dalla cancelleria. Poi, appurato che il problema risiede nell'accumulo di lavoro della cancelleria, le chiede di accelerare l'accettazione dei depositi inevasi. Infine, prosegue lo spoglio dei fascicoli già completi e, non appena riceverà conferma dalla cancelleria, informerà il Magistrato sui tempi.", "media": "Segnala alla cancelleria che alcuni atti depositati dalle parti non risultano ancora visibili nel fascicolo telematico. In particolare, chiede ad un collega cancelliere, di cui si fida particolarmente, di verificare lo stato dei depositi degli atti e di provvedere alla loro acquisizione. Infine, avverte il Magistrato del possibile ritardo, precisandogli che le schede verranno completate non appena la cancelleria provvederà ad inserire le informazioni necessarie nel fascicolo telematico.", "inefficace": "Ritiene che procedere allo spoglio di atti non formalmente acquisiti possa compromettere completezza e affidabilità delle schede. Pertanto, riconosce di non poter procedere allo spoglio degli atti non presenti nel fascicolo telematico e resta in attesa dello scarico dei dati da parte della cancelleria. Nel frattempo, informa il Magistrato che le schede relative ad alcune cause non potranno essere predisposte nei tempi previsti a causa di un ritardo nell’aggiornamento del fascicolo telematico."}, {"num": 151, "domanda": "Lei è addetto all’Ufficio per il Processo con profilo statistico-informatico presso la sezione civile di un Tribunale. All’inizio del mese è stato coinvolto dal Dirigente amministrativo in un progetto di analisi dei tempi medi di definizione dei procedimenti civili, finalizzato alla redazione di un report annuale da trasmettere al Ministero della Giustizia. Nel corso dell’attività, individua alcune anomalie nei dati che potrebbero falsare i risultati dell’elaborazione. Come si comporterebbe in questa situazione?", "efficace": "Classifica le anomalie individuate per tipologia e ne indaga le cause verificando i dati nei registri da cui sono stati estrapolati. Poi, corregge quelle risolvibili direttamente e documenta le restanti in una nota tecnica che trasmette immediatamente al personale IT per avviare gli interventi necessari. Infine, trasmette al Dirigente il report corretto unitamente ad una relazione che documenta nello specifico le criticità iniziali e le opportune correzioni che sono state apportate.", "media": "Individua i dati che presentano anomalie e li esclude dall'elaborazione per evitare che alterino i risultati complessivi del report. Poi, segnala al Dirigente la presenza di alcune irregolarità riscontrate e gli domanda se l'approccio già adottato sia corretto o se preferisca una diversa modalità di gestione. Dopo aver ricevuto conferma di poter procedere in tal modo, completa il report con i dati che non presentano anomalie, annotando il numero complessivo degli elementi esclusi.", "inefficace": "Procede con l'elaborazione del report includendo tutti i dati estratti dal sistema, ritenendo che le anomalie rilevate rappresentino una quota statisticamente trascurabile rispetto al volume complessivo degli elementi esaminati. Inoltre, teme che intervenire manualmente sulle singole anomalie potrebbe rischiare di introdurre delle distorsioni soggettive all'interno dell'analisi. Dunque, completa il report in anticipo e lo trasmette al Dirigente nel formato richiesto."}, {"num": 152, "domanda": "Lei è Addetto all'Ufficio per il Processo con profilo statistico-informatico presso un Tribunale. Il funzionario informatico dell'ufficio la coinvolge nella fase di test di una nuova piattaforma per la gestione delle udienze da remoto, in ragione del suo profilo che unisce competenze informatiche e conoscenza diretta delle dinamiche processuali. In particolare, le viene chiesto di collaudare la piattaforma riproducendo le operazioni tipiche di un'udienza per individuare eventuali criticità prima del rilascio. Tuttavia, tale attività si sovrappone alle sue ordinarie mansioni di supporto al Magistrato. Come si comporterebbe in questa situazione?", "efficace": "Riconosce il valore del progetto e organizza la propria agenda per conciliare il collaudo con il supporto al Magistrato, concordando con quest'ultimo una temporanea rimodulazione delle priorità. Quindi, procede al test riproducendo tutte le operazioni svolte nel corso di un'udienza e documentando ogni criticità riscontrata, al fine di condividere poi con il funzionario informatico una relazione dettagliata sul funzionamento della piattaforma e su alcuni possibili miglioramenti.", "media": "Chiede al Magistrato se possa dedicare una parte del proprio tempo al collaudo o se debba concentrarsi esclusivamente sulle attività ordinarie. Ottenuto il suo consenso a poter supportare il collega informatico, esegue i test nelle fasce orarie in cui il Magistrato non richiede il suo supporto diretto, concentrandosi sulla verifica delle principali funzionalità della piattaforma. Infine, riferisce al funzionario le criticità più rilevanti che sono emerse durante le prove.", "inefficace": "Rappresenta al funzionario informatico che le attività di supporto al Magistrato assorbono interamente il proprio orario di lavoro e che il collaudo richiederebbe tempo che al momento non è in grado di garantire. Infatti, ritiene che le mansioni ordinarie di supporto alla giurisdizione debbano avere la precedenza rispetto ad attività progettuali secondarie e che il test possa essere condotto direttamente dal personale informatico, senza necessità di coinvolgere un addetto all'UPP."}, {"num": 153, "domanda": "Lei è addetto all’Ufficio per il Processo presso la sezione civile di un Tribunale. Nel corso dello spoglio di un fascicolo di remota iscrizione a ruolo per un'udienza fissata il giorno successivo, lei rileva una discrepanza tra i dati presenti nel registro informatico SICID e quelli risultanti dalla documentazione cartacea: in particolare, il SICID indica che il convenuto si è costituito nei termini, ma nel fascicolo cartaceo non è presente alcuna comparsa di risposta. Come si comporterebbe in questa situazione?", "efficace": "Accede al fascicolo telematico per verificare se la comparsa di risposta sia stata depositata, ipotizzando che tale atto sia stato inserito nel sistema digitale ma non nel cartaceo. Verificata la presenza della comparsa, ne stampa una copia da inserire nel fascicolo cartaceo e conferma al Magistrato la costituzione del convenuto nei termini. Infine, segnala alla cancelleria la mancata corrispondenza tra cartaceo e telematico, affinché verifichi se la criticità riguardi anche altri procedimenti.", "media": "Contatta la cancelleria per segnalare la discrepanza tra il dato SICID e il contenuto del fascicolo cartaceo, chiedendo di verificare se la comparsa sia stata effettivamente depositata o se si tratti di un errore. Poi, riferisce al Magistrato di aver chiesto alla cancelleria un riscontro in merito alla criticità emersa, riservandosi di aggiornarlo non appena possibile. Nel frattempo, predispone la scheda preparatoria, segnalando la necessità di verificare tale questione prima dell'udienza.", "inefficace": "Rileva la discrepanza e, ritenendo che il dato presente nel registro SICID sia il più aggiornato e affidabile, inserisce nella scheda preparatoria l'indicazione che il convenuto si è regolarmente costituito entro i termini. Secondo lei, infatti, è possibile che gli ultimi atti pervenuti alla cancelleria non siano stati ancora inseriti nel fascicolo cartaceo e che, pertanto, il registro informatico rifletta con maggiore precisione lo stato effettivo e attuale del procedimento."}, {"num": 154, "domanda": "Lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. La cancelleria le segnala che un avvocato ha depositato telematicamente una memoria con allegati suddivisi in tre buste separate, ma il deposito non rispetta i requisiti tecnici previsti per i depositi frazionati: manca il file 000_indice.pdf nella prima busta e il nome dell'atto principale non rispetta il formato previsto. L'udienza è fissata per il giorno successivo. Come si comporterebbe in questa situazione?", "efficace": "Informa il Magistrato dell’irregolarità del deposito, illustrandone le conseguenze sulla verificabilità della completezza degli atti. Poi, si coordina con la cancelleria per comunicare al difensore lo scarto del deposito, affinché possa procedere a un nuovo invio nei termini processuali ancora disponibili. Infine, documenta le attività svolte e le condivide con il Magistrato, così da fornirgli un quadro completo e consentirgli di valutare le conseguenze processuali qualora non avvenga il nuovo deposito.", "media": "Segnala alla cancelleria che il deposito frazionato presenta alcune irregolarità tecniche e chiede se intenda procedere allo scarto o all’accettazione delle buste telematiche. Poi, informa il Magistrato delle criticità riscontrate, precisando che la cancelleria è stata allertata e che lei, attualmente, è in attesa di un loro riscontro in merito alle determinazioni da adottare sul deposito. Infine, annota nella scheda preparatoria che tale questione dovrà essere ricontrollata quanto prima.", "inefficace": "Certo del fatto che la valutazione sulla regolarità formale del deposito competa al Magistrato in sede di trattazione e che intervenire sulle modalità tecniche del deposito esuli dalle proprie attribuzioni, si limita ad annotare nella scheda preparatoria che il deposito dell'avvocato presenta alcune irregolarità tecniche. Dunque, trasmette la scheda al Magistrato insieme a quelle degli altri fascicoli in programma e segnala tale questione tra quelle da verificare all'inizio della settimana seguente."}, {"num": 155, "domanda": "Lei opera come Addetto all’Ufficio per il Processo presso la sezione civile di un Tribunale. Accedendo al sistema SICID per la gestione ordinaria del ruolo, lei constata che i dati relativi alle udienze della settimana successiva sono parzialmente corrotti: alcune cause risultano cancellate dal calendario delle udienze, pur figurando ancora pendenti nel registro generale, mentre altre compaiono duplicate con diverse date di udienza. Lei è consapevole che alle parti sono già state comunicate le date originariamente fissate. Come si comporterebbe in questa situazione?", "efficace": "Segnala al personale IT le anomalie riscontrate nel calendario del SICID, precisando quali procedimenti risultano cancellati dal calendario e quali presentano duplicazioni. Poi, verifica nel registro generale quali cause risultino effettivamente pendenti e, per ciascuna, controlla nei fascicoli i provvedimenti di fissazione udienza per ricostruire le date corrette. Infine, trasmette al Magistrato il calendario verificato, confermandogli che le date già comunicate alle parti restano valide.", "media": "Chiede alla cancelleria se abbia riscontrato problemi nel calendario del SICID, segnalandole le anomalie che lei ha individuato personalmente. Poi, compatibilmente con gli altri adempimenti in programma, inizia a verificare nei fascicoli delle cause più prossime le date risultanti dai provvedimenti di fissazione. Infine, informa il Magistrato delle discrepanze riscontrate, trasmettendogli un calendario provvisorio delle udienze che è riuscito a ricostruire sulla base dei fascicoli consultati.", "inefficace": "Ritiene che le anomalie nel calendario del SICID siano riconducibili ad un disallineamento temporaneo del sistema, risolvibile con un riavvio del programma. Dunque, prova ad effettuare un nuovo accesso ma, constatato che il problema persiste, conclude che l'anomalia si risolverà automaticamente con il prossimo aggiornamento del sistema. Pertanto, prosegue con lo spoglio dei fascicoli per i quali i dati risultano corretti, riproponendosi di ricontrollare il calendario il giorno successivo."}, {"num": 156, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, nel predisporre le schede preparatorie per le udienze della settimana successiva, verifica le comunicazioni PEC dei fascicoli in programma. Per un'udienza fissata tra cinque giorni, rileva che la comunicazione di fissazione inviata dalla cancelleria al difensore dell'attore ha generato un avviso di mancata consegna, mentre il difensore del convenuto ha regolarmente ricevuto la propria. Come si comporterebbe in questa situazione?", "efficace": "Verifica che l’indirizzo PEC del difensore utilizzato dalla cancelleria sia corretto e attivo, al fine di accertare la causa della mancata consegna. Qualora l’indirizzo risulti errato, si coordinerà con la cancelleria per un nuovo inoltro al recapito corretto; qualora invece risulti corretto, non procederà a un nuovo invio, poiché la mancata ricezione è imputabile al destinatario. Infine, informa il Magistrato della situazione e annota nella scheda preparatoria l’esito della verifica.", "media": "Segnala al Magistrato che la comunicazione PEC al difensore dell'attore ha generato un avviso di mancata consegna, chiedendogli indicazioni su come procedere in vista dell'udienza fissata tra cinque giorni. Nel frattempo, annota nella scheda preparatoria la mancata consegna della comunicazione al difensore come profilo critico, allegando una copia dell'avviso generato dal sistema, e si rende disponibile ad effettuare tutte le verifiche che il Magistrato riterrà necessarie.", "inefficace": "Inserisce nella scheda preparatoria l'annotazione che la comunicazione PEC al difensore dell'attore risulta non consegnata, ritenendo che la gestione delle anomalie legate alle comunicazioni telematiche spetti alla cancelleria. Infatti, crede che la cancelleria, ricevendo direttamente gli avvisi dal sistema PEC, sia già a conoscenza della mancata consegna e provvederà autonomamente a gestire la situazione. Dunque, prosegue con la predisposizione delle schede per gli altri fascicoli in programma."}, {"num": 157, "domanda": "In qualità di Addetto all'Ufficio per il Processo, assegnato alla sezione penale di un Tribunale, lei si accorge che un Operatore ha effettuato un invio massivo di decreti di archiviazione alla Procura, tramite il sistema SICP, comprendendo anche procedimenti per i quali il giudice non ha ancora emesso il relativo provvedimento. A seguito dell'invio, risultano definiti procedimenti tuttora pendenti, poichè l'Operatore non aveva effettuato il controllo preliminare della presenza del decreto nei rispettivi fascicoli. Come si comporterebbe in questa situazione?", "efficace": "Accede al SICP per verificare i procedimenti per i quali è stato effettuato l'invio massivo e controlla la presenza dei provvedimenti di archiviazione nei fascicoli. Poi, contatta la Procura per segnalare i fascicoli nei quali non è presente il decreto di archiviazione affinchè effettui il riscontro. Infine, relaziona al Dirigente l'accaduto e le verifiche effettuate, proponendogli di inserire nella procedura operativa dell'ufficio l'obbligo di effettuare la verifica della presenza del provvedimento prima di ogni invio massivo.", "media": "Verifica nel SICP i procedimenti per i quali è stato effettuato l'invio massivo alla Procura. Poi, fa presente al Dirigente quanto accaduto, descrivendogli la sequenza degli eventi e confermando l'avvenuta trasmissione. Ritiene che, essendo i dati ormai nella disponibilità della Procura, il problema debba essere risolto coordinandosi con tale ufficio e che sia sufficiente ricordare all'Operatore di eseguire il controllo della presenza del provvedimento di archiviazione prima dei prossimi invii.", "inefficace": "Chiede all'Operatore di verificare la presenza del provvedimento di archiviazione in tutti i procedimenti per i quali è stato effettuato l'invio massivo. Secondo la propria valutazione, infatti, la questione deve essere risolta direttamente dalla Procura. Poi, informa il Dirigente dell'episodio presentandolo come un inconveniente legato alla fretta dell'Operatore, che in futuro potrà essere facilmente evitato prestando maggiore attenzione."}, {"num": 158, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Verificando un fascicolo in vista di un'udienza fissata tra tre giorni, lei riscontra una discrepanza tra il registro SICID e la documentazione cartacea: nello specifico, il sistema informatico segnala erroneamente che il procedimento è stato già definito, con sentenza depositata sei mesi prima, mentre il fascicolo cartaceo non contiene alcuna traccia della sentenza. Come si comporterebbe in questa situazione?", "efficace": "Indaga sull’origine dell’errore nel registro SICID per verificare se si tratti di un’inesattezza manuale o di sistema: nel primo caso contatta la cancelleria affinché provveda alla correzione, mentre nel secondo caso attiva il personale IT per la risoluzione dell’anomalia. Informa quindi il Magistrato che il procedimento risulta regolarmente pendente e che l’udienza può svolgersi come previsto, annotando nella scheda preparatoria la discrepanza riscontrata e la correzione richiesta.", "media": "Evidenzia alla cancelleria l'errore presente nel SICID, chiedendo di provvedere alla correzione del dato e di ripristinare lo stato di pendenza del procedimento nel registro. Poi, riferisce al Magistrato la discrepanza riscontrata, chiedendogli conferma che l'udienza possa svolgersi nonostante l'anomalia nel sistema. In attesa del riscontro della cancelleria sull'avvenuta correzione, sospende la predisposizione della scheda preparatoria per evitare di lavorare su dati non ancora allineati.", "inefficace": "Predispone la scheda preparatoria basandosi sulla documentazione cartacea, che mostra il procedimento come pendente, e procede con la preparazione dell'udienza. Quanto alla discrepanza nel SICID, la considera un'anomalia di secondaria importanza rispetto alla realtà processuale risultante dagli atti, ritenendo che il fascicolo cartaceo costituisca il riferimento autentico dello stato del procedimento e che il dato informatico verrà corretto in autonomia dalla cancelleria in tempi brevi."}, {"num": 159, "domanda": "In qualità di Addetto all'Ufficio per il processo, il Presidente del Tribunale la incarica di supportare l'introduzione di un nuovo sistema di gestione digitale delle udienze civili. Dopo tre settimane dall'avvio emergono alcune criticità: alcuni Magistrati si rifiutano di consultare i fascicoli digitali preferendo le copie cartacee e il sistema presenta malfunzionamenti tecnici nelle funzionalità di ricerca che rendono più lenta la consultazione rispetto al cartaceo. Il Presidente le chiede un report sullo stato del progetto entro la settimana. Come si comporterebbe in questa situazione?", "efficace": "Redige il report distinguendo i malfunzionamenti tecnici del sistema dal rifiuto dei Magistrati di utilizzare i fascicoli digitali, analizzando ciascuna criticità separatamente. Poi, segnala al personale IT i difetti riscontrati, richiedendo un intervento prioritario. Infine, presenta al Presidente un report completo e propone di organizzare sessioni dimostrative per i Magistrati che mostrino i vantaggi della consultazione digitale rispetto al cartaceo, così da superarne la resistenza.", "media": "Raccoglie le segnalazioni dei Magistrati e del personale sulle difficoltà di utilizzo del nuovo sistema e le riporta nel report, descrivendo le criticità emerse nelle prime tre settimane di funzionamento. Poi, trasmette il report al Presidente, chiedendogli quali soluzioni possa adottare per superare la resistenza dei Magistrati. Infine, su indicazione del Presidente, invia ai Magistrati una comunicazione che illustra le funzionalità del sistema e i vantaggi della consultazione digitale.", "inefficace": "Predispone il report attribuendo le difficoltà alla naturale fase di adattamento che accompagna ogni innovazione tecnologica. Dunque, suggerisce al Presidente di rendere obbligatorio l'utilizzo esclusivo del sistema digitale, ritenendo che solo l'eliminazione dell'alternativa cartacea possa accelerare la transizione. Quanto ai rallentamenti nella consultazione, li considera fisiologici nella fase iniziale e destinati a risolversi con l'uso quotidiano della piattaforma."}, {"num": 160, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico, su incarico del Presidente del Tribunale collabora con il MAGRIF alla definizione dei criteri per un nuovo sistema di distribuzione automatica dei fascicoli ai Magistrati, basato sul carico di lavoro. Applicando i criteri proposti ai dati reali dei fascicoli della sezione civile, si accorge che non tengono conto della specializzazione per materia dei Magistrati, con il rischio che fascicoli complessi vengano assegnati a giudici privi dell'esperienza specifica. Come si comporterebbe in questa situazione?", "efficace": "Sottopone ai MAGRIF la criticità corredata dai risultati della simulazione, evidenziando come criteri basati solo sul carico di lavoro generino assegnazioni non coerenti con le specializzazioni dei Magistrati. Quindi, propone di integrare nei criteri un parametro relativo alla specializzazione, incrociando le competenze dei Magistrati con la materia e la complessità dei fascicoli in ingresso. Infine, condivide la proposta con il Presidente per una valutazione complessiva del progetto.", "media": "Segnala ai MAGRIF che i criteri proposti non considerano la specializzazione dei Magistrati e che ciò potrebbe generare assegnazioni inadeguate per i fascicoli più complessi. Dunque, chiede come ritengano opportuno affrontare la questione e se reputino necessari ulteriori test per verificare la validità del criterio relativo al carico di lavoro nella sezione penale. Infine, rimane in attesa delle loro indicazioni prima di sottoporre al Presidente lo stato di avanzamento del progetto.", "inefficace": "Fornisce ai MAGRIF i dati statistici richiesti per la calibrazione dei criteri di distribuzione, attenendosi al perimetro dell'incarico ricevuto. Quanto alla mancata considerazione della specializzazione per materia, ritiene che la definizione dei criteri di assegnazione rientri nelle valutazioni di competenza dei MAGRIF e del Presidente. Dunque, una volta trasmessi i risultati dell'analisi entro i tempi stabiliti, considera concluso il proprio contributo al progetto."}, {"num": 161, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico, lei riceve dal Presidente del Tribunale l'incarico di predisporre una bozza di piano formativo sull'utilizzo del Processo Civile Telematico. Il piano dovrà indicare struttura, durata e articolazione delle sessioni, distinguendo tra quelle rivolte al personale di cancelleria e quelle per i Magistrati. Nel raccogliere le esigenze dei due gruppi, lei rileva che: la cancelleria richiede formazione operativa su deposito e gestione dei fascicoli telematici, mentre i Magistrati necessitano di indicazioni sull'utilizzo degli strumenti di ricerca. Come si comporterebbe in questa situazione?", "efficace": "Articola il piano prevedendo sessioni differenziate per i due gruppi, adattando durata e contenuti alle rispettive esigenze: sui processi di deposito e gestione dei fascicoli telematici per la cancelleria e sull'utilizzo degli strumenti di ricerca per i Magistrati. Poi, per consolidare l'apprendimento, propone di fornire del materiale di supporto consultabile in autonomia, come guide operative e tutorial video. Infine, sottopone il piano al Presidente per la valutazione e l'approvazione.", "media": "Predispone una bozza che prevede una parte introduttiva comune per entrambi i gruppi, sugli aspetti generali del Processo Civile Telematico, seguita da moduli specifici differenziati per ciascuna categoria. Poi, domanda al Presidente quali contenuti vadano privilegiati nei moduli specifici e se l'articolazione proposta sia conforme alle sue aspettative. Infine, si rende disponibile a rivedere la bozza sulla base delle osservazioni che, mano a mano che il progetto andrà avanti, gli perverranno.", "inefficace": "Imposta un piano uniforme per entrambi i gruppi, fornendo contenuti basilari e pratici sull'utilizzo del Processo Civile Telematico, ritenendo che tale impostazione consenta di semplificare l'organizzazione del ciclo formativo. Quanto alle specificità delle esigenze di ciascun gruppo, le considera un aspetto che potrà essere risolto durante le sessioni stesse o essere approfondito in momenti successivi, rispondendo alle domande dei partecipanti o fornendo materiale da approfondire in autonomia."}, {"num": 162, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico, il Presidente del Tribunale le affida il coordinamento operativo, in collaborazione con il personale IT, della realizzazione di un cruscotto digitale per il monitoraggio dei carichi di lavoro della sezione, con termine di tre mesi. A metà del secondo mese, lei si accorge che il progetto è in ritardo rispetto al cronoprogramma a causa di complessità tecniche sottostimate in fase di progettazione e di ritardi nella fornitura dei dati da parte di alcune cancellerie. Come si comporterebbe in questa situazione?", "efficace": "Analizza separatamente le due cause del ritardo: si coordina con il personale IT per rivedere le specifiche tecniche tenendo conto della complessità emersa e sollecita direttamente le cancellerie ritardatarie per accelerare la fornitura dei dati richiesti. Poi, rielabora il cronoprogramma sulla base delle azioni intraprese e informa il Presidente presentandogli il piano di rientro aggiornato e le eventuali rimodulazioni necessarie per rispettare il termine complessivo di tre mesi.", "media": "Predispone una relazione sullo stato di avanzamento del progetto in cui documenta le criticità tecniche emerse e i ritardi di alcune cancellerie nella fornitura dei dati, evidenziando l'impatto sul cronoprogramma complessivo. Poi, sollecita le cancellerie ritardatarie per la trasmissione dei dati mancanti. Infine, trasmette la relazione al Presidente, chiedendogli come ritenga opportuno procedere e se sia possibile ottenere un'eventuale proroga del termine inizialmente stabilito.", "inefficace": "Attende che il personale IT risolva le complessità tecniche emerse e che le cancellerie completino la fornitura dei dati mancanti. Poi, informa il Presidente del ritardo evidenziando come le cause non siano imputabili ad un coordinamento operativo poco efficace ma a problematiche tecniche e organizzative esterne al proprio perimetro di intervento, non prevedibili in fase di pianificazione. Dunque, chiede una proroga del termine di realizzazione, coerente con l'entità del ritardo riscontrato."}, {"num": 163, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico, lei lavora presso un Tribunale che sta attuando la transizione al fascicolo telematico. Il Presidente del Tribunale le chiede di proporre una strategia operativa per gestire il problema dei fascicoli civili non ancora integralmente digitalizzati: infatti, circa il 35% dei fascicoli pendenti presenta gli atti più recenti in formato digitale e quelli relativi alle fasi precedenti esclusivamente in formato cartaceo. Come si comporterebbe in questa situazione?", "efficace": "Individua alcuni criteri di priorità per stabilire quali fascicoli cartacei debbano essere digitalizzati con più urgenza, come la prossimità dell'udienza, la complessità del procedimento e la quantità degli atti da scansionare. Poi, elabora e sottopone al Presidente un piano in due fasi: digitalizzazione prioritaria dei fascicoli con udienza imminente e, parallelamente, per i restanti fascicoli, pianificazione di una conversione digitale progressiva, calibrata sulle risorse della cancelleria.", "media": "Propone al Presidente una strategia di digitalizzazione graduale dei fascicoli che presentano alcuni atti esclusivamente in formato cartaceo, suggerendo di avviare tale processo a partire da quelli più datati. Dopo aver ottenuto la sua approvazione, chiede al Presidente quali risorse destinare all'operazione e quale tempistica seguire, precisando che la cancelleria dovrà essere coinvolta per la scansione degli atti compatibilmente con le attività ordinarie già in programma.", "inefficace": "Suggerisce al Presidente di avviare la digitalizzazione integrale e simultanea di tutti i fascicoli ibridi attraverso l'impiego di personale aggiuntivo dedicato esclusivamente all'operazione, ritenendo che solo un intervento massivo possa risolvere in tempi rapidi il problema attuale. Infatti, considera che una transizione più graduale prolungherebbe eccessivamente la coesistenza tra cartaceo e digitale, prolungando per i Magistrati la difficoltà nella consultazione dei fascicoli ibridi."}, {"num": 164, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico presso la sezione civile di un Tribunale, propone l'implementazione di un sistema di intelligenza artificiale a supporto della redazione delle bozze di sentenze, capace di suggerire la struttura argomentativa del provvedimento sulla base del fascicolo digitale e dei precedenti della sezione. I MAGRIF si dichiarano entusiasti della proposta, ma il Presidente del Tribunale le chiede di approfondire i profili critici dell'iniziativa prima di procedere. Come si comporterebbe in questa situazione?", "efficace": "Analizza i profili critici distinguendoli per ambito: rischio di condizionamento dell'autonomia decisionale del giudice da parte dei suggerimenti automatici, protezione dei dati personali, rappresentatività dei dati utilizzati per l'addestramento e trasparenza dell'algoritmo. Poi, coinvolge il Responsabile Protezione Dati per gli aspetti di privacy e documenta per ciascun profilo le cautele da adottare. Infine, propone al Presidente una relazione strutturata per valutare se e come procedere.", "media": "Dopo aver esaminato i principali rischi associati all’impiego dei sistemi di intelligenza artificiale nel settore giuridico, decide di concentrarsi sulla verifica degli aspetti tecnici di funzionamento dell'algoritmo e sulle possibili inaccuratezze dei suggerimenti generati. Poi, segnala ai MAGRIF le criticità tecniche individuate, chiedendogli supporto per una valutazione complessiva. Sulla base delle informazioni raccolte, trasmette al Presidente una relazione sui profili tecnici esaminati.", "inefficace": "Predispone una relazione in cui evidenzia i vantaggi dell'iniziativa in termini di efficienza e standardizzazione della redazione, ridimensionando le possibili criticità come aspetti secondari risolvibili in fase di implementazione. Infatti, ritiene che l'entusiasmo dei MAGRIF sia un indicatore della validità del progetto. Dunque, sottopone al Presidente la relazione, raccomandando di procedere con una fase di sperimentazione prima di estendere l'utilizzo del sistema in tutto l'Ufficio."}, {"num": 165, "domanda": "In qualità di Addetto all'Ufficio per il Processo con profilo statistico-informatico, il Presidente del Tribunale le affida il supporto alla diffusione di un nuovo sistema di firma digitale. Nel corso dell'attività assegnatale, osserva che il personale dell'ufficio manifesta alcune resistenze: alcuni Magistrati lamentano difficoltà nell'utilizzo dei dispositivi di firma, mentre alcuni cancellieri segnalano rallentamenti operativi legati al maggior numero di passaggi richiesti per firmare ciascun atto. Come si comporterebbe in questa situazione?", "efficace": "Distingue le cause delle resistenze e le affronta separatamente con interventi mirati. Per i Magistrati, organizza sessioni di affiancamento individuale sull'utilizzo dei dispositivi di firma e predispone una guida operativa sintetica ma completa. Per i cancellieri, analizza i passaggi richiesti dal nuovo sistema e sottopone ai MAGRIF le criticità riscontrate, proponendo eventuali semplificazioni. Infine, informa il Presidente delle azioni intraprese e dei risultati attesi.", "media": "Organizza una sessione formativa comune per i Magistrati e i cancellieri sull'utilizzo del nuovo sistema di firma digitale, con l'obiettivo di rispondere alle difficoltà segnalate da entrambi i gruppi. Inoltre, segnala al Presidente le resistenze osservate, chiedendogli come procedere qualora la sessione formativa non fosse sufficiente a superarle. Al termine della formazione, raccoglie i feedback dei partecipanti per valutare l'efficacia complessiva dell'intervento .", "inefficace": "Decide autonomamente di istituire un indirizzo email dedicato, al quale il personale dell’ufficio potrà inviare le segnalazioni relative alle difficoltà riscontrate con il nuovo sistema di firma digitale, impegnandosi a monitorarne regola
