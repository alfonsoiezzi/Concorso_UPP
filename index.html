one è consolidato da anni con esito costante. Come si comporterebbe in questa situazione?", "efficace": "Mappa le settantadue cause verificando l'effettiva omogeneità per compagnia assicurativa convenuta e per questioni giuridiche ricorrenti, così da confermare la loro trattabilità in serie. Poi, predispone una proposta di calendario con tre udienze monotematiche dedicate e la sottopone al Presidente di Sezione, illustrando il beneficio che tale soluzione potrebbe apportare in termini di efficienza e uniformità decisionale. In caso di approvazione, procederà alla riorganizzazione del ruolo.", "media": "Raccoglie le informazioni essenziali sulle settantadue cause e si concentra su quelle con udienza nelle prossime settimane. Poi, segnala al Presidente di Sezione la presenza di un numero rilevante di cause seriali, suggerendo di valutare inizialmente accorpamenti per le udienze più imminenti e, nelle settimane successive, considerare la possibilità di riprogrammare anche le rimanenti. Quindi, qualora il Presidente ritenga di procedere con la riorganizzazione, si rende disponibile a supportarlo.", "inefficace": "Cita la presenza di un numero significativo di cause seriali in materia di sinistri stradali nella relazione mensile sul programmazione calendario delle udienze, destinata al Presidente di Sezione, segnalandola tra le osservazioni di carattere generale. Poi, poiché ritiene che la rilevazione concreta della serialità spetti ai Magistrati assegnatari in fase di analisi del singolo fascicolo, prosegue con la chiusura del calendario secondo l'impostazione corrente e lo trasmette nei termini ordinari."}, {"num": 78, "domanda": "In un momento di particolare pressione lavorativa, nel suo ruolo di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei riceve dal Magistrato referente l'incarico di predisporre la bozza di sentenza definitiva di una complessa controversia in materia di responsabilità contrattuale. Il Magistrato le chiede di procedere in piena autonomia nell'individuazione della soluzione giuridica da adottare, precisando che, una volta consegnatogli il testo completo, si limiterà ad una rapida lettura prima di sottoscriverlo, senza apportarvi modifiche sostanziali. Come si comporterebbe in questa situazione?", "efficace": "Intraprende lo studio del fascicolo con la consueta diligenza, ricostruendo i fatti rilevanti e gli orientamenti giurisprudenziali pertinenti. Poi, predispone una bozza articolata che evidenzia gli snodi argomentativi critici e le alternative decisionali sui punti di diritto controversi, affinché il Magistrato possa assumere consapevolmente la paternità della decisione. Infine, sottopone il testo a quest'ultimo, richiedendo un confronto approfondito sui nodi decisionali prima della sottoscrizione.", "media": "Studia approfonditamente il fascicolo e individua l'orientamento giurisprudenziale prevalente sulla questione controversa. Poi, sulla base di ciò, redige la bozza di sentenza seguendo tale impostazione e inserisce in una nota a margine alcuni dei principali passaggi argomentativi che chiede al Magistrato di validare personalmente prima della sottoscrizione. Infine, gli consegna il testo, sperando che trovi il tempo per una lettura effettiva nonostante la pressione lavorativa rappresentata.", "inefficace": "Poiché comprende la particolare pressione lavorativa del Magistrato e teme che sollevare obiezioni formali possa compromettere il rapporto fiduciario, decide di redigere autonomamente la bozza di sentenza ricorrendo alla propria preparazione giuridica e agli orientamenti giurisprudenziali individuati. Dunque, una volta terminato, consegna il testo al Magistrato segnalando unicamente che è pronto per la firma, sperando che l'esito del provvedimento non sollevi criticità in sede di impugnazione."}, {"num": 79, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei opera secondo un modello organizzativo a rotazione e, nello specifico, cura le verifiche ex art. 171-bis c.p.c. sui fascicoli di nuova iscrizione. Nella giornata odierna, le sono stati assegnati dal gestionale venti fascicoli da esaminare. Aprendo il quattordicesimo, classificato come ordinario procedimento di cognizione, si accorge che contiene un'istanza cautelare depositata da oltre tre settimane, ancora non visionata dal Magistrato assegnatario. Come si comporterebbe in questa situazione?", "efficace": "Esamina attentamente tutti gli elementi essenziali dell'istanza cautelare: parti, oggetto della richiesta ed eventuale pregiudizio allegato, così da ricostruire il quadro di urgenza. Poi, predispone una scheda riepilogativa di tali elementi e la sottopone tempestivamente al Magistrato assegnatario, segnalandogli che il deposito è stato effettuato tre settimane prima. Infine, prosegue in parallelo con le altre verifiche 171-bis per rispettare la scadenza dell'incarico.", "media": "Interrompe le verifiche e si reca dal Magistrato assegnatario per informarlo della presenza dell'istanza cautelare non ancora visionata, segnalandogli che è stata depositata tre settimane prima. Poi, gli trasmette il fascicolo affinché possa esaminarlo direttamente, rimandandone ad un momento successivo l'analisi degli elementi rilevanti. Infine, riprende le verifiche 171-bis dai fascicoli rimanenti, sperando di riuscire a completare l'incarico entro la giornata.", "inefficace": "Si attiene al proprio perimetro di lavoro e annota sulla scheda del fascicolo la presenza dell'istanza cautelare ancora da visionare, inserendola tra le osservazioni rilevate nel corso delle verifiche ex art. 171-bis. Poi, ritenendo che le verifiche sui requisiti d'urgenza di tale istanza esulino dalle proprie competenze e spettino al Magistrato assegnatario, prosegue con l'esame dei fascicoli rimanenti secondo l'ordine di assegnazione stabilito dal gestionale."}, {"num": 80, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei sta esaminando le istanze istruttorie delle parti in una causa di separazione giudiziale, in vista della decisione del Magistrato sulla loro ammissibilità. L'attrice chiede di ammettere prova testimoniale su cinque capitoli relativi al comportamento del convenuto, il quale ha formulato sui medesimi fatti capitoli di segno diametralmente opposto. Entrambe le parti hanno indicato i medesimi due testimoni, dai quali si attendono dichiarazioni di segno contrastante. Come si comporterebbe in questa situazione?", "efficace": "Esamina capitolo per capitolo le richieste delle parti, verificandone rilevanza, specificità e non esplorazione rispetto al thema decidendum. Poi, predispone per il Magistrato una scheda comparativa che raffronta i capitoli di segno opposto ed evidenzia quelli sovrapponibili, suggerendo per quest'ultimi formulazioni unitarie cosi dà evitare di interrogare i testimoni più volte sui medesimi fatti. Infine, allega una bozza di ordinanza istruttoria modulabile sulle determinazioni definitive del Magistrato.", "media": "Passa in rassegna i capitoli formulati dalle due parti, individuando la specularità delle richieste e i punti di maggiore contrasto tra le narrazioni. Poi, predispone una nota riepilogativa che illustra al Magistrato la situazione, chiedendogli indicazioni sul criterio da seguire per l'ammissione dei capitoli di prove e sulla possibilità di unificare quelli riferiti agli stessi fatti. Nel frattempo, prosegue con l'esame degli altri fascicoli, confidando in un riscontro tempestivo del Magistrato.", "inefficace": "Trascrive nella scheda preparatoria le istanze istruttorie formulate dalle parti, riportando fedelmente i capitoli di prova così come proposti dai rispettivi difensori. Poi, ritenendo che la valutazione sull'ammissibilità delle prove testimoniali e l'eventuale gestione dei capitoli contrastanti rientrino nelle prerogative esclusive del Magistrato, limita il proprio apporto alla trascrizione puntuale e completa dei capitoli e prosegue con gli altri adempimenti pre-udienza in agenda."}, {"num": 81, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, assegnato in modalità one-to-one a un Magistrato. Durante lo spoglio di un fascicolo in materia contrattuale con intervento di terzi, si accorge che uno dei soci della società convenuta è il coniuge di un avvocato difensore di una terza parte intervenuta. La circostanza, potenzialmente rilevante sotto il profilo deontologico, non risulta dichiarata dall'avvocato né dalle parti, né è stata portata a conoscenza del Magistrato. Come si comporterebbe in questa situazione?", "efficace": "Passa in rassegna in maniera sistematica tutti gli atti per ricostruire la posizione del socio della convenuta e il ruolo processuale del terzo intervenuto, così da valutare la rilevanza del potenziale conflitto di interessi. Poi, predispone una nota tecnica con i dati oggettivi raccolti e la sottopone al Magistrato, evidenziando i profili deontologici rilevanti e i possibili riflessi processuali, così da supportare il Magistrato nella sua valutazione.", "media": "Porta all'attenzione del Magistrato la circostanza emersa dallo spoglio, illustrandogli che uno dei soci della convenuta è coniuge dell'avvocato difensore di una terza parte intervenuta. Poi, gli sottopone la questione rimettendo alla sua valutazione l'opportunità di approfondire la posizione processuale del terzo. Nel frattempo, prosegue con la preparazione degli altri fascicoli, confidando che il Magistrato gli comunichi a breve eventuali verifiche da effettuare.", "inefficace": "Considera la circostanza come attinente esclusivamente alla sfera deontologica del difensore, rilevante in sede di Consiglio dell'Ordine piuttosto che in sede processuale davanti al Magistrato assegnatario. Poi, poiché ritiene che le parti processuali e i difensori siano i soggetti titolari dell'eventuale questione, prosegue con lo spoglio del fascicolo nei profili di propria competenza, limitandosi all'analisi degli elementi strettamente processuali."}, {"num": 82, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, su incarico del Presidente di Sezione ha organizzato un'udienza tematica dedicata alle opposizioni a decreti ingiuntivi per crediti bancari, fissata tra dieci giorni, con trenta cause concentrate in un'unica giornata. Dopo aver trasmesso le comunicazioni sulla data di tale udienza, però, alcuni avvocati si sono rivolti alla cancelleria lamentando difficoltà organizzative per gli studi che devono gestire più procedimenti in contemporanea e chiedono la redistribuzione nelle udienze ordinarie. Come si comporterebbe in questa situazione?", "efficace": "Rileva il numero di avvocati coinvolti e la distribuzione delle cause nella giornata, al fine di stimare la concentrazione di cause in capo ciascuno studio e le conseguenti criticità organizzative. Poi, elabora due opzioni operative realizzabili entro i dieci giorni: scaglionamento orario delle cause per fasce dedicate a ciascuno studio o suddivisione in due sessioni nella stessa settimana. Infine, sottopone la proposta al Presidente di Sezione per le sue determinazioni.", "media": "Sottopone al Presidente di Sezione le lamentele trasmesse dagli avvocati alla cancelleria, segnalandogli la richiesta di redistribuzione delle trenta cause in udienze ordinarie. Poi, rimette al Presidente ogni valutazione sull'opportunità di rivedere la configurazione attuale, mettendosi a disposizione per eventuali modifiche. Nel frattempo, chiede alla cancelleria di raccogliere maggiori dettagli sulle specifiche difficoltà segnalate dai singoli studi.", "inefficace": "Redige rapidamente un'e-mail per segnalare al Presidente di Sezione le lamentele pervenute e il rischio di possibili reclami formali da parte degli avvocati qualora le trenta cause rimangano calendarizzate in un'unica udienza tematica. Poi, ritenendo che la segnalazione appena fatta consentirà la risoluzione del problema, chiede alla cancelleria di rassicurare gli avvocati, comunicando loro che la questione è stata sottoposta al Presidente per le determinazioni del caso."}, {"num": 83, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, il Magistrato referente le affida una ricerca giurisprudenziale da consegnare entro la giornata, in vista dell'udienza di decisione fissata l'indomani. A metà del lavoro, lei scopre che la norma applicabile è stata di recente oggetto di un'ordinanza di rimessione alla Corte Costituzionale con argomentazioni pertinenti al caso, il cui esito potrebbe comportare la sospensione del giudizio. Come si comporterebbe in questa situazione?", "efficace": "Recupera l'ordinanza di rimessione alla Corte Costituzionale per verificarne gli argomenti, la rilevanza rispetto al caso e lo stato del procedimento. Poi, completa la ricerca giurisprudenziale integrando il richiamo e predispone una scheda con i profili di rilevanza per la decisione. Infine, consegna tempestivamente il materiale al Magistrato, allegando una bozza di ordinanza di sospensione ex art. 23 L. 87/1953 modulabile sulle sue determinazioni.", "media": "Richiama tempestivamente l'attenzione del Magistrato sulla scoperta, segnalandogli che la norma applicabile al caso è oggetto di un'ordinanza di rimessione pendente alla Corte Costituzionale. Poi, rimette al Magistrato la valutazione su come integrare l'elemento nella ricerca in corso e sui profili di eventuale sospensione del giudizio. Nel frattempo, completa la ricerca nella direzione originariamente impostata, pronta a rimodularla all'occorrenza.", "inefficace": "Ultima la ricerca giurisprudenziale secondo l'impostazione originariamente richiesta dal Magistrato, concludendo il lavoro entro i tempi indicati per la consegna. Successivamente, inserisce nella scheda finale una breve nota informativa sulla presenza di un'ordinanza di rimessione alla Corte Costituzionale, così che il Magistrato possa prenderne visione autonomamente. Infine, consegna il materiale entro la giornata come da incarico ricevuto."}, {"num": 84, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, assegnato in mini- pool a tre Magistrati, dopo sei mesi di lavoro si accorge che l'organizzazione attuale genera una distribuzione iniqua del carico: due Magistrati del pool le assegnano un numero di fascicoli proporzionato al suo tempo disponibile, mentre il terzo, coordinatore del pool, le assegna sistematicamente un carico doppio rispetto agli altri, con crescente difficoltà nel rispettare le scadenze. Come si comporterebbe in questa situazione?", "efficace": "Misura il volume dei fascicoli assegnati da ciascun Magistrato negli ultimi sei mesi, raccogliendo dati oggettivi sulla sproporzione riscontrata. Poi, chiede un confronto riservato al coordinatore del pool per rappresentargli la situazione, proponendogli una ridistribuzione proporzionata al tempo disponibile e un piano di lavoro sostenibile. Infine, propone di introdurre un monitoraggio periodico condiviso dei carichi per prevenire futuri squilibri.", "media": "Chiede un colloquio urgente al coordinatore del pool per rappresentargli la difficoltà nel gestire un carico doppio di fascicoli rispetto a quello che solitamente le viene assegnato dagli altri due Magistrati, descrivendo a grandi linee la situazione riscontrata e la difficoltà percepita. Poi, gli propone una riduzione delle assegnazioni future dei fascicoli, rimettendo a lui ogni valutazione su una possibile riorganizzazione sostenibile dei carichi di lavoro.", "inefficace": "Lei crede che le scelte organizzative assunte dal coordinatore rispondano ad esigenze specifiche della sezione e che, con il tempo, i carichi di lavoro si riequilibreranno spontaneamente. Pertanto, decide di accettare tutti i carichi che le verranno assegnati da ciascun Magistrato, compreso quello più oneroso del coordinatore del pool, impegnandosi al massimo delle proprie possibilità, anche leggermente oltre l'orario ordinario, per rispettare tutte le scadenze."}, {"num": 85, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nella preparazione del fascicolo per un'udienza in una causa di responsabilità medica, esamina la relazione del CTU appena depositata e rileva un errore palese: il consulente ha calcolato la percentuale di invalidità permanente applicando le tabelle INAIL per gli infortuni sul lavoro anziché le tabelle di Milano previste per la responsabilità civile, con una differenza di circa il 40% nella quantificazione del danno. Come si comporterebbe in questa situazione?", "efficace": "Raffronta le tabelle applicate dal CTU con quelle utilizzate dal Tribunale di Milano nelle cause di responsabilità medica, verificando che vi sia effettivamente un errore nel calcolo dell'invalidità. Poi, predispone una scheda tecnica contenente una descrizione di quanto riscontrato, specificando i passaggi necessari per la correzione del calcolo, e la trasmette al Magistrato con una proposta degli eventuali provvedimenti da adottare, quali chiarimenti ex art. 195 c.p.c. o supplemento di CTU.", "media": "Sottolinea nella scheda preparatoria l'errore riscontrato nella relazione del CTU, specificando che le tabelle applicate sono quelle INAIL anziché quelle del Tribunale di Milano previste per la responsabilità civile. Poi, richiede un confronto urgente con il Magistrato per portare la questione alla sua attenzione, rimettendo a lui ogni valutazione sui profili tecnici del fascicolo e sulle eventuali iniziative processuali che potrà adottare alla luce delle informazioni da lei trasmesse.", "inefficace": "Menziona tra le osservazioni tecniche rilevate, all'interno della scheda preparatoria, la circostanza emersa, sottolineando che il CTU ha utilizzato tabelle diverse da quelle del Tribunale di Milano, comunemente applicate in seno alla sezione per analoghe questioni di responsabilità medica. Poi, poiché ritiene che la valutazione della correttezza metodologica della CTU competa al Magistrato e ai consulenti tecnici di parte nel contraddittorio, archivia la scheda nel fascicolo."}, {"num": 86, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei e un collega AUP siete stati assegnati, in modalità mini-pool, al servizio di tre Magistrati: a lei spettano le verifiche preliminari ex art. 171-bis c.p.c., mentre al collega la ricerca giurisprudenziale e la predisposizione di bozze di provvedimento. Questa mattina, il Magistrato coordinatore del pool le ha comunicato che il suo collega AUP si assenterà per malattia per tre settimane e che, pertanto, le verranno riassegnati anche i suoi compiti, raddoppiandole il carico di lavoro. Come si comporterebbe in questa situazione?", "efficace": "Mappa le scadenze delle proprie attività e di quelle del collega, distinguendo quelle con termini vincolanti dalle restanti. Poi, predispone un piano di priorità per le tre settimane e lo sottopone al Magistrato coordinatore del pool, indicando le attività sostenibili in autonomia e quelle che richiederebbero un supporto temporaneo. Infine, gli chiede di valutare insieme agli altri Magistrati del pool un eventuale riequilibrio o il coinvolgimento di un altro AUP che sostituisca il collega assente.", "media": "Prende in carico i compiti del collega assente e inizia subito a lavorare, concentrandosi sulle scadenze più imminenti delle verifiche preliminari ex art. 171-bis e delle bozze di provvedimento. Successivamente, mano a mano che avanza, cerca di individuare un ritmo di lavoro sostenibile, segnalando al Magistrato coordinatore del pool le attività per le quali i tempi rischiano di dilatarsi. Nel frattempo, prosegue alternando le diverse tipologie di attività, proprie e del collega, lungo la settimana.", "inefficace": "Assicura al Magistrato coordinatore del pool la propria piena disponibilità a gestire il doppio carico di lavoro per le tre settimane indicate, confermando che cercherà di far fronte a tutti gli impegni che le verranno assegnati. Poi, poiché ritiene che la fiducia accordatale dal Magistrato coordinatore richieda un impegno all'altezza della situazione, si organizza per lavorare anche oltre il consueto orario di lavoro, mettendo in conto però che sicuramente qualche scadenza non potrà essere rispettata."}, {"num": 87, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. In sostituzione di un collega AUP assente, svolge le verifiche pre-udienza dei suoi fascicoli. Esaminandone uno, constata che la notificazione dell'atto di citazione al convenuto, eseguita quattro mesi prima, presenta un vizio grave: è stata consegnata a un vicino privo di qualifica, né familiare convivente né addetto. Il convenuto non si è costituito e il collega aveva predisposto una bozza della dichiarazione di contumacia per il Magistrato assegnatario. L'udienza è prevista per domani alle 9:00. Come si comporterebbe in questa situazione?", "efficace": "Rilegge con cura la relata di notifica per confermare la natura del vizio, verificando l'assenza di qualifica del ricevente e le condizioni di cui all'art. 139 c.p.c. Poi, predispone una scheda tecnica con il rilievo e una bozza di ordinanza di rinnovazione ex art. 291 c.p.c., in sostituzione della bozza di contumacia. Infine, sottopone il materiale al Magistrato prima dell'udienza, descrivendo la criticità riscontrata e la correzione apportata.", "media": "Pone all'attenzione del Magistrato il vizio riscontrato nella notifica, descrivendogli che è stata consegnata ad un vicino di casa del convenuto, privo di qualifica per la ricezione, e che la bozza di dichiarazione di contumacia predisposta dal collega assente non può essere adoperata nel caso di specie. Poi, rimette al Magistrato ogni valutazione sulla rinnovazione della notifica e prosegue con le verifiche sugli altri fascicoli del collega.", "inefficace": "Mette in luce al Magistrato l'errore commesso dal collega assente, sottolineando come la bozza di dichiarazione di contumacia sia stata predisposta ignorando il vizio di notifica, con il rischio di determinare una contumacia illegittima. Poi, si dichiara disponibile a segnalare l'accaduto al collega assente affinché possa prendere consapevolezza della svista di cui è responsabile e, in futuro, presti maggiore attenzione durante le verifiche preliminari sui fascicoli."}, {"num": 88, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, prende in carico il fascicolo di una causa complessa seguita in precedenza da un collega AUP ora trasferito. In preparazione all'udienza fissata tra due giorni, esaminando gli atti scopre sette istanze depositate dalle parti negli ultimi tre mesi, aventi ad oggetto proroghe di termini, acquisizioni documentali e rinvii d'udienza, rimaste ferme nel fascicolo e mai sottoposte al Magistrato. Come si comporterebbe in questa situazione?", "efficace": "Passa al vaglio le sette istanze classificandole per tipologia, data di deposito e attualità, distinguendo quelle ancora rilevanti da quelle eventualmente scadute. Poi, predispone una scheda analitica per il Magistrato con una proposta di provvedimento per ciascuna istanza ancora valida, partendo da quelle con scadenze più stringenti. Infine, trasmette tempestivamente il materiale elaborato al Magistrato, segnalando la necessità di intervenire con urgenza.", "media": "Segnala tempestivamente al Magistrato che, esaminando un fascicolo assegnato in origine ad un altro collega ormai trasferitosi, ha rilevato sette istanze rimaste inevase da circa tre mesi, precisando che la loro mancata trattazione è dipesa da un mero disguido organizzativo. Propone quindi di procedere alla loro lavorazione in ordine cronologico, a partire dalle più risalenti fino alle più recenti, offrendosi di iniziare subito a curarne gli adempimenti più urgenti.", "inefficace": "Riferisce al Magistrato che sette istanze sono rimaste inevase e, dopo avergli consegnato il fascicolo di appartenenza di tali atti, gli precisa che la responsabilità di tale mancanza è addebitabile al precedente collega assegnatario del fascicolo, ormai trasferitosi. Poi, chiede al Magistrato di indicargli come procedere con ciascuna istanza e con quali priorità, ritenendo che la valutazione dei profili di merito spetti esclusivamente alla sua discrezionalità."}, {"num": 89, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Nello spoglio pre- udienza di un fascicolo, lei rileva che l'atto di citazione presenta due vizi: uno riguardando l'editio actionis per la mancata indicazione dei fatti costitutivi della domanda e l'altro relativo alla vocatio in ius per il termine a comparire inferiore al minimo legale. Inoltre, lei si accorge che manca anche l'indicazione del valore della causa. L'udienza è fissata tra tre giorni e il convenuto si è regolarmente costituito senza eccepire alcun vizio. Come si comporterebbe in questa situazione?", "efficace": "Distingue i tre profili alla luce dell'art. 164 c.p.c.: considera sanato il vizio della vocatio in ius per effetto della costituzione del convenuto, approfondisce la rilevanza del vizio dell'editio actionis e verifica i riflessi della mancata indicazione del valore sulla competenza. Poi, descrive all'interno di una nota l'analisi appena effettuata e la trasmette al Magistrato con anticipo rispetto all'udienza, affinché possa esaminarla e prendere le decisioni del caso.", "media": "Evidenzia al Magistrato i tre vizi riscontrati nell'atto di citazione, specificando che ciascuno di essi richiede una sua valutazione specifica. Pertanto, gli consegna una copia dell'atto di citazione e rimette a lui ogni decisione in merito alle azioni necessarie da intraprendere per garantire la regolarità del contraddittorio, limitandosi a segnalargli esclusivamente che la costituzione del convenuto potrebbe aver già sanato il vizio della vocatio in ius.", "inefficace": "Registra sinteticamente nella scheda preparatoria i tre vizi rilevati nell'atto di citazione, qualificandoli come profili di nullità ormai superati dalla condotta processuale del convenuto. Infatti, partendo dal presupposto che la sanatoria sia integralmente avvenuta per effetto della costituzione del convenuto e che il contraddittorio risulti regolare, considera conclusa l'analisi sul punto e completa la scheda con i profili di merito rilevanti per l'udienza."}, {"num": 90, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Durante una deposizione testimoniale che lei sta verbalizzando, il testimone, che fino a quel momento aveva risposto in italiano, chiede improvvisamente di poter proseguire nella propria lingua madre, il rumeno, manifestando difficoltà nella comprensione del linguaggio tecnico utilizzato nei capitoli di prova. Non è presente alcun interprete e né il Magistrato né i difensori parlano rumeno. Come si comporterebbe in questa situazione?", "efficace": "Formalizza a verbale la dichiarazione del testimone sulla difficoltà linguistica evidenziata, riportando fedelmente le sue parole fino al momento dell'interruzione. Poi, d'accordo con il Magistrato sulla necessità di trovare urgentemente un interprete, si offre di consultare subito l'elenco dei periti del Tribunale alla ricerca di un traduttore di lingua rumena e di contattarlo. Se non dovesse trovare qualcuno di disponibile entro breve, suggerirà al Magistrato di rinviare l'udienza.", "media": "Mette a verbale la dichiarazione del testimone ed esprime al Magistrato il timore che possa risultare difficile trovare un interprete in tempo utile. Per scrupolo, contatta comunque la cancelleria, chiedendo se possano fornirle subito il contatto di un interprete di lingua rumena certamente disponibile al momento, affinché prenda parte all'udienza in qualità di traduttore. In caso di esito negativo, informerà il Magistrato e rimetterà a lui ogni valutazione sul prosieguo.", "inefficace": "Documenta nel verbale d'udienza la dichiarazione del testimone sulla difficoltà linguistica e la richiesta di proseguire in rumeno, limitandosi a verbalizzare quanto dichiarato. Poi, attende le determinazioni del Magistrato sulla gestione della situazione, ritenendo che la nomina dell'interprete rientri nella discrezionalità giudiziale del Magistrato. Dunque, per il momento, rimane nella propria postazione pronto a riprendere la verbalizzazione quando l'udienza riprenderà."}, {"num": 91, "domanda": "Lei è Addetto all’Ufficio per il Processo presso la sezione civile di un Tribunale. Al termine di un’udienza particolarmente intensa, nel corso della quale sono stati trattati diciotto fascicoli, mentre sta completando il verbale della quattordicesima causa si accorge che un provvedimento adottato oralmente dal Magistrato, ovvero la nomina di un CTU con fissazione dei termini per il conferimento dell’incarico, non è stato verbalizzato da parte sua poiché, nello stesso momento, lei era impegnato nella ricerca del fascicolo successivo. Il Magistrato ha già lasciato l’aula. Come si comporterebbe in questa situazione?", "efficace": "Verifica preliminarmente che il provvedimento non sia stato erroneamente inserito in un altro fascicolo telematico della giornata. Appurata la mancanza, rintraccia immediatamente il Magistrato per telefono o recandosi nella sua stanza e, dopo essersi confrontato con lui, predispone una bozza di integrazione al verbale da sottoporre alla sua sottoscrizione. Infine, si coordina con la cancelleria per le comunicazioni conseguenti al CTU e alle parti.", "media": "Raggiunge il Magistrato nella sua stanza per riferirgli l'omissione del provvedimento di nomina del CTU nel verbale appena redatto, scusandosi per la mancata verbalizzazione durante la trattazione. Poi, rimette al Magistrato ogni valutazione sulle corrette modalità di integrazione del verbale e sui passi da compiere, assumendosi la piena responsabilità dell'errore commesso e impegnandosi personalmente a prestare maggiore attenzione nelle prossime udienze.", "inefficace": "Aggiunge a mano nel verbale il provvedimento di nomina del CTU e la fissazione dei termini, riportando le parole che ricorda, a grandi linee, essere state pronunciate dal Magistrato durante la trattazione del dodicesimo fascicolo. In seguito, ritenendo che l'integrazione corrisponda fedelmente a quanto disposto oralmente dal Magistrato, completa il verbale e lo trasmette alla cancelleria, confidando che l'episodio si esaurisca con la correzione apportata."}, {"num": 92, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, durante la verbalizzazione di un'udienza, uno dei difensori deposita un documento dichiarandolo \"di nuova formazione\", in quanto datato tre giorni prima, e come tale non soggetto ai termini decadenziali per i depositi documentali. Esaminando nel dettaglio tale documento, lei nota che il suo contenuto richiama integralmente un documento risalente a sei mesi prima, circostanza che rende quantomeno dubbia la qualificazione dichiarata dal difensore. Come si comporterebbe in questa situazione?", "efficace": "Verbalizza con precisione il deposito del documento e la dichiarazione di \"nuova formazione\" resa dal difensore, annotandone data e riferimenti. Successivamente, alla prima pausa utile, si avvicina con discrezione al Magistrato, riassumendogli che il contenuto di tale documento risulta identico a quello di un atto depositato sei mesi prima. Infine, si offre di predisporre un prospetto di raffronto tra i due atti al termine dell'udienza.", "media": "Effettua la verbalizzazione del deposito del documento e della dichiarazione di nuova formazione resa dal difensore. Poi, al termine dell'udienza, raggiunge il Magistrato per riferirgli brevemente che il contenuto del documento appena depositato sembra corrispondere a quello di un atto risalente a sei mesi prima, rimettendogli ogni valutazione sulla rilevanza della questione. Quindi, si rende disponibile a un eventuale approfondimento richiesto dal Magistrato.", "inefficace": "Dà atto del deposito del documento e della dichiarazione di nuova formazione resa dal difensore, riportandone gli estremi nel verbale d'udienza. Successivamente, persuaso del fatto che la valutazione sull'autenticità della dichiarazione e sulla portata del contenuto non le competano, si limita a rileggere autonomamente entrambi i documenti per rispondere ad eventuali domande nel caso in cui il Magistrato dovesse richiedere la sua opinione in merito."}, {"num": 93, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, nell'effettuare le comunicazioni post-udienza, trasmette via PEC la sentenza ai difensori delle parti. Il giorno successivo, un avvocato contatta l'ufficio segnalando di aver ricevuto per errore il provvedimento di un procedimento di cui non è difensore, contenente dati personali e processuali di parti terze. Verificando, lei constata di aver inviato la comunicazione ad un indirizzo PEC sbagliato per un errore di copia-incolla. Come si comporterebbe in questa situazione?", "efficace": "Verifica le comunicazioni PEC inviate nella giornata di ieri per accertare l'assenza di analoghi errori di destinatario. Poi, contatta il legale a cui è stata erroneamente trasmessa la comunicazione, chiedendogli di non divulgare il documento e, contestualmente, trasmette la sentenza al difensore corretto. Infine, redige una relazione dell'incidente per il Dirigente e il Responsabile Protezione Dati, proponendo una doppia verifica dei destinatari prima dell'invio.", "media": "Scrive una PEC al legale a cui è stata erroneamente trasmessa la comunicazione per scusarsi dell'accaduto. Poi, trasmette la sentenza all'indirizzo del difensore corretto e accenna brevemente l'accaduto al Dirigente, sottolineando che cercherà di impegnarsi per non ripetere un simile errore in futuro. Infine, sperando che la comunicazione trasmessa per errore sia stata eliminata e che la questione possa dirsi chiusa, prosegue con le altre comunicazioni post-udienza.", "inefficace": "Dato che l'accaduto interessa una potenziale violazione di dati personali e che la gestione degli aspetti privacy richiede competenze specifiche, si rivolge immediatamente al Dirigente esponendogli l'errore di trasmissione commesso. Poi, poiché lei ritiene di non poter gestire la situazione in autonomia, chiede al Dirigente di coordinare personalmente l'interlocuzione con il legale a cui è stata erroneamente inviata la comunicazione e l'invio al difensore corretto."}, {"num": 94, "domanda": "Lei è Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale e gestisce il ruolo delle udienze. Nelle verifiche pre-udienza su sedici fascicoli seriali in materia di locazione commerciale, si accorge che in tre di essi non risulta documentato il previo esperimento della mediazione obbligatoria, condizione di procedibilità per tali controversie. Le udienze sono fissate nei prossimi giorni e i fascicoli erano stati predisposti da un suo collega AUP, attualmente in malattia, che aveva omesso di effettuare tale verifica. Come si comporterebbe in questa situazione?", "efficace": "Riesamina i tre fascicoli per accertare se la documentazione della mediazione sia stata eventualmente archiviata in altra posizione del PCT. Appurata l'effettiva omissione, predispone per ciascun fascicolo una bozza di ordinanza di assegnazione del termine per la mediazione ex art. 5 D.Lgs. 28/2010. Infine, sottopone le bozze al Magistrato, segnalandone l'urgenza, e propone di effettuare sistematicamente controlli doppi sul corretto svolgimento della mediazione obbligatoria nelle cause interessate.", "media": "Mostra subito al Magistrato i tre fascicoli in materia di locazione commerciale nei quali manca la documentazione sulla mediazione obbligatoria, segnalandogli che l'omissione riscontrata è particolarmente urgente dal momento che le relative udienze sono previste tra pochi giorni. Poi, rimette al Magistrato ogni valutazione sulle modalità di integrazione processuale corretta da adottare e sulle eventuali azioni che sarà necessario intraprendere tempestivamente in funzione delle sue determinazioni.", "inefficace": "Contrassegna nella scheda preparatoria di ciascuno dei tre fascicoli l'assenza della documentazione relativa alla mediazione obbligatoria, inserendola tra le osservazioni tecniche rilevate nel corso delle verifiche. In seguito, poiché ritiene che la rilevazione della condizione di procedibilità in sede di prima udienza rientri nelle attribuzioni esclusive del Magistrato, prosegue con le verifiche preliminari necessarie degli altri tredici fascicoli seriali in materia di locazione commerciale."}, {"num": 95, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, deve trasmettere alla Corte d'Appello il fascicolo di una causa di antica iscrizione a ruolo in cui è stato proposto appello. Nel preparare il fascicolo, riscontra diverse discrepanze: tre verbali di udienza sono presenti nel cartaceo ma non nel sistema telematico, la relazione del CTU figura solo nel telematico e due memorie risultano archiviate con un nome file non corrispondente al contenuto, probabilmente a causa di un errore di caricamento della cancelleria. Come si comporterebbe in questa situazione?", "efficace": "Cataloga le discrepanze tra fascicolo cartaceo e telematico, distinguendo per ciascun elemento il tipo di intervento necessario: caricamento dei verbali nel PCT, inserimento cartaceo della CTU e rinominazione dei file relativi alle memorie. Poi, si coordina con la cancelleria per integrare e correggere entrambe le versioni del fascicolo, affinché risultino entrambe complete. Infine, effettua una verifica finale della coerenza tra cartaceo e telematico e ne predispone la trasmissione.", "media": "Stila un breve elenco delle discrepanze riscontrate, da trasmettere alla cancelleria perché provveda alle correzioni necessarie nelle rispettive versioni, cartacea e telematica, del fascicolo. Una volta completato, insieme all'elenco, trasmette alla cancelleria una nota in cui segnala la necessità di provvedere con urgenza al caricamento dei tre verbali mancanti nel sistema telematico, e procedere secondo i loro ordinari tempi di lavorazione alla correzioni e alle integrazioni rimanenti.", "inefficace": "Provvede a trasmettere il fascicolo alla Corte d'Appello nello stato attuale, ritenendo che la correzione delle discrepanze tecniche tra cartaceo e telematico rientri nelle attribuzioni ordinarie della cancelleria e che la Corte destinataria possa richiederle direttamente in caso di necessità. Poi, per evitare che simili omissioni ed errori si ripetano, invia una e-mail alla cancelleria segnalando le discrepanze riscontrate e la necessità di procedere con maggiore attenzione in futuro."}, {"num": 96, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, durante un'udienza in una causa di responsabilità medica complessa, il Magistrato adotta un'ordinanza istruttoria articolata che comprende la nomina del CTU con quesiti estesi, termini multipli per deposito di relazione e osservazioni di parte e fissazione dell'udienza di verifica. Lei fatica a verbalizzarla integralmente per la velocità della dettatura e la complessità tecnica, accorgendosi di aver perso alcuni elementi. Come si comporterebbe in questa situazione?", "efficace": "Interviene cortesemente durante la dettatura chiedendo al Magistrato di rallentare o ripetere i passaggi sfuggiti, in particolare sui termini processuali e sui quesiti al CTU. Al termine dell'udienza, sottopone il verbale al Magistrato per una rilettura congiunta prima della sottoscrizione, verificando la corrispondenza con l'ordinanza dettata. Infine, propone di valutare l'adozione di un sistema di registrazione fonografica per future ordinanze istruttorie complesse.", "media": "Chiude la verbalizzazione riportando quanto è riuscito a cogliere dell'ordinanza dettata dal Magistrato. Poi, al termine dell'udienza, si avvicina a quest'ultimo, segnalandogli di aver faticato a trascrivere alcuni passaggi per la velocità con la quale sono stati comunicati e gli chiede di rileggere il verbale per verificarne la correttezza. Infine, attende che il Magistrato le segnali eventuali integrazioni necessarie prima di procedere alla sottoscrizione del documento.", "inefficace": "Colma le parti mancanti del verbale ricostruendo i passaggi sfuggiti sulla base dei propri appunti e della memoria dell'udienza, integrando in particolare i termini processuali e i quesiti al CTU secondo quanto ritiene di aver sentito dettare. Successivamente, rilegge il verbale per verificarne la fluidità e lo sottopone al Magistrato per la sottoscrizione, confidando che il testo corretto sulla base del proprio ricordo corrisponda sostanzialmente all'ordinanza adottata."}, {"num": 97, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei sta effettuando gli adempimenti di pubblicazione di dieci sentenze depositate dal Magistrato nella stessa giornata. Durante il caricamento nel sistema informatico, si accorge che due sentenze riportano lo stesso numero di ruolo generale e che tale numero non corrisponde a nessuna delle due cause decise, bensì ad un terzo fascicolo tuttora pendente. Come si comporterebbe in questa situazione?", "efficace": "Sospende il caricamento delle due sentenze e ricostruisce, attraverso l'analisi del loro contenuto in termini di parti, oggetto e fatti, a quale fascicolo ciascuna si riferisca effettivamente, identificando i numeri di R.G. corretti. Poi, si reca dal Magistrato per esporgli la situazione e proporgli la rettifica formale del numero di ruolo. Infine, ricevute le correzioni, riprende il caricamento delle due sentenze rettificate e completa quello delle restanti otto.", "media": "Avvisa il Magistrato dell'errore riscontrato sul numero di ruolo generale delle due sentenze, segnalandogli che il numero riportato corrisponde ad un fascicolo pendente diverso da quelli cui ineriscono le due cause decise. Poi, rimette al Magistrato ogni valutazione sulla natura dell'errore e sulle modalità di correzione da adottare. Quindi, sospende il caricamento in attesa delle sue indicazioni e si rende disponibile a supportarlo nelle rettifiche necessarie.", "inefficace": "Blocca il caricamento delle due sentenze recanti il numero di ruolo generale errato, inserendole in una cartella separata, in attesa delle opportune verifiche di competenza sull'origine dell'errore. Poi, poiché ritiene che la correzione delle anomalie spetti alla cancelleria, resta a disposizione per supportarla nell'apportare le eventuali rettifiche che verranno disposte dal Magistrato e procede con il caricamento delle rimanenti otto sentenze regolari."}, {"num": 98, "domanda": "In qualità di addetto all’Ufficio per il Processo presso la sezione civile di un Tribunale, durante l’esame di un fascicolo si trova a valutare un procedimento nel quale il convenuto era stato dichiarato contumace tre udienze prima. Verificando le PEC più recenti, lei rileva che, due settimane prima, il convenuto si è costituito tardivamente mediante comparsa di risposta, chiedendo di essere rimesso in termini per proporre eccezioni processuali. Il deposito risulta nel sistema, ma non è mai stato portato all’attenzione del Magistrato. Come si comporterebbe in questa situazione?", "efficace": "Esamina la comparsa di costituzione tardiva e l’istanza di rimessione in termini ex art. 153 c.p.c., ricostruendo le motivazioni addotte dal convenuto e le eccezioni sollevate. Quindi, verifica lo stato del fascicolo e l’eventuale udienza già fissata. Poi, sottopone al Magistrato una scheda riepilogativa contenente gli estremi del deposito, le ragioni della tardività e le possibili soluzioni processuali, quali la fissazione di un’udienza ad hoc o la concessione di un termine all’attore per controdedurre.", "media": "Mette al corrente il Magistrato della comparsa di risposta tardiva depositata dal convenuto due settimane prima, segnalandogli l'istanza di rimessione in termini contestualmente proposta dalla stessa parte e riportando sinteticamente le eccezioni che il convenuto intende sollevare. Poi, rimette al Magistrato ogni valutazione sull'ammissibilità dell'istanza e sulle conseguenze processuali della costituzione tardiva, restando in attesa delle sue indicazioni per procedere con le comunicazioni alle parti.", "inefficace": "Allega alla scheda preparatoria del fascicolo la comparsa di risposta tardiva e l'istanza di rimessione in termini proposta dal convenuto, qualificandole come atti da sottoporre al Magistrato in occasione della prossima udienza utile. Poi, poiché ritiene che la valutazione sull'ammissibilità della rimessione ex art. 153 c.p.c. sia questione riservata alla discrezionalità del Magistrato, completa la scheda con le ordinarie annotazioni e prosegue con lo spoglio degli altri fascicoli in vista dell'udienza."}, {"num": 99, "domanda": "Da qualche mese, lei opera come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Collaborando con i colleghi AUP della stessa sezione, si accorge che ciascuno mantiene un proprio file Excel per monitorare lo stato dei fascicoli assegnati, duplicando di fatto informazioni già presenti nel registro SICID. Ne derivano frequenti incongruenze tra i dati e la difficoltà di disporre di un quadro aggiornato e unitario dell'attività della sezione. Come si comporterebbe in questa situazione?", "efficace": "Effettua una ricognizione dei file in uso, individuando quali dati ciascun collega registra e quali siano già presenti nel SICID. Sulla base dell'analisi, progetta un unico strumento condiviso che integri i soli dati aggiuntivi rispetto al registro, eliminando le duplicazioni. Quindi, sottopone la proposta al Presidente di Sezione, illustrandone i vantaggi in termini di coerenza e monitoraggio, e propone di adottarlo come prassi standard per tutti gli AUP della sezione.", "media": "Si confronta con i colleghi, proponendo di unificare i diversi file Excel in un unico documento condiviso per ridurre le incongruenze più frequenti. Quindi, predispone un foglio comune con le informazioni principali sui fascicoli in gestione. Tuttavia, rimanda a un momento successivo la verifica delle sovrapposizioni con il SICID, augurandosi che il foglio condiviso sia sufficiente a migliorare il quadro complessivo e che ulteriori affinamenti emergano dalla pratica.", "inefficace": "Riorganizza il proprio file Excel, aggiornandolo con i dati più recenti e curandone la corrispondenza con il registro SICID, così da garantire la massima accuratezza nella gestione dei propri fascicoli. Poi, prosegue con le attività in programma, reputando che la gestione degli strumenti di monitoraggio sia una scelta individuale di ciascun collega e che spetti al Presidente di Sezione intervenire qualora ritenga necessario uniformare le modalità operative degli addetti."}, {"num": 100, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale, lei rileva che, nonostante l'introduzione del sistema TIAP per la digitalizzazione degli atti penali, gran parte della sezione continua a gestire i fascicoli esclusivamente in formato cartaceo, rallentando sia la consultazione degli atti sia la trasmissione dei documenti tra uffici. La resistenza al cambiamento sembra alimentata dalle perplessità di alcuni colleghi sull'affidabilità del sistema digitale. Come si comporterebbe in questa situazione?", "efficace": "Approfondisce le perplessità dei colleghi sul TIAP, raccogliendo le criticità specifiche da essi riscontrate. Intanto, utilizza il sistema sui propri fascicoli, documentando i vantaggi concreti in termini di consultazione e trasmissione degli atti. Quindi, presenta al Presidente di Sezione i risultati ottenuti con una proposta di adozione graduale, suggerendo una fase pilota su un gruppo ristretto di procedimenti e offrendosi di affiancare i colleghi nella transizione.", "media": "Prova a utilizzare il TIAP sui propri fascicoli per verificare di persona se i dubbi dei colleghi siano fondati. Nei giorni successivi, condivide con loro i risultati, mostrando le funzionalità che ha trovato più utili nel lavoro quotidiano. Tuttavia, rimanda a un momento successivo il coinvolgimento del Presidente di Sezione, augurandosi che la propria esperienza diretta sia sufficiente a convincere i colleghi ad avvicinarsi gradualmente allo strumento digitale.", "inefficace": "Consulta la documentazione tecnica del TIAP, annotando le funzionalità principali e le possibili criticità operative. Tuttavia, prosegue con la gestione cartacea dei fascicoli, persuaso che la transizione al digitale debba essere avviata dalla dirigenza con un piano formativo adeguato. Qualora il Presidente dovesse sollecitare l'adozione del sistema, metterà volentieri a disposizione le proprie annotazioni tecniche per contribuire alla pianificazione del passaggio."}, {"num": 101, "domanda": "Da un mese lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Dopo aver partecipato a un corso di formazione telematica sulle nuove funzionalità del Processo Civile Telematico, si rende conto che le competenze acquisite potrebbero essere utili ad altri colleghi della sezione. Tuttavia, non esiste alcun canale strutturato per condividere quanto appreso e la formazione rischia di restare un patrimonio individuale, riservato esclusivamente ai neoassunti. Come si comporterebbe in questa situazione?", "efficace": "Organizza gli appunti del corso in una guida operativa sulle nuove funzionalità del PCT, selezionando i contenuti più rilevanti per il lavoro della sezione. Quindi, propone al Dirigente un breve incontro con i colleghi per illustrare le novità e rispondere ai loro dubbi. Infine, suggerisce di istituire un canale interno per la condivisione delle competenze acquisite nei corsi futuri, così da trasformare la formazione individuale in un patrimonio collettivo della sezione.", "media": "Prepara un riepilogo dei contenuti del corso e lo invia ai colleghi della sezione tramite posta elettronica, allegando i propri appunti sulle funzionalità più rilevanti del PCT. Quindi, segnala al Dirigente che la sezione non dispone di un canale strutturato per la condivisione formativa, chiedendogli se ritenga opportuno intervenire sulla questione. Infine, attende un suo riscontro, ritenendo prematuro avanzare proposte concrete dopo un solo mese di servizio.", "inefficace": "Annota i contenuti del corso nei propri appunti, organizzandoli con cura per poterli consultare agevolmente nel lavoro quotidiano. Poi, torna a dedicarsi ai fascicoli assegnati, reputando che la diffusione delle competenze acquisite nei percorsi formativi sia una responsabilità della struttura organizzativa e che un addetto in servizio da appena un mese non sia nella posizione più adatta per proporre iniziative formative rivolte ai colleghi più esperti della sezione."}, {"num": 102, "domanda": "Lei ha preso servizio come Addetto all'Ufficio per il Processo presso la sezione civile di una Corte d'Appello. Gestendo il transito dei fascicoli provenienti dai Tribunali di primo grado, scopre che le componenti digitali degli atti pervenuti risultano frequentemente trasmesse in formati non compatibili con il sistema gestionale della corte. Ciò costringe il personale a reinserire manualmente i dati, rallentando significativamente la fase di spoglio dei procedimenti. Come si comporterebbe in questa situazione?", "efficace": "Cataloga le incompatibilità riscontrate, identificando i formati problematici e i Tribunali coinvolti con maggiore frequenza. Intanto, verifica con il referente informatico se esistano strumenti di conversione automatica per ridurre il reinserimento manuale dei dati. Quindi, sottopone al Presidente una relazione con le criticità rilevate e la proposta di concordare con i Tribunali interessati standard di trasmissione compatibili con il gestionale della corte.", "media": "Verifica quali fascicoli presentano le incompatibilità più frequenti, concentrandosi sui procedimenti con udienze imminenti per garantirne la tempestiva lavorazione. Poi, segnala al Presidente di Sezione la criticità riscontrata, chiedendogli se ritenga opportuno intervenire presso i Tribunali di provenienza. Nel frattempo, continua a reinserire manualmente i dati sui fascicoli urgenti, in attesa di indicazioni su come gestire la questione in modo strutturale.", "inefficace": "Redige una nota dettagliata per il Dirigente amministrativo in cui descrive il problema di compatibilità dei formati, chiedendogli di coinvolgere il servizio informatico per identificare una soluzione adeguata. Poi, riprende la lavorazione dei fascicoli già pervenuti, convinto che una criticità di natura informatica esuli dalle proprie competenze e richieda l'intervento di personale tecnico specializzato, a cui spetti individuare e implementare i correttivi necessari."}, {"num": 103, "domanda": "Lavorando come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei scambia frequentemente con il Magistrato di riferimento le bozze dei provvedimenti tramite allegati e-mail. Con il passare delle settimane, si accorge che la circolazione di molteplici versioni dello stesso documento genera confusione, poiché non sempre è chiaro quale sia quella più aggiornata. In un caso, il Magistrato ha firmato una bozza vecchia anziché quella definitiva. Come si comporterebbe in questa situazione?", "efficace": "Segnala tempestivamente al Magistrato l'errore sul provvedimento firmato e predispone la versione corretta per la rettifica. Quindi, gli propone di sostituire lo scambio via e-mail con una cartella condivisa dotata di una regola di denominazione che includa data e numero progressivo, rendendo sempre riconoscibile il documento aggiornato. Infine, suggerisce di estendere la procedura ai colleghi della sezione per prevenire il ripetersi di errori analoghi.", "media": "Contatta il Magistrato per informarlo dell'errore e gli sottopone la versione corretta del provvedimento. Poi, propone di adottare una convenzione per i nomi dei file, aggiungendo la data di ultima modifica a ciascun documento trasmesso via e-mail, rimandando a un momento successivo l'eventuale ricerca di uno strumento più efficace rispetto alla posta elettronica. Infatti, confida che la nuova denominazione sia sufficiente a evitare disguidi nello scambio delle bozze.", "inefficace": "Corregge l'errore individuato, predisponendo la versione aggiornata del provvedimento e trasmettendola al Magistrato con una breve nota di accompagnamento. Dopodiché, torna a lavorare con le modalità consuete, persuaso che l'episodio sia riconducibile a una semplice svista occasionale piuttosto che a un difetto nel metodo di lavoro. Qualora disguidi simili dovessero ripresentarsi, provvederà a evidenziare nell'oggetto dell'e-mail la dicitura della versione trasmessa."}, {"num": 104, "domanda": "Da alcuni mesi lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Effettuando lo scarico dell'udienza nel sistema informatico, scopre che le comunicazioni generate automaticamente via PEC contengono modelli testuali obsoleti, con riferimenti normativi non aggiornati alla riforma del processo civile. Diversi difensori hanno già segnalato alla cancelleria perplessità sul contenuto di tali comunicazioni. Come si comporterebbe in questa situazione?", "efficace": "Individua i modelli con riferimenti normativi superati, predisponendo un prospetto che accosti a ciascuno il riferimento aggiornato dalla riforma. Quindi, si coordina con la cancelleria per raccogliere le segnalazioni dei difensori e verificare quali comunicazioni siano già partite con i testi obsoleti. Infine, sottopone al Dirigente il prospetto con le correzioni proposte, suggerendo una revisione periodica dei modelli a ogni aggiornamento normativo rilevante.", "media": "Confronta i modelli delle comunicazioni PEC con le disposizioni introdotte dalla riforma, annotando le discrepanze più evidenti nei riferimenti normativi. Quindi, trasmette le proprie osservazioni alla cancelleria, segnalandole le perplessità già espresse dai difensori e chiedendole di valutare un aggiornamento dei testi. Intanto, prosegue con lo scarico delle udienze in programma, augurandosi che la cancelleria provveda alla correzione dei modelli in tempi ragionevoli.", "inefficace": "Sollecita la cancelleria ad aggiornare i modelli, facendo presente che i riferimenti normativi obsoleti hanno già generato lamentele da parte dei difensori e che è urgente intervenire per tutelare la credibilità dell'ufficio. Poi, informa il Presidente di Sezione dell'accaduto, menzionando che la cancelleria era già al corrente del problema tramite le segnalazioni ricevute e rimettendo a lui ogni ulteriore determinazione sulle misure correttive da adottare."}, {"num": 105, "domanda": "Durante il suo lavoro come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei rileva che le schede preparatorie dei fascicoli vengono scambiate tra AUP e Magistrati tramite cartelle condivise prive di protezione. I file non prevedono restrizioni di accesso né registrano le modifiche apportate, creando rischi sia per la riservatezza delle informazioni processuali sia per l'integrità dei documenti. Come si comporterebbe in questa situazione?", "efficace": "Esamina la configurazione delle cartelle condivise, mappando chi vi ha accesso e quali dati sensibili risultano esposti. Intanto, verifica con il referente informatico la possibilità di attivare restrizioni di accesso e un registro delle modifiche. Quindi, presenta al Dirigente le criticità rilevate con una proposta che preveda permessi differenziati e tracciamento automatico, proponendo di adottarla come standard per lo scambio delle schede nella sezione.", "media": "Attiva la protezione con password sui propri file e abilita il tracciamento delle revisioni nei documenti che condivide con il Magistrato, per ridurre i rischi immediati. Quindi, segnala la vulnerabilità al Dirigente, descrivendogli le criticità riscontrate nelle cartelle condivise e chiedendogli se ritenga opportuno coinvolgere il referente informatico. Tuttavia, lascia che sia il Dirigente a decidere tempi e modalità dell'intervento, ritenendo la questione di sua competenza.", "inefficace": "Dedica particolare attenzione al salvataggio delle proprie versioni, assicurandosi di nominare i file in modo univoco per distinguerli da quelli dei colleghi nelle cartelle condivise. Del resto, è convinto che la protezione dei dati e la configurazione degli strumenti informatici rientrino nelle competenze esclusive del servizio informatico, a cui spetta garantire la sicurezza e il corretto funzionamento delle piattaforme messe a disposizione dell'ufficio."}, {"num": 106, "domanda": "Operando come Addetto all'Ufficio per il Processo con funzioni statistico-informatiche presso un Tribunale, lei analizza la base dati del registro SICID e individua numerosi procedimenti ancora risultanti come pendenti benché siano stati di fatto definiti, generando cosiddette «false pendenze» che alterano i dati per la rendicontazione degli obiettivi PNRR. Tuttavia, non esiste una procedura sistematica per individuare e correggere queste anomalie nei registri informatici. Come si comporterebbe in questa situazione?", "efficace": "Elabora criteri oggettivi per distinguere le false pendenze dai procedimenti effettivamente in corso, incrociando nel SICID i dati su date di definizione, esiti e stato degli adempimenti. Quindi, applica tali criteri all'intera base dati, quantificando le anomalie per sezione. Infine, sottopone alla Presidenza una proposta di procedura sistematica per l'epurazione periodica del registro, includendo un calendario di verifiche ricorrenti a presidio dell'affidabilità dei dati.", "media": "Avvia una ricognizione della base dati, concentrandosi sui procedimenti più datati che presentano segnali evidenti di avvenuta definizione, come la presenza di una sentenza già pubblicata. Poi, corregge le anomalie individuate e predispone un report per la Presidenza, informandola dell'entità del fenomeno. Tuttavia, rimanda l'elaborazione di una procedura stabile di controllo, ritenendo opportuno prima verificare se le correzioni apportate si rivelino durature nel tempo.", "inefficace": "Inserisce i dati estratti dal SICID nei report periodici così come risultano dal sistema, ritenendo che la base dati ufficiale costituisca la fonte di riferimento per la rendicontazione. Poi, si dedica alle altre elaborazioni statistiche in programma, persuaso che la bonifica dei registri rappresenti un'attività di competenza della cancelleria e che il proprio compito si esaurisca nella corretta estrazione e presentazione dei dati disponibili nel sistema gestionale."}, {"num": 107, "domanda": "Da diversi mesi lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Svolgendo la funzione di raccordo con la cancelleria, si accorge che le comunicazioni operative quotidiane tra AUP e cancellieri avvengono prevalentemente attraverso applicazioni di messaggistica personale, anziché attraverso canali istituzionali. Questa prassi, benché rapida, non garantisce la tracciabilità degli scambi né la tutela della riservatezza delle informazioni processuali. Come si comporterebbe in questa situazione?", "efficace": "Censisce le comunicazioni che transitano fuori dai canali istituzionali, distinguendo quelle che contengono dati processuali riservati da quelle meramente operative. Quindi, individua tra gli strumenti istituzionali disponibili quelli che garantiscano rapidità e tracciabilità degli scambi. Infine, sottopone al Dirigente una proposta di protocollo che indichi i canali da utilizzare per ciascuna tipologia di comunicazione, offrendosi di accompagnare i colleghi nella transizione.", "media": "Adotta la posta elettronica istituzionale per le proprie comunicazioni con la cancelleria, assicurando tracciabilità e riservatezza degli scambi. Poi, suggerisce informalmente ai colleghi più vicini di fare altrettanto, accennando ai rischi legati all'uso di applicazioni personali. Quanto al coinvolgimento del Dirigente, lo rimanda a un momento successivo, confidando che il proprio esempio sia sufficiente a modificare gradualmente la prassi nella sezione.", "inefficace": "Gestisce le comunicazioni quotidiane con la cancelleria attraverso gli stessi strumenti adoperati dai colleghi, apprezzandone la rapidità e l'immediatezza nelle attività di raccordo. Del resto, è convinto che modificare unilateralmente le modalità di comunicazione consolidate rallenterebbe il flusso di lavoro con la cancelleria e che spetti al Dirigente stabilire quali canali debbano essere impiegati per le comunicazioni operative tra il personale dell'ufficio."}, {"num": 108, "domanda": "Lei opera come Addetto all'Ufficio per il Processo con funzioni trasversali presso un Tribunale e supporta il Dirigente amministrativo nella raccolta dei dati necessari alla valutazione della performance degli AUP. Avviando la raccolta, rileva che gli indicatori di rendimento — numero di schede redatte, bozze predisposte, verbalizzazioni — vengono registrati manualmente da ciascun addetto senza un sistema digitale centralizzato, rendendo difficoltoso il monitoraggio complessivo e producendo dati spesso non aggiornati. Come si comporterebbe in questa situazione?", "efficace": "Raccoglie dai colleghi le registrazioni individuali in uso, analizzando le difformità nei formati e nelle modalità di inserimento. Sulla base di quanto emerso, progetta un foglio di lavoro condiviso con campi standardizzati per ciascun indicatore, alimentabile in tempo reale da tutti gli addetti. Quindi, presenta al Dirigente il prototipo corredato da un piano di adozione, proponendo un ciclo di verifiche trimestrali per garantire completezza e affidabilità dei dati raccolti.", "media": "Riunisce in un unico documento i dati forniti dai colleghi, cercando di uniformare le informazioni raccolte per ottenere un quadro omogeneo. Poi, trasmette il documento al Dirigente, segnalandogli le principali difficoltà incontrate nella raccolta e chiedendogli se ritenga utile dotarsi di uno strumento condiviso. Intanto, si riserva di aggiornare periodicamente il file, nella speranza che i colleghi si abituino a fornire dati più completi e puntuali.", "inefficace": "Compila con cura un prospetto riepilogativo con i dati trasmessi da ciascun collega, adattandone il formato per conferire al documento un aspetto ordinato e coerente. Poi, lo consegna al Dirigente nei tempi previsti, ritenendo che il proprio compito consista nel presentare le informazioni ricevute nella forma più accurata possibile e che eventuali disallineamenti nella base dati possano risolversi fisiologicamente con le successive rilevazioni semestrali."}, {"num": 109, "domanda": "Lavorando come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei svolge quotidianamente ricerche giurisprudenziali utilizzando banche dati esterne. Tuttavia, scopre che il Tribunale dispone di un archivio digitale interno contenente le sentenze delle diverse sezioni, aggiornato ma scarsamente utilizzato dai colleghi. Questo strumento consentirebbe di individuare rapidamente gli orientamenti giurisprudenziali locali, riducendo i tempi di ricerca per le cause seriali. Come si comporterebbe in questa situazione?", "efficace": "Esplora l'archivio digitale interno, testandone le funzionalità di ricerca e la copertura rispetto alle banche dati esterne. Quindi, lo utilizza sui fascicoli di cause seriali in gestione, documentando il risparmio di tempo ottenuto e la pertinenza dei risultati. Infine, illustra al Presidente di Sezione i vantaggi riscontrati e gli propone di integrare lo strumento nel flusso di lavoro, redigendo una guida operativa per agevolarne l'adozione tra i colleghi della sezione.", "media": "Inizia a consultare l'archivio digitale interno per le proprie ricerche, affiancandolo alle banche dati esterne sulle cause seriali della sezione. Poi, ne parla informalmente con i colleghi più vicini, consigliando loro di provarlo sulle questioni su cui il Tribunale ha espresso orientamenti consolidati. Tuttavia, lascia che ciascuno decida autonomamente se integrarlo nelle proprie abitudini di lavoro, confidando che i risultati ottenuti parlino da soli.", "inefficace": "Prende nota dell'archivio interno e prosegue con le banche dati esterne già consolidate nel proprio metodo di lavoro, ritenendole più complete e affidabili per le proprie necessità operative. Del resto, è persuaso che adottare uno strumento poco conosciuto richiederebbe un investimento di tempo difficile da giustificare a fronte delle scadenze correnti e che, qualora l'archivio fosse davvero utile, i colleghi più esperti lo avrebbero già adottato da tempo."}, {"num": 110, "domanda": "Nel ruolo di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei nota che le schede preparatorie redatte dai diversi AUP della sezione vengono prodotte in formati digitali differenti — documenti di testo, fogli di calcolo, semplici annotazioni — senza un modello condiviso. Questa eterogeneità rende impossibile confrontare le schede, aggregarne il contenuto e archiviarle in modo strutturato per consultazioni future. Come si comporterebbe in questa situazione?", "efficace": "Passa in rassegna le schede prodotte dai colleghi, identificando gli elementi ricorrenti e le soluzioni più efficaci presenti nei diversi formati. Quindi, predispone un modello digitale unificato che raccolga in campi strutturati tutte le informazioni utili ai Magistrati. Infine, lo sottopone al Presidente di Sezione, proponendo di adottarlo come standard e di archiviare le schede in una cartella organizzata per materia, così da renderla consultabile per le ricerche future.", "media": "Predispone un modello di scheda basato sulla propria esperienza lavorativa, strutturandolo in sezioni che riflettono le informazioni più rilevanti per il Magistrato. Poi, lo condivide con i colleghi della sezione, proponendo loro di utilizzarlo come riferimento per uniformare le schede. Tuttavia, lascia a ciascuno la libertà di adattarlo alle proprie esigenze, augurandosi che l'uso del modello si diffonda progressivamente tra i colleghi senza interventi formali.", "inefficace": "Perfeziona il formato delle proprie schede preparatorie, curandone la completezza e la coerenza interna per rispondere al meglio alle esigenze del Magistrato di riferimento. Poi, prosegue con la lavorazione dei fascicoli assegnati, convinto che ciascun addetto debba adeguare le proprie schede alle specificità del Magistrato con cui collabora e che spetti al Presidente di Sezione valutare se introdurre un modello condiviso, qualora lo ritenga funzionale al lavoro della sezione."}, {"num": 112, "domanda": "Da diversi mesi lei lavora come Addetto all'Ufficio per il Processo con funzioni statistico-informatiche presso un Tribunale. Predisponendo i report periodici sull'attività dell'ufficio, lei riscontra che i dati estratti dal sistema informatico differiscono sensibilmente a seconda dei filtri applicati e del momento dell'estrazione. Di conseguenza, i report destinati alla Presidenza, alla Dirigenza e al Ministero presentano cifre non coerenti tra loro, generando dubbi sull'affidabilità delle rilevazioni. Come si comporterebbe in questa situazione?", "efficace": "Ricostruisce le estrazioni già effettuate, documentando filtri, data e cifre ottenute per individuare le variabili che generano le discrepanze. Quindi, definisce un set univoco di parametri che garantisca la riproducibilità dei risultati indipendentemente dal momento dell'estrazione. Infine, presenta alla Presidenza e alla Dirigenza il protocollo elaborato, proponendo di adottarlo come standard per tutte le rilevazioni destinate ai diversi destinatari istituzionali.", "media": "Confronta i report più recenti, evidenziando le principali divergenze nelle cifre e annotando i filtri utilizzati in ciascuna estrazione. Poi, segnala le incongruenze alla Presidenza e alla Dirigenza con una tabella comparativa, chiedendo indicazioni su quali parametri privilegiare per le estrazioni future. Nel frattempo, adotta per i propri report i filtri che ritiene più affidabili, in attesa che venga definita una linea comune per le successive rilevazioni.", "inefficace": "Seleziona il set di filtri che produce i risultati più coerenti con le rilevazioni precedenti e lo applica uniformemente ai propri report, garantendo continuità rispetto ai dati già trasmessi. Poi, prosegue con le elaborazioni in programma, convinto che uniformare i criteri di estrazione rappresenti una questione tecnica di competenza del servizio informatico e che il proprio ruolo si limiti a produrre report accurati sulla base dei parametri a propria disposizione."}, {"num": 113, "domanda": "In qualità di Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale, lei si accorge che i risultati delle ricerche giurisprudenziali svolte dai singoli AUP non vengono condivisi digitalmente con i colleghi della sezione. Ciascun addetto archivia le proprie ricerche in cartelle personali, con la conseguenza che questioni giuridiche già approfondite da un collega vengono riesaminate da altri, duplicando significativamente lo sforzo. Come si comporterebbe in questa situazione?", "efficace": "Analizza le ricerche archiviate dai colleghi, individuando le questioni già approfondite e le sovrapposizioni più frequenti. Quindi, struttura un archivio digitale condiviso organizzato per materia, con un sistema di etichette che consenta di verificare se un tema sia già stato trattato. Infine, propone al Presidente di Sezione l'adozione dello strumento, definendo un flusso in cui ogni nuova ricerca venga classificata e resa immediatamente disponibile all'intera sezione.", "media": "Crea una cartella condivisa sul server dell'ufficio e vi trasferisce le proprie ricerche giurisprudenziali, organizzandole per argomento. Poi, invita i colleghi a fare altrettanto, illustrando il vantaggio di consultare il materiale disponibile prima di avviare nuove ricerche. Tuttavia, lascia a ciascuno la scelta di aderire spontaneamente, rinunciando a proporre al Presidente un'adozione formale e confidando che la praticità dello strumento ne favorisca la diffusione nel tempo.", "inefficace": "Mantiene un archivio personale ordinato per materia, curandone l'aggiornamento costante per potervi attingere rapidamente nelle ricerche future. Del resto, è persuaso che ciascun addetto sviluppi un proprio metodo di ricerca e che condividere materiale prodotto per un fascicolo specifico potrebbe risultare fuorviante se estrapolato dal contesto. Pertanto, si concentra sulla qualità delle proprie analisi e sulla tempestività del supporto offerto al Magistrato."}, {"num": 115, "domanda": "Lavorando come Addetto all’Ufficio per il Processo presso la sezione penale di un Tribunale, si rende conto che i fascicoli cartacei sono conservati in archivi compattabili ma, una volta prelevati, il loro spostamento non viene tracciato in alcun modo. Quando un fascicolo viene estratto per lo studio o l’udienza, non resta registrazione del detentore né della sua collocazione temporanea. In più occasioni fascicoli necessari per udienze imminenti non sono stati reperiti in tempo, causando ritardi nella trattazione. Come si comporterebbe in questa situazione?", "efficace": "Progetta un registro digitale condiviso in cui annotare, per ciascun fascicolo prelevato dagli archivi compattabili, data, destinazione e nome del detentore. Poi, d'accordo con il Presidente, lo testa sui fascicoli della propria sezione, verificandone la praticità e raccogliendo il feedback dei colleghi. Infine, sulla base di ciò, propone di estenderne l’uso alle altre sezioni e di inserire la registrazione dei prelievi tra gli adempimenti obbligatori.", "media": "Crea un foglio di calcolo per tracciare la data e la destinazione dei fascicoli prelevati dagli archivi compattabili e comincia a utilizzarlo immediatamente. Poi, condivide il foglio ad alcuni colleghi, invitandoli ad aggiornarlo ogni volta che estraggono un fascicolo. Infine, preferendo che la diffusione di tale soluzione avvenga spontaneamente da parte dei colleghi che ne riconoscono progressivamente l’utilità, ne rimanda la presentazione formale al Presidente.", "inefficace": "Intensifica i controlli sui fascicoli di propria competenza, verificandone con anticipo la collocazione negli archivi compattabili nei giorni precedenti le udienze per assicurarne la disponibilità. Del resto, è persuaso che la tracciabilità dei fascicoli cartacei sia una questione organizzativa che investe l'intero ufficio e che richieda un intervento del Dirigente, unico soggetto dotato dell'autorità per introdurre procedure operative vincolanti per tutto il personale della sezione."}, {"num": 116, "domanda": "Da qualche mese lei lavora come Addetto all'Ufficio per il Processo presso la sezione penale di un Tribunale. Predisponendo i decreti di fissazione udienza, scopre che il modello digitale in uso contiene campi e riferimenti normativi non più coerenti con le modifiche introdotte dalla recente riforma processuale. Alcuni decreti già emessi sulla base del modello obsoleto hanno infatti generato richieste di chiarimento da parte dei difensori, ma nessuno nella sezione ha ancora provveduto ad aggiornarlo. Come si comporterebbe in questa situazione?", "efficace": "Revisiona il modello alla luce delle modifiche introdotte dalla riforma, individuando campi e riferimenti normativi da correggere. Quindi, predispone una versione aggiornata del decreto e la sottopone al Magistrato per la validazione, concordando con la cancelleria la sostituzione del modello obsoleto. Infine, propone al Presidente di estendere la verifica a tutti i modelli in uso nella sezione, istituendo un controllo periodico a ogni modifica normativa rilevante.", "media": "Segnala al Magistrato di riferimento le incongruenze riscontrate nel modello, elencando i principali campi e riferimenti normativi che necessitano di aggiornamento. Poi, gli chiede come intenda procedere per la correzione e se ritenga opportuno coinvolgere la cancelleria nella sostituzione del modello. Nel frattempo, continua a utilizzare il formato esistente per i decreti in lavorazione, in attesa di ricevere indicazioni operative sulla versione da adottare.", "inefficace": "Utilizza il modello in uso aggiungendo manualmente le correzioni necessarie ai riferimenti normativi, caso per caso, prima di trasmettere ciascun decreto. Del resto, è convinto che il modello sia un documento tecnico la cui revisione compete alla cancelleria e che, finché le correzioni manuali garantiscono la correttezza formale del singolo provvedimento, la sostituzione del modello possa attendere senza conseguenze rilevanti per l'attività della sezione."}, {"num": 118, "domanda": "Operando come Addetto all'Ufficio per il Processo con funzioni statistico-informatiche presso un Tribunale, lei coordina la pubblicazione delle massime giurisprudenziali sul portale interno della banca dati di merito. Svolgendo questa attività, rileva che l'inserimento di ciascuna massima richiede numerosi passaggi manuali ripetitivi, rendendo il processo lento e scoraggiando i colleghi dall'alimentare regolarmente la banca dati. Tuttavia, individua alcune soluzioni tecniche che potrebbero semplificare significativamente il caricamento. Come si comporterebbe in questa situazione?", "efficace": "Mappa i passaggi manuali del caricamento, individuando quelli automatizzabili con le soluzioni tecniche identificate. Quindi, realizza un prototipo del flusso semplificato e lo testa su un campione di massime, misurando la riduzione dei tempi di inserimento. Infine, presenta alla Presidenza i risultati ottenuti con una proposta concreta di implementazione, predisponendo una guida operativa per i colleghi e offrendosi di monitorare l'alimentazione della banca dati.", "media": "Applica le soluzioni individuate al proprio flusso di lavoro, semplificando i passaggi ripetitivi e velocizzando sensibilmente il caricamento delle massime che cura direttamente. Poi, condivide con i colleghi le accortezze adottate, mostrando come risparmiare tempo nelle operazioni di inserimento. Tuttavia, rimanda a un momento successivo la formalizzazione presso la Presidenza, confidando che i colleghi apprezzino i miglioramenti e li adottino spontaneamente.", "inefficace": "Prosegue con il caricamento delle massime seguendo la procedura in uso, dedicando a ciascun inserimento il tempo necessario per completare i passaggi previsti dal portale. Del resto, è convinto che la semplificazione del processo richieda interventi tecnici sull'architettura del portale che esulano dalle proprie competenze e che spetti al MAGRIF e al servizio informatico valutare se e come ottimizzare le attuali modalità di alimentazione della banca dati."}, {"num": 119, "domanda": "Lei lavora come Addetto all'Ufficio per il Processo presso la sezione civile di un Tribunale. Organizzando i fascicoli digitali in preparazione alle udienze, nota che ciascun AUP della sezione adotta criteri diversi per ordinare i documenti all'interno del fascicolo telematico: alcuni seguono l'ordine cronologico di deposito, altri li riorganizzano per tipologia di atto. Questa disomogeneità disorienta i Magistrati, che si trovano ad affrontare fascicoli strutturati ogni volta in
